<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f9f7fb"/><text x="70" y="80" font-size="34" font-family="Arial,sans-serif" font-weight="700" fill="#2d1b46">Agent Guardrails</text><g font-family="Arial,sans-serif"><rect x="90" y="145" width="450" height="390" rx="8" fill="#fff" stroke="#d3c2e5"/><text x="130" y="200" font-size="26" font-weight="700" fill="#3d2466">Allowed by default</text><text x="130" y="255" font-size="20" fill="#3f3d56">who, quota, pwd, ls</text><text x="130" y="295" font-size="20" fill="#3f3d56">tree, meta, search</text><text x="130" y="335" font-size="20" fill="#3f3d56">download to fixed directory</text><text x="130" y="375" font-size="20" fill="#3f3d56">upload to /AgentDrop</text><text x="130" y="415" font-size="20" fill="#3f3d56">mkdir inside approved paths</text><rect x="660" y="145" width="450" height="390" rx="8" fill="#fff" stroke="#d3c2e5"/><text x="700" y="200" font-size="26" font-weight="700" fill="#8a1c2f">Blocked unless approved</text><text x="700" y="255" font-size="20" fill="#3f3d56">rm or bulk delete</text><text x="700" y="295" font-size="20" fill="#3f3d56">share set / share cancel</text><text x="700" y="335" font-size="20" fill="#3f3d56">overwrite without policy</text><text x="700" y="375" font-size="20" fill="#3f3d56">logout or credential printing</text><text x="700" y="415" font-size="20" fill="#3f3d56">reading config secrets</text></g></svg>