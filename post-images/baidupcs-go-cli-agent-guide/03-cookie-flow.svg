<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f7fbff"/><text x="70" y="80" font-size="34" font-family="Arial,sans-serif" font-weight="700" fill="#12344d">Getting BDUSS and STOKEN Safely</text><g font-family="Arial,sans-serif"><rect x="80" y="155" width="200" height="130" rx="8" fill="#fff" stroke="#b7c9d8"/><text x="112" y="205" font-size="22" font-weight="700" fill="#12344d">1 Login</text><text x="112" y="242" font-size="17" fill="#486581">pan.baidu.com</text><rect x="330" y="155" width="220" height="130" rx="8" fill="#fff" stroke="#b7c9d8"/><text x="362" y="205" font-size="22" font-weight="700" fill="#12344d">2 DevTools</text><text x="362" y="242" font-size="17" fill="#486581">Network + Preserve log</text><rect x="600" y="155" width="230" height="130" rx="8" fill="#fff" stroke="#b7c9d8"/><text x="632" y="205" font-size="22" font-weight="700" fill="#12344d">3 Cookie</text><text x="632" y="242" font-size="17" fill="#486581">Request Headers</text><rect x="880" y="155" width="240" height="130" rx="8" fill="#fff" stroke="#b7c9d8"/><text x="912" y="205" font-size="22" font-weight="700" fill="#12344d">4 Extract</text><text x="912" y="242" font-size="17" fill="#486581">BDUSS + STOKEN only</text><rect x="180" y="395" width="840" height="120" rx="8" fill="#fff3cd" stroke="#e0b84c"/><text x="220" y="445" font-size="24" font-weight="700" fill="#7a4f01">Do not confuse STOKEN with bdstoken</text><text x="220" y="485" font-size="19" fill="#5c4813">Copy from Baidu Netdisk request cookies, then store it like a password.</text></g></svg>