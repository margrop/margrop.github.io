<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#fbfaf7"/><text x="70" y="80" font-size="34" font-family="Arial,sans-serif" font-weight="700" fill="#1f2933">Install Check Before Automation</text><g font-family="Arial,sans-serif" font-size="22"><rect x="90" y="150" width="1020" height="420" rx="8" fill="#fff" stroke="#d6cfc2"/><text x="140" y="220" fill="#1f2933">1. command path: which BaiduPCS-Go</text><text x="140" y="290" fill="#1f2933">2. version: BaiduPCS-Go --version</text><text x="140" y="360" fill="#1f2933">3. login help: BaiduPCS-Go login --help</text><text x="140" y="430" fill="#1f2933">4. config dir: BAIDUPCS_GO_CONFIG_DIR</text><text x="140" y="500" fill="#1f2933">5. read-only check: who / quota / ls /</text><circle cx="1040" cy="215" r="22" fill="#1f9d55"/><circle cx="1040" cy="285" r="22" fill="#1f9d55"/><circle cx="1040" cy="355" r="22" fill="#1f9d55"/><circle cx="1040" cy="425" r="22" fill="#1f9d55"/><circle cx="1040" cy="495" r="22" fill="#1f9d55"/></g></svg>