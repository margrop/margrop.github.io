<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f8faf9"/><text x="70" y="80" font-size="34" font-family="Arial,sans-serif" font-weight="700" fill="#1f2933">Common Command Map</text><g font-family="Arial,sans-serif"><rect x="90" y="145" width="300" height="150" rx="8" fill="#fff" stroke="#c9d5cf"/><text x="120" y="195" font-size="24" font-weight="700" fill="#0b6b58">Read</text><text x="120" y="235" font-size="18" fill="#394b59">who, quota, pwd, ls</text><text x="120" y="265" font-size="18" fill="#394b59">tree, meta, search</text><rect x="450" y="145" width="300" height="150" rx="8" fill="#fff" stroke="#c9d5cf"/><text x="480" y="195" font-size="24" font-weight="700" fill="#0b6b58">Download</text><text x="480" y="235" font-size="18" fill="#394b59">d path --saveto dir</text><text x="480" y="265" font-size="18" fill="#394b59">--fullpath --mtime</text><rect x="810" y="145" width="300" height="150" rx="8" fill="#fff" stroke="#c9d5cf"/><text x="840" y="195" font-size="24" font-weight="700" fill="#0b6b58">Upload</text><text x="840" y="235" font-size="18" fill="#394b59">u local remote</text><text x="840" y="265" font-size="18" fill="#394b59">--policy skip/rsync</text><rect x="270" y="385" width="300" height="150" rx="8" fill="#fff" stroke="#c9d5cf"/><text x="300" y="435" font-size="24" font-weight="700" fill="#0b6b58">Transfer</text><text x="300" y="475" font-size="18" fill="#394b59">cd target first</text><text x="300" y="505" font-size="18" fill="#394b59">transfer link code</text><rect x="630" y="385" width="300" height="150" rx="8" fill="#fff" stroke="#c9d5cf"/><text x="660" y="435" font-size="24" font-weight="700" fill="#0b6b58">High Risk</text><text x="660" y="475" font-size="18" fill="#394b59">rm, share set</text><text x="660" y="505" font-size="18" fill="#394b59">require explicit approval</text></g></svg>