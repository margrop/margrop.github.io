<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f6f8fb"/><text x="70" y="78" font-size="34" font-family="Arial,sans-serif" font-weight="700" fill="#172033">BaiduPCS-Go: from CLI to Agent</text><text x="70" y="118" font-size="18" font-family="Arial,sans-serif" fill="#52606d">Credentials stay private. Commands become repeatable. Agent work stays bounded.</text><g font-family="Arial,sans-serif"><rect x="70" y="180" width="230" height="150" rx="8" fill="#fff" stroke="#c8d2dc"/><text x="95" y="225" font-size="24" font-weight="700" fill="#0f4c81">Browser</text><text x="95" y="265" font-size="18" fill="#394b59">Login to pan.baidu.com</text><text x="95" y="295" font-size="18" fill="#394b59">Read BDUSS + STOKEN</text><rect x="370" y="180" width="230" height="150" rx="8" fill="#fff" stroke="#c8d2dc"/><text x="395" y="225" font-size="24" font-weight="700" fill="#0f4c81">BaiduPCS-Go</text><text x="395" y="265" font-size="18" fill="#394b59">ls / d / u / transfer</text><text x="395" y="295" font-size="18" fill="#394b59">Config directory isolated</text><rect x="670" y="180" width="230" height="150" rx="8" fill="#fff" stroke="#c8d2dc"/><text x="695" y="225" font-size="24" font-weight="700" fill="#0f4c81">Wrapper</text><text x="695" y="265" font-size="18" fill="#394b59">Allow safe commands</text><text x="695" y="295" font-size="18" fill="#394b59">Block delete/share</text><rect x="970" y="180" width="160" height="150" rx="8" fill="#fff" stroke="#c8d2dc"/><text x="1000" y="225" font-size="24" font-weight="700" fill="#0f4c81">Agent</text><text x="1000" y="265" font-size="18" fill="#394b59">Plan</text><text x="1000" y="295" font-size="18" fill="#394b59">Run</text><text x="1000" y="325" font-size="18" fill="#394b59">Verify</text><rect x="160" y="430" width="880" height="110" rx="8" fill="#e8f4ef" stroke="#8fc7ad"/><text x="200" y="475" font-size="24" font-weight="700" fill="#145a3d">Guardrail</text><text x="200" y="515" font-size="20" fill="#254b3b">Never print or commit BDUSS, STOKEN, Cookie, private paths, or account identifiers.</text></g></svg>