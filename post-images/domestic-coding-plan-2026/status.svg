<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="700" viewBox="0 0 1500 700"><rect width="1500" height="700" rx="24" fill="#fff7ed"/><text x="70" y="85" fill="#7c2d12" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="700">“限购”到底是什么意思</text><g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="28"><rect x="80" y="150" width="390" height="390" rx="24" fill="#bbf7d0"/><text x="125" y="240" fill="#166534" font-weight="700">可以购买</text><text x="125" y="310">入口可以付款</text><text x="125" y="355">但仍有使用额度</text><rect x="555" y="150" width="390" height="390" rx="24" fill="#fde68a"/><text x="600" y="240" fill="#854d0e" font-weight="700">灰度或邀请</text><text x="600" y="310">需要账号资格</text><text x="600" y="355">状态可能随时变化</text><rect x="1030" y="150" width="390" height="390" rx="24" fill="#fecaca"/><text x="1075" y="240" fill="#991b1b" font-weight="700">暂停或无独立计划</text><text x="1075" y="310">改用 接口 或 开发工具</text><text x="1075" y="355">不要一直等待</text></g></svg>
