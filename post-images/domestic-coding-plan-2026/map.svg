<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820"><rect width="1500" height="820" rx="24" fill="#f8fafc"/><text x="70" y="85" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="44" font-weight="700" fill="#0f172a">国内产品的三种形态</text><g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="28"><rect x="80" y="150" width="400" height="500" rx="24" fill="#dbeafe"/><text x="125" y="235" font-weight="700" fill="#1e3a8a">国内编程套餐</text><text x="125" y="300">按月购买套餐</text><text x="125" y="345">主要面向 智能体</text><text x="125" y="390">例如：GLM、火山方舟</text><rect x="550" y="150" width="400" height="500" rx="24" fill="#dcfce7"/><text x="595" y="235" font-weight="700" fill="#166534">开发工具 计划</text><text x="595" y="300">编辑器内订阅</text><text x="595" y="345">补全、问答与 智能体</text><text x="595" y="390">例如：灵码、文心快码</text><rect x="1020" y="150" width="400" height="500" rx="24" fill="#fef3c7"/><text x="1065" y="235" font-weight="700" fill="#92400e">接口 / 额度</text><text x="1065" y="300">按调用或 令牌 付费</text><text x="1065" y="345">自己搭建 智能体</text><text x="1065" y="390">例如：模型开放平台</text></g></svg>
