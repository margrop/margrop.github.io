<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="boxA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="boxB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="boxC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="boxD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="980" rx="28" fill="url(#bg2)"/>
  <text x="70" y="84" font-size="40" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1f2937" font-weight="700">一次运行会话的内部流转</text>
  <text x="70" y="126" font-size="20" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">从 setup / registry / routing 到 transcript / session_store，状态被显式保留下来，而不是散落在函数里。</text>

  <g filter="url(#shadow2)">
    <rect x="80" y="220" width="220" height="110" rx="22" fill="url(#boxA)"/>
    <rect x="350" y="220" width="220" height="110" rx="22" fill="url(#boxB)"/>
    <rect x="620" y="220" width="220" height="110" rx="22" fill="url(#boxC)"/>
    <rect x="890" y="220" width="220" height="110" rx="22" fill="url(#boxD)"/>
    <rect x="1160" y="220" width="360" height="110" rx="22" fill="#334155"/>
  </g>

  <text x="115" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">setup</text>
  <text x="115" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f0fdfa">prefetch + trust gate</text>

  <text x="386" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">graph</text>
  <text x="386" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f5f3ff">command / tool graphs</text>

  <text x="666" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">runtime</text>
  <text x="666" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff7ed">route_prompt scoring</text>

  <text x="925" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">engine</text>
  <text x="925" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#eff6ff">submit / stream / compact</text>

  <text x="1205" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">session_store</text>
  <text x="1205" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#e2e8f0">persist / load / replay</text>

  <g stroke="#64748b" stroke-width="4" fill="none">
    <path d="M300 275 H345"/>
    <path d="M570 275 H615"/>
    <path d="M840 275 H885"/>
    <path d="M1110 275 H1155"/>
  </g>

  <g filter="url(#shadow2)">
    <rect x="100" y="410" width="320" height="180" rx="24" fill="#ffffff"/>
    <rect x="470" y="410" width="320" height="180" rx="24" fill="#ffffff"/>
    <rect x="840" y="410" width="320" height="180" rx="24" fill="#ffffff"/>
    <rect x="1210" y="410" width="320" height="180" rx="24" fill="#ffffff"/>
  </g>

  <text x="135" y="455" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#0f766e" font-weight="700">QueryEnginePort</text>
  <text x="135" y="490" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">session_id</text>
  <text x="135" y="520" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">mutable_messages</text>
  <text x="135" y="550" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">permission_denials / usage / transcript</text>

  <text x="505" y="455" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#7c3aed" font-weight="700">HistoryLog</text>
  <text x="505" y="490" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">stage-by-stage session notes</text>
  <text x="505" y="520" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">bootstrap / routing / execution / store</text>
  <text x="505" y="550" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">markdown output for inspection</text>

  <text x="875" y="455" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#b45309" font-weight="700">TranscriptStore</text>
  <text x="875" y="490" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">append / compact / replay</text>
  <text x="875" y="520" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">flushed flag keeps lifecycle visible</text>
  <text x="875" y="550" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">persistence is explicit, not hidden</text>

  <text x="1245" y="455" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1d4ed8" font-weight="700">StoredSession</text>
  <text x="1245" y="490" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">messages + token totals</text>
  <text x="1245" y="520" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">saved under .port_sessions/</text>
  <text x="1245" y="550" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">load_session for later replay</text>

  <text x="70" y="700" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">在这个系统里，“会话”不是聊天记录的副产品，而是被主动经营的对象。它可回放、可压缩、可持久化。</text>
</svg>
