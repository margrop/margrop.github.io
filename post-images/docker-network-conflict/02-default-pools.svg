<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfcff"/>
      <stop offset="100%" stop-color="#f3f7ff"/>
    </linearGradient>
    <linearGradient id="pool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <style>
      .title{font:700 34px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#17324d}
      .label{font:700 22px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#17324d}
      .text{font:500 18px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#334155}
      .mono{font:700 18px/1.5 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#17324d}
      .small{font:500 15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .card{fill:#fff;stroke:#b6c7df;stroke-width:2}
      .ok{fill:#fff;stroke:#7fc49a;stroke-width:2}
      .warn{fill:#fff;stroke:#f0b36d;stroke-width:2}
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg2)"/>
  <text x="700" y="58" text-anchor="middle" class="title">Set a single private pool for Docker auto networks</text>

  <rect x="90" y="120" width="1220" height="560" rx="28" fill="#ffffff" stroke="#d6dfef" stroke-width="2"/>

  <rect x="150" y="190" width="340" height="390" rx="24" class="warn"/>
  <text x="320" y="240" text-anchor="middle" class="label">Bad default</text>
  <text x="320" y="280" text-anchor="middle" class="text">Multiple families, easy to collide</text>
  <rect x="185" y="320" width="270" height="74" rx="16" class="card"/>
  <text x="320" y="355" text-anchor="middle" class="mono">192.168.x.x</text>
  <text x="320" y="381" text-anchor="middle" class="small">too close to home LAN</text>
  <rect x="185" y="415" width="270" height="74" rx="16" class="card"/>
  <text x="320" y="450" text-anchor="middle" class="mono">10.x.x.x</text>
  <text x="320" y="476" text-anchor="middle" class="small">often used by VPN / corp network</text>

  <rect x="530" y="190" width="340" height="390" rx="24" class="ok"/>
  <text x="700" y="240" text-anchor="middle" class="label">Chosen rule</text>
  <text x="700" y="280" text-anchor="middle" class="text">One reserved private block for Docker</text>
  <rect x="565" y="320" width="270" height="74" rx="16" class="card"/>
  <text x="700" y="355" text-anchor="middle" class="mono">172.16.0.0/12</text>
  <text x="700" y="381" text-anchor="middle" class="small">expanded space for many stacks</text>
  <rect x="565" y="415" width="270" height="74" rx="16" class="card"/>
  <text x="700" y="450" text-anchor="middle" class="mono">size = 20</text>
  <text x="700" y="476" text-anchor="middle" class="small">Docker slices the pool automatically</text>

  <rect x="910" y="190" width="270" height="390" rx="24" class="ok"/>
  <text x="1045" y="240" text-anchor="middle" class="label">Outcome</text>
  <text x="1045" y="280" text-anchor="middle" class="text">Predictable future networks</text>
  <text x="1045" y="310" text-anchor="middle" class="text">and easier troubleshooting</text>
  <rect x="945" y="350" width="200" height="60" rx="14" class="card"/>
  <text x="1045" y="386" text-anchor="middle" class="mono">Portainer</text>
  <rect x="945" y="425" width="200" height="60" rx="14" class="card"/>
  <text x="1045" y="461" text-anchor="middle" class="mono">Dockhand</text>
  <rect x="945" y="500" width="200" height="60" rx="14" class="card"/>
  <text x="1045" y="536" text-anchor="middle" class="mono">docker compose</text>

  <path d="M500 385h24" stroke="#94a3b8" stroke-width="4"/>
  <path d="M870 385h24" stroke="#94a3b8" stroke-width="4"/>
  <path d="M501 385l-10-8v16z" fill="#94a3b8"/>
  <path d="M894 385l10-8v16z" fill="#94a3b8"/>
</svg>
