<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfbfb"/>
      <stop offset="100%" stop-color="#f4f9f7"/>
    </linearGradient>
    <style>
      .title{font:700 34px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#17324d}
      .label{font:700 20px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#17324d}
      .text{font:500 17px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#334155}
      .mono{font:700 18px/1.5 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#17324d}
      .card{fill:#fff;stroke:#c7d6e4;stroke-width:2}
      .step{fill:#fff;stroke:#8cc3a2;stroke-width:2}
      .warn{fill:#fff;stroke:#efb267;stroke-width:2}
      .bad{fill:#fff;stroke:#e08d8d;stroke-width:2}
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg3)"/>
  <text x="700" y="58" text-anchor="middle" class="title">Migration path: from conflicting networks to private 172 ranges</text>

  <rect x="70" y="130" width="1260" height="560" rx="28" fill="#fff" stroke="#dbe4ec" stroke-width="2"/>

  <rect x="115" y="210" width="260" height="300" rx="24" class="bad"/>
  <text x="245" y="255" text-anchor="middle" class="label">1. Find the old net</text>
  <rect x="145" y="290" width="200" height="56" rx="14" class="card"/>
  <text x="245" y="325" text-anchor="middle" class="mono">docker network ls</text>
  <rect x="145" y="360" width="200" height="56" rx="14" class="card"/>
  <text x="245" y="395" text-anchor="middle" class="mono">docker inspect</text>
  <text x="245" y="445" text-anchor="middle" class="text">Record subnet and attached containers</text>

  <rect x="415" y="210" width="260" height="300" rx="24" class="warn"/>
  <text x="545" y="255" text-anchor="middle" class="label">2. Stop the stack</text>
  <rect x="445" y="290" width="200" height="56" rx="14" class="card"/>
  <text x="545" y="325" text-anchor="middle" class="mono">docker compose down</text>
  <rect x="445" y="360" width="200" height="56" rx="14" class="card"/>
  <text x="545" y="395" text-anchor="middle" class="mono">Portainer / Dockhand</text>
  <text x="545" y="445" text-anchor="middle" class="text">Keep volumes and data intact</text>

  <rect x="715" y="210" width="260" height="300" rx="24" class="step"/>
  <text x="845" y="255" text-anchor="middle" class="label">3. Recreate on 172</text>
  <rect x="745" y="290" width="200" height="56" rx="14" class="card"/>
  <text x="845" y="325" text-anchor="middle" class="mono">172.16.16.0/20</text>
  <rect x="745" y="360" width="200" height="56" rx="14" class="card"/>
  <text x="845" y="395" text-anchor="middle" class="mono">172.16.32.0/20</text>
  <text x="845" y="445" text-anchor="middle" class="text">Let the daemon own the new range</text>

  <rect x="1015" y="210" width="260" height="300" rx="24" class="step"/>
  <text x="1145" y="255" text-anchor="middle" class="label">4. Verify services</text>
  <rect x="1045" y="290" width="200" height="56" rx="14" class="card"/>
  <text x="1145" y="325" text-anchor="middle" class="mono">docker info</text>
  <rect x="1045" y="360" width="200" height="56" rx="14" class="card"/>
  <text x="1145" y="395" text-anchor="middle" class="mono">curl / healthcheck</text>
  <text x="1145" y="445" text-anchor="middle" class="text">Confirm the stack is reachable again</text>

  <path d="M375 360h34" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <path d="M375 360l-14-10v20z" fill="#94a3b8"/>
  <path d="M645 360h34" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <path d="M645 360l-14-10v20z" fill="#94a3b8"/>
  <path d="M945 360h34" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <path d="M945 360l-14-10v20z" fill="#94a3b8"/>

  <rect x="210" y="560" width="980" height="80" rx="20" class="card"/>
  <text x="700" y="607" text-anchor="middle" class="mono">Result: no more 192.168.* or 10.* Docker networks on the host</text>
</svg>
