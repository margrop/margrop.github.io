<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf4ff"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f1"/>
      <stop offset="100%" stop-color="#ffdede"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#effff5"/>
      <stop offset="100%" stop-color="#dff9ea"/>
    </linearGradient>
    <style>
      .title{font:700 34px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#16324f}
      .label{font:600 22px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#16324f}
      .text{font:500 18px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#334155}
      .mono{font:600 18px/1.5 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#16324f}
      .small{font:500 15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .box{fill:#ffffff;stroke:#9fb7d0;stroke-width:2}
      .badbox{fill:#fff;stroke:#ec7c7c;stroke-width:2}
      .goodbox{fill:#fff;stroke:#6bc58e;stroke-width:2}
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="700" y="58" text-anchor="middle" class="title">Docker network conflict: before and after</text>
  <rect x="60" y="110" width="600" height="580" rx="26" fill="url(#bad)" stroke="#f2a7a7" stroke-width="2"/>
  <rect x="740" y="110" width="600" height="580" rx="26" fill="url(#good)" stroke="#9bd7b0" stroke-width="2"/>
  <text x="360" y="164" text-anchor="middle" class="label">Before</text>
  <text x="1040" y="164" text-anchor="middle" class="label">After</text>

  <rect x="115" y="210" width="210" height="96" rx="18" class="badbox"/>
  <text x="220" y="245" text-anchor="middle" class="mono">Home LAN</text>
  <text x="220" y="274" text-anchor="middle" class="small">192.168.x.x</text>

  <rect x="345" y="210" width="260" height="96" rx="18" class="badbox"/>
  <text x="475" y="245" text-anchor="middle" class="mono">Docker auto nets</text>
  <text x="475" y="274" text-anchor="middle" class="small">192.168.x.x appears again</text>

  <rect x="130" y="360" width="500" height="150" rx="20" class="badbox"/>
  <text x="380" y="400" text-anchor="middle" class="label">Risk</text>
  <text x="380" y="438" text-anchor="middle" class="text">Routing confusion, LAN discovery issues,</text>
  <text x="380" y="465" text-anchor="middle" class="text">hard-to-trace access failures on the host</text>
  <text x="380" y="498" text-anchor="middle" class="small">The problem grows silently as more stacks are created.</text>

  <rect x="810" y="210" width="210" height="96" rx="18" class="goodbox"/>
  <text x="915" y="245" text-anchor="middle" class="mono">Home LAN</text>
  <text x="915" y="274" text-anchor="middle" class="small">192.168.x.x</text>

  <rect x="1040" y="210" width="260" height="96" rx="18" class="goodbox"/>
  <text x="1170" y="245" text-anchor="middle" class="mono">Docker auto nets</text>
  <text x="1170" y="274" text-anchor="middle" class="small">172.16.0.0/12 reserved</text>

  <rect x="835" y="360" width="500" height="150" rx="20" class="goodbox"/>
  <text x="1085" y="400" text-anchor="middle" class="label">Result</text>
  <text x="1085" y="438" text-anchor="middle" class="text">Clear separation between LAN and containers,</text>
  <text x="1085" y="465" text-anchor="middle" class="text">predictable network creation for new stacks</text>
  <text x="1085" y="498" text-anchor="middle" class="small">Portainer and Dockhand inherit the same rule.</text>

  <path d="M325 258h18" stroke="#d9534f" stroke-width="5" stroke-linecap="round"/>
  <path d="M1010 258h18" stroke="#3a9a5a" stroke-width="5" stroke-linecap="round"/>
  <circle cx="705" cy="360" r="36" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="705" y="368" text-anchor="middle" class="mono">VS</text>
</svg>
