<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="#0f172a" />

  <!-- Terminal Window -->
  <g transform="translate(40, 40)" filter="url(#shadow)">
    <!-- Header -->
    <rect width="720" height="370" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <path d="M 0,28 L 720,28" stroke="#334155" stroke-width="1.5" />
    <!-- Window controls -->
    <circle cx="20" cy="14" r="6" fill="#ef4444" />
    <circle cx="40" cy="14" r="6" fill="#f59e0b" />
    <circle cx="60" cy="14" r="6" fill="#10b981" />
    <!-- Window Title -->
    <text x="360" y="18" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#94a3b8">root@pve-node-01: ~</text>

    <!-- Terminal Content -->
    <g transform="translate(20, 55)" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="12" fill="#e2e8f0" xml:space="preserve">
      <!-- Command prompt -->
      <text x="0" y="20" fill="#38bdf8" font-weight="bold">root@pve-node-01</text>
      <text x="130" y="20" fill="#94a3b8">:</text>
      <text x="140" y="20" fill="#f43f5e" font-weight="bold">~</text>
      <text x="150" y="20" fill="#e2e8f0"># systemctl status fail2ban.service</text>

      <!-- Output -->
      <text x="0" y="45" fill="#10b981" font-weight="bold">●</text>
      <text x="15" y="45" font-weight="bold">fail2ban.service - Fail2Ban Service</text>
      <text x="25" y="65" fill="#94a3b8">Loaded: loaded (/usr/lib/systemd/system/fail2ban.service; enabled; preset: enabled)</text>
      <text x="25" y="85" fill="#94a3b8">Active: </text>
      <text x="80" y="85" fill="#10b981" font-weight="bold">active (running)</text>
      <text x="195" y="85" fill="#94a3b8"> since Tue 2026-05-26 22:20:00 CST; 5min ago</text>
      
      <text x="25" y="105" fill="#94a3b8">Docs: man:fail2ban(1)</text>
      <text x="25" y="125" fill="#94a3b8">Main PID: 12435 (fail2ban-server)</text>
      <text x="25" y="145" fill="#94a3b8">Tasks: 7 (limit: 38234)</text>
      <text x="25" y="165" fill="#94a3b8">Memory: 18.4M (min: 64.0M max: 512.0M)</text>
      <text x="25" y="185" fill="#94a3b8">CPU: 324ms</text>
      <text x="25" y="205" fill="#94a3b8">CGroup: /system.slice/fail2ban.service</text>
      <text x="80" y="225" fill="#94a3b8">└─12435 /usr/bin/python3 /usr/bin/fail2ban-server -xf start</text>

      <!-- Log Entries -->
      <text x="0" y="255" fill="#a855f7" font-weight="bold">May 26 22:20:00 pve-node-01 systemd[1]: Started fail2ban.service - Fail2Ban Service.</text>
      <text x="0" y="275" fill="#38bdf8">May 26 22:20:00 pve-node-01 fail2ban-server[12435]: Server ready</text>
      <text x="0" y="295" fill="#38bdf8">May 26 22:20:01 pve-node-01 fail2ban-server[12435]: Jail 'sshd' started</text>
      <text x="0" y="315" fill="#38bdf8">May 26 22:20:01 pve-node-01 fail2ban-server[12435]: Jail 'proxmox' started</text>
    </g>
  </g>
</svg>
