<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="#0f172a" />

  <!-- Terminal Window -->
  <g transform="translate(40, 40)" filter="url(#shadow)">
    <!-- Header -->
    <rect width="720" height="370" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <path d="M 0,28 L 720,28" stroke="#334155" stroke-width="1.5" />
    <!-- Window controls -->
    <circle cx="20" cy="14" r="6" fill="#ef4444" />
    <circle cx="40" cy="14" r="6" fill="#f59e0b" />
    <circle cx="60" cy="14" r="6" fill="#10b981" />
    <!-- Window Title -->
    <text x="360" y="18" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#94a3b8">root@pve-node-01: ~</text>

    <!-- Terminal Content -->
    <g transform="translate(20, 55)" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="11" fill="#e2e8f0" xml:space="preserve">
      <!-- Command prompt -->
      <text x="0" y="15" fill="#38bdf8" font-weight="bold">root@pve-node-01</text>
      <text x="130" y="15" fill="#94a3b8">:</text>
      <text x="140" y="15" fill="#f43f5e" font-weight="bold">~</text>
      <text x="150" y="15" fill="#e2e8f0"># nft list ruleset | grep -A 15 f2b</text>

      <!-- Output -->
      <text x="0" y="35" fill="#a855f7" font-weight="bold">table inet f2b-table {</text>
      <text x="20" y="55" fill="#e2e8f0">set f2b-sshd {</text>
      <text x="40" y="70" fill="#e2e8f0">type ipv4_addr</text>
      <text x="40" y="85" fill="#e2e8f0">elements = { <tspan fill="#f43f5e" font-weight="bold">198.51.100.45</tspan>, <tspan fill="#f43f5e" font-weight="bold">203.0.113.88</tspan> }</text>
      <text x="20" y="100" fill="#e2e8f0">}</text>

      <text x="20" y="125" fill="#e2e8f0">set f2b-proxmox {</text>
      <text x="40" y="140" fill="#e2e8f0">type ipv4_addr</text>
      <text x="40" y="155" fill="#e2e8f0">elements = { <tspan fill="#f43f5e" font-weight="bold">192.0.2.222</tspan> }</text>
      <text x="20" y="170" fill="#e2e8f0">}</text>

      <text x="20" y="195" fill="#e2e8f0">chain f2b-chain {</text>
      <text x="40" y="210" fill="#38bdf8">type filter hook input priority filter - 1; policy accept;</text>
      <text x="40" y="225" fill="#e2e8f0">ip saddr @f2b-sshd tcp dport 22 <tspan fill="#ef4444" font-weight="bold">drop</tspan></text>
      <text x="40" y="240" fill="#e2e8f0">ip saddr @f2b-proxmox tcp dport { 8006 } <tspan fill="#ef4444" font-weight="bold">drop</tspan></text>
      <text x="20" y="255" fill="#e2e8f0">}</text>
      <text x="0" y="270" fill="#a855f7" font-weight="bold">}</text>
      
      <!-- Command prompt return -->
      <text x="0" y="300" fill="#38bdf8" font-weight="bold">root@pve-node-01</text>
      <text x="130" y="300" fill="#94a3b8">:</text>
      <text x="140" y="300" fill="#f43f5e" font-weight="bold">~</text>
      <text x="150" y="300" fill="#e2e8f0"># _</text>
    </g>
  </g>
</svg>
