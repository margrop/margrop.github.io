<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="#0f172a" />

  <!-- Terminal Window -->
  <g transform="translate(40, 40)" filter="url(#shadow)">
    <!-- Header -->
    <rect width="720" height="370" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <path d="M 0,28 L 720,28" stroke="#334155" stroke-width="1.5" />
    <!-- Window controls -->
    <circle cx="20" cy="14" r="6" fill="#ef4444" />
    <circle cx="40" cy="14" r="6" fill="#f59e0b" />
    <circle cx="60" cy="14" r="6" fill="#10b981" />
    <!-- Window Title -->
    <text x="360" y="18" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#94a3b8">root@pve-node-01: ~</text>

    <!-- Terminal Content -->
    <g transform="translate(20, 55)" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="11" fill="#e2e8f0" xml:space="preserve">
      <!-- Command prompt -->
      <text x="0" y="15" fill="#38bdf8" font-weight="bold">root@pve-node-01</text>
      <text x="130" y="15" fill="#94a3b8">:</text>
      <text x="140" y="15" fill="#f43f5e" font-weight="bold">~</text>
      <text x="150" y="15" fill="#e2e8f0"># fail2ban-regex systemd-journal /etc/fail2ban/filter.d/proxmox.conf</text>

      <!-- Output -->
      <text x="0" y="35" fill="#e2e8f0">Running tests</text>
      <text x="0" y="50" fill="#e2e8f0">=============</text>
      <text x="0" y="70" fill="#e2e8f0">Use   systemd-journal container for systemd journal</text>
      <text x="0" y="85" fill="#e2e8f0">Use   filter file : proxmox, path : /etc/fail2ban/filter.d/proxmox.conf</text>
      
      <!-- Results section -->
      <text x="0" y="115" fill="#e2e8f0" font-weight="bold">Results</text>
      <text x="0" y="130" fill="#e2e8f0">=======</text>
      
      <!-- Failregex matches -->
      <text x="0" y="155" fill="#e2e8f0">Failregex: <tspan fill="#10b981" font-weight="bold">24 matched</tspan></text>
      <text x="20" y="175" fill="#94a3b8">[1] pvedaemon\[\d+\]: &lt;authentication failure&gt;; ...</text>
      <text x="20" y="195" fill="#94a3b8">[2] pveproxy\[\d+\]: .* connection error: ...</text>
      
      <!-- Ignoreregex -->
      <text x="0" y="225" fill="#e2e8f0">Ignoreregex: 0 matched</text>
      
      <!-- Summary -->
      <text x="0" y="255" fill="#e2e8f0">Lines: 1542 lines, 0 ignored, <tspan fill="#10b981" font-weight="bold">24 matched</tspan>, 1518 missed</text>
      <text x="0" y="270" fill="#94a3b8">[Public IP: 192.0.2.45, 198.51.100.12]</text>
      
      <!-- Success Prompt -->
      <text x="0" y="300" fill="#10b981" font-weight="bold">Success, matches found. Filter is working correctly!</text>
      
      <!-- Command prompt return -->
      <text x="0" y="325" fill="#38bdf8" font-weight="bold">root@pve-node-01</text>
      <text x="130" y="325" fill="#94a3b8">:</text>
      <text x="140" y="325" fill="#f43f5e" font-weight="bold">~</text>
      <text x="150" y="325" fill="#e2e8f0"># _</text>
    </g>
  </g>
</svg>
