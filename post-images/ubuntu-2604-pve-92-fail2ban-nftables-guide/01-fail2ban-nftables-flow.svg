<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions for gradients/filters -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="#0f172a" />
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc">
    Fail2Ban on Ubuntu 26.04 / PVE 9.2 (nftables + systemd-journald)
  </text>
  
  <text x="400" y="65" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#94a3b8">
    Log flow &amp; Intrusion Prevention architecture (No rsyslog / No iptables)
  </text>

  <!-- Group: Source Logs -->
  <g transform="translate(40, 120)" filter="url(#shadow)">
    <rect width="180" height="240" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <text x="90" y="30" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#38bdf8">LOG SOURCES</text>
    
    <!-- ssh.socket / sshd.service -->
    <rect x="15" y="55" width="150" height="45" rx="6" fill="#0284c7" fill-opacity="0.2" stroke="#0284c7" stroke-width="1" />
    <text x="90" y="73" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#e0f2fe">ssh.socket</text>
    <text x="90" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">(Socket Activation)</text>

    <!-- pvedaemon / pveproxy -->
    <rect x="15" y="115" width="150" height="45" rx="6" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-width="1" />
    <text x="90" y="133" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f5f3ff">pvedaemon.service</text>
    <text x="90" y="150" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe">PVE Auth Logs</text>

    <!-- other system services -->
    <rect x="15" y="175" width="150" height="45" rx="6" fill="#4b5563" fill-opacity="0.2" stroke="#4b5563" stroke-width="1" />
    <text x="90" y="193" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f3f4f6">Other Services</text>
    <text x="90" y="210" text-anchor="middle" font-family="monospace" font-size="10" fill="#9ca3af">systemd units</text>
  </g>

  <!-- Flow Arrow 1 -->
  <g transform="translate(220, 240)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#64748b" stroke-width="3" stroke-dasharray="5 5" />
    <polygon points="60,-5 70,0 60,5" fill="#64748b" />
    <text x="30" y="-10" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Journal</text>
  </g>

  <!-- Group: systemd-journald -->
  <g transform="translate(290, 180)" filter="url(#shadow)">
    <rect width="130" height="120" rx="8" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="1.5" />
    <text x="65" y="45" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff">systemd-</text>
    <text x="65" y="65" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff">journald</text>
    <text x="65" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bfdbfe">(system.journal)</text>
  </g>

  <!-- Flow Arrow 2 -->
  <g transform="translate(420, 240)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#64748b" stroke-width="3" />
    <polygon points="60,-5 70,0 60,5" fill="#64748b" />
    <text x="30" y="-10" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">backend=systemd</text>
  </g>

  <!-- Group: Fail2Ban -->
  <g transform="translate(490, 160)" filter="url(#shadow)">
    <rect width="140" height="160" rx="8" fill="url(#orangeGrad)" stroke="#ea580c" stroke-width="1.5" />
    <text x="70" y="35" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#ffffff">Fail2Ban</text>
    <text x="70" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffedd5">service</text>
    
    <!-- regex matching -->
    <rect x="10" y="75" width="120" height="30" rx="4" fill="#7c2d12" stroke="#ea580c" stroke-width="1" />
    <text x="70" y="94" text-anchor="middle" font-family="monospace" font-size="11" fill="#fdba74">Filter matching</text>

    <!-- action ban -->
    <rect x="10" y="115" width="120" height="30" rx="4" fill="#7c2d12" stroke="#ea580c" stroke-width="1" />
    <text x="70" y="134" text-anchor="middle" font-family="monospace" font-size="11" fill="#fdba74">Action: nftables</text>
  </g>

  <!-- Flow Arrow 3 -->
  <g transform="translate(630, 240)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#64748b" stroke-width="3" />
    <polygon points="50,-5 60,0 50,5" fill="#64748b" />
    <text x="25" y="-10" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">nft sets</text>
  </g>

  <!-- Group: nftables -->
  <g transform="translate(690, 180)" filter="url(#shadow)">
    <rect width="80" height="120" rx="8" fill="url(#redGrad)" stroke="#dc2626" stroke-width="1.5" />
    <text x="40" y="45" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff">nftables</text>
    <text x="40" y="65" text-anchor="middle" font-family="monospace" font-size="11" fill="#fee2e2">Ruleset</text>
    <rect x="8" y="80" width="64" height="25" rx="4" fill="#7f1d1d" />
    <text x="40" y="96" text-anchor="middle" font-family="monospace" font-size="10" fill="#fca5a5" font-weight="bold">DROP</text>
  </g>

  <!-- Note: Invisible Bomb Red Alert Badges -->
  <g transform="translate(40, 390)">
    <rect x="0" y="0" width="220" height="30" rx="15" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1" />
    <circle cx="15" cy="15" r="5" fill="#ef4444" />
    <text x="32" y="19" font-family="sans-serif" font-size="11" fill="#fca5a5" font-weight="bold">1. rsyslog missing in 26.04</text>
  </g>

  <g transform="translate(280, 390)">
    <rect x="0" y="0" width="220" height="30" rx="15" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1" />
    <circle cx="15" cy="15" r="5" fill="#ef4444" />
    <text x="32" y="19" font-family="sans-serif" font-size="11" fill="#fca5a5" font-weight="bold">2. sshd socket activation active</text>
  </g>

  <g transform="translate(520, 390)">
    <rect x="0" y="0" width="240" height="30" rx="15" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1" />
    <circle cx="15" cy="15" r="5" fill="#ef4444" />
    <text x="32" y="19" font-family="sans-serif" font-size="11" fill="#fca5a5" font-weight="bold">3. iptables legacy vs nftables</text>
  </g>

</svg>
