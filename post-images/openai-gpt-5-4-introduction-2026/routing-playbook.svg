<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1500" height="820" fill="url(#bg4)"/>
  <text x="70" y="80" font-size="44" font-family="Arial" fill="#0f172a" font-weight="700">GPT-5.4 Model Routing Playbook</text>
  <text x="70" y="118" font-size="22" font-family="Arial" fill="#115e59">A practical decision flow for production workloads</text>

  <rect x="590" y="170" width="320" height="90" rx="16" fill="#0ea5a5"/>
  <text x="750" y="225" text-anchor="middle" font-size="28" font-family="Arial" fill="#ffffff" font-weight="700">Task Arrives</text>

  <rect x="500" y="320" width="500" height="110" rx="16" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
  <text x="750" y="375" text-anchor="middle" font-size="27" font-family="Arial" fill="#134e4a">Need highest-quality deep reasoning?</text>
  <text x="750" y="406" text-anchor="middle" font-size="22" font-family="Arial" fill="#475569">(high impact / low volume)</text>

  <rect x="180" y="540" width="440" height="170" rx="18" fill="#ffffff" stroke="#1d4ed8" stroke-width="3"/>
  <text x="400" y="595" text-anchor="middle" font-size="30" font-family="Arial" fill="#1e3a8a" font-weight="700">Use GPT-5.4</text>
  <text x="220" y="636" font-size="22" font-family="Arial" fill="#334155">- Default for most professional tasks</text>
  <text x="220" y="668" font-size="22" font-family="Arial" fill="#334155">- Start with reasoning.effort = none/medium</text>

  <rect x="880" y="540" width="440" height="170" rx="18" fill="#ffffff" stroke="#7c2d12" stroke-width="3"/>
  <text x="1100" y="595" text-anchor="middle" font-size="30" font-family="Arial" fill="#7c2d12" font-weight="700">Use GPT-5.4 Pro</text>
  <text x="920" y="636" font-size="22" font-family="Arial" fill="#334155">- Hardest tasks with high business value</text>
  <text x="920" y="668" font-size="22" font-family="Arial" fill="#334155">- Accept higher cost and latency</text>

  <line x1="750" y1="260" x2="750" y2="320" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="430" x2="430" y2="540" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="860" y1="430" x2="1070" y2="540" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="525" y="500" font-size="24" font-family="Arial" fill="#0f766e">No</text>
  <text x="955" y="500" font-size="24" font-family="Arial" fill="#0f766e">Yes</text>
