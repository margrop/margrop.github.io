<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f9ff"/>
      <stop offset="100%" stop-color="#eef8f0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2463eb"/>
      <stop offset="100%" stop-color="#18a957"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#173b6a" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1400" height="520" fill="url(#bg)"/>
  <text x="64" y="72" font-size="42" font-family="Arial, Helvetica, sans-serif" fill="#0e2a47" font-weight="700">GPT-5.4 Related Timeline (2026)</text>
  <text x="64" y="108" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#355373">Public dates from OpenAI official sources</text>

  <line x1="100" y1="270" x2="1300" y2="270" stroke="url(#line)" stroke-width="10" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <circle cx="280" cy="270" r="20" fill="#2563eb"/>
    <rect x="140" y="310" rx="16" ry="16" width="280" height="140" fill="#ffffff"/>
    <text x="162" y="354" font-size="26" font-family="Arial" fill="#0e2a47" font-weight="700">2026-02-13</text>
    <text x="162" y="390" font-size="22" font-family="Arial" fill="#2f4661">Legacy models retired</text>
    <text x="162" y="420" font-size="18" font-family="Arial" fill="#4b647f">GPT-4o / GPT-4.1 / o4-mini</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="700" cy="270" r="22" fill="#0ea35b"/>
    <rect x="560" y="120" rx="16" ry="16" width="290" height="130" fill="#ffffff"/>
    <text x="582" y="162" font-size="26" font-family="Arial" fill="#0e2a47" font-weight="700">2026-03-05</text>
    <text x="582" y="198" font-size="22" font-family="Arial" fill="#2f4661">GPT-5.4 released</text>
    <text x="582" y="228" font-size="18" font-family="Arial" fill="#4b647f">ChatGPT / API / Codex</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="1120" cy="270" r="20" fill="#f59e0b"/>
    <rect x="980" y="310" rx="16" ry="16" width="280" height="140" fill="#ffffff"/>
    <text x="1002" y="354" font-size="26" font-family="Arial" fill="#0e2a47" font-weight="700">2026-06-05</text>
    <text x="1002" y="390" font-size="22" font-family="Arial" fill="#2f4661">GPT-5.2 Thinking</text>
    <text x="1002" y="420" font-size="18" font-family="Arial" fill="#4b647f">legacy sunset</text>
  </g>
