<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="920" rx="28" fill="url(#bg3)"/>
  <text x="70" y="84" font-size="40" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1f2937" font-weight="700">Parity Audit：当前工作区到底镜像到了什么程度？</text>
  <text x="70" y="126" font-size="20" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">这不是“是否完全等价”的口号图，而是仓库自己对镜像覆盖面的自我体检。</text>

  <g filter="url(#shadow3)">
    <rect x="100" y="210" width="360" height="170" rx="26" fill="url(#p1)"/>
    <rect x="500" y="210" width="360" height="170" rx="26" fill="url(#p2)"/>
    <rect x="900" y="210" width="600" height="170" rx="26" fill="url(#p3)"/>
  </g>

  <text x="138" y="258" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">root / directory coverage</text>
  <text x="138" y="295" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f0fdfa">archive root files + root dirs</text>
  <text x="138" y="326" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f0fdfa">focus on shape, not byte equality</text>

  <text x="538" y="258" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">entry ratios</text>
  <text x="538" y="295" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f5f3ff">207 command entries / 184 tool entries</text>
  <text x="538" y="326" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f5f3ff">mirrored inventories become data</text>

  <text x="938" y="258" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">surface snapshot</text>
  <text x="938" y="295" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fffbeb">1902 TS-like files in archive surface snapshot</text>
  <text x="938" y="326" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fffbeb">the audit is about coverage and drift</text>

  <g filter="url(#shadow3)">
    <rect x="110" y="470" width="300" height="220" rx="24" fill="#ffffff"/>
    <rect x="450" y="470" width="300" height="220" rx="24" fill="#ffffff"/>
    <rect x="790" y="470" width="300" height="220" rx="24" fill="#ffffff"/>
    <rect x="1130" y="470" width="360" height="220" rx="24" fill="#ffffff"/>
  </g>

  <text x="145" y="518" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#0f766e" font-weight="700">archive_root</text>
  <text x="145" y="552" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">ignored local TS snapshot</text>
  <text x="145" y="584" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">optional, external to Git history</text>
  <text x="145" y="616" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">used for parity comparison</text>

  <text x="485" y="518" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#7c3aed" font-weight="700">missing targets</text>
  <text x="485" y="552" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">root files and directory mappings</text>
  <text x="485" y="584" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">the audit exposes drift explicitly</text>
  <text x="485" y="616" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">it does not pretend equivalence</text>

  <text x="825" y="518" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#b45309" font-weight="700">snapshot counts</text>
  <text x="825" y="552" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">commands_snapshot.json</text>
  <text x="825" y="584" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">tools_snapshot.json</text>
  <text x="825" y="616" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">reference_surface_snapshot.json</text>

  <text x="1165" y="518" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1d4ed8" font-weight="700">audit takeaway</text>
  <text x="1165" y="552" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">the workspace is now a mirror-and-rewrite system</text>
  <text x="1165" y="584" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">not a preserved copy of the leaked tree</text>
  <text x="1165" y="616" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">the audit is the project’s conscience</text>

  <text x="70" y="760" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">如果前两张图是在画“如何组织”，那这张图就是在画“组织到什么程度”。镜像项目最怕自我感觉良好，而 audit 让它不至于飘。</text>
</svg>
