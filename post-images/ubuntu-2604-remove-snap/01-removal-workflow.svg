<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760">
<rect width="1320" height="760" fill="#f8fafc"/>
<rect x="46" y="42" width="1228" height="676" rx="20" fill="#ffffff" stroke="#dbe3ec"/>
<text x="90" y="106" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#111827">Snap removal workflow on Ubuntu 26.04</text>
<text x="90" y="148" font-family="Arial, sans-serif" font-size="22" fill="#475569">Treat it like moving house: list your boxes, move app data out, then return the keys.</text>
<rect x="88" y="220" width="214" height="250" rx="16" fill="#fff" stroke="#cbd5e1"/>
<circle cx="124" cy="262" r="18" fill="#f97316"/>
<text x="116" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">1</text>
<text x="152" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Inventory</text>
<text x="116" y="312" font-family="Arial" font-size="20" fill="#334155">Check snap</text>
<text x="116" y="343" font-family="Arial" font-size="20" fill="#334155">list and</text>
<text x="116" y="374" font-family="Arial" font-size="20" fill="#334155">identify</text>
<text x="116" y="405" font-family="Arial" font-size="20" fill="#334155">Firefox,</text>
<text x="116" y="436" font-family="Arial" font-size="20" fill="#334155">Store, core</text>
<text x="116" y="467" font-family="Arial" font-size="20" fill="#334155">and app snaps.</text>
<path d="M 309 345.0 h 20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 329 345.0 l -10 -9 m 10 9 l -10 9" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="330" y="220" width="214" height="250" rx="16" fill="#fff" stroke="#cbd5e1"/>
<circle cx="366" cy="262" r="18" fill="#0ea5e9"/>
<text x="358" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">2</text>
<text x="394" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Backup</text>
<text x="358" y="312" font-family="Arial" font-size="20" fill="#334155">Save app data</text>
<text x="358" y="343" font-family="Arial" font-size="20" fill="#334155">that matters</text>
<text x="358" y="374" font-family="Arial" font-size="20" fill="#334155">before</text>
<text x="358" y="405" font-family="Arial" font-size="20" fill="#334155">removal.</text>
<path d="M 551 345.0 h 20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 571 345.0 l -10 -9 m 10 9 l -10 9" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="572" y="220" width="214" height="250" rx="16" fill="#fff" stroke="#cbd5e1"/>
<circle cx="608" cy="262" r="18" fill="#22c55e"/>
<text x="600" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">3</text>
<text x="636" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Remove</text>
<text x="600" y="312" font-family="Arial" font-size="20" fill="#334155">Use snap</text>
<text x="600" y="343" font-family="Arial" font-size="20" fill="#334155">remove --purge</text>
<text x="600" y="374" font-family="Arial" font-size="20" fill="#334155">for installed</text>
<text x="600" y="405" font-family="Arial" font-size="20" fill="#334155">snaps.</text>
<path d="M 793 345.0 h 20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 813 345.0 l -10 -9 m 10 9 l -10 9" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="814" y="220" width="214" height="250" rx="16" fill="#fff" stroke="#cbd5e1"/>
<circle cx="850" cy="262" r="18" fill="#a855f7"/>
<text x="842" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">4</text>
<text x="878" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Purge</text>
<text x="842" y="312" font-family="Arial" font-size="20" fill="#334155">APT purge</text>
<text x="842" y="343" font-family="Arial" font-size="20" fill="#334155">snapd and</text>
<text x="842" y="374" font-family="Arial" font-size="20" fill="#334155">clean snap</text>
<text x="842" y="405" font-family="Arial" font-size="20" fill="#334155">directories.</text>
<path d="M 1035 345.0 h 20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 1055 345.0 l -10 -9 m 10 9 l -10 9" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="1056" y="220" width="214" height="250" rx="16" fill="#fff" stroke="#cbd5e1"/>
<circle cx="1092" cy="262" r="18" fill="#64748b"/>
<text x="1084" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">5</text>
<text x="1120" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Guard</text>
<text x="1084" y="312" font-family="Arial" font-size="20" fill="#334155">Pin snapd only</text>
<text x="1084" y="343" font-family="Arial" font-size="20" fill="#334155">when you</text>
<text x="1084" y="374" font-family="Arial" font-size="20" fill="#334155">really want no</text>
<text x="1084" y="405" font-family="Arial" font-size="20" fill="#334155">reinstall.</text>
<text x="90" y="650" font-family="Arial" font-size="22" fill="#64748b">Default principle: preview first, remove explicit packages, purge snapd, clean leftovers, then block accidental reinstall if needed.</text>
</svg>