<text x="90" y="106" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#111827">Manual vs Agent execution</text>
<text x="90" y="148" font-family="Arial, sans-serif" font-size="22" fill="#475569">The script is the same; only the operator changes.</text>
