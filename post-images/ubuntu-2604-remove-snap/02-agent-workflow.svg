<circle cx="608" cy="262" r="18" fill="#22c55e"/>
<text x="600" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">3</text>
<text x="636" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Confirm</text>
<text x="600" y="312" font-family="Arial" font-size="20" fill="#334155">Compare app</text>
<text x="600" y="343" font-family="Arial" font-size="20" fill="#334155">list and</text>
<text x="600" y="374" font-family="Arial" font-size="20" fill="#334155">package</text>
<text x="600" y="405" font-family="Arial" font-size="20" fill="#334155">changes.</text>
<path d="M 793 345.0 h 20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 813 345.0 l -10 -9 m 10 9 l -10 9" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
