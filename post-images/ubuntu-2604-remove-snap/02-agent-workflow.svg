<text x="152" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Human</text>
<text x="116" y="312" font-family="Arial" font-size="20" fill="#334155">Read script,</text>
<text x="116" y="343" font-family="Arial" font-size="20" fill="#334155">run dry-run,</text>
<text x="116" y="374" font-family="Arial" font-size="20" fill="#334155">inspect</text>
<text x="116" y="405" font-family="Arial" font-size="20" fill="#334155">output.</text>
<path d="M 309 345.0 h 20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 329 345.0 l -10 -9 m 10 9 l -10 9" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
