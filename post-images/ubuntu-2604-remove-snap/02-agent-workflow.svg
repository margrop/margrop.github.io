<circle cx="1092" cy="262" r="18" fill="#64748b"/>
<text x="1084" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">5</text>
<text x="1120" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Verify</text>
<text x="1084" y="312" font-family="Arial" font-size="20" fill="#334155">Check snap</text>
<text x="1084" y="343" font-family="Arial" font-size="20" fill="#334155">command, apt</text>
<text x="1084" y="374" font-family="Arial" font-size="20" fill="#334155">state and</text>
<text x="1084" y="405" font-family="Arial" font-size="20" fill="#334155">browser path.</text>
<text x="90" y="650" font-family="Arial" font-size="22" fill="#64748b">Default principle: preview first, remove explicit packages, purge snapd, clean leftovers, then block accidental reinstall if needed.</text>
</svg>