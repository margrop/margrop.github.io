<circle cx="850" cy="262" r="18" fill="#a855f7"/>
<text x="842" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">4</text>
<text x="878" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Execute</text>
<text x="842" y="312" font-family="Arial" font-size="20" fill="#334155">Run approved</text>
<text x="842" y="343" font-family="Arial" font-size="20" fill="#334155">script with</text>
<text x="842" y="374" font-family="Arial" font-size="20" fill="#334155">explicit</text>
<text x="842" y="405" font-family="Arial" font-size="20" fill="#334155">switch.</text>
<path d="M 1035 345.0 h 20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 1055 345.0 l -10 -9 m 10 9 l -10 9" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
