<circle cx="366" cy="262" r="18" fill="#0ea5e9"/>
<text x="358" y="270" font-family="Arial" font-size="20" font-weight="700" fill="#fff">2</text>
<text x="394" y="270" font-family="Arial" font-size="23" font-weight="700" fill="#0f172a">Agent</text>
<text x="358" y="312" font-family="Arial" font-size="20" fill="#334155">Inspect host,</text>
<text x="358" y="343" font-family="Arial" font-size="20" fill="#334155">propose plan,</text>
<text x="358" y="374" font-family="Arial" font-size="20" fill="#334155">run dry-run.</text>
<path d="M 551 345.0 h 20" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
