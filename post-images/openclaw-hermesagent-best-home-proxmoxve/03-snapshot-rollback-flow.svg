<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
<rect width="1200" height="680" fill="#F8FAFC"/>
<rect x="36" y="36" width="1128" height="608" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<text x="72" y="98" font-size="42" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">升级前后的恢复路径</text>
<text x="74" y="138" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#475569">OpenClaw / HermesAgent 的更新、技能安装、渠道接入都可能改变运行时状态</text>
<line x1="72" y1="162" x2="1128" y2="162" stroke="#14B8A6" stroke-width="6"/>
<rect x="72" y="220" width="246" height="300" rx="18" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
<text x="96" y="270" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">升级前</text>
<text x="98" y="316" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">停止服务或低峰操作</text>
<text x="98" y="358" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">创建快照</text>
<text x="98" y="400" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">记录当前版本</text>
<rect x="342" y="220" width="246" height="300" rx="18" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
<text x="366" y="270" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">升级中</text>
<text x="368" y="316" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">限制资源波动</text>
<text x="368" y="358" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">观察日志</text>
<text x="368" y="400" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">保留旧配置</text>
<rect x="612" y="220" width="246" height="300" rx="18" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
<text x="636" y="270" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">异常时</text>
<text x="638" y="316" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">停止新流量</text>
<text x="638" y="358" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">回滚快照</text>
<text x="638" y="400" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">恢复到上一可用点</text>
<rect x="882" y="220" width="246" height="300" rx="18" fill="#FCE7F3" stroke="#DB2777" stroke-width="2"/>
<text x="906" y="270" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">稳定后</text>
<text x="908" y="316" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">删除临时快照</text>
<text x="908" y="358" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">写入备份</text>
<text x="908" y="400" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">更新运行手册</text>
<text x="72" y="590" font-size="24" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F766E">真正有价值的不是“能备份”，而是“能在出事时快速回到能用状态”。</text>
</svg>