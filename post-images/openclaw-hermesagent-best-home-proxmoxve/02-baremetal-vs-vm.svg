<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
<rect width="1200" height="680" fill="#F8FAFC"/>
<rect x="36" y="36" width="1128" height="608" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<text x="72" y="98" font-size="42" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">实体机安装 vs 虚拟机安装</text>
<text x="74" y="138" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#475569">智能体不是普通脚本，它会长期持有身份、记忆、工具权限和网络入口</text>
<line x1="72" y1="162" x2="1128" y2="162" stroke="#14B8A6" stroke-width="6"/>
<rect x="72" y="220" width="336" height="300" rx="18" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
<text x="96" y="270" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">数据隔离</text>
<text x="98" y="316" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">实体机：状态散落</text>
<text x="98" y="358" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">VM：整盘封装</text>
<text x="98" y="400" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">按信任边界拆分</text>
<rect x="432" y="220" width="336" height="300" rx="18" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
<text x="456" y="270" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">资源隔离</text>
<text x="458" y="316" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">实体机：抢占不可控</text>
<text x="458" y="358" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">VM：vCPU/内存硬限额</text>
<text x="458" y="400" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">异常时不拖垮宿主</text>
<rect x="792" y="220" width="336" height="300" rx="18" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
<text x="816" y="270" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F172A">恢复方式</text>
<text x="818" y="316" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">实体机：重装成本高</text>
<text x="818" y="358" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">VM：快照 + 回滚</text>
<text x="818" y="400" font-size="22" font-family="Arial, PingFang SC, sans-serif" fill="#334155">备份可异机恢复</text>
<text x="72" y="590" font-size="24" font-family="Arial, PingFang SC, sans-serif" font-weight="700" fill="#0F766E">结论：裸机适合作为 PVE 宿主，不适合直接承载高权限 Agent。</text>
</svg>