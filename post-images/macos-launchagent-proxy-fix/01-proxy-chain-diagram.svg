<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#51cf66"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd43b"/>
    </marker>
  </defs>
  <rect width="960" height="420" fill="url(#bg)" rx="12"/>
  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">macOS LaunchAgent + Python httpx Proxy Chain: Where It Breaks</text>
  <!-- macOS System Proxy Box -->
  <rect x="30" y="60" width="200" height="120" rx="10" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="2"/>
  <text x="130" y="88" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="bold">macOS System Proxy</text>
  <text x="130" y="108" text-anchor="middle" fill="#dfe6e9" font-size="11">(Network Preferences)</text>
  <text x="130" y="128" text-anchor="middle" fill="#81ecec" font-size="11">scutil --proxy</text>
  <text x="130" y="148" text-anchor="middle" fill="#ffeaa7" font-size="11">HTTPProxy: proxy:1081</text>
  <text x="130" y="165" text-anchor="middle" fill="#ffeaa7" font-size="11">HTTPEnable: 1</text>
  <!-- LaunchAgent Box -->
  <rect x="300" y="60" width="200" height="120" rx="10" fill="#1a1a2e" stroke="#00b894" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" fill="#55efc4" font-size="13" font-weight="bold">LaunchAgent</text>
  <text x="400" y="108" text-anchor="middle" fill="#dfe6e9" font-size="11">gateway.run</text>
  <text x="400" y="128" text-anchor="middle" fill="#81ecec" font-size="11">trust_env=True</text>
  <text x="400" y="148" text-anchor="middle" fill="#fab1a0" font-size="11">Reads system proxy</text>
  <text x="400" y="165" text-anchor="middle" fill="#fab1a0" font-size="11">via scutil --proxy</text>
  <!-- httpx Box -->
  <rect x="570" y="60" width="180" height="120" rx="10" fill="#1a1a2e" stroke="#fdcb6e" stroke-width="2"/>
  <text x="660" y="88" text-anchor="middle" fill="#ffeaa7" font-size="13" font-weight="bold">httpx.AsyncClient</text>
  <text x="660" y="108" text-anchor="middle" fill="#dfe6e9" font-size="11">trust_env=True</text>
  <text x="660" y="128" text-anchor="middle" fill="#81ecec" font-size="11">Picks up proxy from</text>
  <text x="660" y="148" text-anchor="middle" fill="#81ecec" font-size="11">system AND env vars</text>
  <text x="660" y="165" text-anchor="middle" fill="#fab1a0" font-size="11">Uses proxy automatically</text>
  <!-- Arrows: System Proxy -> LaunchAgent -->
  <line x1="230" y1="120" x2="300" y2="120" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)" stroke-dasharray="6,4"/>
  <text x="265" y="112" text-anchor="middle" fill="#ff6b6b" font-size="10">inherits</text>
  <!-- Arrows: LaunchAgent -> httpx -->
  <line x1="500" y1="120" x2="570" y2="120" stroke="#fdcb6e" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <text x="535" y="112" text-anchor="middle" fill="#fdcb6e" font-size="10">reads</text>
  <!-- Proxy Server -->
  <rect x="570" y="220" width="180" height="80" rx="10" fill="#2d1b1b" stroke="#ff6b6b" stroke-width="2"/>
  <text x="660" y="250" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">Proxy Server</text>
  <text x="660" y="270" text-anchor="middle" fill="#fab1a0" font-size="11">192.168.x.x:1081</text>
  <text x="660" y="288" text-anchor="middle" fill="#fab1a0" font-size="10">(sanitized)</text>
  <!-- WeCom API -->
  <rect x="800" y="220" width="140" height="80" rx="10" fill="#1a2e1a" stroke="#51cf66" stroke-width="2"/>
  <text x="870" y="250" text-anchor="middle" fill="#51cf66" font-size="13" font-weight="bold">WeCom API</text>
  <text x="870" y="270" text-anchor="middle" fill="#dfe6e9" font-size="11">qyapi.weixin.qq.com</text>
  <!-- httpx -> Proxy (FAIL) -->
  <line x1="660" y1="180" x2="660" y2="220" stroke="#ff6b6b" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="680" y="205" fill="#ff6b6b" font-size="12" font-weight="bold">X FAIL</text>
  <text x="680" y="218" fill="#ff6b6b" font-size="10">No route to host</text>
  <!-- Proxy -> WeCom (OK) -->
  <line x1="750" y1="260" x2="800" y2="260" stroke="#51cf66" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="6,4"/>
  <!-- Bypass path -->
  <rect x="30" y="240" width="200" height="120" rx="10" fill="#0d2818" stroke="#51cf66" stroke-width="2"/>
  <text x="130" y="268" text-anchor="middle" fill="#55efc4" font-size="13" font-weight="bold">FIX: NO_PROXY=*</text>
  <text x="130" y="290" text-anchor="middle" fill="#dfe6e9" font-size="11">In LaunchAgent plist</text>
  <text x="130" y="310" text-anchor="middle" fill="#81ecec" font-size="11">EnvironmentVariables</text>
  <text x="130" y="330" text-anchor="middle" fill="#51cf66" font-size="11">Bypasses ALL proxies</text>
  <text x="130" y="348" text-anchor="middle" fill="#51cf66" font-size="11">Connects DIRECT</text>
  <!-- Fix arrow: httpx -> WeCom DIRECT -->
  <path d="M 230 300 Q 400 350 570 260" stroke="#51cf66" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="8,4"/>
  <text x="400" y="345" text-anchor="middle" fill="#51cf66" font-size="12" font-weight="bold">Direct Connection (bypass proxy)</text>
  <!-- Bottom note -->
  <text x="480" y="405" text-anchor="middle" fill="#636e72" font-size="11">Root cause: macOS system proxy + httpx trust_env + LaunchAgent network isolation = silent failure</text>
</svg>
