<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1a1040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="glowGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#55efc4;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#00b894"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/><line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="150" cy="315" r="200" fill="none" stroke="#6c5ce7" stroke-width="0.5" opacity="0.15"/>
  <circle cx="150" cy="315" r="150" fill="none" stroke="#6c5ce7" stroke-width="0.5" opacity="0.1"/>
  <circle cx="1050" cy="315" r="180" fill="none" stroke="#00b894" stroke-width="0.5" opacity="0.15"/>

  <!-- macOS logo area -->
  <rect x="60" y="80" width="140" height="60" rx="12" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1.5" opacity="0.9"/>
  <text x="130" y="105" text-anchor="middle" fill="#a29bfe" font-size="14" font-weight="bold">macOS</text>
  <text x="130" y="125" text-anchor="middle" fill="#636e72" font-size="11">LaunchAgent</text>

  <!-- Python logo area -->
  <rect x="60" y="160" width="140" height="60" rx="12" fill="#1a1a2e" stroke="#fdcb6e" stroke-width="1.5" opacity="0.9"/>
  <text x="130" y="185" text-anchor="middle" fill="#ffeaa7" font-size="14" font-weight="bold">Python</text>
  <text x="130" y="205" text-anchor="middle" fill="#636e72" font-size="11">httpx + trust_env</text>

  <!-- httpx box -->
  <rect x="300" y="120" width="200" height="80" rx="12" fill="#1a1a2e" stroke="#fdcb6e" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="150" text-anchor="middle" fill="#ffeaa7" font-size="16" font-weight="bold">httpx.AsyncClient</text>
  <text x="400" y="175" text-anchor="middle" fill="#81ecec" font-size="12">trust_env=True</text>
  <text x="400" y="192" text-anchor="middle" fill="#fab1a0" font-size="10">Reads system proxy</text>

  <!-- System Proxy box -->
  <rect x="600" y="120" width="200" height="80" rx="12" fill="#2d1b1b" stroke="#ff6b6b" stroke-width="1.5" filter="url(#glow)"/>
  <text x="700" y="148" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">System Proxy</text>
  <text x="700" y="168" text-anchor="middle" fill="#fab1a0" font-size="12">scutil --proxy</text>
  <text x="700" y="188" text-anchor="middle" fill="#636e72" font-size="10">192.168.x.x:1081</text>

  <!-- Error box -->
  <rect x="880" y="120" width="260" height="80" rx="12" fill="#1a0a0a" stroke="#ff6b6b" stroke-width="2" filter="url(#glow)"/>
  <text x="1010" y="148" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">All connection attempts failed</text>
  <text x="1010" y="170" text-anchor="middle" fill="#fab1a0" font-size="12">No route to host</text>
  <text x="1010" y="190" text-anchor="middle" fill="#636e72" font-size="10">LaunchAgent can't reach proxy</text>

  <!-- Arrows -->
  <line x1="200" y1="160" x2="300" y2="160" stroke="#fdcb6e" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.7"/>
  <line x1="500" y1="160" x2="600" y2="160" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)" stroke-dasharray="8,4"/>
  <line x1="800" y1="160" x2="880" y2="160" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- X marks -->
  <text x="550" y="155" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold" filter="url(#softGlow)">X</text>
  <text x="840" y="155" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold" filter="url(#softGlow)">X</text>

  <!-- FIX section -->
  <rect x="300" y="280" width="540" height="120" rx="16" fill="#0d2818" stroke="#00b894" stroke-width="2" filter="url(#glow)"/>
  <text x="570" y="312" text-anchor="middle" fill="#55efc4" font-size="22" font-weight="bold">FIX: NO_PROXY=* in plist</text>
  <text x="570" y="340" text-anchor="middle" fill="#dfe6e9" font-size="14">Bypass all proxies, connect directly</text>
  <text x="570" y="365" text-anchor="middle" fill="#81ecec" font-size="12">One line in LaunchAgent EnvironmentVariables</text>
  <text x="570" y="388" text-anchor="middle" fill="#00b894" font-size="12" opacity="0.7">Token refreshed successfully</text>

  <!-- Bypass arrow -->
  <path d="M 200 280 Q 200 400 300 340" stroke="#00b894" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <path d="M 840 280 Q 1000 400 840 340" stroke="#00b894" stroke-width="2" fill="none" stroke-dasharray="8,4"/>

  <!-- Success path -->
  <rect x="920" y="280" width="220" height="120" rx="16" fill="#0d2818" stroke="#00b894" stroke-width="1.5"/>
  <text x="1030" y="315" text-anchor="middle" fill="#55efc4" font-size="16" font-weight="bold">WeCom API</text>
  <text x="1030" y="340" text-anchor="middle" fill="#dfe6e9" font-size="12">qyapi.weixin.qq.com</text>
  <text x="1030" y="365" text-anchor="middle" fill="#00b894" font-size="14" font-weight="bold">Token: OK</text>
  <text x="1030" y="388" text-anchor="middle" fill="#55efc4" font-size="11">expires in 7200s</text>

  <line x1="840" y1="340" x2="920" y2="340" stroke="#00b894" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" fill="#dfe6e9" font-size="26" font-weight="bold">macOS LaunchAgent + Python httpx</text>
  <text x="600" y="535" text-anchor="middle" fill="#a29bfe" font-size="20">Proxy Trap: Diagnosis & Fix</text>

  <!-- Subtitle -->
  <text x="600" y="580" text-anchor="middle" fill="#636e72" font-size="14">trust_env=True + scutil --proxy + LaunchAgent network isolation = silent failure</text>
  <text x="600" y="610" text-anchor="middle" fill="#636e72" font-size="12">Root Cause Analysis | Step-by-Step Debugging | One-Line Fix</text>
</svg>
