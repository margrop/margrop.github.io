<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 40px/1.2 Inter,Helvetica,Arial,sans-serif; fill:#0F172A}
      .sub{font:500 20px/1.4 Inter,Helvetica,Arial,sans-serif; fill:#475569}
      .label{font:700 22px/1.2 Inter,Helvetica,Arial,sans-serif; fill:#0F172A}
      .text{font:500 18px/1.4 Inter,Helvetica,Arial,sans-serif; fill:#334155}
      .small{font:500 15px/1.35 Inter,Helvetica,Arial,sans-serif; fill:#475569}
      .caps{font:700 14px/1 Inter,Helvetica,Arial,sans-serif; letter-spacing:.16em; fill:#2563EB}
    </style>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="1060" cy="110" r="160" fill="#DBEAFE" opacity="0.55"/>
  <circle cx="120" cy="620" r="180" fill="#D1FAE5" opacity="0.45"/>
  <text x="72" y="84" class="caps">INCIDENT TIMELINE</text>
  <text x="72" y="130" class="title">Two machines failed in different ways</text>
  <text x="72" y="168" class="sub">The local Mac needed a scheduling fix. The remote VPS needed a permissions fix.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="210" width="1056" height="192" rx="28" fill="#FFFFFF"/>
    <rect x="72" y="430" width="1056" height="192" rx="28" fill="#FFFFFF"/>
  </g>

  <g>
    <rect x="108" y="244" width="170" height="120" rx="20" fill="#E0F2FE"/>
    <text x="138" y="286" class="label">Local Mac</text>
    <text x="138" y="320" class="text">launchd</text>
    <text x="138" y="346" class="small">GUI-session bound</text>
    <line x1="300" y1="304" x2="470" y2="304" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="470,304 452,294 452,314" fill="#0F172A"/>
    <rect x="500" y="244" width="190" height="120" rx="20" fill="#FEE2E2"/>
    <text x="530" y="286" class="label">Missed run</text>
    <text x="530" y="320" class="text">sleep / stale job</text>
    <text x="530" y="346" class="small">manual kickstart worked</text>
    <line x1="704" y1="304" x2="874" y2="304" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="874,304 856,294 856,314" fill="#0F172A"/>
    <rect x="904" y="244" width="180" height="120" rx="20" fill="#DCFCE7"/>
    <text x="934" y="286" class="label">Cron</text>
    <text x="934" y="320" class="text">stable daily job</text>
    <text x="934" y="346" class="small">no GUI dependency</text>
  </g>

  <g>
    <rect x="108" y="464" width="170" height="120" rx="20" fill="#FDE68A"/>
    <text x="138" y="506" class="label">Remote VPS</text>
    <text x="138" y="540" class="text">EACCES</text>
    <text x="138" y="566" class="small">state dir ownership drift</text>
    <line x1="300" y1="524" x2="470" y2="524" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="470,524 452,514 452,534" fill="#0F172A"/>
    <rect x="500" y="464" width="220" height="120" rx="20" fill="#FCA5A5"/>
    <text x="530" y="506" class="label">Permission fix</text>
    <text x="530" y="540" class="text">restore ownership</text>
    <text x="530" y="566" class="small">self-heal before backup</text>
    <line x1="734" y1="524" x2="904" y2="524" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="904,524 886,514 886,534" fill="#0F172A"/>
    <rect x="934" y="464" width="150" height="120" rx="20" fill="#DCFCE7"/>
    <text x="958" y="506" class="label">NAS OK</text>
    <text x="958" y="540" class="text">backup lands</text>
    <text x="958" y="566" class="small">archive verified</text>
  </g>
</svg>
