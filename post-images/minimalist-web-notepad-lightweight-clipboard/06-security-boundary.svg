<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-label="Security boundary for a lightweight web clipboard">
  <rect width="1440" height="820" fill="#fff7ed"/>
  <text x="720" y="88" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="700" fill="#7c2d12">轻量不等于可以裸奔</text>
  <text x="720" y="137" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" fill="#9a3412">它像门口的便签纸：方便，但不该写银行卡密码、长期令牌和生产密钥。</text>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="110" y="230" width="360" height="430" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="4"/>
    <text x="290" y="285" text-anchor="middle" font-size="32" font-weight="700" fill="#166534">适合放</text>
    <text x="150" y="355" font-size="24" fill="#14532d">短文本草稿</text>
    <text x="150" y="415" font-size="24" fill="#14532d">一次性命令片段</text>
    <text x="150" y="475" font-size="24" fill="#14532d">临时跨设备复制</text>
    <text x="150" y="535" font-size="24" fill="#14532d">可公开的说明文字</text>
    <rect x="540" y="230" width="360" height="430" rx="18" fill="#ffffff" stroke="#dc2626" stroke-width="4"/>
    <text x="720" y="285" text-anchor="middle" font-size="32" font-weight="700" fill="#991b1b">不要放</text>
    <text x="580" y="355" font-size="24" fill="#7f1d1d">密码和 Token</text>
    <text x="580" y="415" font-size="24" fill="#7f1d1d">私钥和 Cookie</text>
    <text x="580" y="475" font-size="24" fill="#7f1d1d">长期业务文档</text>
    <text x="580" y="535" font-size="24" fill="#7f1d1d">敏感个人信息</text>
    <rect x="970" y="230" width="360" height="430" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
    <text x="1150" y="285" text-anchor="middle" font-size="32" font-weight="700" fill="#1e3a8a">建议加</text>
    <text x="1010" y="355" font-size="24" fill="#1e40af">反代认证</text>
    <text x="1010" y="415" font-size="24" fill="#1e40af">只走私有入口</text>
    <text x="1010" y="475" font-size="24" fill="#1e40af">定期清理 _tmp</text>
    <text x="1010" y="535" font-size="24" fill="#1e40af">备份前先脱敏</text>
  </g>
  <text x="720" y="730" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" fill="#431407">原则：把它当作“临时纸条”，不要当作“保险柜”。</text>
</svg>
