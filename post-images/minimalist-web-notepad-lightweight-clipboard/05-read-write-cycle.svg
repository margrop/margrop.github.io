<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-label="Read and write cycle of a web note">
  <rect width="1440" height="820" fill="#f8fafc"/>
  <text x="720" y="90" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="700" fill="#0f172a">一次保存，其实只是写了一个纯文本文件</text>
  <text x="720" y="138" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" fill="#475569">把它想成前台递纸条：浏览器交给 PHP，PHP 放进 _tmp，下一次再按名字拿出来。</text>
  <g font-family="Inter,Arial,sans-serif">
    <circle cx="215" cy="410" r="100" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <text x="215" y="398" text-anchor="middle" font-size="28" font-weight="700" fill="#1e3a8a">Browser</text>
    <text x="215" y="435" text-anchor="middle" font-size="22" fill="#1d4ed8">textarea</text>
    <path d="M330 410H505" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <path d="M505 410l-30-20v40z" fill="#334155"/>
    <rect x="535" y="300" width="310" height="220" rx="20" fill="#ecfeff" stroke="#0891b2" stroke-width="4"/>
    <text x="690" y="385" text-anchor="middle" font-size="32" font-weight="700" fill="#155e75">index.php</text>
    <text x="690" y="430" text-anchor="middle" font-size="23" fill="#0e7490">note 名称校验</text>
    <text x="690" y="465" text-anchor="middle" font-size="23" fill="#0e7490">POST text 写入</text>
    <path d="M875 410H1050" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <path d="M1050 410l-30-20v40z" fill="#334155"/>
    <rect x="1080" y="300" width="230" height="220" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <text x="1195" y="385" text-anchor="middle" font-size="32" font-weight="700" fill="#92400e">_tmp</text>
    <text x="1195" y="430" text-anchor="middle" font-size="23" fill="#b45309">blog-demo</text>
    <text x="1195" y="465" text-anchor="middle" font-size="23" fill="#b45309">plain text</text>
    <path d="M1110 560 C890 685, 515 685, 300 560" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
    <path d="M300 560l36 2-18 30z" fill="#16a34a"/>
    <text x="705" y="705" text-anchor="middle" font-size="24" fill="#166534">读取时走反方向：找到同名文件，原样塞回文本框或 raw 输出。</text>
  </g>
</svg>
