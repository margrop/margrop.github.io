<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-label="Docker Compose deployment flow for Minimalist Web Notepad">
  <rect width="1440" height="760" fill="#f7f7f2"/>
  <rect x="90" y="90" width="1260" height="580" rx="18" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
  <text x="130" y="155" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700" fill="#111827">Compose 部署时真正需要守住的 3 个点</text>
  <text x="130" y="205" font-family="Inter,Arial,sans-serif" font-size="24" fill="#4b5563">镜像负责运行 PHP + Apache，端口负责入口，_tmp 负责纯文本持久化。</text>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="135" y="285" width="290" height="180" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
    <text x="280" y="350" text-anchor="middle" font-size="30" font-weight="700" fill="#312e81">image</text>
    <text x="280" y="395" text-anchor="middle" font-size="22" fill="#4338ca">ahfeil/minimalist...</text>
    <text x="280" y="428" text-anchor="middle" font-size="20" fill="#4b5563">把应用打包进容器</text>
    <path d="M445 375H585" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
    <path d="M585 375l-24-16v32z" fill="#111827"/>
    <rect x="610" y="285" width="290" height="180" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
    <text x="755" y="350" text-anchor="middle" font-size="30" font-weight="700" fill="#155e75">ports</text>
    <text x="755" y="395" text-anchor="middle" font-size="22" fill="#0e7490">8081:80</text>
    <text x="755" y="428" text-anchor="middle" font-size="20" fill="#4b5563">给浏览器一个入口</text>
    <path d="M920 375H1060" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
    <path d="M1060 375l-24-16v32z" fill="#111827"/>
    <rect x="1085" y="285" width="290" height="180" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="1230" y="350" text-anchor="middle" font-size="30" font-weight="700" fill="#92400e">volumes</text>
    <text x="1230" y="395" text-anchor="middle" font-size="22" fill="#b45309">_tmp</text>
    <text x="1230" y="428" text-anchor="middle" font-size="20" fill="#4b5563">每个 note 就是文件</text>
  </g>
  <rect x="165" y="540" width="1110" height="70" rx="12" fill="#111827"/>
  <text x="720" y="585" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" fill="#ffffff">没有数据库、没有富文本、没有账号体系：越少的零件，越容易看清风险边界。</text>
</svg>
