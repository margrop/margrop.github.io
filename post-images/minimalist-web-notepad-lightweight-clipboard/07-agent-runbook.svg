<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-label="Manual and agent deployment runbook">
  <rect width="1440" height="760" fill="#f0fdf4"/>
  <text x="720" y="86" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700" fill="#064e3b">人工自动执行 vs Agent 自动配置</text>
  <text x="720" y="134" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" fill="#166534">脚本负责确定性执行，Agent 负责先检查环境、再写配置、最后验证结果。</text>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="105" y="220" width="560" height="400" rx="20" fill="#ffffff" stroke="#059669" stroke-width="4"/>
    <text x="385" y="280" text-anchor="middle" font-size="32" font-weight="700" fill="#065f46">人工自动执行</text>
    <text x="150" y="350" font-size="24" fill="#064e3b">1. 保存对应系统脚本</text>
    <text x="150" y="410" font-size="24" fill="#064e3b">2. 修改安装目录和端口</text>
    <text x="150" y="470" font-size="24" fill="#064e3b">3. 执行脚本并查看输出</text>
    <text x="150" y="530" font-size="24" fill="#064e3b">4. 打开页面和 raw 链接验证</text>
    <rect x="775" y="220" width="560" height="400" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
    <text x="1055" y="280" text-anchor="middle" font-size="32" font-weight="700" fill="#115e59">Agent 自动配置</text>
    <text x="820" y="350" font-size="24" fill="#134e4a">1. 只给可公开参数</text>
    <text x="820" y="410" font-size="24" fill="#134e4a">2. 要求先检查 Docker/Compose</text>
    <text x="820" y="470" font-size="24" fill="#134e4a">3. 要求写入 compose 并启动</text>
    <text x="820" y="530" font-size="24" fill="#134e4a">4. 要求 curl + 页面双验证</text>
  </g>
</svg>
