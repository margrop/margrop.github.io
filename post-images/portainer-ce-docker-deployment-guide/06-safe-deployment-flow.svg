<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Safe Portainer deployment workflow</title>
  <desc id="desc">Six steps cover version pinning, persistent data, HTTPS, access restriction, backups, and upgrade verification.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#17152b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1400" height="760" rx="34" fill="url(#bg2)"/>
  <text x="70" y="84" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="700">A safe deployment is a repeatable path</text>
  <text x="70" y="126" fill="#9fb2c8" font-family="Arial, sans-serif" font-size="22">Installation is only the first checkpoint.</text>
  <path d="M135 376H1265" stroke="url(#line)" stroke-width="10" stroke-linecap="round" opacity=".7" filter="url(#glow)"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(150 0)">
      <circle cx="0" cy="376" r="70" fill="#0e7490" stroke="#67e8f9" stroke-width="4"/>
      <text x="0" y="389" fill="#ecfeff" font-size="38" font-weight="700">1</text>
      <text x="0" y="500" fill="#f8fafc" font-size="24" font-weight="700">Pin version</text>
      <text x="0" y="535" fill="#9fb2c8" font-size="18">avoid surprise changes</text>
    </g>
    <g transform="translate(370 0)">
      <circle cx="0" cy="376" r="70" fill="#155e75" stroke="#67e8f9" stroke-width="4"/>
      <text x="0" y="389" fill="#ecfeff" font-size="38" font-weight="700">2</text>
      <text x="0" y="500" fill="#f8fafc" font-size="24" font-weight="700">Persist data</text>
      <text x="0" y="535" fill="#9fb2c8" font-size="18">keep configuration safe</text>
    </g>
    <g transform="translate(590 0)">
      <circle cx="0" cy="376" r="70" fill="#4338ca" stroke="#a5b4fc" stroke-width="4"/>
      <text x="0" y="389" fill="#eef2ff" font-size="38" font-weight="700">3</text>
      <text x="0" y="500" fill="#f8fafc" font-size="24" font-weight="700">Prefer HTTPS</text>
      <text x="0" y="535" fill="#9fb2c8" font-size="18">use port 9443</text>
    </g>
    <g transform="translate(810 0)">
      <circle cx="0" cy="376" r="70" fill="#5b21b6" stroke="#c4b5fd" stroke-width="4"/>
      <text x="0" y="389" fill="#f5f3ff" font-size="38" font-weight="700">4</text>
      <text x="0" y="500" fill="#f8fafc" font-size="24" font-weight="700">Restrict access</text>
      <text x="0" y="535" fill="#9fb2c8" font-size="18">VPN, firewall, SSO</text>
    </g>
    <g transform="translate(1030 0)">
      <circle cx="0" cy="376" r="70" fill="#7e22ce" stroke="#d8b4fe" stroke-width="4"/>
      <text x="0" y="389" fill="#faf5ff" font-size="38" font-weight="700">5</text>
      <text x="0" y="500" fill="#f8fafc" font-size="24" font-weight="700">Back up</text>
      <text x="0" y="535" fill="#9fb2c8" font-size="18">protect /data first</text>
    </g>
    <g transform="translate(1250 0)">
      <circle cx="0" cy="376" r="70" fill="#86198f" stroke="#f0abfc" stroke-width="4"/>
      <text x="0" y="389" fill="#fdf4ff" font-size="38" font-weight="700">6</text>
      <text x="0" y="500" fill="#f8fafc" font-size="24" font-weight="700">Upgrade &amp; verify</text>
      <text x="0" y="535" fill="#9fb2c8" font-size="18">check UI and workloads</text>
    </g>
  </g>
  <rect x="100" y="625" width="1200" height="70" rx="22" fill="#111a2d" stroke="#34445f"/>
  <text x="700" y="670" text-anchor="middle" fill="#dce8f6" font-family="Arial, sans-serif" font-size="21">Think like moving house: label the boxes, keep the keys, and check every room before discarding the backup</text>
</svg>
