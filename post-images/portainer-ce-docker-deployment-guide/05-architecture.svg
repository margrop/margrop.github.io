<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Portainer and Docker architecture</title>
  <desc id="desc">A browser connects to Portainer, which uses the Docker socket to manage Docker Engine resources.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#151b2f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25c2ff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#67d8ff"/>
    </marker>
  </defs>
  <rect width="1400" height="800" rx="34" fill="url(#bg)"/>
  <text x="70" y="85" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="700">Portainer is the control room, not the engine</text>
  <text x="70" y="127" fill="#9fb2c8" font-family="Arial, sans-serif" font-size="22">The Docker socket is the privileged management channel.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="260" width="250" height="230" rx="28" fill="#172033" stroke="#31425e" stroke-width="2"/>
    <rect x="106" y="298" width="178" height="112" rx="14" fill="#0a1020" stroke="#67d8ff" stroke-width="3"/>
    <rect x="133" y="326" width="124" height="14" rx="7" fill="#31425e"/>
    <rect x="133" y="354" width="88" height="14" rx="7" fill="#31425e"/>
    <path d="M156 439h78l23 24H133z" fill="#4d5f7a"/>
    <text x="195" y="535" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="28" font-weight="700">Browser</text>
  </g>

  <path d="M330 375H480" stroke="#67d8ff" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="405" y="348" text-anchor="middle" fill="#bfeeff" font-family="Arial, sans-serif" font-size="20">HTTPS</text>

  <g filter="url(#shadow)">
    <rect x="500" y="210" width="330" height="330" rx="36" fill="#172033" stroke="url(#accent)" stroke-width="4"/>
    <rect x="552" y="267" width="226" height="146" rx="18" fill="#0a1020"/>
    <rect x="580" y="298" width="170" height="18" rx="9" fill="#25c2ff"/>
    <rect x="580" y="333" width="112" height="16" rx="8" fill="#4d5f7a"/>
    <rect x="580" y="364" width="148" height="16" rx="8" fill="#4d5f7a"/>
    <circle cx="665" cy="461" r="24" fill="#8b5cf6"/>
    <text x="665" y="585" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="31" font-weight="700">Portainer CE</text>
  </g>

  <path d="M840 375H970" stroke="#67d8ff" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="905" y="340" text-anchor="middle" fill="#bfeeff" font-family="Arial, sans-serif" font-size="20">Docker socket</text>
  <text x="905" y="365" text-anchor="middle" fill="#ffb4c8" font-family="Arial, sans-serif" font-size="17">high privilege</text>

  <g filter="url(#shadow)">
    <rect x="990" y="170" width="340" height="420" rx="36" fill="#172033" stroke="#31425e" stroke-width="2"/>
    <text x="1160" y="230" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="31" font-weight="700">Docker Engine</text>
    <g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
      <rect x="1035" y="270" width="120" height="92" rx="18" fill="#0e7490"/><text x="1095" y="325" fill="#ecfeff">Containers</text>
      <rect x="1175" y="270" width="110" height="92" rx="18" fill="#4338ca"/><text x="1230" y="325" fill="#eef2ff">Images</text>
      <rect x="1035" y="388" width="120" height="92" rx="18" fill="#7c3aed"/><text x="1095" y="443" fill="#f5f3ff">Volumes</text>
      <rect x="1175" y="388" width="110" height="92" rx="18" fill="#0f766e"/><text x="1230" y="443" fill="#f0fdfa">Networks</text>
    </g>
    <rect x="1035" y="515" width="250" height="38" rx="19" fill="#25324a"/>
    <text x="1160" y="541" text-anchor="middle" fill="#b8c7db" font-family="Arial, sans-serif" font-size="18">host resources</text>
  </g>

  <rect x="70" y="670" width="1260" height="72" rx="22" fill="#111a2d" stroke="#2c3d58"/>
  <text x="700" y="715" text-anchor="middle" fill="#dce8f6" font-family="Arial, sans-serif" font-size="23">If Portainer can control the socket, treat access to Portainer like access to the Docker host.</text>
</svg>
