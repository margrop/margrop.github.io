<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Checklist for duplicate reply debugging">
<style>
  .bg{fill:#f7fafc}.panel{fill:#ffffff;stroke:#1f2937;stroke-width:2}.soft{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.warn{fill:#fee2e2;stroke:#b91c1c;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.muted{fill:#eef2ff;stroke:#4338ca;stroke-width:2}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif;font-size:22px;fill:#111827}.small{font-size:16px;fill:#374151}.tiny{font-size:14px;fill:#4b5563}.arrow{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#6b7280;stroke-width:2;stroke-dasharray:7 7;fill:none}.title{font-size:30px;font-weight:700;fill:#111827}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker></defs>
<rect class="bg" width="1200" height="720"/>
<text x="60" y="70" class="title">重复回复排障清单：先分层，再动配置</text>
<rect x="80" y="125" width="480" height="95" rx="14" class="panel"/><text x="115" y="165" class="text">1. 看发送层</text><text x="115" y="195" class="small">发送 API 是否真的调用了多次？</text>
<rect x="640" y="125" width="480" height="95" rx="14" class="panel"/><text x="675" y="165" class="text">2. 看最终文本</text><text x="675" y="195" class="small">agent raw text 是否已经重复？</text>
<rect x="80" y="255" width="480" height="95" rx="14" class="panel"/><text x="115" y="295" class="text">3. 看 provider</text><text x="115" y="325" class="small">同名模型是否有多条 provider 路径？</text>
<rect x="640" y="255" width="480" height="95" rx="14" class="panel"/><text x="675" y="295" class="text">4. 做对照实验</text><text x="675" y="325" class="small">兼容路径 vs 原生路径，同 prompt 对比。</text>
<rect x="80" y="385" width="480" height="95" rx="14" class="panel"/><text x="115" y="425" class="text">5. 收窄可见模型</text><text x="115" y="455" class="small">移除故障候选，减少路由歧义。</text>
<rect x="640" y="385" width="480" height="95" rx="14" class="panel"/><text x="675" y="425" class="text">6. 重启并复测</text><text x="675" y="455" class="small">验证 channel、gateway、主会话三处状态。</text>
<rect x="120" y="545" width="920" height="80" rx="14" class="ok"/><text x="155" y="585" class="text">判定修复</text><text x="300" y="585" class="small">同一条最小 prompt 返回一次；执行轨迹显示 winner provider 已切到目标路径。</text>
</svg>