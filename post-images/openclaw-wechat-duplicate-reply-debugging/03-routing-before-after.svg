<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Routing before and after">
<style>
  .bg{fill:#f7fafc}.panel{fill:#ffffff;stroke:#1f2937;stroke-width:2}.soft{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.warn{fill:#fee2e2;stroke:#b91c1c;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.muted{fill:#eef2ff;stroke:#4338ca;stroke-width:2}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif;font-size:22px;fill:#111827}.small{font-size:16px;fill:#374151}.tiny{font-size:14px;fill:#4b5563}.arrow{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#6b7280;stroke-width:2;stroke-dasharray:7 7;fill:none}.title{font-size:30px;font-weight:700;fill:#111827}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker></defs>
<rect class="bg" width="1200" height="720"/>
<text x="60" y="70" class="title">修复前后：同一个模型名，不等于同一条运行路径</text>
<text x="90" y="125" class="text">修复前</text>
<rect x="80" y="155" width="230" height="90" rx="14" class="panel"/><text x="115" y="207" class="small">个人 IM 消息</text>
<path d="M320 200 H430" class="arrow"/>
<rect x="440" y="155" width="250" height="90" rx="14" class="soft"/><text x="475" y="190" class="small">Agent 默认模型</text><text x="475" y="218" class="tiny">模型名相同，provider 有歧义</text>
<path d="M700 200 H810" class="arrow"/>
<rect x="820" y="155" width="260" height="90" rx="14" class="warn"/><text x="855" y="190" class="small">兼容网关路径</text><text x="855" y="218" class="tiny">最终文本重复</text>
<text x="90" y="345" class="text">修复后</text>
<rect x="80" y="375" width="230" height="90" rx="14" class="panel"/><text x="115" y="427" class="small">个人 IM 消息</text>
<path d="M320 420 H430" class="arrow"/>
<rect x="440" y="375" width="250" height="90" rx="14" class="muted"/><text x="475" y="410" class="small">通道级覆盖</text><text x="475" y="438" class="tiny">显式指定 provider/model</text>
<path d="M700 420 H810" class="arrow"/>
<rect x="820" y="375" width="260" height="90" rx="14" class="ok"/><text x="855" y="410" class="small">原生 Provider 路径</text><text x="855" y="438" class="tiny">最终文本只保留一次</text>
<path d="M950 250 V360" class="dash"/><text x="870" y="315" class="tiny">保留知识，不保留故障候选</text>
<rect x="120" y="555" width="900" height="70" rx="14" class="panel"/><text x="150" y="597" class="small">工程经验：排障时不要只看模型 ID，要同时记录 provider、API 协议、会话 key、最终 raw text。</text>
</svg>