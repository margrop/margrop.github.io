<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Layered diagnosis path">
<style>
  .bg{fill:#f7fafc}.panel{fill:#ffffff;stroke:#1f2937;stroke-width:2}.soft{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.warn{fill:#fee2e2;stroke:#b91c1c;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.muted{fill:#eef2ff;stroke:#4338ca;stroke-width:2}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif;font-size:22px;fill:#111827}.small{font-size:16px;fill:#374151}.tiny{font-size:14px;fill:#4b5563}.arrow{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#6b7280;stroke-width:2;stroke-dasharray:7 7;fill:none}.title{font-size:30px;font-weight:700;fill:#111827}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker></defs>
<rect class="bg" width="1200" height="720"/>
<text x="60" y="70" class="title">从“看见复读”到“定位复读发生在哪一层”</text>
<rect x="70" y="130" width="220" height="110" rx="14" class="warn"/><text x="105" y="175" class="text">用户看到</text><text x="105" y="210" class="small">一条消息内重复多次</text>
<path d="M300 185 H400" class="arrow"/>
<rect x="410" y="130" width="220" height="110" rx="14" class="soft"/><text x="445" y="175" class="text">发送层</text><text x="445" y="210" class="small">是否调用多次 API</text>
<path d="M640 185 H740" class="arrow"/>
<rect x="750" y="130" width="220" height="110" rx="14" class="soft"/><text x="785" y="175" class="text">会话层</text><text x="785" y="210" class="small">是否复用旧 session</text>
<path d="M860 250 V330" class="arrow"/>
<rect x="750" y="340" width="220" height="110" rx="14" class="warn"/><text x="785" y="385" class="text">模型路由层</text><text x="785" y="420" class="small">最终文本已重复</text>
<path d="M740 395 H640" class="arrow"/>
<rect x="410" y="340" width="220" height="110" rx="14" class="ok"/><text x="445" y="385" class="text">原生 Provider</text><text x="445" y="420" class="small">同样输入只返回一次</text>
<path d="M400 395 H300" class="arrow"/>
<rect x="70" y="340" width="220" height="110" rx="14" class="ok"/><text x="105" y="385" class="text">修复路径</text><text x="105" y="420" class="small">切换路由并重启验证</text>
<rect x="70" y="530" width="1010" height="90" rx="14" class="panel"/><text x="100" y="570" class="text">关键判断</text><text x="220" y="570" class="small">如果发送日志只有一次，但 agent 输出文本已经重复，问题就不在 IM 通道，而在模型执行链路。</text>
</svg>