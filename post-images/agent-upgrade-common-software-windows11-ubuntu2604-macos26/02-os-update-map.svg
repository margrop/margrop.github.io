<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
<rect width="1400" height="760" fill="#f8fafc"/>
<text x="80" y="92" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#172033">Three systems, same upgrade grammar</text>
<text x="80" y="138" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#5a6678">The commands are different, but the pattern is inventory, upgrade, clean, verify.</text>
<g font-family="Arial, Helvetica, sans-serif">
<g transform="translate(80 210)"><rect width="380" height="390" rx="22" fill="#ffffff" stroke="#cfd8e5"/><rect x="0" y="0" width="380" height="72" rx="22" fill="#eaf3ff"/><text x="28" y="47" font-size="29" font-weight="700" fill="#173b62">Windows 11</text><text x="32" y="125" font-size="23" font-weight="700" fill="#203040">Primary tools</text><text x="32" y="168" font-size="21" fill="#506173">winget upgrade</text><text x="32" y="202" font-size="21" fill="#506173">winget export/import</text><text x="32" y="236" font-size="21" fill="#506173">Microsoft Store update</text><line x1="32" y1="270" x2="348" y2="270" stroke="#e2e8f0"/><text x="32" y="315" font-size="23" font-weight="700" fill="#203040">Good for</text><text x="32" y="354" font-size="20" fill="#506173">Desktop apps, dev tools, utilities</text></g>
<g transform="translate(510 210)"><rect width="380" height="390" rx="22" fill="#ffffff" stroke="#cfd8e5"/><rect x="0" y="0" width="380" height="72" rx="22" fill="#fff4e6"/><text x="28" y="47" font-size="29" font-weight="700" fill="#7a4a00">Ubuntu 26.04</text><text x="32" y="125" font-size="23" font-weight="700" fill="#203040">Primary tools</text><text x="32" y="168" font-size="21" fill="#506173">apt update && apt upgrade</text><text x="32" y="202" font-size="21" fill="#506173">snap refresh</text><text x="32" y="236" font-size="21" fill="#506173">unattended-upgrades</text><line x1="32" y1="270" x2="348" y2="270" stroke="#e2e8f0"/><text x="32" y="315" font-size="23" font-weight="700" fill="#203040">Good for</text><text x="32" y="354" font-size="20" fill="#506173">Servers, packages, runtimes</text></g>
<g transform="translate(940 210)"><rect width="380" height="390" rx="22" fill="#ffffff" stroke="#cfd8e5"/><rect x="0" y="0" width="380" height="72" rx="22" fill="#eff7f1"/><text x="28" y="47" font-size="29" font-weight="700" fill="#225b34">macOS 26</text><text x="32" y="125" font-size="23" font-weight="700" fill="#203040">Primary tools</text><text x="32" y="168" font-size="21" fill="#506173">softwareupdate</text><text x="32" y="202" font-size="21" fill="#506173">brew outdated/upgrade</text><text x="32" y="236" font-size="21" fill="#506173">App Store updates</text><line x1="32" y1="270" x2="348" y2="270" stroke="#e2e8f0"/><text x="32" y="315" font-size="23" font-weight="700" fill="#203040">Good for</text><text x="32" y="354" font-size="20" fill="#506173">System patches, CLI tools, apps</text></g>
<rect x="80" y="640" width="1240" height="56" rx="16" fill="#202a36"/><text x="110" y="675" font-size="22" fill="#e7eef9">Agent prompt should name the OS, package managers, reboot policy, and rollback evidence.</text>
</g></svg>