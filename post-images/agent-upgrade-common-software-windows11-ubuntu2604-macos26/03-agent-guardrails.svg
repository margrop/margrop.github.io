<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
<rect width="1400" height="760" fill="#fbfbfd"/>
<text x="80" y="94" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#18202c">Agent guardrails for software upgrades</text>
<text x="80" y="140" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#596477">Treat the Agent like a careful operator, not a magic update button.</text>
<g font-family="Arial, Helvetica, sans-serif">
<g transform="translate(80 210)"><rect width="590" height="390" rx="24" fill="#effaf3" stroke="#79c48f"/><text x="34" y="58" font-size="30" font-weight="700" fill="#21683a">Allow</text><text x="48" y="118" font-size="23" fill="#273647">✓ List current versions first</text><text x="48" y="168" font-size="23" fill="#273647">✓ Use package-manager dry runs</text><text x="48" y="218" font-size="23" fill="#273647">✓ Save logs under a local folder</text><text x="48" y="268" font-size="23" fill="#273647">✓ Ask before rebooting</text><text x="48" y="318" font-size="23" fill="#273647">✓ Report failures package by package</text></g>
<g transform="translate(730 210)"><rect width="590" height="390" rx="24" fill="#fff1f1" stroke="#e38989"/><text x="34" y="58" font-size="30" font-weight="700" fill="#933232">Block</text><text x="48" y="118" font-size="23" fill="#273647">✕ No random installer download</text><text x="48" y="168" font-size="23" fill="#273647">✕ No hidden credential output</text><text x="48" y="218" font-size="23" fill="#273647">✕ No full private address in docs</text><text x="48" y="268" font-size="23" fill="#273647">✕ No forced major OS upgrade</text><text x="48" y="318" font-size="23" fill="#273647">✕ No reboot without approval</text></g>
<rect x="80" y="640" width="1240" height="58" rx="16" fill="#202a36"/><text x="110" y="677" font-size="22" fill="#e7eef9">A good automation run ends with evidence: before/after versions, changed packages, errors, and restart status.</text>
</g></svg>