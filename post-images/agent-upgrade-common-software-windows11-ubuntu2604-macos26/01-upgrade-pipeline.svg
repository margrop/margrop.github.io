<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
<rect width="1400" height="760" fill="#f7f8fa"/>
<rect x="70" y="60" width="1260" height="640" rx="24" fill="#fff" stroke="#d7dde7"/>
<text x="110" y="125" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#18202c">Safe software upgrade pipeline</text>
<text x="110" y="170" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#596477">Agent can drive the workflow, but each gate still needs evidence.</text>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#5b6f8f"/></marker></defs>
<g font-family="Arial, Helvetica, sans-serif">
<g transform="translate(110 260)"><rect width="180" height="190" rx="18" fill="#eef6ff" stroke="#7bb7e8"/><text x="90" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#16466f">1</text><text x="90" y="100" text-anchor="middle" font-size="25" font-weight="700" fill="#203040">Inventory</text><text x="90" y="135" text-anchor="middle" font-size="18" fill="#526173">versions, disks</text><text x="90" y="160" text-anchor="middle" font-size="18" fill="#526173">running apps</text></g>
<g transform="translate(330 260)"><rect width="180" height="190" rx="18" fill="#f4f0ff" stroke="#a48be8"/><text x="90" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#503c8f">2</text><text x="90" y="100" text-anchor="middle" font-size="25" font-weight="700" fill="#203040">Dry run</text><text x="90" y="135" text-anchor="middle" font-size="18" fill="#526173">show changes</text><text x="90" y="160" text-anchor="middle" font-size="18" fill="#526173">before touching</text></g>
<g transform="translate(550 260)"><rect width="180" height="190" rx="18" fill="#fff7e8" stroke="#e6b45c"/><text x="90" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#805300">3</text><text x="90" y="100" text-anchor="middle" font-size="25" font-weight="700" fill="#203040">Upgrade</text><text x="90" y="135" text-anchor="middle" font-size="18" fill="#526173">batch update</text><text x="90" y="160" text-anchor="middle" font-size="18" fill="#526173">with logs</text></g>
<g transform="translate(770 260)"><rect width="180" height="190" rx="18" fill="#eefaf1" stroke="#75c48b"/><text x="90" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#21723b">4</text><text x="90" y="100" text-anchor="middle" font-size="25" font-weight="700" fill="#203040">Verify</text><text x="90" y="135" text-anchor="middle" font-size="18" fill="#526173">versions, health</text><text x="90" y="160" text-anchor="middle" font-size="18" fill="#526173">restart needed</text></g>
<g transform="translate(990 260)"><rect width="180" height="190" rx="18" fill="#fff0f0" stroke="#e88989"/><text x="90" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#9d3030">5</text><text x="90" y="100" text-anchor="middle" font-size="25" font-weight="700" fill="#203040">Rollback</text><text x="90" y="135" text-anchor="middle" font-size="18" fill="#526173">pin, restore</text><text x="90" y="160" text-anchor="middle" font-size="18" fill="#526173">or defer</text></g>
<path d="M295 355 H320" stroke="#5b6f8f" stroke-width="5" marker-end="url(#arrow)"/><path d="M515 355 H540" stroke="#5b6f8f" stroke-width="5" marker-end="url(#arrow)"/><path d="M735 355 H760" stroke="#5b6f8f" stroke-width="5" marker-end="url(#arrow)"/><path d="M955 355 H980" stroke="#5b6f8f" stroke-width="5" marker-end="url(#arrow)"/>
<rect x="110" y="540" width="1060" height="92" rx="18" fill="#202a36"/><text x="145" y="578" font-size="23" font-weight="700" fill="#fff">Rule of thumb</text><text x="145" y="612" font-size="21" fill="#d7e2f2">No dry run, no log, no rollback note means the upgrade is not finished yet.</text>
</g></svg>