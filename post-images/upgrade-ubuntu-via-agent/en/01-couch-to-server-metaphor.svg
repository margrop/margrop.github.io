<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="jammy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="noble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <text x="480" y="42" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">One sentence, one agent, one upgrade: 22.04 to 24.04</text>
  <text x="480" y="68" fill="#94a3b8" font-size="13" text-anchor="middle">You type on the couch. Another machine swaps its kernel in another room.</text>

  <rect x="40" y="110" width="220" height="380" rx="18" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="150" y="138" fill="#f8fafc" font-size="15" font-weight="700" text-anchor="middle">You (couch)</text>
  <text x="150" y="158" fill="#94a3b8" font-size="11" text-anchor="middle">macOS + Claude Code</text>

  <rect x="55" y="180" width="190" height="62" rx="10" fill="#0b1220" stroke="#475569" stroke-width="1"/>
  <text x="150" y="205" fill="#fde68a" font-size="12" text-anchor="middle" font-style="italic">"upgrade 192.168.103.182 to 24.04"</text>
  <text x="150" y="225" fill="#94a3b8" font-size="11" text-anchor="middle">one sentence</text>

  <path d="M 270 250 Q 380 250 470 250" stroke="#60a5fa" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" stroke-dasharray="6 4"/>
  <polygon points="0,-6 12,0 0,6" fill="#60a5fa" transform="translate(470 250)"/>
  <text x="370" y="240" fill="#60a5fa" font-size="12" text-anchor="middle">ssh + tmux</text>

  <rect x="490" y="110" width="430" height="380" rx="18" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="705" y="138" fill="#f8fafc" font-size="15" font-weight="700" text-anchor="middle">Remote box (other room)</text>
  <text x="705" y="158" fill="#94a3b8" font-size="11" text-anchor="middle">Ubuntu 22.04 → 24.04</text>

  <rect x="520" y="180" width="170" height="130" rx="10" fill="url(#jammy)" stroke="#7c2d12" stroke-width="2"/>
  <text x="605" y="210" fill="#fff7ed" font-size="14" font-weight="700" text-anchor="middle">22.04 LTS</text>
  <text x="605" y="232" fill="#fed7aa" font-size="11" text-anchor="middle">jammy</text>
  <text x="605" y="252" fill="#fed7aa" font-size="11" text-anchor="middle">kernel 5.15</text>
  <text x="605" y="290" fill="#fed7aa" font-size="10" text-anchor="middle">9.5G disk / 1G mem</text>

  <path d="M 700 245 L 740 245" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrowYellow)"/>
  <polygon points="0,-6 12,0 0,6" fill="#fbbf24" transform="translate(740 245)"/>
  <text x="720" y="232" fill="#fbbf24" font-size="11" text-anchor="middle">do-release-upgrade</text>

  <rect x="750" y="180" width="170" height="130" rx="10" fill="url(#noble)" stroke="#14532d" stroke-width="2"/>
  <text x="835" y="210" fill="#f0fdf4" font-size="14" font-weight="700" text-anchor="middle">24.04 LTS</text>
  <text x="835" y="232" fill="#bbf7d0" font-size="11" text-anchor="middle">noble</text>
  <text x="835" y="252" fill="#bbf7d0" font-size="11" text-anchor="middle">kernel 6.8</text>
  <text x="835" y="290" fill="#bbf7d0" font-size="10" text-anchor="middle">3.7G disk free</text>

  <rect x="520" y="340" width="170" height="60" rx="8" fill="#0b1220" stroke="#475569"/>
  <text x="605" y="362" fill="#fde68a" font-size="11" font-weight="700" text-anchor="middle">tmux guard</text>
  <text x="605" y="382" fill="#94a3b8" font-size="10" text-anchor="middle">survives disconnects</text>

  <rect x="750" y="340" width="170" height="60" rx="8" fill="#0b1220" stroke="#475569"/>
  <text x="835" y="362" fill="#fde68a" font-size="11" font-weight="700" text-anchor="middle">fallback sshd:1022</text>
  <text x="835" y="382" fill="#94a3b8" font-size="10" text-anchor="middle">when port 22 sleeps</text>

  <rect x="520" y="420" width="400" height="50" rx="8" fill="#0b1220" stroke="#fbbf24" stroke-dasharray="4 3"/>
  <text x="720" y="442" fill="#fde68a" font-size="11" text-anchor="middle" font-style="italic">"It is not you carrying boxes. It is letting a moving company in</text>
  <text x="720" y="460" fill="#fde68a" font-size="11" text-anchor="middle" font-style="italic">another room dismantle the old cabinet, build a new one, and put your stuff back."</text>

  <text x="480" y="520" fill="#475569" font-size="11" text-anchor="middle">Figure 1 / The upgrade needs far less babysitting than you think.</text>
</svg>
