<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="320" fill="url(#bg)"/>
  <text x="480" y="32" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">真实时间线(节选自 journalctl)</text>
  <text x="480" y="54" fill="#94a3b8" font-size="11" text-anchor="middle">每一行就是一次"心跳",断线了可以接着看</text>

  <line x1="60" y1="100" x2="920" y2="100" stroke="#475569" stroke-width="2"/>
  <g fill="#94a3b8" font-size="11">
    <circle cx="100" cy="100" r="6" fill="#60a5fa"/>
    <text x="100" y="80" text-anchor="middle">10:08</text>
    <text x="100" y="135" text-anchor="middle" fill="#cbd5e1">探活</text>

    <circle cx="220" cy="100" r="6" fill="#fbbf24"/>
    <text x="220" y="80" text-anchor="middle">10:14</text>
    <text x="220" y="135" text-anchor="middle" fill="#cbd5e1">tmux + fallback</text>

    <circle cx="360" cy="100" r="6" fill="#fb923c"/>
    <text x="360" y="80" text-anchor="middle">10:18</text>
    <text x="360" y="135" text-anchor="middle" fill="#cbd5e1">进入 dpkg</text>

    <circle cx="500" cy="100" r="6" fill="#f87171"/>
    <text x="500" y="80" text-anchor="middle">10:21</text>
    <text x="500" y="135" text-anchor="middle" fill="#cbd5e1">udev 255 上线</text>

    <circle cx="640" cy="100" r="6" fill="#fbbf24"/>
    <text x="640" y="80" text-anchor="middle">10:24</text>
    <text x="640" y="135" text-anchor="middle" fill="#cbd5e1">autoremove</text>

    <circle cx="780" cy="100" r="6" fill="#86efac"/>
    <text x="780" y="80" text-anchor="middle">10:28</text>
    <text x="780" y="135" text-anchor="middle" fill="#cbd5e1">reboot</text>

    <circle cx="900" cy="100" r="8" fill="#22d3ee"/>
    <text x="900" y="80" text-anchor="middle">10:35</text>
    <text x="900" y="135" text-anchor="middle" fill="#cbd5e1">noble + 6.8</text>
  </g>

  <g fill="#cbd5e1" font-size="11">
    <rect x="60" y="170" width="850" height="38" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="80" y="194">10:14:30  Setting up systemd-sysv (255.4-1ubuntu8.16) ...</text>
    <rect x="60" y="215" width="850" height="38" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="80" y="239">10:21:24  udev 255.4 上线,清理 obsolete conffile</text>
    <rect x="60" y="260" width="850" height="38" rx="6" fill="#0b1220" stroke="#475569"/>
    <text x="80" y="284">10:35:42  new kernel 6.8.0-124-generic, sshd PID 805 接管 22</text>
  </g>

  <text x="480" y="312" fill="#475569" font-size="10" text-anchor="middle">图 3 · 一次跨 LTS 升级的"心电图",时间是真的,过程是顺的。</text>
</svg>
