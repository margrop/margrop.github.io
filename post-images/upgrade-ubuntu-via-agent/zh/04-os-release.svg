<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="280" fill="url(#bg)"/>
  <text x="480" y="32" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">"机器是不是真的升级了?" 一行命令出答案</text>

  <rect x="40" y="70" width="880" height="180" rx="10" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <text x="60" y="100" fill="#86efac" font-size="13" font-family="ui-monospace, Menlo, monospace">$ ssh root@host cat /etc/os-release</text>
  <g font-size="13" font-family="ui-monospace, Menlo, monospace">
    <text x="60" y="128" fill="#f8fafc">PRETTY_NAME="Ubuntu 24.04.4 LTS (Noble Numbat)"</text>
    <text x="60" y="150" fill="#f8fafc">VERSION_ID="24.04"</text>
    <text x="60" y="172" fill="#f8fafc">VERSION_CODENAME=noble</text>
    <text x="60" y="194" fill="#94a3b8">ID=ubuntu</text>
    <text x="60" y="216" fill="#94a3b8">HOME_URL="https://www.ubuntu.com/"</text>
    <text x="60" y="238" fill="#94a3b8">SUPPORT_URL="https://help.ubuntu.com/"</text>
  </g>

  <rect x="700" y="180" width="200" height="50" rx="8" fill="#1e293b" stroke="#86efac" stroke-width="2"/>
  <text x="800" y="202" fill="#86efac" font-size="11" font-weight="700" text-anchor="middle">检查三项</text>
  <text x="800" y="220" fill="#cbd5e1" font-size="10" text-anchor="middle">VERSION · CODENAME · uname -r</text>

  <text x="480" y="270" fill="#475569" font-size="10" text-anchor="middle">图 4 · OS 版本不是猜的,是 cat 出来的。</text>
</svg>
