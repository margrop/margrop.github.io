<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="220" fill="url(#bg)"/>
  <text x="480" y="32" fill="#f8fafc" font-size="18" font-weight="700" text-anchor="middle">Agent 升级的五步流水线(每一段都"可观察")</text>

  <g font-size="12" fill="#f8fafc">
    <rect x="20" y="70" width="170" height="80" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <text x="105" y="98" font-weight="700" text-anchor="middle">1. SSH 探活</text>
    <text x="105" y="120" fill="#94a3b8" text-anchor="middle">cat /etc/os-release</text>
    <text x="105" y="138" fill="#94a3b8" text-anchor="middle">uname -r / df -h</text>

    <rect x="210" y="70" width="170" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="295" y="98" font-weight="700" text-anchor="middle">2. 准备 tmux</text>
    <text x="295" y="120" fill="#94a3b8" text-anchor="middle">apt install tmux</text>
    <text x="295" y="138" fill="#94a3b8" text-anchor="middle">tmux new -d -s upg</text>

    <rect x="400" y="70" width="170" height="80" rx="10" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
    <text x="485" y="98" font-weight="700" text-anchor="middle">3. fallback sshd</text>
    <text x="485" y="120" fill="#94a3b8" text-anchor="middle">sshd -D -p 1022</text>
    <text x="485" y="138" fill="#94a3b8" text-anchor="middle">Prompt=normal</text>

    <rect x="590" y="70" width="170" height="80" rx="10" fill="#1e293b" stroke="#86efac" stroke-width="2"/>
    <text x="675" y="98" font-weight="700" text-anchor="middle">4. 升级 + 日志</text>
    <text x="675" y="120" fill="#94a3b8" text-anchor="middle">do-release-upgrade -f</text>
    <text x="675" y="138" fill="#94a3b8" text-anchor="middle">DistUpgradeViewNonInteractive</text>

    <rect x="780" y="70" width="160" height="80" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="860" y="98" font-weight="700" text-anchor="middle">5. 重启 + 自检</text>
    <text x="860" y="120" fill="#94a3b8" text-anchor="middle">noble / 6.8 内核</text>
    <text x="860" y="138" fill="#94a3b8" text-anchor="middle">服务端口全在</text>
  </g>

  <g stroke="#475569" stroke-width="2" fill="none">
    <path d="M 190 110 L 210 110" marker-end="url(#a)"/>
    <path d="M 380 110 L 400 110" marker-end="url(#a)"/>
    <path d="M 570 110 L 590 110" marker-end="url(#a)"/>
    <path d="M 760 110 L 780 110" marker-end="url(#a)"/>
  </g>

  <text x="480" y="190" fill="#fde68a" font-size="11" text-anchor="middle" font-style="italic">每一步都有输出,每一步都可以被打断、恢复、追溯。</text>
  <text x="480" y="210" fill="#475569" font-size="10" text-anchor="middle">图 2 · 升级流程的"乐高化",每块可换可拆。</text>
</svg>
