<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7fafc"/>
  <text x="80" y="95" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#17202b">为什么“重置前提醒”有价值</text>
  <text x="80" y="142" font-family="Arial, sans-serif" font-size="20" fill="#667085">当周额度即将被补偿性重置覆盖，剩余额度如果没有使用，就等于错过了一次可执行窗口。</text>
  <line x1="110" y1="360" x2="1170" y2="360" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
  <g font-family="Arial, sans-serif">
    <circle cx="170" cy="360" r="18" fill="#2d65c8"/><text x="135" y="415" font-size="20" fill="#17202b">周额度开始</text>
    <rect x="260" y="295" width="240" height="130" rx="16" fill="#e7efff" stroke="#9bbcf5"/>
    <text x="292" y="345" font-size="22" font-weight="700" fill="#17202b">正常使用期</text><text x="292" y="382" font-size="17" fill="#667085">做大任务 / 开长会话</text>
    <circle cx="610" cy="360" r="22" fill="#a86600"/><text x="540" y="415" font-size="20" fill="#17202b">前置信号出现</text>
    <path d="M620 250 C670 210 742 210 792 250" fill="none" stroke="#a86600" stroke-width="5"/>
    <path d="M648 279 C685 250 727 250 764 279" fill="none" stroke="#a86600" stroke-width="5"/>
    <rect x="680" y="295" width="250" height="130" rx="16" fill="#fff0d0" stroke="#e7bd6c"/>
    <text x="712" y="345" font-size="22" font-weight="700" fill="#17202b">速蹬窗口</text><text x="712" y="382" font-size="17" fill="#667085">优先消耗剩余额度</text>
    <circle cx="1010" cy="360" r="24" fill="#13865d"/><text x="958" y="415" font-size="20" fill="#17202b">额度重置</text>
    <rect x="1018" y="245" width="130" height="62" rx="12" fill="#e2f4ec" stroke="#66bc8d"/><text x="1044" y="284" font-size="22" fill="#13865d" font-weight="700">刷新</text>
    <text x="80" y="590" font-size="22" font-weight="700" fill="#17202b">核心不是“薅免费额度”，而是减少计划外停工。</text>
    <text x="80" y="628" font-size="18" fill="#667085">雷达无法保证命中每一次重置，但能把原本散落在状态页、官方动态和社区反馈里的信号变成更早的行动提示。</text>
  </g>
</svg>
