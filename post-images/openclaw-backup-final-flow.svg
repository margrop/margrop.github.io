<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0FDFA"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 40px/1.2 Inter,Helvetica,Arial,sans-serif; fill:#0F172A}
      .sub{font:500 20px/1.4 Inter,Helvetica,Arial,sans-serif; fill:#475569}
      .head{font:700 22px/1.2 Inter,Helvetica,Arial,sans-serif; fill:#0F172A}
      .body{font:500 18px/1.45 Inter,Helvetica,Arial,sans-serif; fill:#334155}
      .tiny{font:500 15px/1.35 Inter,Helvetica,Arial,sans-serif; fill:#475569}
      .caps{font:700 14px/1 Inter,Helvetica,Arial,sans-serif; letter-spacing:.16em; fill:#0F766E}
    </style>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="72" y="84" class="caps">FINAL PIPELINE</text>
  <text x="72" y="130" class="title">The stable backup path is simple and boring</text>
  <text x="72" y="168" class="sub">That is a feature. The process now works the same way every day.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="250" width="248" height="160" rx="24" fill="#FFFFFF"/>
    <rect x="360" y="250" width="248" height="160" rx="24" fill="#FFFFFF"/>
    <rect x="648" y="250" width="248" height="160" rx="24" fill="#FFFFFF"/>
    <rect x="936" y="250" width="192" height="160" rx="24" fill="#FFFFFF"/>
  </g>

  <rect x="108" y="290" width="176" height="80" rx="18" fill="#CCFBF1"/>
  <text x="136" y="334" class="head">Scheduler</text>
  <text x="136" y="362" class="tiny">cron or launchd fallback</text>

  <rect x="396" y="290" width="176" height="80" rx="18" fill="#DBEAFE"/>
  <text x="424" y="334" class="head">Backup create</text>
  <text x="424" y="362" class="tiny">plan, package, verify</text>

  <rect x="684" y="290" width="176" height="80" rx="18" fill="#FEF3C7"/>
  <text x="712" y="334" class="head">Sync</text>
  <text x="712" y="362" class="tiny">copy to NAS</text>

  <rect x="966" y="290" width="132" height="80" rx="18" fill="#DCFCE7"/>
  <text x="984" y="334" class="head">Done</text>
  <text x="984" y="362" class="tiny">archive verified</text>

  <line x1="320" y1="330" x2="360" y2="330" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <polygon points="360,330 342,320 342,340" fill="#0F172A"/>
  <line x1="608" y1="330" x2="648" y2="330" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <polygon points="648,330 630,320 630,340" fill="#0F172A"/>
  <line x1="896" y1="330" x2="936" y2="330" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <polygon points="936,330 918,320 918,340" fill="#0F172A"/>

  <g filter="url(#shadow)">
    <rect x="188" y="474" width="824" height="132" rx="26" fill="#FFFFFF"/>
  </g>
  <circle cx="244" cy="540" r="32" fill="#0F766E"/>
  <path d="M230 540L239 549L257 530" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="302" y="526" class="head">Guardrails added</text>
  <text x="302" y="560" class="body">Lock file, permission self-heal, separate logs, and explicit verification stop overlap and make failures visible.</text>
  <text x="302" y="592" class="tiny">The point is not elegance. The point is that the same job can be trusted tomorrow.</text>
</svg>
