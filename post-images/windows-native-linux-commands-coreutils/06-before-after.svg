<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="painBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE8E8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fixBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FFF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0FFE8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F8F8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#333" font-weight="bold">Before &amp; After：有了 coreutils 之后</text>

  <!-- === BEFORE === -->
  <text x="200" y="62" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#E53E3E" font-weight="bold">❌ 没有 coreutils 的时候</text>

  <rect x="20" y="75" width="360" height="300" rx="8" fill="url(#painBg)" stroke="#FEB2B2" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Pain 1 -->
  <rect x="35" y="88" width="330" height="60" rx="6" fill="white" stroke="#FED7D7" stroke-width="1"/>
  <text x="50" y="108" font-size="12" font-family="Arial" fill="#E53E3E" font-weight="bold">😤 日志分析</text>
  <text x="50" y="126" font-size="10" font-family="monospace" fill="#666">需要记住 Select-String / Group-Object</text>
  <text x="50" y="140" font-size="10" font-family="monospace" fill="#999">Stack Overflow 答案全是 Linux 命令</text>

  <!-- Pain 2 -->
  <rect x="35" y="158" width="330" height="60" rx="6" fill="white" stroke="#FED7D7" stroke-width="1"/>
  <text x="50" y="178" font-size="12" font-family="Arial" fill="#E53E3E" font-weight="bold">😤 跨平台脚本</text>
  <text x="50" y="196" font-size="10" font-family="monospace" fill="#666">bash 脚本在 Windows 上全报错</text>
  <text x="50" y="210" font-size="10" font-family="monospace" fill="#999">要么重写 PowerShell，要么装 WSL</text>

  <!-- Pain 3 -->
  <rect x="35" y="228" width="330" height="60" rx="6" fill="white" stroke="#FED7D7" stroke-width="1"/>
  <text x="50" y="248" font-size="12" font-family="Arial" fill="#E53E3E" font-weight="bold">😤 AI Agent 自动化</text>
  <text x="50" y="266" font-size="10" font-family="monospace" fill="#666">Agent 生成 Linux 命令，Windows 不认</text>
  <text x="50" y="280" font-size="10" font-family="monospace" fill="#999">每次都要在 prompt 里强调"用 PowerShell"</text>

  <!-- Pain 4 -->
  <rect x="35" y="298" width="330" height="60" rx="6" fill="white" stroke="#FED7D7" stroke-width="1"/>
  <text x="50" y="318" font-size="12" font-family="Arial" fill="#E53E3E" font-weight="bold">😤 学习成本</text>
  <text x="50" y="336" font-size="10" font-family="monospace" fill="#666">从 Linux 切到 Windows 要重新学命令</text>
  <text x="50" y="350" font-size="10" font-family="monospace" fill="#999">肌肉记忆全废，效率大打折扣</text>

  <!-- === ARROW === -->
  <text x="400" y="230" text-anchor="middle" font-size="28" fill="#FF6B35">→</text>

  <!-- === AFTER === -->
  <text x="600" y="62" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#38A169" font-weight="bold">✅ 有了 coreutils 之后</text>

  <rect x="420" y="75" width="360" height="300" rx="8" fill="url(#fixBg)" stroke="#9AE6B4" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Fix 1 -->
  <rect x="435" y="88" width="330" height="60" rx="6" fill="white" stroke="#C6F6D5" stroke-width="1"/>
  <text x="450" y="108" font-size="12" font-family="Arial" fill="#38A169" font-weight="bold">😎 日志分析</text>
  <text x="450" y="126" font-size="10" font-family="monospace" fill="#38A169">grep ERROR app.log | sort | uniq -c</text>
  <text x="450" y="140" font-size="10" font-family="monospace" fill="#999">和 Linux 一模一样的体验</text>

  <!-- Fix 2 -->
  <rect x="435" y="158" width="330" height="60" rx="6" fill="white" stroke="#C6F6D5" stroke-width="1"/>
  <text x="450" y="178" font-size="12" font-family="Arial" fill="#38A169" font-weight="bold">😎 跨平台脚本</text>
  <text x="450" y="196" font-size="10" font-family="monospace" fill="#38A169">同一个 bash 脚本，Linux/Windows 都能跑</text>
  <text x="450" y="210" font-size="10" font-family="monospace" fill="#999">CI/CD 不再需要两套配置</text>

  <!-- Fix 3 -->
  <rect x="435" y="228" width="330" height="60" rx="6" fill="white" stroke="#C6F6D5" stroke-width="1"/>
  <text x="450" y="248" font-size="12" font-family="Arial" fill="#38A169" font-weight="bold">😎 AI Agent 自动化</text>
  <text x="450" y="266" font-size="10" font-family="monospace" fill="#38A169">Agent 生成什么命令，Windows 就执行什么</text>
  <text x="450" y="280" font-size="10" font-family="monospace" fill="#999">不再需要"翻译"这一步</text>

  <!-- Fix 4 -->
  <rect x="435" y="298" width="330" height="60" rx="6" fill="white" stroke="#C6F6D5" stroke-width="1"/>
  <text x="450" y="318" font-size="12" font-family="Arial" fill="#38A169" font-weight="bold">😎 学习成本</text>
  <text x="450" y="336" font-size="10" font-family="monospace" fill="#38A169">Linux 肌肉记忆在 Windows 上直接复用</text>
  <text x="450" y="350" font-size="10" font-family="monospace" fill="#999">一条 winget install 搞定一切</text>

  <!-- Bottom -->
  <text x="400" y="394" text-anchor="middle" font-size="11" font-family="Arial" fill="#999">从"翻译"到"直说"——Windows 和 Linux 命令行的墙，被 coreutils 拆掉了</text>
</svg>
