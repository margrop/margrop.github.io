<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#333" font-weight="bold">方案对比：WSL2 · Git Bash · Cygwin · coreutils</text>

  <!-- Table header -->
  <rect x="20" y="50" width="140" height="36" rx="0" fill="url(#headerGrad)"/>
  <text x="90" y="73" text-anchor="middle" font-size="12" font-family="Arial" fill="white" font-weight="bold">特性</text>

  <rect x="160" y="50" width="150" height="36" rx="0" fill="url(#headerGrad)"/>
  <text x="235" y="73" text-anchor="middle" font-size="12" font-family="Arial" fill="white" font-weight="bold">WSL2</text>

  <rect x="310" y="50" width="150" height="36" rx="0" fill="url(#headerGrad)"/>
  <text x="385" y="73" text-anchor="middle" font-size="12" font-family="Arial" fill="white" font-weight="bold">Git Bash</text>

  <rect x="460" y="50" width="150" height="36" rx="0" fill="url(#headerGrad)"/>
  <text x="535" y="73" text-anchor="middle" font-size="12" font-family="Arial" fill="white" font-weight="bold">Cygwin</text>

  <rect x="610" y="50" width="170" height="36" rx="0" fill="#FF6B35"/>
  <text x="695" y="73" text-anchor="middle" font-size="12" font-family="Arial" fill="white" font-weight="bold">coreutils ⭐</text>

  <!-- Row: 启动速度 -->
  <rect x="20" y="86" width="140" height="32" fill="#F8F8F8"/>
  <text x="90" y="107" text-anchor="middle" font-size="11" font-family="Arial" fill="#555">启动速度</text>
  <rect x="160" y="86" width="150" height="32" fill="white"/>
  <text x="235" y="107" text-anchor="middle" font-size="11" font-family="Arial" fill="#E95420">慢（2-5秒）</text>
  <rect x="310" y="86" width="150" height="32" fill="#F8F8F8"/>
  <text x="385" y="107" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">快</text>
  <rect x="460" y="86" width="150" height="32" fill="white"/>
  <text x="535" y="107" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">快</text>
  <rect x="610" y="86" width="170" height="32" fill="#F0FFF0"/>
  <text x="695" y="107" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60" font-weight="bold">极快（&lt;1ms）</text>

  <!-- Row: 内存占用 -->
  <rect x="20" y="118" width="140" height="32" fill="white"/>
  <text x="90" y="139" text-anchor="middle" font-size="11" font-family="Arial" fill="#555">内存占用</text>
  <rect x="160" y="118" width="150" height="32" fill="#F8F8F8"/>
  <text x="235" y="139" text-anchor="middle" font-size="11" font-family="Arial" fill="#E95420">1-4 GB</text>
  <rect x="310" y="118" width="150" height="32" fill="white"/>
  <text x="385" y="139" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">几十 MB</text>
  <rect x="460" y="118" width="150" height="32" fill="#F8F8F8"/>
  <text x="535" y="139" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">几十 MB</text>
  <rect x="610" y="118" width="170" height="32" fill="#F0FFF0"/>
  <text x="695" y="139" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60" font-weight="bold">几 MB</text>

  <!-- Row: 原生性 -->
  <rect x="20" y="150" width="140" height="32" fill="#F8F8F8"/>
  <text x="90" y="171" text-anchor="middle" font-size="11" font-family="Arial" fill="#555">原生性</text>
  <rect x="160" y="150" width="150" height="32" fill="white"/>
  <text x="235" y="171" text-anchor="middle" font-size="11" font-family="Arial" fill="#E95420">虚拟机</text>
  <rect x="310" y="150" width="150" height="32" fill="#F8F8F8"/>
  <text x="385" y="171" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">兼容层</text>
  <rect x="460" y="150" width="150" height="32" fill="white"/>
  <text x="535" y="171" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">兼容层</text>
  <rect x="610" y="150" width="170" height="32" fill="#F0FFF0"/>
  <text x="695" y="171" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60" font-weight="bold">原生 PE 二进制</text>

  <!-- Row: 命令完整度 -->
  <rect x="20" y="182" width="140" height="32" fill="white"/>
  <text x="90" y="203" text-anchor="middle" font-size="11" font-family="Arial" fill="#555">命令完整度</text>
  <rect x="160" y="182" width="150" height="32" fill="#F8F8F8"/>
  <text x="235" y="203" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60">⭐⭐⭐⭐⭐</text>
  <rect x="310" y="182" width="150" height="32" fill="white"/>
  <text x="385" y="203" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">⭐⭐</text>
  <rect x="460" y="182" width="150" height="32" fill="#F8F8F8"/>
  <text x="535" y="203" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">⭐⭐⭐</text>
  <rect x="610" y="182" width="170" height="32" fill="#F0FFF0"/>
  <text x="695" y="203" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60" font-weight="bold">⭐⭐⭐⭐</text>

  <!-- Row: 文件系统 -->
  <rect x="20" y="214" width="140" height="32" fill="#F8F8F8"/>
  <text x="90" y="235" text-anchor="middle" font-size="11" font-family="Arial" fill="#555">文件系统</text>
  <rect x="160" y="214" width="150" height="32" fill="white"/>
  <text x="235" y="235" text-anchor="middle" font-size="11" font-family="Arial" fill="#E95420">隔离</text>
  <rect x="310" y="214" width="150" height="32" fill="#F8F8F8"/>
  <text x="385" y="235" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">路径转换</text>
  <rect x="460" y="214" width="150" height="32" fill="white"/>
  <text x="535" y="235" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">路径转换</text>
  <rect x="610" y="214" width="170" height="32" fill="#F0FFF0"/>
  <text x="695" y="235" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60" font-weight="bold">直接访问</text>

  <!-- Row: 官方维护 -->
  <rect x="20" y="246" width="140" height="32" fill="white"/>
  <text x="90" y="267" text-anchor="middle" font-size="11" font-family="Arial" fill="#555">官方维护</text>
  <rect x="160" y="246" width="150" height="32" fill="#F8F8F8"/>
  <text x="235" y="267" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60">微软</text>
  <rect x="310" y="246" width="150" height="32" fill="white"/>
  <text x="385" y="267" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">Git 社区</text>
  <rect x="460" y="246" width="150" height="32" fill="#F8F8F8"/>
  <text x="535" y="267" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">社区</text>
  <rect x="610" y="246" width="170" height="32" fill="#F0FFF0"/>
  <text x="695" y="267" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60" font-weight="bold">微软</text>

  <!-- Row: 安装 -->
  <rect x="20" y="278" width="140" height="32" fill="#F8F8F8"/>
  <text x="90" y="299" text-anchor="middle" font-size="11" font-family="Arial" fill="#555">安装复杂度</text>
  <rect x="160" y="278" width="150" height="32" fill="white"/>
  <text x="235" y="299" text-anchor="middle" font-size="11" font-family="Arial" fill="#F0AD4E">中等</text>
  <rect x="310" y="278" width="150" height="32" fill="#F8F8F8"/>
  <text x="385" y="299" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60">简单</text>
  <rect x="460" y="278" width="150" height="32" fill="white"/>
  <text x="535" y="299" text-anchor="middle" font-size="11" font-family="Arial" fill="#E95420">复杂</text>
  <rect x="610" y="278" width="170" height="32" fill="#F0FFF0"/>
  <text x="695" y="299" text-anchor="middle" font-size="11" font-family="Arial" fill="#27AE60" font-weight="bold">极简（一条命令）</text>

  <!-- Row: 适合场景 -->
  <rect x="20" y="310" width="140" height="32" fill="white"/>
  <text x="90" y="331" text-anchor="middle" font-size="11" font-family="Arial" fill="#555">适合场景</text>
  <rect x="160" y="310" width="150" height="32" fill="#F8F8F8"/>
  <text x="235" y="331" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">完整 Linux 开发环境</text>
  <rect x="310" y="310" width="150" height="32" fill="white"/>
  <text x="385" y="331" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">Git 操作</text>
  <rect x="460" y="310" width="150" height="32" fill="#F8F8F8"/>
  <text x="535" y="331" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">老旧系统兼容</text>
  <rect x="610" y="310" width="170" height="32" fill="#F0FFF0"/>
  <text x="695" y="331" text-anchor="middle" font-size="10" font-family="Arial" fill="#27AE60" font-weight="bold">命令行工具/脚本/CI</text>

  <!-- Bottom note -->
  <text x="400" y="370" text-anchor="middle" font-size="11" font-family="Arial" fill="#999">💡 不是替代关系，而是互补关系。WSL2 适合完整开发环境，coreutils 适合轻量命令行场景。</text>
  <text x="400" y="392" text-anchor="middle" font-size="10" font-family="Arial" fill="#BBB">数据来源：microsoft/coreutils GitHub · 各项目官方文档 · 实际使用体验</text>
</svg>
