<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#181825;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D3F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252536;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg)" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="36" fill="url(#header)" rx="8"/>
  <rect x="0" y="20" width="800" height="16" fill="url(#header)"/>
  <circle cx="20" cy="18" r="6" fill="#FF5F56"/>
  <circle cx="40" cy="18" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="18" r="6" fill="#27C93F"/>
  <text x="400" y="22" text-anchor="middle" font-size="12" font-family="monospace" fill="#8F8FA8">PowerShell 7.6 — coreutils demo</text>

  <!-- Demo 1: grep -->
  <text x="24" y="62" font-size="12" font-family="monospace" fill="#585B70"># 1. grep — 过滤日志中的 ERROR</text>
  <text x="24" y="84" font-size="13" font-family="monospace" fill="#A6E3A1">PS&gt;</text>
  <text x="56" y="84" font-size="13" font-family="monospace" fill="#F5C2E7">grep ERROR app.log</text>
  <text x="24" y="106" font-size="12" font-family="monospace" fill="#F38BA8">2026-06-27 10:01:23 ERROR Database connection timeout</text>
  <text x="24" y="124" font-size="12" font-family="monospace" fill="#F38BA8">2026-06-27 10:02:15 ERROR Failed to authenticate user</text>
  <text x="24" y="142" font-size="12" font-family="monospace" fill="#F38BA8">2026-06-27 10:03:07 ERROR Out of memory in worker pool</text>

  <!-- Demo 2: pipe chain -->
  <text x="24" y="176" font-size="12" font-family="monospace" fill="#585B70"># 2. 管道组合 — 统计每种错误出现次数</text>
  <text x="24" y="198" font-size="13" font-family="monospace" fill="#A6E3A1">PS&gt;</text>
  <text x="56" y="198" font-size="13" font-family="monospace" fill="#F5C2E7">grep ERROR app.log | cut -d' ' -f4- | sort | uniq -c | sort -rn</text>
  <text x="24" y="222" font-size="12" font-family="monospace" fill="#89B4FA">     15 Database connection timeout</text>
  <text x="24" y="240" font-size="12" font-family="monospace" fill="#89B4FA">      8 Failed to authenticate user</text>
  <text x="24" y="258" font-size="12" font-family="monospace" fill="#89B4FA">      3 Out of memory in worker pool</text>
  <text x="24" y="276" font-size="12" font-family="monospace" fill="#89B4FA">      1 Disk I/O error on volume</text>

  <!-- Demo 3: find + xargs -->
  <text x="24" y="310" font-size="12" font-family="monospace" fill="#585B70"># 3. find + xargs — 批量查找并统计代码行数</text>
  <text x="24" y="332" font-size="13" font-family="monospace" fill="#A6E3A1">PS&gt;</text>
  <text x="56" y="332" font-size="13" font-family="monospace" fill="#F5C2E7">find src/ -name "*.rs" | xargs wc -l | sort -rn | head -5</text>
  <text x="24" y="356" font-size="12" font-family="monospace" fill="#89B4FA">   1234 total</text>
  <text x="24" y="374" font-size="12" font-family="monospace" fill="#89B4FA">    456 src/main.rs</text>
  <text x="24" y="392" font-size="12" font-family="monospace" fill="#89B4FA">    312 src/parser.rs</text>
  <text x="24" y="410" font-size="12" font-family="monospace" fill="#89B4FA">    289 src/compiler.rs</text>
  <text x="24" y="428" font-size="12" font-family="monospace" fill="#89B4FA">    177 src/utils.rs</text>

  <!-- Demo 4: sed -->
  <text x="24" y="462" font-size="12" font-family="monospace" fill="#585B70"># 4. sed — 批量替换配置文件中的地址</text>
  <text x="24" y="484" font-size="13" font-family="monospace" fill="#A6E3A1">PS&gt;</text>
  <text x="56" y="484" font-size="13" font-family="monospace" fill="#F5C2E7">sed -i 's/localhost:8080/0.0.0.0:3000/g' config.yaml</text>

  <!-- Cursor -->
  <text x="24" y="508" font-size="13" font-family="monospace" fill="#A6E3A1">PS&gt;</text>
  <rect x="56" y="496" width="8" height="16" fill="#F5C2E7">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
