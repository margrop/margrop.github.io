<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#181825;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D3F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252536;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Terminal title bar -->
  <rect x="0" y="0" width="800" height="36" fill="url(#header)" rx="8"/>
  <rect x="0" y="20" width="800" height="16" fill="url(#header)"/>
  <circle cx="20" cy="18" r="6" fill="#FF5F56"/>
  <circle cx="40" cy="18" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="18" r="6" fill="#27C93F"/>
  <text x="400" y="22" text-anchor="middle" font-size="12" font-family="monospace" fill="#8F8FA8">PowerShell 7.6</text>

  <!-- Prompt line 1 -->
  <text x="24" y="62" font-size="13" font-family="monospace" fill="#A6E3A1">PS C:\Users\margrop&gt;</text>
  <text x="220" y="62" font-size="13" font-family="monospace" fill="#F5C2E7">winget install Microsoft.Coreutils</text>

  <!-- Output line 1 -->
  <text x="24" y="86" font-size="12" font-family="monospace" fill="#8F8FA8">Found Microsoft.Coreutils [Microsoft.Coreutils]</text>
  <text x="24" y="106" font-size="12" font-family="monospace" fill="#8F8FA8">This application is licensed to you by its owner.</text>
  <text x="24" y="126" font-size="12" font-family="monospace" fill="#8F8FA8">Microsoft is not responsible for, nor does it grant any licenses to, third-party packages.</text>

  <!-- Progress bar -->
  <rect x="24" y="146" width="300" height="6" rx="3" fill="#313244"/>
  <rect x="24" y="146" width="210" height="6" rx="3" fill="#A6E3A1"/>

  <!-- Download info -->
  <text x="24" y="170" font-size="12" font-family="monospace" fill="#89B4FA">Downloading Microsoft.Coreutils v2026.6.16 ...</text>
  <text x="24" y="190" font-size="12" font-family="monospace" fill="#8F8FA8">  [====================&gt;      ] 70%  4.2 MB / 6.0 MB</text>

  <!-- Success -->
  <text x="24" y="218" font-size="12" font-family="monospace" fill="#A6E3A1">Successfully installed Microsoft.Coreutils v2026.6.16</text>

  <!-- Separator -->
  <text x="24" y="250" font-size="12" font-family="monospace" fill="#585B70">────────────────────────────────────────────</text>

  <!-- Verification commands -->
  <text x="24" y="276" font-size="13" font-family="monospace" fill="#A6E3A1">PS C:\Users\margrop&gt;</text>
  <text x="220" y="276" font-size="13" font-family="monospace" fill="#F5C2E7">coreutils --version</text>

  <text x="24" y="300" font-size="12" font-family="monospace" fill="#89B4FA">coreutils 2026.6.16</text>
  <text x="24" y="320" font-size="12" font-family="monospace" fill="#8F8FA8">Built on uutils/coreutils (Rust)</text>

  <!-- ls demo -->
  <text x="24" y="354" font-size="13" font-family="monospace" fill="#A6E3A1">PS C:\Users\margrop&gt;</text>
  <text x="220" y="354" font-size="13" font-family="monospace" fill="#F5C2E7">ls -la</text>

  <text x="24" y="378" font-size="12" font-family="monospace" fill="#89B4FA">drwxr-xr-x  1 margrop margrop   512 Jun 27 10:00 .</text>
  <text x="24" y="398" font-size="12" font-family="monospace" fill="#89B4FA">drwxr-xr-x  1 margrop margrop   512 Jun 27 09:00 ..</text>
  <text x="24" y="418" font-size="12" font-family="monospace" fill="#89B4FA">-rw-r--r--  1 margrop margrop  1024 Jun 27 09:30 README.md</text>
  <text x="24" y="438" font-size="12" font-family="monospace" fill="#89B4FA">-rw-r--r--  1 margrop margrop  8192 Jun 27 09:45 app.log</text>
  <text x="24" y="458" font-size="12" font-family="monospace" fill="#89B4FA">drwxr-xr-x  1 margrop margrop   512 Jun 27 08:00 src</text>

  <!-- Cursor -->
  <text x="24" y="480" font-size="13" font-family="monospace" fill="#A6E3A1">PS C:\Users\margrop&gt;</text>
  <rect x="220" y="468" width="8" height="16" fill="#F5C2E7">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
