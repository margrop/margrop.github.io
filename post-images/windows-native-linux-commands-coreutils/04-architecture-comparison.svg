<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="wslGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E95420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A83A12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004C8C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#333" font-weight="bold">WSL2 vs coreutils — 架构对比</text>

  <!-- === WSL2 Side === -->
  <text x="200" y="70" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#E95420" font-weight="bold">WSL2（重量级）</text>

  <!-- WSL2 Box -->
  <rect x="30" y="85" width="340" height="400" rx="8" fill="white" stroke="#E95420" stroke-width="2" filter="url(#shadow)"/>

  <!-- App layer -->
  <rect x="60" y="105" width="280" height="36" rx="6" fill="#FFE8DD"/>
  <text x="200" y="128" text-anchor="middle" font-size="12" font-family="monospace" fill="#E95420">grep / sed / awk / find ...</text>

  <!-- Arrow -->
  <text x="200" y="160" text-anchor="middle" font-size="20" fill="#999">↓</text>

  <!-- Linux userspace -->
  <rect x="60" y="172" width="280" height="50" rx="6" fill="#FFF0E8"/>
  <text x="200" y="192" text-anchor="middle" font-size="11" font-family="Arial" fill="#E95420" font-weight="bold">GNU Coreutils (Linux 用户态)</text>
  <text x="200" y="210" text-anchor="middle" font-size="10" font-family="Arial" fill="#999">glibc / bash / GNU toolchain</text>

  <!-- Arrow -->
  <text x="200" y="240" text-anchor="middle" font-size="20" fill="#999">↓</text>

  <!-- Linux Kernel -->
  <rect x="60" y="252" width="280" height="50" rx="6" fill="#FDE8E0"/>
  <text x="200" y="272" text-anchor="middle" font-size="11" font-family="Arial" fill="#E95420" font-weight="bold">Linux Kernel (完整内核)</text>
  <text x="200" y="290" text-anchor="middle" font-size="10" font-family="Arial" fill="#999">ext4 / syscall / process scheduler</text>

  <!-- Arrow -->
  <text x="200" y="320" text-anchor="middle" font-size="20" fill="#999">↓</text>

  <!-- Hyper-V -->
  <rect x="60" y="332" width="280" height="50" rx="6" fill="#F5E0D8"/>
  <text x="200" y="352" text-anchor="middle" font-size="11" font-family="Arial" fill="#E95420" font-weight="bold">Hyper-V 虚拟机层</text>
  <text x="200" y="370" text-anchor="middle" font-size="10" font-family="Arial" fill="#999">Virtual Hardware / vNIC / vDisk</text>

  <!-- Arrow -->
  <text x="200" y="400" text-anchor="middle" font-size="20" fill="#999">↓</text>

  <!-- Windows NT -->
  <rect x="60" y="412" width="280" height="36" rx="6" fill="#E8E8E8"/>
  <text x="200" y="435" text-anchor="middle" font-size="11" font-family="Arial" fill="#666" font-weight="bold">Windows NT Kernel</text>

  <!-- WSL2 Stats -->
  <text x="200" y="472" text-anchor="middle" font-size="10" font-family="Arial" fill="#999">启动: 2-5秒 | 内存: 1-4 GB | 层数: 5层</text>

  <!-- === coreutils Side === -->
  <text x="600" y="70" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0078D4" font-weight="bold">coreutils（轻量级）</text>

  <!-- coreutils Box -->
  <rect x="430" y="85" width="340" height="400" rx="8" fill="white" stroke="#0078D4" stroke-width="2" filter="url(#shadow)"/>

  <!-- App layer -->
  <rect x="460" y="105" width="280" height="36" rx="6" fill="#E0F0FF"/>
  <text x="600" y="128" text-anchor="middle" font-size="12" font-family="monospace" fill="#0078D4">grep / sed / awk / find ...</text>

  <!-- Arrow -->
  <text x="600" y="160" text-anchor="middle" font-size="20" fill="#999">↓</text>

  <!-- coreutils.exe -->
  <rect x="460" y="172" width="280" height="80" rx="6" fill="#E8F4FF"/>
  <text x="600" y="195" text-anchor="middle" font-size="12" font-family="Arial" fill="#0078D4" font-weight="bold">coreutils.exe</text>
  <text x="600" y="213" text-anchor="middle" font-size="10" font-family="Arial" fill="#0078D4">单个多合一 PE 二进制 (Rust)</text>
  <text x="600" y="231" text-anchor="middle" font-size="10" font-family="Arial" fill="#0078D4">uutils/coreutils + findutils + grep</text>

  <!-- Arrow -->
  <text x="600" y="270" text-anchor="middle" font-size="20" fill="#999">↓</text>

  <!-- Win32 API -->
  <rect x="460" y="282" width="280" height="50" rx="6" fill="#F0F8FF"/>
  <text x="600" y="302" text-anchor="middle" font-size="11" font-family="Arial" fill="#0078D4" font-weight="bold">Windows NT Kernel API (直接调用)</text>
  <text x="600" y="320" text-anchor="middle" font-size="10" font-family="Arial" fill="#999">NtCreateFile / NtReadFile / NtWriteFile</text>

  <!-- Arrow -->
  <text x="600" y="350" text-anchor="middle" font-size="20" fill="#999">↓</text>

  <!-- Windows NT -->
  <rect x="460" y="362" width="280" height="36" rx="6" fill="#E8E8E8"/>
  <text x="600" y="385" text-anchor="middle" font-size="11" font-family="Arial" fill="#666" font-weight="bold">Windows NT Kernel</text>

  <!-- Stats -->
  <text x="600" y="420" text-anchor="middle" font-size="10" font-family="Arial" fill="#999">启动: &lt;1毫秒 | 内存: 几 MB | 层数: 2层</text>

  <!-- Big difference callout -->
  <rect x="460" y="440" width="280" height="36" rx="6" fill="#0078D4" opacity="0.1"/>
  <text x="600" y="463" text-anchor="middle" font-size="11" font-family="Arial" fill="#0078D4" font-weight="bold">⚡ 没有虚拟机 · 没有兼容层 · 没有模拟</text>

  <!-- VS badge -->
  <circle cx="400" cy="290" r="22" fill="#FF6B35"/>
  <text x="400" y="296" text-anchor="middle" font-size="16" font-family="Arial" fill="white" font-weight="bold">VS</text>
</svg>
