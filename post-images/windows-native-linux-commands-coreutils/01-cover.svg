<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001A4D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="win" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCF2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tux" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCC624;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E95420;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Windows logo -->
  <g transform="translate(180, 160)" filter="url(#shadow)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#win)"/>
    <rect x="8" y="8" width="30" height="30" rx="3" fill="white" opacity="0.95"/>
    <rect x="42" y="8" width="30" height="30" rx="3" fill="white" opacity="0.95"/>
    <rect x="8" y="42" width="30" height="30" rx="3" fill="white" opacity="0.95"/>
    <rect x="42" y="42" width="30" height="30" rx="3" fill="white" opacity="0.95"/>
  </g>

  <!-- Bridge / Arrow -->
  <g transform="translate(290, 175)">
    <path d="M0,25 L60,25" stroke="white" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M0,25 L60,25" stroke="#00BCF2" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  </g>

  <!-- Tux / Linux logo -->
  <g transform="translate(380, 160)" filter="url(#shadow)">
    <rect x="0" y="0" width="80" height="80" rx="40" fill="url(#tux)"/>
    <text x="40" y="52" text-anchor="middle" font-size="42" font-family="Arial" fill="white" font-weight="bold">$</text>
  </g>

  <!-- Equals sign -->
  <g transform="translate(490, 180)">
    <rect x="0" y="10" width="30" height="6" rx="3" fill="white" opacity="0.8"/>
    <rect x="0" y="24" width="30" height="6" rx="3" fill="white" opacity="0.8"/>
  </g>

  <!-- Heart / Core -->
  <g transform="translate(550, 160)" filter="url(#shadow)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="#FF6B35"/>
    <text x="40" y="52" text-anchor="middle" font-size="36" font-family="Arial" fill="white">⚡</text>
  </g>

  <!-- Title -->
  <text x="400" y="310" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="white" font-weight="bold">Windows × Linux 命令 = 原生融合</text>

  <!-- Subtitle -->
  <text x="400" y="345" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#8EC8F2">microsoft/coreutils — 一条 winget install，告别 WSL / Cygwin / Git Bash</text>

  <!-- Bottom tag -->
  <rect x="280" y="380" width="240" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="404" text-anchor="middle" font-size="14" font-family="monospace" fill="#00BCF2">winget install Microsoft.Coreutils</text>

  <!-- Footer -->
  <text x="400" y="438" text-anchor="middle" font-size="11" font-family="Arial, sans-serif" fill="rgba(255,255,255,0.4)">Powered by uutils/coreutils · Rust · Native Windows PE Binary</text>
</svg>
