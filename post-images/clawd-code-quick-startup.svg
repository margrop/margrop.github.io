<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="x1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="x2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="x3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="x4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="860" rx="28" fill="url(#bg)"/>
  <text x="72" y="84" font-size="40" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#111827" font-weight="700">启动链路速读</text>
  <text x="72" y="124" font-size="20" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">prefetch -> trust gate -> deferred init -> routing -> turn loop</text>

  <rect x="90" y="220" width="240" height="110" rx="20" fill="url(#x1)"/>
  <rect x="360" y="220" width="240" height="110" rx="20" fill="url(#x2)"/>
  <rect x="630" y="220" width="240" height="110" rx="20" fill="url(#x3)"/>
  <rect x="900" y="220" width="240" height="110" rx="20" fill="url(#x4)"/>
  <rect x="1170" y="220" width="340" height="110" rx="20" fill="#334155"/>

  <text x="132" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Prefetch</text>
  <text x="132" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f0fdfa">project scan / keychain</text>

  <text x="402" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Trust</text>
  <text x="402" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f5f3ff">gate before activation</text>

  <text x="652" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Deferred</text>
  <text x="652" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fffbeb">plugins / skills / hooks</text>

  <text x="940" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Route</text>
  <text x="940" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#eff6ff">local / remote / ssh / teleport</text>

  <text x="1206" y="262" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Turn Loop</text>
  <text x="1206" y="292" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#e2e8f0">submit / stream / persist</text>

  <g stroke="#64748b" stroke-width="4" fill="none">
    <path d="M330 275 H355"/>
    <path d="M600 275 H625"/>
    <path d="M870 275 H895"/>
    <path d="M1140 275 H1165"/>
  </g>

  <g fill="#fff">
    <rect x="120" y="400" width="290" height="170" rx="22"/>
    <rect x="450" y="400" width="290" height="170" rx="22"/>
    <rect x="780" y="400" width="290" height="170" rx="22"/>
    <rect x="1110" y="400" width="340" height="170" rx="22"/>
  </g>

  <text x="150" y="448" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#0f766e" font-weight="700">setup.py</text>
  <text x="150" y="482" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">platform + prefetch</text>
  <text x="150" y="514" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">trusted startup report</text>

  <text x="480" y="448" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#7c3aed" font-weight="700">deferred_init.py</text>
  <text x="480" y="482" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">turn trust into switches</text>
  <text x="480" y="514" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">plugins / skills / hooks</text>

  <text x="810" y="448" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#b45309" font-weight="700">runtime.py</text>
  <text x="810" y="482" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">route prompt with score</text>
  <text x="810" y="514" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">execute mirrored registry</text>

  <text x="1145" y="448" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1d4ed8" font-weight="700">query_engine.py</text>
  <text x="1145" y="482" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">usage / transcript / session</text>
  <text x="1145" y="514" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">the loop becomes durable state</text>
</svg>
