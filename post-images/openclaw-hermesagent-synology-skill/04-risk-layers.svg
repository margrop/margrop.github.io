<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Risk layers for Synology agent operations</title>
  <desc id="desc">Hand-drawn risk ladder from read-only checks to service reloads and destructive storage commands.</desc>
  <rect width="1200" height="640" fill="#fffaf0"/>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.021" numOctaves="2" seed="12"/><feDisplacementMap in="SourceGraphic" scale="1.2"/></filter>
    <style>.step{stroke:#334155;stroke-width:3;rx:18;filter:url(#rough)}.t{font-family:ui-rounded,"Comic Sans MS","Noto Sans SC",sans-serif;fill:#111827}.h{font-size:32px;font-weight:700}.m{font-size:24px;font-weight:650}.s{font-size:18px}.xs{font-size:15px;fill:#475569}</style>
  </defs>
  <text x="56" y="62" class="t h">风险分层：不是所有群晖命令都应该自动执行</text>
  <rect x="110" y="430" width="260" height="92" class="step" fill="#dcfce7"/><text x="138" y="468" class="t m">低风险</text><text x="138" y="498" class="t s">查看状态、容量、日志</text>
  <rect x="240" y="320" width="300" height="92" class="step" fill="#e0f2fe"/><text x="268" y="358" class="t m">中风险</text><text x="268" y="388" class="t s">重启服务、刷新配置</text>
  <rect x="410" y="210" width="340" height="92" class="step" fill="#fff7dd"/><text x="438" y="248" class="t m">高风险</text><text x="438" y="278" class="t s">改权限、改网络、改用户</text>
  <rect x="620" y="100" width="390" height="92" class="step" fill="#fee2e2"/><text x="648" y="138" class="t m">禁止默认自动化</text><text x="648" y="168" class="t s">删除数据、格式化、重建存储池</text>
  <text x="118" y="570" class="t xs">建议默认策略：只读命令可以直接执行；中高风险先生成计划；破坏性动作不写进“一句话自动执行”。</text>
</svg>
