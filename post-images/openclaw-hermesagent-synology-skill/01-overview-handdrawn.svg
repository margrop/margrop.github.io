<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw / HermesAgent Synology skill integration overview</title>
  <desc id="desc">Hand-drawn style overview of preparing Synology SSH access, adding a skill, running one sentence commands, executing CLI operations, and reviewing results.</desc>
  <rect width="1280" height="720" fill="#fffaf0"/>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6"/><feDisplacementMap in="SourceGraphic" scale="1.4"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
    <style>
      .box{fill:#ffffff;stroke:#334155;stroke-width:3;rx:18;filter:url(#rough)}
      .muted{fill:#f1f5f9;stroke:#475569;stroke-width:2.4;rx:16;filter:url(#rough)}
      .accent{fill:#dff7ea;stroke:#166534;stroke-width:3;rx:18;filter:url(#rough)}
      .warn{fill:#fff1d6;stroke:#b45309;stroke-width:3;rx:18;filter:url(#rough)}
      .line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow);filter:url(#rough)}
      .t{font-family:ui-rounded,"Comic Sans MS","Noto Sans SC",sans-serif;fill:#0f172a}
      .h{font-size:34px;font-weight:700}
      .m{font-size:24px;font-weight:650}
      .s{font-size:19px}
      .xs{font-size:16px;fill:#475569}
    </style>
  </defs>
  <text x="58" y="64" class="t h">OpenClaw / HermesAgent 集成群晖操作 SKILL：从一句话到可审计执行</text>
  <text x="62" y="104" class="t s">目标：让 Agent 会使用你批准的群晖 CLI 操作，但不绕过确认、权限和回滚边界。</text>
  <rect x="56" y="145" width="230" height="160" class="box"/>
  <text x="84" y="190" class="t m">1. 准备群晖</text>
  <text x="84" y="226" class="t s">开启 SSH</text>
  <text x="84" y="254" class="t s">配置 root / key</text>
  <text x="84" y="282" class="t xs">先把门禁做对</text>
  <rect x="368" y="145" width="230" height="160" class="accent"/>
  <text x="396" y="190" class="t m">2. 写成 SKILL</text>
  <text x="396" y="226" class="t s">能力说明</text>
  <text x="396" y="254" class="t s">命令模板</text>
  <text x="396" y="282" class="t xs">风险动作要确认</text>
  <rect x="680" y="145" width="230" height="160" class="box"/>
  <text x="708" y="190" class="t m">3. 一句话调用</text>
  <text x="708" y="226" class="t s">检查存储池健康</text>
  <text x="708" y="254" class="t s">列出共享目录</text>
  <text x="708" y="282" class="t xs">把意图交给 Agent</text>
  <rect x="992" y="145" width="230" height="160" class="warn"/>
  <text x="1020" y="190" class="t m">4. 审核结果</text>
  <text x="1020" y="226" class="t s">只读优先</text>
  <text x="1020" y="254" class="t s">变更留日志</text>
  <text x="1020" y="282" class="t xs">失败能回退</text>
  <path d="M292 225 C325 220 335 220 360 224" class="line"/>
  <path d="M604 225 C637 220 647 220 672 224" class="line"/>
  <path d="M916 225 C949 220 959 220 984 224" class="line"/>
  <rect x="128" y="385" width="1024" height="220" class="muted"/>
  <text x="168" y="435" class="t m">典型一句话</text>
  <text x="168" y="480" class="t s">“请参考我的群晖 CLI 操作说明，检查 NAS 存储空间、服务状态和最近错误日志，</text>
  <text x="168" y="515" class="t s">只执行只读命令；如果需要修改配置，先列出计划并等待我确认。”</text>
  <path d="M210 548 C354 590 530 590 656 548" stroke="#166534" stroke-width="4" fill="none" filter="url(#rough)"/>
  <text x="690" y="568" class="t xs">关键不是“让 Agent 权限最大”，而是“让操作路径最短、边界最清楚”。</text>
</svg>
