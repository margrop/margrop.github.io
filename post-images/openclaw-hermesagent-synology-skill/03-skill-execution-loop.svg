<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Skill execution loop</title>
  <desc id="desc">Hand-drawn loop from human intent to skill rules, SSH execution, Synology CLI, evidence, and approval gate.</desc>
  <rect width="1200" height="640" fill="#f8fafc"/>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3"/><feDisplacementMap in="SourceGraphic" scale="1.4"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
    <style>.box{fill:#fff;stroke:#334155;stroke-width:3;rx:18;filter:url(#rough)}.blue{fill:#e0f2fe;stroke:#0369a1;stroke-width:3;rx:18;filter:url(#rough)}.green{fill:#dcfce7;stroke:#15803d;stroke-width:3;rx:18;filter:url(#rough)}.red{fill:#fee2e2;stroke:#b91c1c;stroke-width:3;rx:18;filter:url(#rough)}.line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow);filter:url(#rough)}.t{font-family:ui-rounded,"Comic Sans MS","Noto Sans SC",sans-serif;fill:#0f172a}.h{font-size:32px;font-weight:700}.m{font-size:23px;font-weight:650}.s{font-size:18px}.xs{font-size:15px;fill:#475569}</style>
  </defs>
  <text x="54" y="62" class="t h">SKILL 执行链路：一句话不是直接裸奔到 root shell</text>
  <rect x="70" y="140" width="200" height="120" class="blue"/><text x="104" y="188" class="t m">用户意图</text><text x="104" y="224" class="t s">一句话任务</text>
  <rect x="360" y="140" width="220" height="120" class="box"/><text x="394" y="188" class="t m">SKILL 规则</text><text x="394" y="224" class="t s">只读 / 变更分级</text>
  <rect x="675" y="140" width="220" height="120" class="green"/><text x="709" y="188" class="t m">SSH 执行</text><text x="709" y="224" class="t s">固定目标和 key</text>
  <rect x="980" y="140" width="170" height="120" class="box"/><text x="1010" y="188" class="t m">DSM CLI</text><text x="1010" y="224" class="t s">syno*</text>
  <path d="M278 200 C310 195 326 195 352 200" class="line"/><path d="M588 200 C620 195 638 195 668 200" class="line"/><path d="M902 200 C930 195 946 195 974 200" class="line"/>
  <rect x="180" y="395" width="260" height="120" class="box"/><text x="214" y="443" class="t m">证据返回</text><text x="214" y="479" class="t s">输出 / 日志 / 状态</text>
  <rect x="520" y="395" width="260" height="120" class="red"/><text x="554" y="443" class="t m">高风险门禁</text><text x="554" y="479" class="t s">删除 / 重启 / 改权限</text>
  <path d="M1064 266 C1030 342 924 414 786 448" class="line"/>
  <path d="M514 456 C486 456 468 456 446 456" class="line"/>
  <path d="M650 390 C600 330 524 292 474 264" class="line"/>
  <text x="803" y="480" class="t xs">高风险动作必须先解释影响、列命令、等确认。</text>
</svg>
