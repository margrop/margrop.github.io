<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Synology SSH preparation flow</title>
  <desc id="desc">Hand-drawn flow for enabling SSH, setting root access, generating a key, and validating passwordless login.</desc>
  <rect width="1200" height="640" fill="#fbf7ef"/>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="9"/><feDisplacementMap in="SourceGraphic" scale="1.2"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#334155"/></marker>
    <style>.box{fill:#fff;stroke:#334155;stroke-width:3;rx:18;filter:url(#rough)}.green{fill:#e7f8ee;stroke:#15803d;stroke-width:3;rx:18;filter:url(#rough)}.orange{fill:#fff7dd;stroke:#b45309;stroke-width:3;rx:18;filter:url(#rough)}.line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow);filter:url(#rough)}.t{font-family:ui-rounded,"Comic Sans MS","Noto Sans SC",sans-serif;fill:#111827}.h{font-size:32px;font-weight:700}.m{font-size:23px;font-weight:650}.s{font-size:18px}.xs{font-size:15px;fill:#475569}</style>
  </defs>
  <text x="56" y="62" class="t h">前提准备：把“能连上”变成“可控地连上”</text>
  <rect x="70" y="130" width="210" height="140" class="box"/><text x="100" y="178" class="t m">开启 SSH</text><text x="100" y="214" class="t s">DSM 控制面板</text><text x="100" y="242" class="t xs">限制来源地址更好</text>
  <rect x="350" y="130" width="210" height="140" class="orange"/><text x="380" y="178" class="t m">root 能力</text><text x="380" y="214" class="t s">sudo / root 密码</text><text x="380" y="242" class="t xs">只在需要时启用</text>
  <rect x="630" y="130" width="210" height="140" class="box"/><text x="660" y="178" class="t m">生成密钥</text><text x="660" y="214" class="t s">专用 key</text><text x="660" y="242" class="t xs">不要复用个人主钥</text>
  <rect x="910" y="130" width="210" height="140" class="green"/><text x="940" y="178" class="t m">免密验证</text><text x="940" y="214" class="t s">ssh root@nas</text><text x="940" y="242" class="t xs">失败先修 SSH</text>
  <path d="M286 200 C310 195 324 196 344 200" class="line"/><path d="M566 200 C590 195 604 196 624 200" class="line"/><path d="M846 200 C870 195 884 196 904 200" class="line"/>
  <rect x="118" y="365" width="964" height="150" class="box"/>
  <text x="154" y="412" class="t m">建议验证命令</text>
  <text x="154" y="452" class="t s">ssh -o BatchMode=yes root@nas.example.lan 'hostname; id; uptime'</text>
  <text x="154" y="488" class="t xs">验证点：目标正确、身份正确、命令能返回、没有进入交互式密码提示。</text>
</svg>
