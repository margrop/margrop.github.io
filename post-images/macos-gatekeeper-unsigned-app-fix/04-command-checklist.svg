<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="macOS unsigned app command checklist">
  <rect width="1280" height="720" fill="#101827"/>
  <rect x="90" y="80" width="1100" height="560" rx="24" fill="#172033" stroke="#334155"/>
  <circle cx="130" cy="120" r="10" fill="#ef4444"/>
  <circle cx="160" cy="120" r="10" fill="#f59e0b"/>
  <circle cx="190" cy="120" r="10" fill="#22c55e"/>
  <text x="230" y="128" font-family="Menlo, Consolas, monospace" font-size="18" fill="#94a3b8">unsigned-app-local-fix.sh</text>
  <g font-family="Menlo, Consolas, monospace" font-size="25">
    <text x="125" y="200" fill="#38bdf8">1.</text>
    <text x="175" y="200" fill="#e2e8f0">xattr -lr "/Applications/&lt;App&gt;.app"</text>
    <text x="175" y="235" fill="#94a3b8"># look for com.apple.quarantine</text>
    <text x="125" y="305" fill="#38bdf8">2.</text>
    <text x="175" y="305" fill="#e2e8f0">codesign --verify --deep --strict --verbose=4 ...</text>
    <text x="175" y="340" fill="#94a3b8"># confirm whether the bundle has a usable signature</text>
    <text x="125" y="410" fill="#38bdf8">3.</text>
    <text x="175" y="410" fill="#e2e8f0">codesign --force --deep --sign - ...</text>
    <text x="175" y="445" fill="#94a3b8"># local ad-hoc signature for this machine</text>
    <text x="125" y="515" fill="#38bdf8">4.</text>
    <text x="175" y="515" fill="#e2e8f0">xattr -dr com.apple.quarantine ...</text>
    <text x="175" y="550" fill="#94a3b8"># remove first-run download quarantine after trust check</text>
  </g>
</svg>
