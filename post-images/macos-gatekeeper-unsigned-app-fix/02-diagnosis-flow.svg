<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="macOS unsigned app diagnosis flow">
  <rect width="1280" height="720" fill="#f6f8fb"/>
  <rect x="70" y="70" width="1140" height="580" rx="26" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
  <text x="100" y="125" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#172033">从现象到根因：不要先猜，先取证</text>
  <text x="100" y="165" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5a6678">A private-safe troubleshooting path for unsigned macOS apps</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4169e1"/>
    </marker>
  </defs>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <g transform="translate(110 235)">
      <rect width="210" height="120" rx="18" fill="#edf3ff" stroke="#4169e1" stroke-width="2"/>
      <text x="24" y="46" font-size="24" font-weight="700" fill="#1e3a8a">启动失败</text>
      <text x="24" y="82" font-size="17" fill="#42526b">提示无法验证开发者</text>
    </g>
    <line x1="335" y1="295" x2="425" y2="295" stroke="#4169e1" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(450 235)">
      <rect width="230" height="120" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
      <text x="24" y="46" font-size="24" font-weight="700" fill="#92400e">检查隔离属性</text>
      <text x="24" y="82" font-size="17" fill="#6b4e16">xattr 是否含 quarantine</text>
    </g>
    <line x1="695" y1="295" x2="785" y2="295" stroke="#4169e1" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(810 235)">
      <rect width="230" height="120" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
      <text x="24" y="46" font-size="24" font-weight="700" fill="#166534">验证签名</text>
      <text x="24" y="82" font-size="17" fill="#37624a">codesign / spctl 给证据</text>
    </g>
    <line x1="925" y1="370" x2="925" y2="445" stroke="#4169e1" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(710 465)">
      <rect width="430" height="110" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
      <text x="26" y="42" font-size="24" font-weight="700" fill="#172033">根因组合</text>
      <text x="26" y="76" font-size="17" fill="#42526b">下载隔离 + 无可用签名，被 Gatekeeper 拦截</text>
    </g>
  </g>
</svg>
