<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="local ad hoc signing boundary">
  <rect width="1280" height="720" fill="#fbfcff"/>
  <text x="90" y="92" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" font-weight="700" fill="#172033">修复边界：本地能启动，不等于官方分发已合规</text>
  <text x="90" y="132" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" fill="#5a6678">Ad-hoc signing is a local trust repair, not a Developer ID + notarization replacement.</text>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="95" y="190" width="500" height="370" rx="22" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <text x="135" y="245" font-size="28" font-weight="700" fill="#166534">适合本地自用</text>
    <text x="135" y="295" font-size="21" fill="#244c36">• 自己确认来源可信</text>
    <text x="135" y="335" font-size="21" fill="#244c36">• 只处理这个 app bundle</text>
    <text x="135" y="375" font-size="21" fill="#244c36">• 移除 quarantine 后再启动</text>
    <text x="135" y="415" font-size="21" fill="#244c36">• 用 codesign 做本地 ad-hoc 签名</text>
    <text x="135" y="470" font-size="18" fill="#55705f">目标：让 macOS 不再按首次下载风险拦截它。</text>
    <rect x="685" y="190" width="500" height="370" rx="22" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="725" y="245" font-size="28" font-weight="700" fill="#9f1239">不等于这些</text>
    <text x="725" y="295" font-size="21" fill="#6b2235">• 不是 Apple Developer ID 签名</text>
    <text x="725" y="335" font-size="21" fill="#6b2235">• 不是 notarization 公证</text>
    <text x="725" y="375" font-size="21" fill="#6b2235">• 不是证明软件一定安全</text>
    <text x="725" y="415" font-size="21" fill="#6b2235">• 不应作为公开分发方案</text>
    <text x="725" y="470" font-size="18" fill="#7a4b58">目标：避免把临时修复误写成供应链背书。</text>
  </g>
</svg>
