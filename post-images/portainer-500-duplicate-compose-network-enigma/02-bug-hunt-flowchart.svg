<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="ok-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="warn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="err-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="600" y="45" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="700">一次 stack 改配置请求的完整链路</text>
  <text x="600" y="68" text-anchor="middle" fill="#475569" font-size="14">从浏览器按钮到 dockerd，看每个组件分别在检查什么</text>

  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="280" height="100" rx="10" fill="url(#ok-grad)" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <text x="140" y="32" text-anchor="middle" fill="#065f46" font-size="16" font-weight="700">浏览器点击 Update the stack</text>
    <text x="140" y="58" text-anchor="middle" fill="#065f46" font-size="12">PUT /api/stacks/&lt;id&gt; (jwt in header)</text>
    <text x="140" y="78" text-anchor="middle" fill="#065f46" font-size="12">body = { StackFileContent, env, prune }</text>
    <text x="140" y="96" text-anchor="middle" fill="#16a34a" font-size="11" font-style="italic">它只检查 HTTP 状态</text>
  </g>
  <line x1="200" y1="200" x2="200" y2="240" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(60, 240)">
    <rect x="0" y="0" width="280" height="100" rx="10" fill="url(#warn-bg)" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <text x="140" y="32" text-anchor="middle" fill="#78350f" font-size="16" font-weight="700">Portainer server</text>
    <text x="140" y="58" text-anchor="middle" fill="#78350f" font-size="12">它把请求封装成</text>
    <text x="140" y="78" text-anchor="middle" fill="#78350f" font-size="12">ComposeStackManager.Deploy()</text>
    <text x="140" y="96" text-anchor="middle" fill="#d97706" font-size="11" font-style="italic">它不解析 compose 语法</text>
  </g>
  <line x1="200" y1="340" x2="200" y2="380" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="280" height="100" rx="10" fill="url(#warn-bg)" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <text x="140" y="32" text-anchor="middle" fill="#78350f" font-size="16" font-weight="700">docker compose (Go library)</text>
    <text x="140" y="58" text-anchor="middle" fill="#78350f" font-size="12">resolveOrCreateNetwork()</text>
    <text x="140" y="78" text-anchor="middle" fill="#78350f" font-size="12">先 NetworkInspect 再 NetworkList</text>
    <text x="140" y="96" text-anchor="middle" fill="#d97706" font-size="11" font-style="italic">它只信 dockerd 给的答案</text>
  </g>
  <line x1="200" y1="480" x2="200" y2="520" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrow-red)"/>

  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="280" height="100" rx="10" fill="url(#err-bg)" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
    <text x="140" y="32" text-anchor="middle" fill="#7f1d1d" font-size="16" font-weight="700">dockerd FindNetwork()</text>
    <text x="140" y="58" text-anchor="middle" fill="#7f1d1d" font-size="12">if len(listByFullName) &gt; 1</text>
    <text x="140" y="78" text-anchor="middle" fill="#7f1d1d" font-size="12" font-family="Consolas,monospace">"is ambiguous (N matches)"</text>
    <text x="140" y="96" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="700" font-style="italic">真正的根因在这里</text>
  </g>

  <g transform="translate(440, 100)">
    <rect x="0" y="0" width="700" height="560" rx="10" fill="url(#terminal)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <text x="20" y="30" fill="#f8fafc" font-size="14" font-weight="700">每个层报给上层的真实信息</text>

    <g transform="translate(20, 60)">
      <text x="0" y="20" fill="#94a3b8" font-size="12" font-family="Consolas,monospace">$ curl -X PUT /api/stacks/32 \</text>
      <text x="0" y="40" fill="#94a3b8" font-size="12" font-family="Consolas,monospace">  -d '{ "StackFileContent": "..." }'</text>
      <text x="0" y="68" fill="#fbbf24" font-size="12" font-family="Consolas,monospace">HTTP/1.1 500 Internal Server Error</text>
      <text x="0" y="88" fill="#cbd5e1" font-size="12" font-family="Consolas,monospace">{</text>
      <text x="0" y="106" fill="#cbd5e1" font-size="12" font-family="Consolas,monospace">  "message": "failed to deploy a stack:</text>
      <text x="0" y="124" fill="#fca5a5" font-size="12" font-family="Consolas,monospace">    compose up operation failed:</text>
      <text x="0" y="142" fill="#fca5a5" font-size="12" font-family="Consolas,monospace">    Error response from daemon:</text>
      <text x="0" y="160" fill="#fca5a5" font-size="12" font-family="Consolas,monospace">    network librespeed_default</text>
      <text x="0" y="178" fill="#fca5a5" font-size="12" font-family="Consolas,monospace">    is ambiguous (2 matches found on name)",</text>
      <text x="0" y="196" fill="#cbd5e1" font-size="12" font-family="Consolas,monospace">  "details": "Failed to deploy a stack: ..."</text>
      <text x="0" y="214" fill="#cbd5e1" font-size="12" font-family="Consolas,monospace">}</text>
    </g>

    <line x1="20" y1="290" x2="680" y2="290" stroke="#334155" stroke-width="1"/>

    <g transform="translate(20, 310)">
      <text x="0" y="0" fill="#94a3b8" font-size="13" font-weight="600">关键洞见</text>
      <text x="0" y="24" fill="#f8fafc" font-size="12">Portainer 的 500 不是「我炸了」</text>
      <text x="20" y="44" fill="#cbd5e1" font-size="11">它只是把 dockerd 抛上来的错误原样包了一下</text>
      <text x="0" y="68" fill="#f8fafc" font-size="12">真正的报错在 message 字段里</text>
      <text x="20" y="88" fill="#cbd5e1" font-size="11">直接告诉你「name 撞了」</text>
      <text x="0" y="112" fill="#f8fafc" font-size="12">docker compose 也只是中间人</text>
      <text x="20" y="132" fill="#cbd5e1" font-size="11">它没出语法错，没出拉镜像错</text>
      <text x="0" y="156" fill="#f8fafc" font-size="12">真正的核弹在 dockerd FindNetwork()</text>
      <text x="20" y="176" fill="#cbd5e1" font-size="11">「同名的网络我有 2 个，我选不出来」</text>
    </g>

    <g transform="translate(20, 510)">
      <rect x="0" y="-20" width="660" height="40" rx="6" fill="#dc2626" opacity="0.18"/>
      <text x="20" y="6" fill="#fca5a5" font-size="13" font-weight="700">经验：错误信息往往藏在最长的那个字符串里。</text>
    </g>
  </g>

  <g transform="translate(60, 660)">
    <text x="0" y="0" fill="#475569" font-size="13" font-style="italic">错误从 dockerd 向上回传：500 包装 → compose up failed → 引擎 ambiguous</text>
  </g>
</svg>
