<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="ok-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="err-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="code-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="600" y="45" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="700">Portainer Stack Editor 与 500 弹窗</text>
  <text x="600" y="68" text-anchor="middle" fill="#475569" font-size="14">实测的「最后一公里」交互：你在 UI 上到底会看到什么</text>

  <!-- Browser window -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="1080" height="540" rx="10" fill="url(#card)" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1080" height="42" rx="10" fill="url(#header)"/>
    <circle cx="20" cy="21" r="6" fill="#ef4444"/>
    <circle cx="40" cy="21" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="21" r="6" fill="#22c55e"/>
    <text x="540" y="26" text-anchor="middle" fill="#cbd5e1" font-size="12">Portainer — Stacks / librespeed / Editor</text>

    <!-- Top bar -->
    <g transform="translate(0, 42)">
      <rect x="0" y="0" width="1080" height="40" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
      <text x="20" y="26" fill="#0f172a" font-size="13" font-weight="700">Stack: librespeed</text>
      <rect x="180" y="10" width="100" height="22" rx="4" fill="#16a34a" opacity="0.15"/>
      <text x="230" y="25" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="600">Up (1/1)</text>
      <rect x="900" y="10" width="80" height="22" rx="4" fill="#0f172a"/>
      <text x="940" y="25" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Editor</text>
      <rect x="990" y="10" width="80" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="1030" y="25" text-anchor="middle" fill="#475569" font-size="11">Logs</text>
    </g>

    <!-- Code editor -->
    <g transform="translate(0, 82)">
      <rect x="0" y="0" width="1080" height="320" fill="url(#code-bg)"/>
      <g transform="translate(20, 30)" font-family="Consolas, monospace" font-size="13">
        <text x="0" y="0" fill="#94a3b8">1</text>
        <text x="40" y="0" fill="#f8fafc">version: '3'</text>
        <text x="0" y="20" fill="#94a3b8">2</text>
        <text x="40" y="20" fill="#f8fafc">services:</text>
        <text x="0" y="40" fill="#94a3b8">3</text>
        <text x="40" y="40" fill="#f8fafc">  librespeed:</text>
        <text x="0" y="60" fill="#94a3b8">4</text>
        <text x="40" y="60" fill="#f8fafc">    image: linuxserver/librespeed</text>
        <text x="0" y="80" fill="#94a3b8">5</text>
        <text x="40" y="80" fill="#f8fafc">    container_name: librespeed</text>
        <text x="0" y="100" fill="#94a3b8">6</text>
        <text x="40" y="100" fill="#f8fafc">    restart: always</text>
        <text x="0" y="120" fill="#94a3b8">7</text>
        <text x="40" y="120" fill="#f8fafc">    environment:</text>
        <text x="0" y="140" fill="#94a3b8">8</text>
        <text x="40" y="140" fill="#f8fafc">      - PUID=1000</text>
        <text x="0" y="160" fill="#94a3b8">9</text>
        <text x="40" y="160" fill="#f8fafc">      - PGID=1000</text>
        <text x="0" y="180" fill="#94a3b8">10</text>
        <text x="40" y="180" fill="#f8fafc">      - TZ=Asia/Shanghai</text>
        <text x="0" y="200" fill="#94a3b8">11</text>
        <text x="40" y="200" fill="#f8fafc">    ports:</text>
        <text x="0" y="220" fill="#94a3b8">12</text>
        <text x="40" y="220" fill="#f8fafc">      - "8888:80"</text>
        <text x="0" y="240" fill="#94a3b8">13</text>
        <text x="40" y="240" fill="#f8fafc">    volumes:</text>
        <text x="0" y="260" fill="#94a3b8">14</text>
        <text x="40" y="260" fill="#f8fafc">      - /srv/docker/librespeed/config:/config</text>
      </g>
    </g>

    <!-- Action bar -->
    <g transform="translate(0, 402)">
      <rect x="0" y="0" width="1080" height="50" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="20" y="12" width="100" height="26" rx="4" fill="#0f172a"/>
      <text x="70" y="30" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Update the stack</text>
      <rect x="130" y="12" width="80" height="26" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="170" y="30" text-anchor="middle" fill="#475569" font-size="12">Deploy</text>
    </g>

    <!-- 500 Error dialog overlay -->
    <g transform="translate(280, 130)" filter="url(#shadow)">
      <rect x="0" y="0" width="520" height="280" rx="10" fill="#fff" stroke="#dc2626" stroke-width="2"/>
      <rect x="0" y="0" width="520" height="44" rx="10" fill="#dc2626"/>
      <text x="20" y="29" fill="#fff" font-size="16" font-weight="700">500 Internal Server Error</text>
      <text x="500" y="29" text-anchor="end" fill="#fff" font-size="18" font-weight="700">×</text>

      <text x="20" y="76" fill="#7f1d1d" font-size="13" font-weight="700">failed to deploy a stack</text>

      <g transform="translate(20, 90)">
        <rect x="0" y="0" width="480" height="140" rx="6" fill="url(#err-bg)" stroke="#dc2626" stroke-width="1"/>
        <text x="14" y="22" fill="#7f1d1d" font-size="12" font-family="Consolas,monospace">compose up operation failed:</text>
        <text x="14" y="42" fill="#7f1d1d" font-size="12" font-family="Consolas,monospace">Error response from daemon:</text>
        <text x="14" y="64" fill="#7f1d1d" font-size="12" font-family="Consolas,monospace" font-weight="700">network librespeed_default</text>
        <text x="14" y="82" fill="#7f1d1d" font-size="12" font-family="Consolas,monospace" font-weight="700">is ambiguous (2 matches</text>
        <text x="14" y="100" fill="#7f1d1d" font-size="12" font-family="Consolas,monospace" font-weight="700">found on name)</text>
        <text x="14" y="128" fill="#7f1d1d" font-size="11" font-style="italic">查看 DevTools Network → 找 message 字段</text>
      </g>

      <rect x="200" y="244" width="120" height="28" rx="6" fill="#dc2626"/>
      <text x="260" y="263" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Close</text>
      <rect x="330" y="244" width="170" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="415" y="263" text-anchor="middle" fill="#475569" font-size="13" font-weight="600">Open container logs</text>
    </g>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(60, 670)">
    <text x="0" y="0" fill="#475569" font-size="13" font-style="italic">UI 上一闪而过的红条；真正的诊断信息要在「Details」里翻出来。</text>
  </g>
</svg>
