<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="err" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="600" y="45" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">docker network ls — 现场拍到的两个「重影」</text>
  <text x="600" y="68" text-anchor="middle" fill="#94a3b8" font-size="14">同 NAME、同 Driver、同 Project label，差 0.0002 秒出生的双胞胎</text>

  <!-- Terminal card -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="1080" height="540" rx="10" fill="url(#card)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1080" height="36" rx="10" fill="#1e293b"/>
    <circle cx="20" cy="18" r="5" fill="#ef4444"/>
    <circle cx="38" cy="18" r="5" fill="#f59e0b"/>
    <circle cx="56" cy="18" r="5" fill="#22c55e"/>
    <text x="540" y="22" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Consolas,monospace">root@nas — ssh</text>

    <!-- The actual command output -->
    <g transform="translate(20, 60)" font-family="Consolas, monospace" font-size="14">
      <text x="0" y="0" fill="#86efac">root@nas:~#</text>
      <text x="120" y="0" fill="#f8fafc">docker network ls --filter label=com.docker.compose.project=librespeed</text>

      <text x="0" y="36" fill="#f8fafc">NETWORK ID     NAME                DRIVER  SCOPE</text>
      <text x="0" y="58" fill="#fca5a5" font-weight="700">a1b2c3d4e5f6   librespeed_default  bridge  local   &lt;-- 孤儿 A</text>
      <text x="0" y="80" fill="#fca5a5" font-weight="700">7z8y9x0w1v2u   librespeed_default  bridge  local   &lt;-- 孤儿 B</text>

      <text x="0" y="120" fill="#86efac">root@nas:~#</text>
      <text x="120" y="120" fill="#f8fafc">docker network inspect a1b2c3d4e5f6 --format '{{json .}}' | jq .</text>

      <text x="0" y="148" fill="#94a3b8">{</text>
      <text x="0" y="166" fill="#cbd5e1">  "Name": "librespeed_default",</text>
      <text x="0" y="184" fill="#cbd5e1">  "Id": "a1b2c3d4e5f6...",</text>
      <text x="0" y="202" fill="#cbd5e1">  "Created": "2026-06-13T06:55:33.119070909+08:00",</text>
      <text x="0" y="220" fill="#cbd5e1">  "Scope": "local",</text>
      <text x="0" y="238" fill="#cbd5e1">  "Driver": "bridge",</text>
      <text x="0" y="256" fill="#cbd5e1">  "EnableIPv6": false,</text>
      <text x="0" y="274" fill="#cbd5e1">  "IPAM": { "Config": [{ "Subnet": "10.0.0.0/24" }] },</text>
      <text x="0" y="292" fill="#cbd5e1">  "Containers": {},           </text>
      <text x="170" y="292" fill="#fbbf24">&lt;-- 空！没有任何容器挂在上面</text>
      <text x="0" y="310" fill="#cbd5e1">  "Labels": {</text>
      <text x="0" y="328" fill="#cbd5e1">    "com.docker.compose.config-hash": "aacc11d868e9...",</text>
      <text x="0" y="346" fill="#cbd5e1">    "com.docker.compose.network": "default",</text>
      <text x="0" y="364" fill="#cbd5e1">    "com.docker.compose.project": "librespeed"</text>
      <text x="0" y="382" fill="#cbd5e1">  }</text>
      <text x="0" y="400" fill="#94a3b8">}</text>

      <text x="0" y="430" fill="#86efac">root@nas:~#</text>
      <text x="120" y="430" fill="#f8fafc">docker network inspect 7z8y9x0w1v2u --format '{{json .}}' | jq -r .Created</text>
      <text x="0" y="448" fill="#fca5a5">2026-06-13T06:55:33.119233258+08:00</text>

      <text x="0" y="478" fill="#fbbf24"># Created 时间差：0.000162 秒 → 同一份 compose up 双重执行</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 670)">
    <rect x="0" y="-12" width="14" height="12" fill="#fca5a5"/>
    <text x="20" y="-2" fill="#cbd5e1" font-size="12">被错误报 ambiguous 的两个对象</text>
    <rect x="280" y="-12" width="14" height="12" fill="#fbbf24"/>
    <text x="300" y="-2" fill="#cbd5e1" font-size="12">关键注释：Created / Containers: {}</text>
    <rect x="600" y="-12" width="14" height="12" fill="#86efac"/>
    <text x="620" y="-2" fill="#cbd5e1" font-size="12">shell prompt</text>
  </g>
</svg>
