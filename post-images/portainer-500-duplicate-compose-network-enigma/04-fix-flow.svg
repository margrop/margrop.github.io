<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="err" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="600" y="45" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="700">修复路径：删孤儿 + 重试</text>
  <text x="600" y="68" text-anchor="middle" fill="#475569" font-size="14">三步：定位 → 删 → 重试</text>

  <!-- Step 1: locate orphans -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="360" height="560" rx="12" fill="url(#err)" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
    <text x="180" y="36" text-anchor="middle" fill="#7f1d1d" font-size="18" font-weight="700">① 定位：找出来哪些是孤儿</text>

    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="320" height="320" rx="8" fill="url(#terminal)" stroke="#334155" stroke-width="1"/>
      <g transform="translate(10, 30)" font-family="Consolas,monospace" font-size="11">
        <text x="0" y="0" fill="#94a3b8">$ docker network ls \</text>
        <text x="0" y="18" fill="#94a3b8">  --filter label=com.docker.compose.project=librespeed</text>
        <text x="0" y="42" fill="#cbd5e1">NETWORK ID     NAME                DRIVER  SCOPE</text>
        <text x="0" y="62" fill="#fca5a5">a1b2c3d4e5f6   librespeed_default  bridge  local</text>
        <text x="0" y="80" fill="#fca5a5">7z8y9x0w1v2u   librespeed_default  bridge  local</text>
        <text x="0" y="110" fill="#94a3b8"># 详细看每一个的 labels</text>
        <text x="0" y="130" fill="#94a3b8">$ docker network inspect a1b2c3...</text>
        <text x="0" y="150" fill="#cbd5e1">"com.docker.compose.config-hash":</text>
        <text x="0" y="170" fill="#cbd5e1">  "aacc11d868e9..."</text>
        <text x="0" y="190" fill="#cbd5e1">"Containers": {}</text>
        <text x="0" y="220" fill="#94a3b8">$ docker network inspect 7z8y9x...</text>
        <text x="0" y="240" fill="#cbd5e1">"com.docker.compose.config-hash":</text>
        <text x="0" y="260" fill="#cbd5e1">  "aacc11d868e9..."  (一样的 hash)</text>
        <text x="0" y="280" fill="#cbd5e1">"Containers": {}</text>
      </g>
    </g>

    <g transform="translate(20, 410)">
      <text x="0" y="0" fill="#7f1d1d" font-size="13" font-weight="700">判断孤儿的关键标志</text>
      <text x="0" y="22" fill="#7f1d1d" font-size="12">• Containers: {} (没有任何容器)</text>
      <text x="0" y="42" fill="#7f1d1d" font-size="12">• Created 时间和另一个差几毫秒</text>
      <text x="0" y="62" fill="#7f1d1d" font-size="12">• config-hash 相同 (同一份 compose 算出来的)</text>
      <text x="0" y="92" fill="#dc2626" font-size="12" font-weight="700">挑一个删，剩一个才是「真的」</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="400" y1="390" x2="430" y2="390" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 2: remove -->
  <g transform="translate(440, 110)">
    <rect x="0" y="0" width="320" height="560" rx="12" fill="url(#warn)" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <text x="160" y="36" text-anchor="middle" fill="#78350f" font-size="18" font-weight="700">② 删除：彻底拆掉一个</text>

    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="280" height="320" rx="8" fill="url(#terminal)" stroke="#334155" stroke-width="1"/>
      <g transform="translate(10, 30)" font-family="Consolas,monospace" font-size="11">
        <text x="0" y="0" fill="#94a3b8"># 1) CLI 删</text>
        <text x="0" y="20" fill="#fbbf24">$ docker network rm a1b2c3d4e5f6</text>
        <text x="0" y="40" fill="#86efac">a1b2c3d4e5f6</text>

        <text x="0" y="80" fill="#94a3b8"># 2) 或者通过 Portainer UI</text>
        <text x="0" y="100" fill="#cbd5e1">Networks → 选 librespeed_default</text>
        <text x="0" y="120" fill="#cbd5e1">(ID 不同的那个) → Remove</text>

        <text x="0" y="160" fill="#94a3b8"># 3) 验证：现在只剩一个了</text>
        <text x="0" y="180" fill="#94a3b8">$ docker network ls \</text>
        <text x="0" y="198" fill="#94a3b8">  --filter name=librespeed_default</text>
        <text x="0" y="220" fill="#cbd5e1">NETWORK ID     NAME                DRIVER  SCOPE</text>
        <text x="0" y="240" fill="#86efac">7z8y9x0w1v2u   librespeed_default  bridge  local</text>

        <text x="0" y="280" fill="#fbbf24"># 报错 No such network 才算成功</text>
      </g>
    </g>

    <g transform="translate(20, 410)">
      <text x="0" y="0" fill="#78350f" font-size="13" font-weight="700">几个安全规则</text>
      <text x="0" y="22" fill="#78350f" font-size="12">• 永远不要一次删两个</text>
      <text x="0" y="42" fill="#78350f" font-size="12">• 优先删 Containers: {} 的那个</text>
      <text x="0" y="62" fill="#78350f" font-size="12">• 删之前再确认 config-hash 相同</text>
      <text x="0" y="92" fill="#d97706" font-size="12" font-weight="700">如果两个都有容器：先停 stack 再删</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="760" y1="390" x2="790" y2="390" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-green)"/>

  <!-- Step 3: retry -->
  <g transform="translate(800, 110)">
    <rect x="0" y="0" width="360" height="560" rx="12" fill="url(#ok)" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <text x="180" y="36" text-anchor="middle" fill="#065f46" font-size="18" font-weight="700">③ 重试：原样再来一次</text>

    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="320" height="320" rx="8" fill="url(#terminal)" stroke="#334155" stroke-width="1"/>
      <g transform="translate(10, 30)" font-family="Consolas,monospace" font-size="11">
        <text x="0" y="0" fill="#94a3b8"># Portainer 上：</text>
        <text x="0" y="20" fill="#86efac"># 重新点 Update the stack</text>
        <text x="0" y="40" fill="#86efac"># (用原来的 compose 内容)</text>

        <text x="0" y="80" fill="#94a3b8"># 或者直接调 API：</text>
        <text x="0" y="100" fill="#fbbf24">$ curl -X PUT \</text>
        <text x="0" y="118" fill="#fbbf24">  http://&lt;PORTAINER&gt;/api/stacks/&lt;ID&gt; \</text>
        <text x="0" y="136" fill="#fbbf24">  -H "Authorization: Bearer ..." \</text>
        <text x="0" y="154" fill="#fbbf24">  -d @stack.json</text>

        <text x="0" y="190" fill="#86efac">HTTP/1.1 200 OK</text>
        <text x="0" y="210" fill="#cbd5e1">{"Id": 32, "Status": 1, ...}</text>

        <text x="0" y="250" fill="#94a3b8"># 验证服务真的起来了</text>
        <text x="0" y="270" fill="#fbbf24">$ docker ps --filter name=librespeed</text>
        <text x="0" y="290" fill="#86efac">c8d928a7a6c1  ...  Up 12 seconds</text>
      </g>
    </g>

    <g transform="translate(20, 410)">
      <text x="0" y="0" fill="#065f46" font-size="13" font-weight="700">到这里就算修完了</text>
      <text x="0" y="22" fill="#065f46" font-size="12">• container running</text>
      <text x="0" y="42" fill="#065f46" font-size="12">• 端口绑了 0.0.0.0:8888→80</text>
      <text x="0" y="62" fill="#065f46" font-size="12">• /config 挂载可读写</text>
      <text x="0" y="92" fill="#16a34a" font-size="12" font-weight="700">curl 业务端口应该立刻 200</text>
    </g>
  </g>
</svg>
