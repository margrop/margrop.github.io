<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="err" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="net1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="net2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <rect x="0" y="0" width="1200" height="80" fill="#1e293b"/>
  <text x="60" y="50" fill="#f8fafc" font-size="26" font-weight="700">两个 librespeed_default 同时存在的奇景</text>
  <text x="60" y="70" fill="#94a3b8" font-size="14">Portainer 报 500，容器起不来，引擎说「名字撞了」</text>

  <g transform="translate(820, 120)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="220" rx="12" fill="url(#card)" stroke="#dc2626" stroke-width="2"/>
    <rect x="0" y="0" width="340" height="40" rx="12" fill="#dc2626"/>
    <text x="20" y="27" fill="#fff" font-size="16" font-weight="700">500 Internal Server Error</text>
    <text x="20" y="75" fill="#7f1d1d" font-size="13" font-weight="700">failed to deploy a stack:</text>
    <text x="20" y="95" fill="#7f1d1d" font-size="12">compose up operation failed:</text>
    <text x="20" y="115" fill="#7f1d1d" font-size="12" font-family="Consolas, monospace">network librespeed_default</text>
    <text x="20" y="132" fill="#7f1d1d" font-size="12" font-family="Consolas, monospace">is ambiguous (2 matches</text>
    <text x="20" y="149" fill="#7f1d1d" font-size="12" font-family="Consolas, monospace">found on name)</text>
    <rect x="20" y="170" width="120" height="32" rx="6" fill="#dc2626"/>
    <text x="80" y="190" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">OK</text>
    <rect x="200" y="170" width="120" height="32" rx="6" fill="#e2e8f0"/>
    <text x="260" y="190" text-anchor="middle" fill="#475569" font-size="13" font-weight="600">Details</text>
  </g>

  <g transform="translate(180, 200)">
    <g filter="url(#shadow)">
      <ellipse cx="200" cy="160" rx="200" ry="140" fill="url(#net1)" stroke="#1d4ed8" stroke-width="2.5"/>
      <ellipse cx="220" cy="140" rx="180" ry="110" fill="url(#net1)" stroke="#1d4ed8" stroke-width="2" opacity="0.9"/>
      <text x="200" y="110" text-anchor="middle" fill="#1e3a8a" font-size="18" font-weight="700">librespeed_default</text>
      <text x="200" y="135" text-anchor="middle" fill="#1e3a8a" font-size="13">id: a1b2c3d4e5f6...</text>
      <text x="200" y="155" text-anchor="middle" fill="#1e3a8a" font-size="12">created 00:00.000</text>
      <text x="200" y="180" text-anchor="middle" fill="#1e3a8a" font-size="12">subnet 10.0.0.0/24</text>
      <text x="200" y="200" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="700">containers: 0</text>
    </g>
    <g transform="translate(180, 50)" filter="url(#shadow)">
      <ellipse cx="200" cy="160" rx="200" ry="140" fill="url(#net2)" stroke="#be185d" stroke-width="2.5"/>
      <ellipse cx="220" cy="140" rx="180" ry="110" fill="url(#net2)" stroke="#be185d" stroke-width="2" opacity="0.9"/>
      <text x="200" y="110" text-anchor="middle" fill="#831843" font-size="18" font-weight="700">librespeed_default</text>
      <text x="200" y="135" text-anchor="middle" fill="#831843" font-size="13">id: 7z8y9x0w1v2u...</text>
      <text x="200" y="155" text-anchor="middle" fill="#831843" font-size="12">created 00:00.000</text>
      <text x="200" y="180" text-anchor="middle" fill="#831843" font-size="12">subnet 10.0.1.0/24</text>
      <text x="200" y="200" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="700">containers: 0</text>
    </g>
    <g transform="translate(150, 380)">
      <rect x="0" y="0" width="400" height="40" rx="8" fill="url(#err)" stroke="#dc2626" stroke-width="1.5"/>
      <text x="200" y="26" text-anchor="middle" fill="#7f1d1d" font-size="14" font-weight="700">同一个引擎里两个同名的「孤儿」网络</text>
    </g>
  </g>

  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="50" rx="8" fill="#1e293b"/>
    <text x="20" y="32" fill="#f8fafc" font-size="14">解药：删掉其中一个，Portainer 重试就 200 了。</text>
    <text x="1060" y="32" text-anchor="end" fill="#94a3b8" font-size="13">本文自制题图</text>
  </g>
</svg>
