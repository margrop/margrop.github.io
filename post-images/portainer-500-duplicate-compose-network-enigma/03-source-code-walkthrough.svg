<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="moby" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="compose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="err" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="code" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <text x="600" y="45" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="700">源码级追踪：是谁吐出了「is ambiguous」</text>
  <text x="600" y="68" text-anchor="middle" fill="#475569" font-size="14">moby dockerd 与 docker compose 的两段关键代码</text>

  <!-- Left: moby dockerd FindNetwork -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="550" height="600" rx="12" fill="url(#code)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="550" height="42" rx="12" fill="#7c3aed"/>
    <text x="20" y="28" fill="#fff" font-size="14" font-weight="700">moby / daemon / network.go</text>
    <text x="530" y="28" text-anchor="end" fill="#e9d5ff" font-size="11">FindNetwork() — 名字查找的真正裁判</text>

    <g transform="translate(20, 60)" font-family="Consolas, monospace" font-size="13">
      <text x="0" y="0" fill="#cbd5e1">// FindNetwork returns a network based on:</text>
      <text x="0" y="20" fill="#cbd5e1">// 1. Full ID</text>
      <text x="0" y="40" fill="#cbd5e1">// 2. Full Name</text>
      <text x="0" y="60" fill="#cbd5e1">// 3. Partial ID</text>
      <text x="0" y="80" fill="#cbd5e1">// as long as there is no ambiguity</text>

      <text x="0" y="120" fill="#fbbf24">func (daemon *Daemon) FindNetwork(</text>
      <text x="0" y="140" fill="#fbbf24">    term string) (*libnetwork.Network, error) {</text>
      <text x="0" y="160" fill="#cbd5e1">    var listByFullName, listByPartialID []*libnetwork.Network</text>
      <text x="0" y="180" fill="#cbd5e1">    for _, nw := range daemon.getAllNetworks() {</text>
      <text x="0" y="200" fill="#cbd5e1">        if nw.Name() == term {</text>
      <text x="0" y="220" fill="#86efac">            listByFullName = append(listByFullName, nw)</text>
      <text x="0" y="240" fill="#cbd5e1">        }</text>
      <text x="0" y="260" fill="#cbd5e1">    }</text>
      <text x="0" y="280" fill="#fbbf24">    switch {</text>
      <text x="0" y="300" fill="#cbd5e1">    case len(listByFullName) == 1:</text>
      <text x="0" y="320" fill="#cbd5e1">        return listByFullName[0], nil</text>
      <text x="0" y="340" fill="#fca5a5">    case len(listByFullName) &gt; 1:  // &lt;-- 我们撞在这里</text>
      <text x="0" y="360" fill="#fca5a5">        return nil, errdefs.InvalidParameter(</text>
      <text x="0" y="380" fill="#fca5a5">            fmt.Errorf(</text>
      <text x="0" y="400" fill="#fca5a5">              "network %s is ambiguous "</text>
      <text x="0" y="420" fill="#fca5a5">              + "(%d matches found on name)",</text>
      <text x="0" y="440" fill="#fca5a5">              term, len(listByFullName)))</text>
      <text x="0" y="460" fill="#cbd5e1">    ...</text>
      <text x="0" y="480" fill="#cbd5e1">    }</text>
      <text x="0" y="500" fill="#fbbf24">}</text>
    </g>
  </g>

  <!-- Right: docker compose resolveOrCreateNetwork -->
  <g transform="translate(610, 100)">
    <rect x="0" y="0" width="550" height="600" rx="12" fill="url(#code)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="550" height="42" rx="12" fill="#2563eb"/>
    <text x="20" y="28" fill="#fff" font-size="14" font-weight="700">compose / pkg / compose / create.go</text>
    <text x="530" y="28" text-anchor="end" fill="#bfdbfe" font-size="11">resolveOrCreateNetwork() — 重试也救不了</text>

    <g transform="translate(20, 60)" font-family="Consolas, monospace" font-size="13">
      <text x="0" y="0" fill="#cbd5e1">func (s *composeService) resolveOrCreateNetwork(</text>
      <text x="0" y="20" fill="#cbd5e1">    ctx context.Context, project *types.Project,</text>
      <text x="0" y="40" fill="#cbd5e1">    name string, n *types.NetworkConfig,</text>
      <text x="0" y="60" fill="#cbd5e1">) (string, error) {</text>

      <text x="0" y="100" fill="#86efac">    // First, try to find a unique network</text>
      <text x="0" y="120" fill="#86efac">    // matching by name or ID</text>
      <text x="0" y="140" fill="#cbd5e1">    res, err := s.apiClient().NetworkInspect(</text>
      <text x="0" y="160" fill="#cbd5e1">        ctx, n.Name,</text>
      <text x="0" y="180" fill="#cbd5e1">        client.NetworkInspectOptions{})</text>
      <text x="0" y="200" fill="#cbd5e1">    if err == nil { ... return inspect.ID, nil }</text>

      <text x="0" y="240" fill="#fca5a5">    // ignore other errors. Typically, an</text>
      <text x="0" y="260" fill="#fca5a5">    // ambiguous request by name results in</text>
      <text x="0" y="280" fill="#fca5a5">    // some generic `invalidParameter` error</text>

      <text x="0" y="320" fill="#86efac">    // Either not found, or name is</text>
      <text x="0" y="340" fill="#86efac">    // ambiguous - use NetworkList to list</text>
      <text x="0" y="360" fill="#fbbf24">    nwList, err := s.apiClient().NetworkList(</text>
      <text x="0" y="380" fill="#fbbf24">        ctx, client.NetworkListOptions{</text>
      <text x="0" y="400" fill="#fbbf24">            Filters: make(client.Filters).</text>
      <text x="0" y="420" fill="#fbbf24">                Add("name", n.Name),</text>
      <text x="0" y="440" fill="#fbbf24">        })</text>
      <text x="0" y="460" fill="#cbd5e1">    ... // 严格按 name 过滤后还是 2 个</text>
      <text x="0" y="480" fill="#fca5a5">    // 失败，回 ErrNoSuchNetwork</text>
      <text x="0" y="500" fill="#fbbf24">}</text>
    </g>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(40, 720)">
    <rect x="0" y="-15" width="20" height="12" fill="#fca5a5"/>
    <text x="28" y="-5" fill="#0f172a" font-size="11">关键失败路径</text>
    <rect x="160" y="-15" width="20" height="12" fill="#86efac"/>
    <text x="188" y="-5" fill="#0f172a" font-size="11">正常 / 注释</text>
    <rect x="320" y="-15" width="20" height="12" fill="#cbd5e1"/>
    <text x="348" y="-5" fill="#0f172a" font-size="11">普通代码</text>
  </g>
</svg>
