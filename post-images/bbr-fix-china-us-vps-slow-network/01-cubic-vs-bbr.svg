<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="cubicGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="bbrGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">TCP 拥塞控制在 10% 丢包链路上的行为</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748b">纵轴：即时发送速率 / 横轴：时间</text>

  <!-- CUBIC panel -->
  <rect x="40" y="90" width="380" height="340" fill="#fef2f2" stroke="#fecaca" stroke-width="2" rx="8"/>
  <text x="230" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">CUBIC (Linux 默认)</text>
  <text x="230" y="140" text-anchor="middle" font-size="12" fill="#991b1b">丢包 = 拥塞 → 立即退避</text>
  <!-- axes -->
  <line x1="70" y1="380" x2="400" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="70" y1="380" x2="70" y2="160" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="384" font-size="11" fill="#64748b">time</text>
  <text x="60" y="155" text-anchor="end" font-size="11" fill="#64748b">rate</text>
  <!-- sawtooth pattern for cubic under loss -->
  <path d="M70,370 L100,340 L100,370 L130,335 L130,370 L160,340 L160,370 L190,338 L190,370 L220,342 L220,370 L250,338 L250,370 L280,340 L280,370 L310,342 L310,370 L340,338 L340,370 L370,340 L370,370"
        fill="none" stroke="url(#cubicGrad)" stroke-width="3"/>
  <!-- avg line -->
  <line x1="80" y1="360" x2="390" y2="360" stroke="#dc2626" stroke-dasharray="4,3" stroke-width="1.5"/>
  <text x="395" y="364" font-size="11" fill="#dc2626" font-weight="600">平均 30 KB/s</text>
  <text x="230" y="415" text-anchor="middle" font-size="12" fill="#7f1d1d">
    每次丢包 → 速率折半 → 慢慢爬升 → 再丢包 → 再折半
  </text>

  <!-- BBR panel -->
  <rect x="480" y="90" width="380" height="340" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2" rx="8"/>
  <text x="670" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">BBR (Google)</text>
  <text x="670" y="140" text-anchor="middle" font-size="12" fill="#166534">建模瓶颈带宽 × 最小 RTT，忽略丢包</text>
  <line x1="510" y1="380" x2="840" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="380" x2="510" y2="160" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="845" y="384" font-size="11" fill="#64748b">time</text>
  <text x="500" y="155" text-anchor="end" font-size="11" fill="#64748b">rate</text>
  <!-- steady BBR line with mild probe oscillation -->
  <path d="M510,340 L540,220 L580,215 L620,218 L660,210 L700,215 L740,220 L780,215 L820,218"
        fill="none" stroke="url(#bbrGrad)" stroke-width="3"/>
  <line x1="520" y1="217" x2="830" y2="217" stroke="#059669" stroke-dasharray="4,3" stroke-width="1.5"/>
  <text x="835" y="221" font-size="11" fill="#059669" font-weight="600">平均 500 KB/s</text>
  <text x="670" y="415" text-anchor="middle" font-size="12" fill="#14532d">
    丢包不再意味退避 → 保持稳定发送 → 吞吐 15-24×
  </text>

  <text x="450" y="465" text-anchor="middle" font-size="13" fill="#334155" font-weight="600">
    国际链路真实实测：吞吐从 30 KB/s → 500-1000 KB/s
  </text>
</svg>
