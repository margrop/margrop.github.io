<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#64748b"/>
    </linearGradient>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">生活化比喻：拥塞控制像高速收费站怎么应对堵车</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748b">CUBIC = 老实人保守派收费员　　BBR = 见招拆招灵活派收费员</text>

  <!-- CUBIC scene -->
  <rect x="30" y="90" width="400" height="200" fill="#fef2f2" stroke="#fecaca" rx="8"/>
  <text x="230" y="115" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">🚗 CUBIC：见到坑洼立刻猛踩刹车</text>
  <!-- road -->
  <rect x="60" y="145" width="340" height="60" fill="url(#road)" rx="4"/>
  <line x1="80" y1="175" x2="380" y2="175" stroke="#fbbf24" stroke-dasharray="12,8" stroke-width="2"/>
  <!-- pothole markers -->
  <circle cx="140" cy="175" r="6" fill="#111827"/>
  <circle cx="220" cy="175" r="6" fill="#111827"/>
  <circle cx="300" cy="175" r="6" fill="#111827"/>
  <text x="140" y="230" text-anchor="middle" font-size="11" fill="#7f1d1d">丢包</text>
  <text x="220" y="230" text-anchor="middle" font-size="11" fill="#7f1d1d">丢包</text>
  <text x="300" y="230" text-anchor="middle" font-size="11" fill="#7f1d1d">丢包</text>
  <!-- car -->
  <text x="80" y="180" font-size="22">🚗</text>
  <text x="230" y="260" text-anchor="middle" font-size="12" fill="#7f1d1d">
    每次遇到丢包就以为"前面拥堵了"
  </text>
  <text x="230" y="278" text-anchor="middle" font-size="12" fill="#7f1d1d">
    自动降速一半再慢慢加，永远跑不快
  </text>

  <!-- BBR scene -->
  <rect x="470" y="90" width="400" height="200" fill="#ecfdf5" stroke="#bbf7d0" rx="8"/>
  <text x="670" y="115" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">🚙 BBR：眼睛盯路况，不理会小坑</text>
  <rect x="500" y="145" width="340" height="60" fill="url(#road)" rx="4"/>
  <line x1="520" y1="175" x2="820" y2="175" stroke="#fbbf24" stroke-dasharray="12,8" stroke-width="2"/>
  <circle cx="580" cy="175" r="6" fill="#111827"/>
  <circle cx="660" cy="175" r="6" fill="#111827"/>
  <circle cx="740" cy="175" r="6" fill="#111827"/>
  <text x="580" y="230" text-anchor="middle" font-size="11" fill="#14532d">忽略</text>
  <text x="660" y="230" text-anchor="middle" font-size="11" fill="#14532d">忽略</text>
  <text x="740" y="230" text-anchor="middle" font-size="11" fill="#14532d">忽略</text>
  <text x="820" y="180" font-size="22">🚙</text>
  <text x="670" y="260" text-anchor="middle" font-size="12" fill="#14532d">
    看的是"实际到达时间和吞吐量"，不是坑洼
  </text>
  <text x="670" y="278" text-anchor="middle" font-size="12" fill="#14532d">
    只有真正堵车（RTT 上升）才减速
  </text>

  <!-- middle icon -->
  <text x="450" y="200" text-anchor="middle" font-size="36">⚖️</text>

  <!-- Summary table -->
  <rect x="60" y="320" width="780" height="170" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <text x="450" y="345" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">同样的道路，不同司机开出的效果</text>
  <line x1="80" y1="360" x2="820" y2="360" stroke="#cbd5e1"/>
  <text x="200" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">场景</text>
  <text x="450" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">CUBIC 表现</text>
  <text x="720" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">BBR 表现</text>
  <line x1="80" y1="395" x2="820" y2="395" stroke="#e2e8f0"/>

  <text x="200" y="418" text-anchor="middle" font-size="12" fill="#334155">10% 丢包国际链路</text>
  <text x="450" y="418" text-anchor="middle" font-size="12" fill="#7f1d1d">30 KB/s (爬行)</text>
  <text x="720" y="418" text-anchor="middle" font-size="12" fill="#14532d">500-1000 KB/s (提升 15-24×)</text>

  <text x="200" y="445" text-anchor="middle" font-size="12" fill="#334155">同城局域网 (0% 丢包)</text>
  <text x="450" y="445" text-anchor="middle" font-size="12" fill="#334155">跑满带宽</text>
  <text x="720" y="445" text-anchor="middle" font-size="12" fill="#334155">跑满带宽（无差别）</text>

  <text x="200" y="472" text-anchor="middle" font-size="12" fill="#334155">竞争带宽的邻居</text>
  <text x="450" y="472" text-anchor="middle" font-size="12" fill="#7f1d1d">礼貌退让</text>
  <text x="720" y="472" text-anchor="middle" font-size="12" fill="#14532d">积极抢占（占用更多）</text>
</svg>
