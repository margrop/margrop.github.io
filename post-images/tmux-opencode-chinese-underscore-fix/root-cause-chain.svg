<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-label="tmux UTF-8 root cause chain">
  <rect width="1040" height="520" fill="#fbfbfd"/>
  <text x="56" y="64" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">从现象追到根因</text>
  <text x="56" y="100" font-family="Arial, sans-serif" font-size="16" fill="#5b6472">locale 看起来是 UTF-8，不代表 tmux client 一定会向外层终端输出 UTF-8。</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="72" y="156" width="190" height="104" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="108" y="202" font-weight="700" fill="#075985">现象</text>
    <text x="96" y="234" fill="#0f172a">中文变成下划线</text>
    <rect x="322" y="156" width="190" height="104" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="350" y="202" font-weight="700" fill="#92400e">排除</text>
    <text x="350" y="234" fill="#0f172a">opencode 直跑正常</text>
    <rect x="572" y="156" width="190" height="104" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="608" y="202" font-weight="700" fill="#5b21b6">证据</text>
    <text x="604" y="234" fill="#0f172a">client_utf8=0</text>
    <rect x="822" y="156" width="160" height="104" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="854" y="202" font-weight="700" fill="#166534">根因</text>
    <text x="852" y="234" fill="#0f172a">tmux ASCII 输出</text>
  </g>
  <path d="M262 208 H322" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M512 208 H572" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M762 208 H822" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="104" y="332" width="832" height="98" rx="12" fill="#111827"/>
  <text x="132" y="374" font-family="Menlo, Consolas, monospace" font-size="21" fill="#f8fafc">tmux display-message -p 'client_utf8=#{client_utf8}'</text>
  <text x="132" y="412" font-family="Menlo, Consolas, monospace" font-size="23" fill="#fca5a5">client_utf8=0</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
</svg>
