<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-label="opencode Chinese rendering comparison outside and inside tmux">
  <rect width="1040" height="520" fill="#f6f7f9"/>
  <text x="52" y="62" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#20242a">同一个 opencode，两个输出环境</text>
  <text x="52" y="100" font-family="Arial, sans-serif" font-size="16" fill="#5f6875">问题不在中文内容本身，而在 tmux client 是否允许向外层终端写 UTF-8。</text>
  <rect x="52" y="140" width="438" height="284" rx="12" fill="#111827"/>
  <rect x="550" y="140" width="438" height="284" rx="12" fill="#111827"/>
  <circle cx="78" cy="166" r="7" fill="#ef4444"/><circle cx="100" cy="166" r="7" fill="#f59e0b"/><circle cx="122" cy="166" r="7" fill="#22c55e"/>
  <circle cx="576" cy="166" r="7" fill="#ef4444"/><circle cx="598" cy="166" r="7" fill="#f59e0b"/><circle cx="620" cy="166" r="7" fill="#22c55e"/>
  <text x="78" y="212" font-family="Menlo, Consolas, monospace" font-size="21" fill="#d1fae5">$ opencode</text>
  <text x="78" y="252" font-family="Menlo, Consolas, monospace" font-size="25" fill="#ffffff">中文菜单正常显示</text>
  <text x="78" y="292" font-family="Menlo, Consolas, monospace" font-size="18" fill="#93c5fd">LANG=en_US.UTF-8</text>
  <text x="78" y="326" font-family="Menlo, Consolas, monospace" font-size="18" fill="#93c5fd">直接连接终端</text>
  <text x="576" y="212" font-family="Menlo, Consolas, monospace" font-size="21" fill="#fee2e2">$ tmux new -s work</text>
  <text x="576" y="252" font-family="Menlo, Consolas, monospace" font-size="25" fill="#ffffff">____ ____ ____ ____</text>
  <text x="576" y="292" font-family="Menlo, Consolas, monospace" font-size="18" fill="#fca5a5">client_utf8=0</text>
  <text x="576" y="326" font-family="Menlo, Consolas, monospace" font-size="18" fill="#fca5a5">tmux 用 ASCII 保护输出</text>
  <path d="M492 282 C512 282 530 282 550 282" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <text x="402" y="468" font-family="Arial, sans-serif" font-size="18" fill="#334155">同一套内容，渲染边界不同，结果完全不同。</text>
</svg>
