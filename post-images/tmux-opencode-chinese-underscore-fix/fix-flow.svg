<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-label="tmux opencode UTF-8 fix flow">
  <rect width="1040" height="540" fill="#f8fafc"/>
  <text x="56" y="64" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">修复思路：让边界明确说 UTF-8</text>
  <g font-family="Arial, sans-serif">
    <rect x="72" y="128" width="268" height="130" rx="12" fill="#ffffff" stroke="#94a3b8"/>
    <text x="100" y="172" font-size="22" font-weight="700" fill="#0f172a">1. Shell 环境</text>
    <text x="100" y="210" font-size="18" fill="#334155">LANG=en_US.UTF-8</text>
    <text x="100" y="238" font-size="18" fill="#334155">LC_CTYPE=en_US.UTF-8</text>
    <rect x="386" y="128" width="268" height="130" rx="12" fill="#ffffff" stroke="#94a3b8"/>
    <text x="414" y="172" font-size="22" font-weight="700" fill="#0f172a">2. tmux client</text>
    <text x="414" y="210" font-size="18" fill="#334155">tmux -u new -s work</text>
    <text x="414" y="238" font-size="18" fill="#334155">或 alias tmux='tmux -u'</text>
    <rect x="700" y="128" width="268" height="130" rx="12" fill="#ffffff" stroke="#94a3b8"/>
    <text x="728" y="172" font-size="22" font-weight="700" fill="#0f172a">3. tmux 配置</text>
    <text x="728" y="210" font-size="18" fill="#334155">default-terminal</text>
    <text x="728" y="238" font-size="18" fill="#334155">terminal-features RGB</text>
  </g>
  <path d="M340 193 H386" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M654 193 H700" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="130" y="342" width="780" height="102" rx="14" fill="#0f172a"/>
  <text x="164" y="385" font-family="Menlo, Consolas, monospace" font-size="21" fill="#d1fae5">source ~/.zshrc</text>
  <text x="164" y="424" font-family="Menlo, Consolas, monospace" font-size="21" fill="#d1fae5">tmux -u attach -t work</text>
  <text x="164" y="474" font-family="Arial, sans-serif" font-size="17" fill="#475569">已存在的 tmux client 需要重新连接；只 source 配置不会改变当前 client_utf8。</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
</svg>
