<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
    <rect width="600" height="500" fill="#f8f9fa"/>
    
<text x="300.0" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937" font-family="sans-serif">Troubleshooting Checklist</text>
<text x="300.0" y="52" text-anchor="middle" font-size="13" fill="#6b7280" font-family="sans-serif">For AI Agent duplicate reply issues</text>
<rect x="30" y="90" width="80" height="55" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/><text x="70.0" y="120.83333333333333" text-anchor="middle" font-size="10" fill="#3b82f6" font-family="sans-serif">Step 1</text><rect x="130" y="90" width="180" height="50" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/><text x="220" y="108" font-size="12" fill="#1f2937" font-family="sans-serif">Reproduce with minimal prompt</text><text x="220" y="127" font-size="9" fill="#6b7280" font-family="monospace">Use a short, deterministic prompt\nto isolate the issue</text><rect x="340" y="90" width="210" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/><text x="445" y="108" font-size="9" fill="#3b82f6" font-family="monospace">Use a short, deterministic prompt</text><text x="445" y="126" font-size="9" fill="#3b82f6" font-family="monospace">to isolate the issue</text><defs><marker id="arrow_d1d5db" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#d1d5db"/></marker></defs>
<line x1="220" y1="155" x2="220" y2="170" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrow_d1d5db)"/><rect x="30" y="170" width="80" height="55" rx="6" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/><text x="70.0" y="200.83333333333334" text-anchor="middle" font-size="10" fill="#8b5cf6" font-family="sans-serif">Step 2</text><rect x="130" y="170" width="180" height="50" rx="6" fill="white" stroke="#8b5cf6" stroke-width="1.5"/><text x="220" y="188" font-size="12" fill="#1f2937" font-family="sans-serif">Identify duplicate type</text><text x="220" y="207" font-size="9" fill="#6b7280" font-family="monospace">Multiple messages vs.\nduplicate text in one message</text><rect x="340" y="170" width="210" height="50" rx="6" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/><text x="445" y="188" font-size="9" fill="#8b5cf6" font-family="monospace">Multiple messages vs.</text><text x="445" y="206" font-size="9" fill="#8b5cf6" font-family="monospace">duplicate text in one message</text><defs><marker id="arrow_d1d5db" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#d1d5db"/></marker></defs>
<line x1="220" y1="235" x2="220" y2="250" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrow_d1d5db)"/><rect x="30" y="250" width="80" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="70.0" y="280.8333333333333" text-anchor="middle" font-size="10" fill="#f59e0b" font-family="sans-serif">Step 3</text><rect x="130" y="250" width="180" height="50" rx="6" fill="white" stroke="#f59e0b" stroke-width="1.5"/><text x="220" y="268" font-size="12" fill="#1f2937" font-family="sans-serif">Verify the provider</text><text x="220" y="287" font-size="9" fill="#6b7280" font-family="monospace">Check winner provider and model\nin agent execution trace</text><rect x="340" y="250" width="210" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="445" y="268" font-size="9" fill="#f59e0b" font-family="monospace">Check winner provider and model</text><text x="445" y="286" font-size="9" fill="#f59e0b" font-family="monospace">in agent execution trace</text><defs><marker id="arrow_d1d5db" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#d1d5db"/></marker></defs>
<line x1="220" y1="315" x2="220" y2="330" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrow_d1d5db)"/><rect x="30" y="330" width="80" height="55" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/><text x="70.0" y="360.8333333333333" text-anchor="middle" font-size="10" fill="#10b981" font-family="sans-serif">Step 4</text><rect x="130" y="330" width="180" height="50" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/><text x="220" y="348" font-size="12" fill="#1f2937" font-family="sans-serif">Compare protocols</text><text x="220" y="367" font-size="9" fill="#6b7280" font-family="monospace">Test openai-completions vs.\nanthropic-messages</text><rect x="340" y="330" width="210" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/><text x="445" y="348" font-size="9" fill="#10b981" font-family="monospace">Test openai-completions vs.</text><text x="445" y="366" font-size="9" fill="#10b981" font-family="monospace">anthropic-messages</text><defs><marker id="arrow_d1d5db" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#d1d5db"/></marker></defs>
<line x1="220" y1="395" x2="220" y2="410" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrow_d1d5db)"/><rect x="30" y="410" width="80" height="55" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/><text x="70.0" y="440.8333333333333" text-anchor="middle" font-size="10" fill="#6366f1" font-family="sans-serif">Step 5</text><rect x="130" y="410" width="180" height="50" rx="6" fill="white" stroke="#6366f1" stroke-width="1.5"/><text x="220" y="428" font-size="12" fill="#1f2937" font-family="sans-serif">Apply the fix</text><text x="220" y="447" font-size="9" fill="#6b7280" font-family="monospace">Change provider config to use\ncorrect protocol</text><rect x="340" y="410" width="210" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/><text x="445" y="428" font-size="9" fill="#6366f1" font-family="monospace">Change provider config to use</text><text x="445" y="446" font-size="9" fill="#6366f1" font-family="monospace">correct protocol</text><rect x="100" y="430" width="400" height="50" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/><text x="300" y="450" font-size="11" fill="#065f46" font-family="monospace">Key Insight: Always check the RAW model response first</text><text x="300" y="468" font-size="10" fill="#059669" font-family="monospace">Don't blame the IM plugin before verifying the provider output</text>
</svg>