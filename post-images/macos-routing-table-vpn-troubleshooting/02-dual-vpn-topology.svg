<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="vpn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8787"/>
      <stop offset="100%" stop-color="#fa5252"/>
    </linearGradient>
    <linearGradient id="vpn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74c0fc"/>
      <stop offset="100%" stop-color="#339af0"/>
    </linearGradient>
    <linearGradient id="lan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b2f2bb"/>
      <stop offset="100%" stop-color="#69db7c"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="980" height="560" fill="url(#bg2)"/>

  <text x="490" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#212529">双 VPN 路由冲突：10.0.0.0/8 聚合路由为何"吞掉"目标网段</text>
  <text x="490" y="58" text-anchor="middle" font-size="12" fill="#868e96">utun0 和 utun15 各自推送了一组路由，10.99.x 落在了错误的接口上</text>

  <!-- Local Mac -->
  <g filter="url(#shadow2)">
    <rect x="380" y="100" width="220" height="80" rx="10" fill="#fff" stroke="#495057" stroke-width="2"/>
    <text x="490" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#212529">本地 Mac 客户端</text>
    <text x="490" y="150" text-anchor="middle" font-size="11" fill="#495057">en0 (192.168.1.x)</text>
    <text x="490" y="166" text-anchor="middle" font-size="11" fill="#495057">路由表由系统统一管理</text>
  </g>

  <!-- utun0 VPN (left) -->
  <g filter="url(#shadow2)">
    <rect x="60" y="240" width="200" height="100" rx="10" fill="url(#vpn1)" stroke="#c92a2a" stroke-width="2"/>
    <text x="160" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">utun0  (VPN-A)</text>
    <text x="160" y="293" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">10.0.0.0/8 → utun0</text>
    <text x="160" y="310" text-anchor="middle" font-size="11" fill="#fff">192.168.120/22, /140, /160</text>
    <text x="160" y="327" text-anchor="middle" font-size="10" fill="#fff" font-style="italic">吃掉了 10.99.x 流量</text>
  </g>

  <!-- utun15 VPN (right) -->
  <g filter="url(#shadow2)">
    <rect x="720" y="240" width="200" height="100" rx="10" fill="url(#vpn2)" stroke="#1971c2" stroke-width="2"/>
    <text x="820" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">utun15  (VPN-B)</text>
    <text x="820" y="293" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">default → 10.255.255.1</text>
    <text x="820" y="310" text-anchor="middle" font-size="11" fill="#fff">DNS: 10.19.180.31/32</text>
    <text x="820" y="327" text-anchor="middle" font-size="10" fill="#fff" font-style="italic">缺少 10.99.0.0/24 路由</text>
  </g>

  <!-- Target host -->
  <g filter="url(#shadow2)">
    <rect x="700" y="430" width="240" height="80" rx="10" fill="url(#lan)" stroke="#2b8a3e" stroke-width="2"/>
    <text x="820" y="460" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">目标 NAS  10.99.99.99</text>
    <text x="820" y="478" text-anchor="middle" font-size="11" fill="#fff">挂在 utun15 对端内网</text>
    <text x="820" y="496" text-anchor="middle" font-size="10" fill="#fff" font-style="italic">DNS 已经能解析到</text>
  </g>

  <!-- Arrows from Mac to each VPN -->
  <line x1="395" y1="180" x2="200" y2="240" stroke="#495057" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow3)"/>
  <line x1="585" y1="180" x2="780" y2="240" stroke="#495057" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow3)"/>

  <!-- 10.99.99.99 path: from Mac -> utun0 (wrong) - red -->
  <path d="M 160 340 Q 160 380 200 380 Q 350 380 400 380 Q 600 380 800 380 Q 820 380 820 430" stroke="#c92a2a" stroke-width="3" fill="none" stroke-dasharray="8 4" marker-end="url(#arrowRed2)"/>
  <rect x="320" y="365" width="200" height="32" rx="4" fill="#fff5f5" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="420" y="386" text-anchor="middle" font-size="12" font-weight="700" fill="#c92a2a">❌ 10.99.99.99 走向了 utun0</text>

  <!-- Fix arrow: /32 host route forces to utun15 - green -->
  <path d="M 490 180 Q 490 215 820 215 Q 820 225 820 240" stroke="#2f9e44" stroke-width="3" fill="none" stroke-dasharray="8 4" marker-end="url(#arrowGreen2)"/>
  <rect x="540" y="190" width="260" height="30" rx="4" fill="#ebfbee" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="670" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#2b8a3e">✅ 加 /32 主机路由后走 utun15</text>

  <!-- Footer notes -->
  <g transform="translate(40, 520)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#212529">根因：</text>
    <text x="45" y="0" font-size="11" fill="#495057">utun0 推送了覆盖整个 10.0.0.0/8 的聚合路由，utun15 又没有 10.99.0.0/16 路由；内核按"最长前缀匹配"规则，把 10.99.99.99 给了 utun0，但 utun0 内部对端并没有到 10.99.99.99 的路径，</text>
    <text x="0" y="18" font-size="11" fill="#495057">于是包发出去了但回不来（或对端丢弃）。解决办法：手动加一条 /32 主机路由 <tspan font-weight="700" fill="#2b8a3e">10.99.99.99/32 → utun15</tspan>，比 utun0 的 /8 聚合更精确，胜出。</text>
  </g>

  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
    <marker id="arrowRed2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrowGreen2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9e44"/>
    </marker>
  </defs>
</svg>
