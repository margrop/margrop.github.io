<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="980" height="560" fill="url(#bg3)"/>

  <text x="490" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#212529">修复前后路由表对比</text>
  <text x="490" y="58" text-anchor="middle" font-size="12" fill="#868e96">通过 `route -n get &lt;target&gt;` 验证目标 IP 走的是哪条出口</text>

  <!-- Before card -->
  <g filter="url(#shadow3)">
    <rect x="40" y="90" width="430" height="430" rx="10" fill="#fff" stroke="#c92a2a" stroke-width="2"/>
    <rect x="40" y="90" width="430" height="38" rx="10" fill="#c92a2a"/>
    <rect x="40" y="118" width="430" height="10" fill="#c92a2a"/>
    <text x="60" y="115" font-size="14" font-weight="700" fill="#fff">❌ 修复前：路由命中错误的 VPN</text>

    <text x="60" y="160" font-size="11" font-weight="600" fill="#495057">$ route -n get 10.99.99.99</text>
    <line x1="60" y1="170" x2="450" y2="170" stroke="#dee2e6"/>
    <text x="60" y="192" font-size="12" fill="#212529">   route to: 10.99.99.99</text>
    <text x="60" y="212" font-size="12" fill="#212529">destination: 10.99.99.99</text>
    <rect x="60" y="222" width="390" height="26" fill="#ffe3e3"/>
    <text x="70" y="240" font-size="12" font-weight="700" fill="#c92a2a">interface: utun0  ← 错误！</text>
    <text x="60" y="266" font-size="12" fill="#212529">      flags: &lt;UP,HOST,DONE,WASCLONED,...&gt;</text>
    <text x="60" y="286" font-size="12" fill="#212529">   recvpipe  sendpipe  ssthresh  rtt,msec</text>
    <text x="60" y="306" font-size="12" fill="#212529">        0         0         0         0</text>
    <text x="60" y="330" font-size="12" font-weight="700" fill="#c92a2a">$ ping -c 3 10.99.99.99</text>
    <text x="60" y="350" font-size="12" fill="#212529">PING 10.99.99.99 (10.99.99.99): 56 data bytes</text>
    <text x="60" y="370" font-size="12" fill="#212529">Request timeout for icmp_seq 0</text>
    <text x="60" y="390" font-size="12" fill="#212529">Request timeout for icmp_seq 1</text>
    <text x="60" y="410" font-size="12" fill="#212529">Request timeout for icmp_seq 2</text>
    <rect x="60" y="420" width="390" height="80" fill="#fff5f5" stroke="#c92a2a" stroke-width="1"/>
    <text x="70" y="442" font-size="11" font-weight="600" fill="#c92a2a">3 packets transmitted, 0 received, 100% loss</text>
    <text x="70" y="465" font-size="10" fill="#495057">包从 utun0 发出，但 utun0 对端 VPN-A 内部</text>
    <text x="70" y="480" font-size="10" fill="#495057">没有到达 10.99.99.99 的路径。</text>
    <text x="70" y="495" font-size="10" fill="#495057">包被发到黑洞，或 TCP 握手被重置。</text>
  </g>

  <!-- After card -->
  <g filter="url(#shadow3)">
    <rect x="510" y="90" width="430" height="430" rx="10" fill="#fff" stroke="#2f9e44" stroke-width="2"/>
    <rect x="510" y="90" width="430" height="38" rx="10" fill="#2f9e44"/>
    <rect x="510" y="118" width="430" height="10" fill="#2f9e44"/>
    <text x="530" y="115" font-size="14" font-weight="700" fill="#fff">✅ 修复后：加 /32 主机路由</text>

    <text x="530" y="160" font-size="11" font-weight="600" fill="#495057">$ sudo route -n add -host 10.99.99.99 -interface utun15</text>
    <line x1="530" y1="170" x2="920" y2="170" stroke="#dee2e6"/>
    <text x="530" y="192" font-size="12" fill="#212529">   route to: 10.99.99.99</text>
    <text x="530" y="212" font-size="12" fill="#212529">destination: 10.99.99.99</text>
    <rect x="530" y="222" width="390" height="26" fill="#d3f9d8"/>
    <text x="540" y="240" font-size="12" font-weight="700" fill="#2b8a3e">interface: utun15  ← 正确！</text>
    <text x="530" y="266" font-size="12" fill="#212529">      flags: &lt;UP,HOST,DONE,WASCLONED,...&gt;</text>
    <text x="530" y="286" font-size="12" fill="#212529">   recvpipe  sendpipe  ssthresh  rtt,msec</text>
    <text x="530" y="306" font-size="12" fill="#212529">        0         0         0         0</text>
    <text x="530" y="330" font-size="12" font-weight="700" fill="#2b8a3e">$ ping -c 3 10.99.99.99</text>
    <text x="530" y="350" font-size="12" fill="#212529">PING 10.99.99.99 (10.99.99.99): 56 data bytes</text>
    <text x="530" y="370" font-size="12" fill="#212529">64 bytes from 10.99.99.99: icmp_seq=0 ttl=63</text>
    <text x="530" y="390" font-size="12" fill="#212529">64 bytes from 10.99.99.99: icmp_seq=1 ttl=63</text>
    <text x="530" y="410" font-size="12" fill="#212529">64 bytes from 10.99.99.99: icmp_seq=2 ttl=63</text>
    <rect x="530" y="420" width="390" height="80" fill="#ebfbee" stroke="#2f9e44" stroke-width="1"/>
    <text x="540" y="442" font-size="11" font-weight="600" fill="#2b8a3e">3 packets transmitted, 3 received, 0% loss</text>
    <text x="540" y="465" font-size="10" fill="#495057">包沿着 utun15 进入 VPN-B 内网，</text>
    <text x="540" y="480" font-size="10" fill="#495057">由对端网关正确转发到目标主机，</text>
    <text x="540" y="495" font-size="10" fill="#495057">回程也走 utun15 回来。</text>
  </g>
</svg>
