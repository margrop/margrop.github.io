<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="wrong" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a52"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#51cf66"/>
      <stop offset="100%" stop-color="#37b24d"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="980" height="620" fill="url(#bg)"/>

  <text x="490" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#212529">macOS 路由表查找：最长前缀匹配流程</text>
  <text x="490" y="64" text-anchor="middle" font-size="13" fill="#868e96">当两个 VPN 同时存在时，10.0.0.0/8 聚合路由为什么会"吃"掉更精确的目标地址？</text>

  <!-- App / Packet -->
  <g filter="url(#shadow)">
    <rect x="40" y="120" width="140" height="70" rx="8" fill="url(#box)" stroke="#adb5bd" stroke-width="1.5"/>
    <text x="110" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#212529">应用进程</text>
    <text x="110" y="170" text-anchor="middle" font-size="11" fill="#495057">目标 10.99.99.99</text>
  </g>

  <!-- Kernel routing decision -->
  <g filter="url(#shadow)">
    <rect x="240" y="105" width="220" height="100" rx="10" fill="url(#box)" stroke="#495057" stroke-width="2"/>
    <text x="350" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#212529">内核路由决策</text>
    <text x="350" y="154" text-anchor="middle" font-size="11" fill="#495057">最长前缀匹配(LPM)</text>
    <text x="350" y="172" text-anchor="middle" font-size="10" fill="#868e96">按前缀长度从长到短匹配</text>
    <text x="350" y="188" text-anchor="middle" font-size="10" fill="#868e96">匹配项中 metric 最小者胜出</text>
  </g>

  <line x1="180" y1="155" x2="240" y2="155" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Routing table (right side) -->
  <g filter="url(#shadow)">
    <rect x="540" y="90" width="400" height="420" rx="10" fill="url(#box)" stroke="#495057" stroke-width="2"/>
    <text x="740" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#212529">路由表 (netstat -rn 节选)</text>

    <!-- table header -->
    <line x1="560" y1="135" x2="920" y2="135" stroke="#adb5bd" stroke-width="1"/>
    <text x="565" y="155" font-size="11" font-weight="600" fill="#495057">Destination</text>
    <text x="730" y="155" font-size="11" font-weight="600" fill="#495057">Gateway</text>
    <text x="820" y="155" font-size="11" font-weight="600" fill="#495057">Iface</text>
    <line x1="560" y1="165" x2="920" y2="165" stroke="#adb5bd" stroke-width="1"/>

    <!-- /32 specific route (utun15) -->
    <rect x="555" y="175" width="370" height="40" rx="4" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1.5"/>
    <text x="565" y="200" font-size="12" font-weight="700" fill="#2b8a3e">10.99.99.99/32</text>
    <text x="730" y="200" font-size="12" font-weight="600" fill="#2b8a3e">10.255.255.1</text>
    <text x="820" y="200" font-size="12" font-weight="600" fill="#2b8a3e">utun15</text>

    <!-- /24 via utun15 (added) -->
    <rect x="555" y="220" width="370" height="40" rx="4" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="565" y="245" font-size="12" font-weight="700" fill="#2b8a3e">10.99.0.0/16</text>
    <text x="730" y="245" font-size="12" font-weight="600" fill="#2b8a3e">—</text>
    <text x="820" y="245" font-size="12" font-weight="600" fill="#2b8a3e">utun15</text>

    <!-- /8 aggregate (utun0) -->
    <rect x="555" y="280" width="370" height="40" rx="4" fill="#ffe3e3" stroke="#c92a2a" stroke-width="1.5"/>
    <text x="565" y="305" font-size="12" font-weight="700" fill="#c92a2a">10.0.0.0/8</text>
    <text x="730" y="305" font-size="12" font-weight="600" fill="#c92a2a">—</text>
    <text x="820" y="305" font-size="12" font-weight="600" fill="#c92a2a">utun0</text>

    <!-- default -->
    <rect x="555" y="340" width="370" height="40" rx="4" fill="#fff3bf" stroke="#f08c00" stroke-width="1.5"/>
    <text x="565" y="365" font-size="12" font-weight="700" fill="#e67700">default</text>
    <text x="730" y="365" font-size="12" font-weight="600" fill="#e67700">10.255.255.1</text>
    <text x="820" y="365" font-size="12" font-weight="600" fill="#e67700">utun15</text>

    <!-- /22 local LAN -->
    <rect x="555" y="400" width="370" height="40" rx="4" fill="#e7f5ff" stroke="#1971c2" stroke-width="1.5"/>
    <text x="565" y="425" font-size="12" font-weight="600" fill="#1971c2">192.168.0.0/16</text>
    <text x="730" y="425" font-size="12" font-weight="600" fill="#1971c2">link#4</text>
    <text x="820" y="425" font-size="12" font-weight="600" fill="#1971c2">en0</text>

    <!-- other /32 routes for context -->
    <rect x="555" y="455" width="370" height="40" rx="4" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1"/>
    <text x="565" y="480" font-size="11" fill="#495057">10.19.180.31/32 → 10.255.255.1 utun15 (DNS)</text>
  </g>

  <!-- Two arrows from decision to two outcomes -->
  <!-- Wrong: utun0 -->
  <g>
    <path d="M 460 155 Q 500 155 510 200 Q 520 250 555 295" stroke="url(#wrong)" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
    <rect x="465" y="225" width="90" height="26" rx="4" fill="#fff" stroke="#c92a2a" stroke-width="1"/>
    <text x="510" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#c92a2a">错误路径</text>
  </g>

  <!-- Right: utun15 -->
  <g>
    <path d="M 460 175 Q 490 175 500 195 Q 510 210 555 195" stroke="url(#right)" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
    <rect x="465" y="170" width="90" height="26" rx="4" fill="#fff" stroke="#2f9e44" stroke-width="1"/>
    <text x="510" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#2b8a3e">正确路径</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(40, 540)">
    <rect x="0" y="0" width="900" height="60" rx="8" fill="#fff" stroke="#adb5bd" stroke-width="1"/>
    <text x="15" y="22" font-size="12" font-weight="700" fill="#212529">图例：</text>

    <rect x="65" y="10" width="14" height="14" fill="#d3f9d8" stroke="#2f9e44"/>
    <text x="85" y="22" font-size="11" fill="#495057">/32 主机路由(优先级最高)</text>

    <rect x="245" y="10" width="14" height="14" fill="#ffe3e3" stroke="#c92a2a"/>
    <text x="265" y="22" font-size="11" fill="#495057">/8 聚合路由(本案例的元凶)</text>

    <rect x="435" y="10" width="14" height="14" fill="#fff3bf" stroke="#f08c00"/>
    <text x="455" y="22" font-size="11" fill="#495057">default 兜底路由</text>

    <rect x="605" y="10" width="14" height="14" fill="#e7f5ff" stroke="#1971c2"/>
    <text x="625" y="22" font-size="11" fill="#495057">本地直连路由</text>

    <text x="15" y="48" font-size="10" fill="#868e96">关键原则：内核按前缀长度从大到小匹配路由；/32 永远比 /8 优先。所以"加一条 /32 主机路由"就能精确覆盖 utun0 的 /8 聚合。</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9e44"/>
    </marker>
  </defs>
</svg>
