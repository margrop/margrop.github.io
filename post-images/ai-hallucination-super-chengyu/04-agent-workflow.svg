<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
<rect width="1400" height="760" fill="#f1f5f9"/><text x="70" y="85" fill="#0f172a" font-size="42" font-family="Arial">Agent 不应只有“生成”，还要有“刹车”</text>
<g font-family="Arial" font-size="27" text-anchor="middle"><rect x="90" y="270" width="250" height="120" rx="18" fill="#2563eb"/><text x="215" y="325" fill="white">任务拆分</text><text x="215" y="360" fill="white">定义事实范围</text><rect x="420" y="270" width="250" height="120" rx="18" fill="#0f766e"/><text x="545" y="325" fill="white">检索来源</text><text x="545" y="360" fill="white">保存证据片段</text><rect x="750" y="270" width="250" height="120" rx="18" fill="#d97706"/><text x="875" y="325" fill="white">交叉核对</text><text x="875" y="360" fill="white">发现冲突就停</text><rect x="1080" y="270" width="250" height="120" rx="18" fill="#be123c"/><text x="1205" y="325" fill="white">人类批准</text><text x="1205" y="360" fill="white">再执行高风险动作</text></g>
<g fill="none" stroke="#334155" stroke-width="7"><path d="M340 330 H410"/><path d="M670 330 H740"/><path d="M1000 330 H1070"/></g><text x="115" y="560" fill="#334155" font-size="30" font-family="Arial">核心原则：没有证据，就降低语气；发现冲突，就暂停执行。</text></svg>
