<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
<rect width="1400" height="820" fill="#f8fafc"/><text x="70" y="80" fill="#0f172a" font-size="42" font-family="Arial">把“聊天”变成“可核验流程”</text>
<g font-family="Arial" font-size="26" text-anchor="middle"><circle cx="220" cy="350" r="125" fill="#dbeafe" stroke="#2563eb" stroke-width="5"/><text x="220" y="340" fill="#1e3a8a">1. 先回答</text><text x="220" y="380" fill="#1e3a8a">允许不确定</text><circle cx="520" cy="180" r="125" fill="#dcfce7" stroke="#16a34a" stroke-width="5"/><text x="520" y="170" fill="#14532d">2. 找来源</text><text x="520" y="210" fill="#14532d">官方/论文</text><circle cx="850" cy="180" r="125" fill="#fef3c7" stroke="#d97706" stroke-width="5"/><text x="850" y="170" fill="#78350f">3. 对照证据</text><text x="850" y="210" fill="#78350f">逐条核对</text><circle cx="1160" cy="350" r="125" fill="#fce7f3" stroke="#db2777" stroke-width="5"/><text x="1160" y="340" fill="#831843">4. 输出结论</text><text x="1160" y="380" fill="#831843">附引用和边界</text><circle cx="850" cy="610" r="125" fill="#ede9fe" stroke="#7c3aed" stroke-width="5"/><text x="850" y="600" fill="#4c1d95">5. 人工复核</text><text x="850" y="640" fill="#4c1d95">高风险必做</text></g>
