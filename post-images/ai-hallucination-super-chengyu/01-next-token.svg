<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
<rect width="1400" height="760" fill="#0b1020"/><text x="70" y="90" fill="#f8fafc" font-size="42" font-family="Arial">AI 的“超级成语接龙”</text>
<text x="70" y="145" fill="#94a3b8" font-size="24" font-family="Arial">模型每一步都在选择“最像下一句”的词，不是在数据库里翻答案</text>
