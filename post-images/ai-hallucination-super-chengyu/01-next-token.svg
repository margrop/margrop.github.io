<path d="M130 520 C380 430 520 650 750 530 S1110 420 1270 560" fill="none" stroke="#f59e0b" stroke-width="8"/><text x="90" y="640" fill="#fde68a" font-size="30" font-family="Arial">连贯 ≠ 正确　　自信 ≠ 证据　　流畅 ≠ 事实</text>
