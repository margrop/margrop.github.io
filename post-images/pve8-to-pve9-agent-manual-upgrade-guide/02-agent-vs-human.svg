<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent-assisted and manual upgrade paths</title>
  <desc id="desc">Comparison of Agent-assisted and manual Proxmox VE upgrade workflows.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Two Ways to Do the Same Upgrade</text>
  <text x="600" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">Agent saves typing and sequencing time; the operator still owns approval and recovery decisions.</text>
  <g font-family="Arial, sans-serif">
    <rect x="90" y="162" width="480" height="440" rx="24" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <rect x="630" y="162" width="480" height="440" rx="24" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="330" y="220" text-anchor="middle" font-size="28" font-weight="700" fill="#0f766e">Agent-assisted</text>
    <text x="870" y="220" text-anchor="middle" font-size="28" font-weight="700" fill="#7c2d12">Manual</text>
    <g fill="#0f766e" font-size="18">
      <text x="140" y="282">1. Give one scoped prompt</text>
      <text x="140" y="332">2. Agent collects state and runs pve8to9</text>
      <text x="140" y="382">3. Human approves risky steps</text>
      <text x="140" y="432">4. Agent executes commands and records logs</text>
      <text x="140" y="482">5. Human checks console after reboot</text>
      <text x="140" y="532">6. Agent verifies services and guests</text>
    </g>
    <g fill="#7c2d12" font-size="18">
      <text x="680" y="282">1. Read official documentation</text>
      <text x="680" y="332">2. Run every preflight command yourself</text>
      <text x="680" y="382">3. Edit repository files carefully</text>
      <text x="680" y="432">4. Answer package prompts deliberately</text>
      <text x="680" y="482">5. Reboot from a reliable console</text>
      <text x="680" y="532">6. Verify cluster, storage, guests, logs</text>
    </g>
  </g>
</svg>
