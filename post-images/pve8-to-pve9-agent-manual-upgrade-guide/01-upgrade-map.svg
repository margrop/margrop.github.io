<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PVE 8 to 9 upgrade map</title>
  <desc id="desc">A privacy-safe flow diagram for upgrading Proxmox VE 8 to 9.</desc>
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect x="72" y="58" width="1056" height="604" rx="26" fill="#ffffff" stroke="#d7dce3" stroke-width="2"/>
  <text x="100" y="118" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">PVE 8 -> 9 Upgrade Map</text>
  <text x="100" y="156" font-family="Arial, sans-serif" font-size="18" fill="#64748b">Same route whether an Agent drives it or a human operator types it</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(100 218)">
      <rect width="180" height="118" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
      <text x="90" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0e7490">1. Backups</text>
      <text x="90" y="73" text-anchor="middle" font-size="15" fill="#155e75">VM/CT + /etc</text>
      <text x="90" y="96" text-anchor="middle" font-size="15" fill="#155e75">restore test first</text>
    </g>
    <g transform="translate(330 218)">
      <rect width="180" height="118" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <text x="90" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#15803d">2. PVE 8.4</text>
      <text x="90" y="73" text-anchor="middle" font-size="15" fill="#166534">apt update</text>
      <text x="90" y="96" text-anchor="middle" font-size="15" fill="#166534">dist-upgrade</text>
    </g>
    <g transform="translate(560 218)">
      <rect width="180" height="118" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <text x="90" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#c2410c">3. pve8to9</text>
      <text x="90" y="73" text-anchor="middle" font-size="15" fill="#9a3412">fix warnings</text>
      <text x="90" y="96" text-anchor="middle" font-size="15" fill="#9a3412">rerun full check</text>
    </g>
    <g transform="translate(790 218)">
      <rect width="180" height="118" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
      <text x="90" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#4338ca">4. Trixie</text>
      <text x="90" y="73" text-anchor="middle" font-size="15" fill="#3730a3">switch repos</text>
      <text x="90" y="96" text-anchor="middle" font-size="15" fill="#3730a3">apt policy</text>
    </g>
    <g transform="translate(445 438)">
      <rect width="310" height="126" rx="16" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
      <text x="155" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#be185d">5. dist-upgrade + reboot</text>
      <text x="155" y="78" text-anchor="middle" font-size="16" fill="#9d174d">review prompts, do not remove proxmox-ve</text>
      <text x="155" y="102" text-anchor="middle" font-size="16" fill="#9d174d">verify version, services, guests, logs</text>
    </g>
    <path d="M280 277 H330" stroke="#94a3b8" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M510 277 H560" stroke="#94a3b8" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M740 277 H790" stroke="#94a3b8" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M880 336 C880 420 755 438 755 492" stroke="#94a3b8" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
