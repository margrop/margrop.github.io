<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Risk checkpoints for Proxmox VE 8 to 9</title>
  <desc id="desc">Important checkpoints before, during, and after a PVE 8 to 9 upgrade.</desc>
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="74" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Upgrade Risk Checkpoints</text>
  <text x="74" y="118" font-family="Arial, sans-serif" font-size="18" fill="#64748b">The dangerous part is not the command. It is skipping one of these gates.</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <g transform="translate(82 176)">
      <rect width="300" height="370" rx="20" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
      <text x="150" y="54" text-anchor="middle" font-size="25" font-weight="700" fill="#075985">Before</text>
      <text x="34" y="112" fill="#0c4a6e">Tested backups</text>
      <text x="34" y="160" fill="#0c4a6e">Free root space</text>
      <text x="34" y="208" fill="#0c4a6e">Console or tmux</text>
      <text x="34" y="256" fill="#0c4a6e">Cluster health</text>
      <text x="34" y="304" fill="#0c4a6e">Ceph Squid if used</text>
    </g>
    <g transform="translate(450 176)">
      <rect width="300" height="370" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
      <text x="150" y="54" text-anchor="middle" font-size="25" font-weight="700" fill="#9a3412">During</text>
      <text x="34" y="112" fill="#7c2d12">Do not remove proxmox-ve</text>
      <text x="34" y="160" fill="#7c2d12">Review config prompts</text>
      <text x="34" y="208" fill="#7c2d12">No blind repository mix</text>
      <text x="34" y="256" fill="#7c2d12">Keep logs visible</text>
      <text x="34" y="304" fill="#7c2d12">Rerun pve8to9</text>
    </g>
    <g transform="translate(818 176)">
      <rect width="300" height="370" rx="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <text x="150" y="54" text-anchor="middle" font-size="25" font-weight="700" fill="#166534">After</text>
      <text x="34" y="112" fill="#14532d">Reboot new kernel</text>
      <text x="34" y="160" fill="#14532d">Check pveversion</text>
      <text x="34" y="208" fill="#14532d">Check services</text>
      <text x="34" y="256" fill="#14532d">Start guests</text>
      <text x="34" y="304" fill="#14532d">Check journals</text>
    </g>
  </g>
</svg>
