<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="streaming contract"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="1280" height="720" fill="#f8fafc"/><text x="80" y="80" font-family="Inter, Arial" font-size="44" font-weight="800" fill="#0f172a">正常的流式协议：只累计 delta</text><g font-family="Inter, Arial" font-size="24" fill="#0f172a"><rect x="80" y="150" width="260" height="130" rx="16" fill="#dbeafe" stroke="#60a5fa"/><text x="115" y="205">chunk 1</text><text x="115" y="245" font-family="monospace">delta: &quot;Hel&quot;</text><rect x="400" y="150" width="260" height="130" rx="16" fill="#dbeafe" stroke="#60a5fa"/><text x="435" y="205">chunk 2</text><text x="435" y="245" font-family="monospace">delta: &quot;lo&quot;</text><rect x="720" y="150" width="260" height="130" rx="16" fill="#dcfce7" stroke="#22c55e"/><text x="755" y="205">stop chunk</text><text x="755" y="245" font-family="monospace">finish: stop</text><path d="M350 215H390M670 215H710" stroke="#334155" stroke-width="5" marker-end="url(#a)"/><rect x="250" y="410" width="780" height="150" rx="20" fill="#0f172a"/><text x="300" y="465" fill="#e2e8f0">client buffer</text><text x="300" y="520" fill="#7dd3fc" font-family="monospace">&quot;Hel&quot; + &quot;lo&quot; = &quot;Hello&quot;</text></g></svg>