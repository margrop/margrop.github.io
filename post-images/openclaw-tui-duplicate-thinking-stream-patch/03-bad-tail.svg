<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="non standard full message tail causes duplicate"><defs><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#9a3412"/></marker></defs><rect width="1280" height="720" fill="#fff7ed"/><text x="75" y="80" font-family="Inter, Arial" font-size="42" font-weight="800" fill="#7c2d12">问题链路：增量之后又来了完整 message</text><g font-family="Inter, Arial" font-size="22"><rect x="70" y="155" width="240" height="120" rx="16" fill="#ffedd5" stroke="#fb923c"/><text x="105" y="205" fill="#7c2d12">delta A</text><text x="105" y="245" fill="#9a3412" font-family="monospace">&quot;OK&quot;</text><rect x="370" y="155" width="240" height="120" rx="16" fill="#ffedd5" stroke="#fb923c"/><text x="405" y="205" fill="#7c2d12">finish</text><text x="405" y="245" fill="#9a3412" font-family="monospace">stop</text><rect x="670" y="155" width="430" height="120" rx="16" fill="#fee2e2" stroke="#ef4444"/><text x="705" y="205" fill="#7f1d1d">extra tail</text><text x="705" y="245" fill="#991b1b" font-family="monospace">message.content: &quot;OK&quot;</text><path d="M320 215H360M620 215H660" stroke="#9a3412" stroke-width="5" marker-end="url(#b)"/><rect x="210" y="420" width="860" height="150" rx="20" fill="#431407"/><text x="260" y="478" fill="#fed7aa">naive client buffer</text><text x="260" y="532" fill="#fecaca" font-family="monospace">&quot;OK&quot; + &quot;OK&quot; = &quot;OKOK&quot;</text></g></svg>