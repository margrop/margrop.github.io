<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">SSH keys and passkeys are related but different tools</title>
  <desc id="desc">A comparison of SSH passwordless login and passkeys across target, protocol, storage, and daily use.</desc>
  <rect width="1200" height="675" fill="#f7f8fb"/>
  <rect x="60" y="58" width="1080" height="559" rx="24" fill="#ffffff" stroke="#d7dce8"/>
  <text x="90" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#172033">Two keys, two doors</text>
  <text x="90" y="150" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5a6375">Do not treat passkeys as a drop-in SSH password replacement.</text>

  <rect x="95" y="205" width="455" height="326" rx="18" fill="#eef6ff" stroke="#9dc4f2"/>
  <circle cx="150" cy="260" r="30" fill="#1f6feb"/>
  <path d="M136 259h24m-11-12 12 12-12 12" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="195" y="255" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#12345a">SSH passwordless login</text>
  <text x="195" y="289" font-family="Inter, Arial, sans-serif" font-size="17" fill="#35536f">For shell, Git, automation, and server access</text>
  <line x1="125" y1="330" x2="520" y2="330" stroke="#bdd7f4"/>
  <text x="125" y="373" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#12345a">Target</text>
  <text x="250" y="373" font-family="Inter, Arial, sans-serif" font-size="19" fill="#21364d">sshd on a server or VM</text>
  <text x="125" y="417" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#12345a">Protocol</text>
  <text x="250" y="417" font-family="Inter, Arial, sans-serif" font-size="19" fill="#21364d">SSH public-key auth</text>
  <text x="125" y="461" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#12345a">Secret</text>
  <text x="250" y="461" font-family="Inter, Arial, sans-serif" font-size="19" fill="#21364d">Private key file or hardware token</text>

  <rect x="650" y="205" width="455" height="326" rx="18" fill="#fff3e6" stroke="#f0b36d"/>
  <circle cx="705" cy="260" r="30" fill="#f97316"/>
  <path d="M697 272c-9-8-9-22 0-30s24-8 32 0 8 22 0 30" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="713" cy="257" r="7" fill="#fff"/>
  <text x="750" y="255" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#60310c">Passkeys</text>
  <text x="750" y="289" font-family="Inter, Arial, sans-serif" font-size="17" fill="#75491d">For website, app, and account sign-in</text>
  <line x1="680" y1="330" x2="1075" y2="330" stroke="#f2d0a7"/>
  <text x="680" y="373" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#60310c">Target</text>
  <text x="805" y="373" font-family="Inter, Arial, sans-serif" font-size="19" fill="#4f3926">A website or native app account</text>
  <text x="680" y="417" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#60310c">Protocol</text>
  <text x="805" y="417" font-family="Inter, Arial, sans-serif" font-size="19" fill="#4f3926">FIDO2 / WebAuthn</text>
  <text x="680" y="461" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#60310c">Secret</text>
  <text x="805" y="461" font-family="Inter, Arial, sans-serif" font-size="19" fill="#4f3926">Device-bound or synced credential</text>

  <path d="M552 376c36-23 60-23 96 0" fill="none" stroke="#6b7280" stroke-width="4" stroke-dasharray="8 9"/>
  <text x="556" y="424" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#374151">Same idea:</text>
  <text x="542" y="449" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4b5563">public key</text>
  <text x="539" y="474" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4b5563">challenge</text>
  <text x="535" y="499" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4b5563">local unlock</text>

  <rect x="160" y="558" width="880" height="34" rx="17" fill="#e8f5ef"/>
  <text x="600" y="582" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">Rule of thumb: SSH keys open terminals; passkeys open accounts.</text>
</svg>
