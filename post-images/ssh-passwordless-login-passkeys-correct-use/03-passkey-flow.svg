<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Passkey sign-in flow</title>
  <desc id="desc">A website sends a challenge, the phone or desktop unlocks locally, and the server checks the signed response.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="70" y="88" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#18202f">How a passkey signs in to a website or app</text>
  <text x="70" y="124" font-family="Inter, Arial, sans-serif" font-size="18" fill="#626b7a">A passkey is not a password you remember. It is a cryptographic credential your device unlocks.</text>

  <rect x="75" y="180" width="270" height="335" rx="24" fill="#ffffff" stroke="#d8dee9"/>
  <rect x="115" y="220" width="190" height="124" rx="13" fill="#dbeafe"/>
  <circle cx="210" cy="258" r="25" fill="#2563eb"/>
  <rect x="150" y="302" width="120" height="16" rx="8" fill="#93c5fd"/>
  <rect x="150" y="326" width="92" height="13" rx="6.5" fill="#bfdbfe"/>
  <text x="210" y="390" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">Website or app</text>
  <text x="210" y="422" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">stores the public key</text>
  <text x="210" y="450" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">sends a fresh challenge</text>

  <rect x="465" y="165" width="270" height="365" rx="36" fill="#111827"/>
  <rect x="492" y="204" width="216" height="286" rx="22" fill="#eef2ff"/>
  <circle cx="600" cy="315" r="54" fill="#4f46e5"/>
  <path d="M572 318c13-28 43-28 56 0m-42-20c10 11 19 11 29 0m-51 43h72" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <text x="600" y="407" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#312e81">Phone or desktop</text>
  <text x="600" y="439" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">local unlock authorizes use</text>

  <rect x="855" y="180" width="270" height="335" rx="24" fill="#ffffff" stroke="#d8dee9"/>
  <circle cx="990" cy="258" r="48" fill="#16a34a"/>
  <path d="M969 262l15 15 36-43" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="990" y="390" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">Signed response</text>
  <text x="990" y="422" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">server verifies proof</text>
  <text x="990" y="450" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">no shared password exists</text>

  <path d="M350 320h96" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M440 309l16 11-16 11" fill="#64748b"/>
  <text x="400" y="292" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">challenge</text>

  <path d="M745 320h96" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M835 309l16 11-16 11" fill="#64748b"/>
  <text x="793" y="292" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">signature</text>

  <rect x="162" y="572" width="876" height="40" rx="20" fill="#fef3c7"/>
  <text x="600" y="598" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#854d0e">Daily-life analogy: the site checks your stamp; it never receives the stamp itself.</text>
</svg>
