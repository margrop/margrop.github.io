<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">SSH passwordless login flow</title>
  <desc id="desc">Steps from generating an SSH key to authenticating with the private key without sending the private key to the server.</desc>
  <rect width="1200" height="675" fill="#fbfaf7"/>
  <text x="70" y="88" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#18202f">How SSH passwordless login really works</text>
  <text x="70" y="124" font-family="Inter, Arial, sans-serif" font-size="18" fill="#626b7a">The server stores a public key. The client proves it owns the private key.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="80" y="190" width="210" height="220" rx="20" fill="#e0f2fe" stroke="#38bdf8"/>
    <circle cx="185" cy="250" r="42" fill="#0284c7"/>
    <path d="M166 250h38m-17-17 18 17-18 17" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="185" y="329" text-anchor="middle" font-size="23" font-weight="700" fill="#0c4a6e">1. Generate</text>
    <text x="185" y="361" text-anchor="middle" font-size="16" fill="#164e63">private key + public key</text>

    <rect x="360" y="190" width="210" height="220" rx="20" fill="#ecfdf5" stroke="#34d399"/>
    <circle cx="465" cy="250" r="42" fill="#059669"/>
    <path d="M447 261c11-18 25-27 41-27 8 0 15 2 22 7m-63 20c11 7 24 11 39 11 10 0 20-2 30-6" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <text x="465" y="329" text-anchor="middle" font-size="23" font-weight="700" fill="#064e3b">2. Install</text>
    <text x="465" y="361" text-anchor="middle" font-size="16" fill="#065f46">append public key only</text>

    <rect x="640" y="190" width="210" height="220" rx="20" fill="#fff7ed" stroke="#fb923c"/>
    <circle cx="745" cy="250" r="42" fill="#ea580c"/>
    <path d="M724 250h42m-21-21v42" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
    <text x="745" y="329" text-anchor="middle" font-size="23" font-weight="700" fill="#7c2d12">3. Challenge</text>
    <text x="745" y="361" text-anchor="middle" font-size="16" fill="#9a3412">server asks for proof</text>

    <rect x="920" y="190" width="210" height="220" rx="20" fill="#f5f3ff" stroke="#a78bfa"/>
    <circle cx="1025" cy="250" r="42" fill="#7c3aed"/>
    <path d="M1004 255l13 13 31-36" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1025" y="329" text-anchor="middle" font-size="23" font-weight="700" fill="#4c1d95">4. Unlock</text>
    <text x="1025" y="361" text-anchor="middle" font-size="16" fill="#5b21b6">passphrase or touch</text>

    <path d="M300 300h50" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M344 289l16 11-16 11" fill="#64748b"/>
    <path d="M580 300h50" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M624 289l16 11-16 11" fill="#64748b"/>
    <path d="M860 300h50" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M904 289l16 11-16 11" fill="#64748b"/>
  </g>

  <rect x="130" y="482" width="940" height="74" rx="18" fill="#ffffff" stroke="#d4d8e3"/>
  <text x="600" y="512" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">The private key never needs to be copied to the server.</text>
  <text x="600" y="540" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4b5563">If the private key has no passphrase and is stolen, passwordless login becomes attacker-friendly login.</text>
</svg>
