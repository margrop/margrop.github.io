<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .box { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; rx: 8; }
      .box-blue { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; rx: 8; }
      .box-orange { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; rx: 8; }
      .arrow { stroke: #388e3c; stroke-width: 2; marker-end: url(#arrowhead-green); }
      .label { font-family: monospace; font-size: 13px; text-anchor: middle; }
      .title { font-family: sans-serif; font-size: 18px; font-weight: bold; }
      .subtitle { font-family: sans-serif; font-size: 14px; }
    </style>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <text x="400" y="30" class="title">Ubuntu Autoinstall Boot Sequence</text>

  <!-- Boot Order Configuration -->
  <rect x="50" y="50" width="700" height="50" fill="#f5f5f5" stroke="#999" rx="6"/>
  <text x="70" y="80" font-family="sans-serif" font-size="14px" font-weight="bold">Boot Order Configuration:</text>
  <text x="250" y="80" font-family="monospace" font-size="14px">--boot order="ide2;ide3;scsi0"</text>

  <!-- Step 1: ISO Boot -->
  <rect x="80" y="130" width="180" height="80" class="box-blue"/>
  <text x="170" y="160" class="subtitle" font-weight="bold">Step 1: IDE2 (ISO)</text>
  <text x="170" y="180" class="label">ubuntu-26.04-live-</text>
  <text x="170" y="195" class="label">server-amd64.iso</text>

  <line x1="260" y1="170" x2="300" y2="170" class="arrow"/>
  <text x="280" y="160" font-family="sans-serif" font-size="11px" fill="#388e3c">Boot</text>

  <!-- Step 2: Cloud-init Detection -->
  <rect x="310" y="130" width="180" height="80" class="box-orange"/>
  <text x="400" y="160" class="subtitle" font-weight="bold">Step 2: IDE3 (CIDATA)</text>
  <text x="400" y="180" class="label">Cloud-init ISO</text>
  <text x="400" y="195" class="label">detected</text>

  <line x1="490" y1="170" x2="530" y2="170" class="arrow"/>

  <!-- Step 3: Autoinstall -->
  <rect x="540" y="130" width="180" height="80" class="box"/>
  <text x="630" y="160" class="subtitle" font-weight="bold">Step 3: Autoinstall</text>
  <text x="630" y="180" class="label">Execute automated</text>
  <text x="630" y="195" class="label">installation</text>

  <!-- Detailed Process Flow -->
  <line x1="630" y1="210" x2="630" y2="250" class="arrow"/>

  <rect x="430" y="260" width="400" height="150" fill="#fffde7" stroke="#fbc02d" stroke-width="2" rx="8"/>
  <text x="630" y="285" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">Installation Process Details</text>
  <line x1="440" y1="295" x2="820" y2="295" stroke="#fbc02d"/>

  <text x="450" y="315" font-family="monospace" font-size="12px">1. Detect CIDATA volume</text>
  <text x="450" y="335" font-family="monospace" font-size="12px">2. Read user-data (autoinstall config)</text>
  <text x="450" y="355" font-family="monospace" font-size="12px">3. Configure identity (user, hostname)</text>
  <text x="450" y="375" font-family="monospace" font-size="12px">4. Partition disk (LVM)</text>
  <text x="450" y="395" font-family="monospace" font-size="12px">5. Install packages</text>

  <!-- IDE Ports Detail -->
  <rect x="50" y="260" width="200" height="150" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2" rx="8"/>
  <text x="150" y="285" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">IDE Port Mapping</text>
  <line x1="60" y1="295" x2="240" y2="295" stroke="#3f51b5"/>

  <text x="70" y="318" font-family="monospace" font-size="12px">ide0: [Reserved]</text>
  <text x="70" y="338" font-family="monospace" font-size="12px">ide1: [Reserved]</text>
  <text x="70" y="358" font-family="monospace" font-size="12px" fill="#1976d2" font-weight="bold">ide2: Ubuntu ISO</text>
  <text x="70" y="378" font-family="monospace" font-size="12px" fill="#f57c00" font-weight="bold">ide3: Cloud-init</text>
  <text x="70" y="398" font-family="monospace" font-size="12px">scsi0: System Disk</text>
</svg>