<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900"><rect width="1600" height="900" fill="#f8fafc"/><text x="100" y="110" font-family="Arial" font-size="54" font-weight="700" fill="#0f172a">挑选镜像源的四个问题</text><text x="100" y="160" font-family="Arial" font-size="24" fill="#64748b">不要只看“能不能打开”，要看完整拉取链路</text><g font-family="Arial"><g transform="translate(110 250)"><circle cx="70" cy="70" r="65" fill="#dbeafe"/><text x="70" y="88" text-anchor="middle" font-size="46">1</text><text x="170" y="62" font-size="34" font-weight="700" fill="#1e3a8a">能连上吗？</text><text x="170" y="108" font-size="24" fill="#475569">看 HTTP / HTTPS 可达性与证书</text></g><g transform="translate(110 430)"><circle cx="70" cy="70" r="65" fill="#ccfbf1"/><text x="70" y="88" text-anchor="middle" font-size="46">2</text><text x="170" y="62" font-size="34" font-weight="700" fill="#115e59">能拉下来吗？</text><text x="170" y="108" font-size="24" fill="#475569">用小镜像做真实 pull 测试</text></g><g transform="translate(850 250)"><circle cx="70" cy="70" r="65" fill="#ffedd5"/><text x="70" y="88" text-anchor="middle" font-size="46">3</text><text x="170" y="62" font-size="34" font-weight="700" fill="#9a3412">稳不稳定？</text><text x="170" y="108" font-size="24" fill="#475569">看定期检查、故障记录和持续时间</text></g><g transform="translate(850 430)"><circle cx="70" cy="70" r="65" fill="#fce7f3"/><text x="70" y="88" text-anchor="middle" font-size="46">4</text><text x="170" y="62" font-size="34" font-weight="700" fill="#9d174d">适合谁？</text><text x="170" y="108" font-size="24" fill="#475569">家用、NAS、CI、生产环境结论不同</text></g></g><rect x="110" y="690" width="1380" height="100" rx="24" fill="#0f172a"/><text x="800" y="752" text-anchor="middle" font-family="Arial" font-size="30" fill="#e2e8f0">status.anye.xyz：把“今天能不能用”变成可观察的数据</text></svg>
