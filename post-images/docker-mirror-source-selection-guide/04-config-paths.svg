<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900"><rect width="1600" height="900" fill="#111827"/><text x="100" y="105" font-family="Arial" font-size="54" font-weight="700" fill="#fff">不同系统，先找对配置文件</text><text x="100" y="155" font-family="Arial" font-size="24" fill="#9ca3af">路径错了，改得再漂亮也不会生效</text><g font-family="Arial"><rect x="110" y="250" width="1380" height="125" rx="20" fill="#1d4ed8"/><text x="160" y="305" font-size="30" fill="#dbeafe" font-weight="700">群晖 DSM 7.x / Container Manager</text><text x="160" y="350" font-size="28" fill="#fff">/var/packages/ContainerManager/etc/dockerd.json</text><rect x="110" y="415" width="1380" height="125" rx="20" fill="#0f766e"/><text x="160" y="470" font-size="30" fill="#ccfbf1" font-weight="700">群晖 DSM 6.x / Docker</text><text x="160" y="515" font-size="28" fill="#fff">/var/packages/Docker/etc/dockerd.json</text><rect x="110" y="580" width="1380" height="125" rx="20" fill="#9a3412"/><text x="160" y="635" font-size="30" fill="#ffedd5" font-weight="700">Ubuntu / Debian / 飞牛 OS 等</text><text x="160" y="680" font-size="28" fill="#fff">/etc/docker/daemon.json</text></g></svg>
