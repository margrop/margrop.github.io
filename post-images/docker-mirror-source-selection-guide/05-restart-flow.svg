<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900"><rect width="1600" height="900" fill="#f1f5f9"/><text x="100" y="105" font-family="Arial" font-size="54" font-weight="700" fill="#0f172a">改完配置后，别忘了让 Docker 重新读一遍</text><g font-family="Arial" text-anchor="middle"><rect x="150" y="280" width="290" height="180" rx="28" fill="#dbeafe"/><text x="295" y="355" font-size="34" font-weight="700" fill="#1e3a8a">备份</text><text x="295" y="405" font-size="24" fill="#475569">cp /path /path.bak</text><rect x="515" y="280" width="290" height="180" rx="28" fill="#ccfbf1"/><text x="660" y="355" font-size="34" font-weight="700" fill="#115e59">校验 JSON</text><text x="660" y="405" font-size="24" fill="#475569">jq . daemon.json</text><rect x="880" y="280" width="290" height="180" rx="28" fill="#ffedd5"/><text x="1025" y="355" font-size="34" font-weight="700" fill="#9a3412">重启服务</text><text x="1025" y="405" font-size="24" fill="#475569">systemctl restart docker</text><rect x="1245" y="280" width="220" height="180" rx="28" fill="#fce7f3"/><text x="1355" y="355" font-size="34" font-weight="700" fill="#9d174d">验证</text><text x="1355" y="405" font-size="24" fill="#475569">docker info</text></g><path d="M450 370h55m300 0h55m300 0h70" stroke="#334155" stroke-width="10"/><text x="800" y="650" text-anchor="middle" font-family="Arial" font-size="32" fill="#334155">像换公交线路：换完站牌，车辆也要重新出发</text></svg>
