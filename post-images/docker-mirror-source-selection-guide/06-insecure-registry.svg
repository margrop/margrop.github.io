<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900"><rect width="1600" height="900" fill="#0b1120"/><text x="100" y="105" font-family="Arial" font-size="54" font-weight="700" fill="#fff">insecure-registries 到底解决什么问题？</text><g font-family="Arial"><rect x="120" y="240" width="560" height="300" rx="28" fill="#172554"/><text x="400" y="315" text-anchor="middle" font-size="36" font-weight="700" fill="#bfdbfe">公共镜像加速</text><text x="400" y="390" text-anchor="middle" font-size="28" fill="#dbeafe">HTTPS</text><text x="400" y="445" text-anchor="middle" font-size="26" fill="#93c5fd">解决：访问公共仓库慢</text><text x="400" y="495" text-anchor="middle" font-size="24" fill="#bfdbfe">配置：registry-mirrors</text><rect x="920" y="240" width="560" height="300" rx="28" fill="#431407"/><text x="1200" y="315" text-anchor="middle" font-size="36" font-weight="700" fill="#fed7aa">内网 HTTP 仓库</text><text x="1200" y="390" text-anchor="middle" font-size="28" fill="#ffedd5">HTTP</text><text x="1200" y="445" text-anchor="middle" font-size="26" fill="#fdba74">解决：没有 TLS 的私有仓库</text><text x="1200" y="495" text-anchor="middle" font-size="24" fill="#fed7aa">配置：insecure-registries</text></g><path d="M700 390h180" stroke="#94a3b8" stroke-width="8" stroke-dasharray="18 14"/><text x="800" y="700" text-anchor="middle" font-family="Arial" font-size="34" fill="#fef3c7">能用 ≠ 安全：生产环境优先给私有仓库配置 HTTPS</text></svg>
