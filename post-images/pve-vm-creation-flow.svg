<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; rx: 8; }
      .arrow { stroke: #1976d2; stroke-width: 2; marker-end: url(#arrowhead); }
      .label { font-family: monospace; font-size: 14px; text-anchor: middle; }
      .title { font-family: sans-serif; font-size: 18px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <text x="400" y="30" class="title">PVE Virtual Machine Creation Flow</text>

  <!-- Step 1 -->
  <rect x="50" y="60" width="140" height="60" class="box"/>
  <text x="120" y="95" class="label">1. Prepare ISO</text>
  <text x="120" y="110" class="label">ubuntu-26.04.iso</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="90" x2="230" y2="90" class="arrow"/>

  <!-- Step 2 -->
  <rect x="240" y="60" width="160" height="60" class="box"/>
  <text x="320" y="95" class="label">2. Clone VM from</text>
  <text x="320" y="110" class="label">Reference (qm clone)</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="90" x2="440" y2="90" class="arrow"/>

  <!-- Step 3 -->
  <rect x="450" y="60" width="160" height="60" class="box"/>
  <text x="530" y="95" class="label">3. Configure VM</text>
  <text x="530" y="110" class="label">(Cloud-init, Boot)</text>

  <!-- Arrow 3 -->
  <line x1="610" y1="90" x2="650" y2="90" class="arrow"/>

  <!-- Step 4 -->
  <rect x="660" y="60" width="120" height="60" class="box"/>
  <text x="720" y="95" class="label">4. Start VM</text>
  <text x="720" y="110" class="label">(qm start)</text>

  <!-- Second row -->
  <!-- Step 5 -->
  <rect x="240" y="180" width="160" height="60" class="box"/>
  <text x="320" y="215" class="label">5. Create Cloud-init</text>
  <text x="320" y="230" class="label">ISO (CIDATA)</text>

  <!-- Arrow 5 -->
  <line x1="320" y1="120" x2="320" y2="140" class="arrow"/>
  <line x1="320" y1="140" x2="400" y2="140" class="arrow"/>
  <line x1="400" y1="140" x2="400" y2="180" class="arrow"/>

  <!-- Arrow to step 5 -->
  <line x1="530" y1="120" x2="530" y2="160" class="arrow"/>
  <line x1="530" y1="160" x2="400" y2="160" class="arrow"/>
  <line x1="400" y1="160" x2="400" y2="180" class="arrow"/>

  <!-- Arrow 6 -->
  <line x1="320" y1="240" x2="320" y2="280" class="arrow"/>

  <!-- Step 6 -->
  <rect x="240" y="290" width="160" height="60" class="box"/>
  <text x="320" y="325" class="label">6. Autoinstall</text>
  <text x="320" y="340" class="label">Execution</text>

  <!-- Cloud-init ISO detail -->
  <rect x="500" y="200" width="200" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
  <text x="600" y="230" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">Cloud-init ISO</text>
  <line x1="510" y1="240" x2="690" y2="240" stroke="#ff9800"/>
  <text x="520" y="260" font-family="monospace" font-size="12px">📄 user-data</text>
  <text x="520" y="280" font-family="monospace" font-size="12px">📄 meta-data</text>
  <text x="520" y="300" font-family="monospace" font-size="12px">📀 Volume: CIDATA</text>

  <!-- Arrow to Cloud-init ISO detail -->
  <line x1="400" y1="210" x2="490" y2="210" class="arrow"/>
  <line x1="490" y1="210" x2="490" y2="260" class="arrow"/>
  <line x1="490" y1="260" x2="500" y2="260" class="arrow"/>

  <!-- Legend -->
  <rect x="50" y="370" width="700" height="30" fill="#f5f5f5" stroke="#999" rx="4"/>
  <text x="70" y="390" font-family="sans-serif" font-size="12px">Legend:</text>
  <rect x="130" y="377" width="20" height="15" class="box"/>
  <text x="160" y="390" font-family="sans-serif" font-size="12px">Process Step</text>
  <rect x="280" y="377" width="20" height="15" fill="#fff3e0" stroke="#ff9800"/>
  <text x="310" y="390" font-family="sans-serif" font-size="12px">Cloud-init ISO</text>
  <line x1="420" y1="385" x2="460" y2="385" class="arrow"/>
  <text x="470" y="390" font-family="sans-serif" font-size="12px">Flow Direction</text>
</svg>