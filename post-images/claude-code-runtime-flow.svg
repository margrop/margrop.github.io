<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#334155" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="860" rx="28" fill="url(#bg2)"/>
  <text x="78" y="86" font-size="40" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1f2937" font-weight="700">Claude Code 的一次请求如何穿过整条运行链</text>
  <text x="78" y="126" font-size="20" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">入口很薄，真正的重心在认证、配置、提示词、工具、执行、文件系统与终端适配器的编排。</text>

  <g filter="url(#shadow2)">
    <rect x="80" y="210" width="220" height="110" rx="20" fill="url(#box1)"/>
    <rect x="360" y="210" width="220" height="110" rx="20" fill="url(#box2)"/>
    <rect x="640" y="210" width="220" height="110" rx="20" fill="url(#box3)"/>
    <rect x="920" y="210" width="220" height="110" rx="20" fill="url(#box4)"/>
    <rect x="1200" y="210" width="320" height="110" rx="20" fill="#1d4ed8"/>
  </g>

  <text x="122" y="252" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">CLI / TUI</text>
  <text x="122" y="284" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f0f9ff">parse args, help, prompt</text>

  <text x="390" y="252" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Command Registry</text>
  <text x="390" y="284" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f5f3ff">dispatch, categories, auth gate</text>

  <text x="683" y="252" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Config / Auth</text>
  <text x="683" y="284" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff7ed">merge defaults, tokens, oauth</text>

  <text x="978" y="252" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">AI Client</text>
  <text x="978" y="284" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#e2e8f0">messages, retry, timeout, stream</text>

  <text x="1238" y="252" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Tools / Adapters</text>
  <text x="1238" y="284" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#dbeafe">fileops, execution, terminal, codebase</text>

  <g stroke="#64748b" stroke-width="4" fill="none">
    <path d="M300 265 H355"/>
    <path d="M580 265 H635"/>
    <path d="M860 265 H915"/>
    <path d="M1140 265 H1195"/>
  </g>

  <g filter="url(#shadow2)">
    <rect x="120" y="420" width="300" height="250" rx="24" fill="#ffffff"/>
    <rect x="470" y="420" width="300" height="250" rx="24" fill="#ffffff"/>
    <rect x="820" y="420" width="300" height="250" rx="24" fill="#ffffff"/>
    <rect x="1170" y="420" width="300" height="250" rx="24" fill="#ffffff"/>
  </g>

  <text x="155" y="468" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#0f766e" font-weight="700">1. 入口</text>
  <text x="155" y="508" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">用户输入命令</text>
  <text x="155" y="540" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">CLI 解析参数和帮助</text>
  <text x="155" y="572" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">TUI 负责交互和展示</text>

  <text x="505" y="468" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#7c3aed" font-weight="700">2. 控制面</text>
  <text x="505" y="508" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">命令注册成元数据</text>
  <text x="505" y="540" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">按类别、别名、权限分发</text>
  <text x="505" y="572" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">先鉴权，再初始化 AI</text>

  <text x="855" y="468" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#b45309" font-weight="700">3. 状态面</text>
  <text x="855" y="508" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">配置按层合并</text>
  <text x="855" y="540" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">token / OAuth / env</text>
  <text x="855" y="572" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">工作区、缓存、会话并存</text>

  <text x="1205" y="468" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1d4ed8" font-weight="700">4. 能力面</text>
  <text x="1205" y="508" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">提示词驱动 LLM</text>
  <text x="1205" y="540" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">文件操作、代码分析、执行命令</text>
  <text x="1205" y="572" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">最终把回答落成动作</text>

  <text x="78" y="760" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">如果用道家的话说，CLI 是门，道法体术四层通过“限制可见性”和“减少不必要动作”来保持系统不散。</text>
</svg>
