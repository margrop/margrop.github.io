<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Docker registry mirror rebuild cover">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#14213d"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" x2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- decorative grid -->
  <g opacity="0.18" stroke="#93c5fd" stroke-width="1">
    <path d="M80 90H1200M80 170H1200M80 250H1200M80 330H1200M80 410H1200M80 490H1200M80 570H1200"/>
    <path d="M160 55V650M320 55V650M480 55V650M640 55V650M800 55V650M960 55V650M1120 55V650"/>
  </g>

  <!-- LEFT card: 5m14s slow pull -->
  <g filter="url(#shadow)">
    <rect x="80" y="130" width="540" height="390" rx="22" fill="#111827" stroke="#334155"/>
    <circle cx="115" cy="165" r="8" fill="#ef4444"/>
    <circle cx="143" cy="165" r="8" fill="#f59e0b"/>
    <circle cx="171" cy="165" r="8" fill="#22c55e"/>
    <text x="105" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#94a3b8">$ time docker pull alpine:3.19</text>
    <text x="105" y="270" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#e5e7eb">  ... retry ... 5m14s</text>
    <text x="105" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#fca5a5">real  5m14.467s</text>
    <text x="105" y="400" font-family="Inter, Arial, sans-serif" font-size="20" fill="#94a3b8" opacity="0.85">old pull-through proxy</text>
    <text x="105" y="430" font-family="Inter, Arial, sans-serif" font-size="20" fill="#94a3b8" opacity="0.85">over a slow upstream</text>
    <rect x="105" y="455" width="180" height="48" rx="10" fill="url(#bad)"/>
    <text x="195" y="487" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">SLOW</text>
  </g>

  <!-- arrow -->
  <g transform="translate(640, 290)">
    <path d="M0 40 L80 40" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
    <polygon points="80,40 64,28 64,52" fill="#38bdf8"/>
    <text x="40" y="20" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5e1">switch upstream</text>
    <text x="40" y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5e1">+ add cron</text>
  </g>

  <!-- RIGHT card: 0.6s after fix -->
  <g filter="url(#shadow)">
    <rect x="730" y="165" width="470" height="320" rx="22" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="755" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#0f172a">$ docker pull 8082/alpine</text>
    <text x="755" y="275" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#0f172a">Status: Image is up to date</text>
    <text x="755" y="335" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700" fill="#16a34a">real  0.6s</text>
    <rect x="755" y="365" width="220" height="50" rx="12" fill="url(#ok)"/>
    <text x="865" y="398" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#082f49">CACHED · 1ms-class</text>
  </g>

  <!-- title -->
  <text x="80" y="610" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#f8fafc">5 分 14 秒 → 0.6 秒</text>
  <text x="80" y="660" font-family="Inter, Arial, sans-serif" font-size="22" fill="#cbd5e1">一台 8082 仓库,踩了 3 个坑,撞了 IP 限流,最后用 5 行 cron 守门</text>
</svg>
