<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Mirror benchmark bars">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#14213d"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <text x="640" y="60" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">Pulling alpine:3.19 — 8 candidate mirrors</text>
  <text x="640" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#94a3b8">measured from the same host, 4 byte-identical bytes, real docker CLI</text>

  <!-- axes -->
  <line x1="180" y1="160" x2="180" y2="540" stroke="#475569" stroke-width="2"/>
  <line x1="180" y1="540" x2="1200" y2="540" stroke="#475569" stroke-width="2"/>

  <!-- horizontal grid lines, labels on left (seconds) -->
  <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">
    <line x1="180" y1="180" x2="1200" y2="180" stroke="#1e293b" stroke-dasharray="2 6"/>
    <text x="170" y="186" text-anchor="end">0s</text>
    <line x1="180" y1="300" x2="1200" y2="300" stroke="#1e293b" stroke-dasharray="2 6"/>
    <text x="170" y="306" text-anchor="end">10s</text>
    <line x1="180" y1="420" x2="1200" y2="420" stroke="#1e293b" stroke-dasharray="2 6"/>
    <text x="170" y="426" text-anchor="end">20s</text>
    <line x1="180" y1="510" x2="1200" y2="510" stroke="#1e293b" stroke-dasharray="2 6"/>
    <text x="170" y="516" text-anchor="end">30s+</text>
  </g>

  <!-- bars: each is label + bar. y_top = 180 + (sec / 32) * (510-180) clamped  -->
  <!-- 1) hub1.nat.tf 1.4s -> 180 + 1.4/32*330 = 194 -->
  <g>
    <text x="170" y="240" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e2e8f0">hub1.nat.tf ★</text>
    <rect x="200" y="200" width="20" height="340" fill="#22c55e"/>
    <text x="230" y="195" font-family="Inter, Arial, sans-serif" font-size="14" fill="#86efac">1.4s ✓</text>
  </g>
  <g>
    <text x="170" y="290" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e2e8f0">hub.1panel.dev</text>
    <rect x="200" y="245" width="36" height="295" fill="#38bdf8"/>
    <text x="246" y="240" font-family="Inter, Arial, sans-serif" font-size="14" fill="#7dd3fc">2.4s</text>
  </g>
  <g>
    <text x="170" y="340" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e2e8f0">docker.367231.xyz</text>
    <rect x="200" y="255" width="40" height="285" fill="#38bdf8"/>
    <text x="250" y="250" font-family="Inter, Arial, sans-serif" font-size="14" fill="#7dd3fc">2.4s</text>
  </g>
  <g>
    <text x="170" y="390" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e2e8f0">dockerproxy.cool</text>
    <rect x="200" y="258" width="40" height="282" fill="#38bdf8"/>
    <text x="250" y="253" font-family="Inter, Arial, sans-serif" font-size="14" fill="#7dd3fc">2.4s</text>
  </g>
  <g>
    <text x="170" y="440" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e2e8f0">nmqu.com</text>
    <rect x="200" y="276" width="50" height="264" fill="#fbbf24"/>
    <text x="260" y="271" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fde68a">3.0s</text>
  </g>
  <g>
    <text x="170" y="490" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e2e8f0">docker.sparkcr.cn</text>
    <rect x="200" y="354" width="320" height="186" fill="#f87171"/>
    <text x="530" y="349" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fca5a5">15.3s</text>
  </g>
  <g>
    <text x="170" y="520" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="16" fill="#e2e8f0">hub3.nat.tf</text>
    <rect x="200" y="384" width="120" height="156" fill="#fbbf24"/>
    <text x="330" y="379" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fde68a">4.3s</text>
  </g>

  <text x="640" y="610" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">★ = the one that won. numbers come from the real host, not from a marketing page.</text>
</svg>
