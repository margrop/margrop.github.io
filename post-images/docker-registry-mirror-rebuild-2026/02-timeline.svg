<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="540" viewBox="0 0 1280 540" role="img" aria-label="Three pitfall timeline">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#14213d"/>
    </linearGradient>
    <linearGradient id="r" x1="0" x2="1"><stop offset="0" stop-color="#f87171"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="o" x1="0" x2="1"><stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#22c55e"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
  </defs>
  <rect width="1280" height="540" fill="url(#bg)"/>

  <text x="640" y="60" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">The 3 mistakes I made (chronological)</text>

  <!-- timeline base -->
  <line x1="180" y1="270" x2="1100" y2="270" stroke="#475569" stroke-width="3" stroke-dasharray="6 8"/>

  <!-- pitfall 1 -->
  <g transform="translate(220, 220)">
    <circle cx="0" cy="50" r="38" fill="url(#r)"/>
    <text x="0" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#1f2937">1</text>
    <text x="0" y="-10" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#fda4af">PITFALL</text>
    <text x="0" y="135" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">switched to docker.io</text>
    <text x="0" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">+ auth → connection</text>
    <text x="0" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">refused (Meta IP blackholed)</text>
  </g>

  <!-- pitfall 2 -->
  <g transform="translate(640, 220)">
    <circle cx="0" cy="50" r="38" fill="url(#o)"/>
    <text x="0" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#1f2937">2</text>
    <text x="0" y="-10" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#fdba74">PITFALL</text>
    <text x="0" y="135" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">switched to dockerproxy.net</text>
    <text x="0" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">fast (1.5s) but every cold</text>
    <text x="0" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">pull hit 100/6h IP rate-limit</text>
  </g>

  <!-- pitfall 3 -->
  <g transform="translate(1060, 220)">
    <circle cx="0" cy="50" r="38" fill="url(#g)"/>
    <text x="0" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#1f2937">3</text>
    <text x="0" y="-10" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#86efac">FIX</text>
    <text x="0" y="135" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">hub1.nat.tf (independent</text>
    <text x="0" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">cache, not on rate-limit</text>
    <text x="0" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#cbd5e1" width="220">list) + 5-line cron watchdog</text>
  </g>

  <text x="640" y="510" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#94a3b8">each switch was driven by a real measurement on the same host, not by reputation or popularity</text>
</svg>
