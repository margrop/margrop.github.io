<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Final architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#14213d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1"><stop offset="0" stop-color="#22c55e"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <text x="640" y="55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">Final architecture — one registry, one upstream, one cron</text>

  <!-- client -->
  <g transform="translate(70, 280)">
    <rect x="0" y="0" width="160" height="100" rx="14" fill="url(#card)" stroke="#38bdf8"/>
    <text x="80" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Docker client</text>
    <text x="80" y="60" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">/etc/docker/</text>
    <text x="80" y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">daemon.json</text>
  </g>

  <!-- registry -->
  <g transform="translate(420, 220)">
    <rect x="0" y="0" width="280" height="200" rx="18" fill="url(#card)" stroke="#facc15" stroke-width="2"/>
    <text x="140" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#fde68a">registry:2 (container)</text>
    <text x="140" y="65" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#cbd5e1">proxy:</text>
    <text x="140" y="88" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#86efac">  remoteurl: hub1.nat.tf</text>
    <text x="140" y="120" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#cbd5e1">storage:</text>
    <text x="140" y="143" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#86efac">  /docker/registry-cache 9.4G</text>
    <rect x="50" y="160" width="180" height="28" rx="6" fill="url(#ok)"/>
    <text x="140" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#082f49">listens on host :8082</text>
  </g>

  <!-- upstream primary -->
  <g transform="translate(870, 130)">
    <rect x="0" y="0" width="290" height="100" rx="14" fill="url(#card)" stroke="#22c55e"/>
    <text x="145" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#86efac">PRIMARY</text>
    <text x="145" y="58" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" fill="#cbd5e1">hub1.nat.tf</text>
    <text x="145" y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">independent cache · ~1.4s</text>
  </g>

  <!-- upstream fallback -->
  <g transform="translate(870, 380)">
    <rect x="0" y="0" width="290" height="100" rx="14" fill="url(#card)" stroke="#fb923c"/>
    <text x="145" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#fdba74">FALLBACK</text>
    <text x="145" y="58" text-anchor="middle" font-family="ui-monospace, monospace" font-size="15" fill="#cbd5e1">docker.sparkcr.cn</text>
    <text x="145" y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">slower but never rate-limited</text>
  </g>

  <!-- cron watchdog -->
  <g transform="translate(420, 480)">
    <rect x="0" y="0" width="280" height="90" rx="14" fill="url(#card)" stroke="#a78bfa"/>
    <text x="140" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#c4b5fd">cron — daily 08:00</text>
    <text x="140" y="58" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#cbd5e1">/usr/local/bin/registry-fallback.sh</text>
    <text x="140" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#94a3b8">tests primary → switches if down</text>
  </g>

  <!-- arrows -->
  <g stroke="#38bdf8" stroke-width="3" fill="#38bdf8">
    <path d="M230 330 L420 290" />
    <polygon points="420,290 402,283 404,300" />
    <text x="305" y="282" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">pull</text>
  </g>
  <g stroke="#22c55e" stroke-width="3" fill="#22c55e">
    <path d="M700 250 L870 180" />
    <polygon points="870,180 852,177 858,194" />
    <text x="755" y="200" font-family="Inter, Arial, sans-serif" font-size="13" fill="#86efac">upstream</text>
  </g>
  <g stroke="#fb923c" stroke-width="3" fill="#fb923c" stroke-dasharray="6 6">
    <path d="M700 350 L870 420" />
    <polygon points="870,420 853,410 855,427" />
    <text x="755" y="412" font-family="Inter, Arial, sans-serif" font-size="13" fill="#fdba74">emergency</text>
  </g>
  <g stroke="#a78bfa" stroke-width="3" fill="#a78bfa" stroke-dasharray="4 6">
    <path d="M560 480 L560 420" />
    <polygon points="560,420 552,436 568,436" />
    <text x="572" y="455" font-family="Inter, Arial, sans-serif" font-size="12" fill="#c4b5fd">if fail</text>
  </g>
</svg>
