<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Fallback script code card">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#14213d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <text x="640" y="55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">5-line cron watchdog (full source below)</text>

  <g filter="url(#shadow)">
    <rect x="120" y="100" width="1040" height="540" rx="18" fill="#0f172a" stroke="#1e293b"/>
    <circle cx="155" cy="135" r="8" fill="#ef4444"/>
    <circle cx="183" cy="135" r="8" fill="#f59e0b"/>
    <circle cx="211" cy="135" r="8" fill="#22c55e"/>
    <text x="140" y="195" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#94a3b8">#!/bin/bash</text>
    <text x="140" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#94a3b8">PRIMARY="hub1.nat.tf"; FALLBACK="docker.sparkcr.cn"</text>
    <text x="140" y="255" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#94a3b8">CONFIG="/docker/registry-dockerhub/config.yml"</text>
    <text x="140" y="295" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#86efac">if timeout 60 docker pull --quiet $PRIMARY/library/alpine:3.19 &gt;/dev/null; then</text>
    <text x="160" y="325" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#cbd5e1">[ "$CURRENT" = "https://$PRIMARY" ] || switch_to "$PRIMARY" "primary back"</text>
    <text x="140" y="355" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#86efac">else</text>
    <text x="160" y="385" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#fca5a5">switch_to "$FALLBACK" "primary $PRIMARY is down"</text>
    <text x="140" y="415" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#86efac">fi</text>
    <text x="140" y="475" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#94a3b8"># crontab -e</text>
    <text x="140" y="505" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#fde68a">0 8 * * * /usr/local/bin/registry-fallback.sh &gt;&gt; /var/log/registry-fallback/cron.log 2&gt;&amp;1</text>
    <text x="140" y="565" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#94a3b8"># verified: simulated "primary down" → script auto-fell-back, then switched back.</text>
    <text x="140" y="595" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#94a3b8"># log line: [2026-06-13 06:56:02] 切换 upstream: -&gt; hub1.nat.tf (原因: primary 恢复, 从 fallback 切回)</text>
  </g>

  <text x="640" y="685" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">swap &amp; restart is the only side-effect. blob cache (9.4G, sha256-addressed) is preserved on every switch.</text>
</svg>
