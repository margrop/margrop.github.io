<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Why 100/6h rate limit hits you">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#14213d"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <text x="640" y="55" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">What "100 pulls / 6h / IP" actually looks like</text>

  <!-- the IP you share with others -->
  <g transform="translate(180, 130)">
    <rect x="0" y="0" width="430" height="430" rx="20" fill="#0f172a" stroke="#f87171" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#fca5a5">your public IPv4</text>
    <text x="215" y="68" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#cbd5e1">203.0.113.42  (shared)</text>

    <!-- people -->
    <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#e2e8f0">
      <circle cx="100" cy="130" r="34" fill="#1e293b" stroke="#fbbf24"/>
      <text x="100" y="135" text-anchor="middle">colleague A</text>
      <text x="100" y="180" text-anchor="middle" font-size="11" fill="#94a3b8">60 pulls</text>

      <circle cx="320" cy="130" r="34" fill="#1e293b" stroke="#fbbf24"/>
      <text x="320" y="135" text-anchor="middle">CI runner</text>
      <text x="320" y="180" text-anchor="middle" font-size="11" fill="#94a3b8">35 pulls</text>

      <circle cx="100" cy="260" r="34" fill="#1e293b" stroke="#fbbf24"/>
      <text x="100" y="265" text-anchor="middle">shared</text>
      <text x="100" y="280" text-anchor="middle">NAT phone</text>
      <text x="100" y="310" text-anchor="middle" font-size="11" fill="#94a3b8">5 pulls</text>

      <circle cx="320" cy="260" r="34" fill="#1e293b" stroke="#f87171" stroke-width="2"/>
      <text x="320" y="265" text-anchor="middle" font-weight="700">YOU</text>
      <text x="320" y="310" text-anchor="middle" font-size="11" fill="#fca5a5">0/100 left</text>
    </g>

    <text x="215" y="385" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#cbd5e1">all four share one 100-pull bucket</text>
    <text x="215" y="408" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">by the time your `docker pull` runs,</text>
    <text x="215" y="425" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">you're getting 429 from Docker Hub</text>
  </g>

  <!-- the upstream chain -->
  <g transform="translate(720, 130)">
    <rect x="0" y="0" width="430" height="430" rx="20" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#7dd3fc">anatomy of "fast but rate-limited"</text>

    <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#cbd5e1">
      <rect x="40" y="80" width="350" height="44" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="60" y="107">docker daemon</text>
      <text x="330" y="107" text-anchor="end" fill="#86efac">$HOST:8082</text>

      <rect x="40" y="150" width="350" height="44" rx="6" fill="#1e293b" stroke="#334155"/>
      <text x="60" y="177">dockerproxy.net  (transparent proxy)</text>

      <rect x="40" y="220" width="350" height="44" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="2"/>
      <text x="60" y="247">registry-1.docker.io</text>
      <text x="330" y="247" text-anchor="end" fill="#fca5a5">IP rate-limited</text>

      <text x="215" y="305" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">Docker Hub sees YOUR public IP,</text>
      <text x="215" y="324" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">not dockerproxy.net's IP.</text>
    </g>

    <g font-family="Inter, Arial, sans-serif" font-size="13">
      <rect x="40" y="350" width="350" height="60" rx="8" fill="#7f1d1d" opacity="0.5"/>
      <text x="215" y="376" text-anchor="middle" font-weight="700" fill="#fecaca">"You have reached your unauthenticated</text>
      <text x="215" y="395" text-anchor="middle" font-weight="700" fill="#fecaca">pull rate limit" → 429 → 404 to you</text>
    </g>
  </g>
</svg>
