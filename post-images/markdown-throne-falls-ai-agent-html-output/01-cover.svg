<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Markdown vs HTML Cover">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="md_accent" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="html_accent" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Technical Grid -->
  <g opacity="0.07" stroke="#38bdf8" stroke-width="1">
    <path d="M0 80h1280M0 160h1280M0 240h1280M0 320h1280M0 400h1280M0 480h1280M0 560h1280M0 640h1280"/>
    <path d="M160 0v720M320 0v720M480 0v720M640 0v720M800 0v720M960 0v720M1120 0v720"/>
  </g>
  
  <!-- Markdown Panel (Left) -->
  <g filter="url(#glow)">
    <rect x="120" y="160" width="440" height="340" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="120" y="160" width="440" height="50" rx="16" fill="#0f172a" opacity="0.6"/>
    <!-- MD Logo representation / Icon -->
    <rect x="140" y="172" width="26" height="26" rx="4" fill="#38bdf8"/>
    <text x="146" y="191" font-family="monospace" font-weight="900" font-size="16" fill="#0f172a">M↓</text>
    <text x="180" y="195" font-family="sans-serif" font-weight="700" font-size="16" fill="#94a3b8">Markdown Output</text>
    
    <!-- Code mockup -->
    <text x="150" y="250" font-family="monospace" font-size="16" fill="#38bdf8"># System Report</text>
    <text x="150" y="290" font-family="monospace" font-size="16" fill="#e2e8f0">- CPU Load: **87%**</text>
    <text x="150" y="320" font-family="monospace" font-size="16" fill="#e2e8f0">- Memory: **92%**</text>
    <text x="150" y="360" font-family="monospace" font-size="16" fill="#64748b">| Service | Status |</text>
    <text x="150" y="385" font-family="monospace" font-size="16" fill="#64748b">|---------|--------|</text>
    <text x="150" y="410" font-family="monospace" font-size="16" fill="#64748b">| API     | OK     |</text>
    
    <text x="150" y="465" font-family="sans-serif" font-size="14" fill="#64748b">Token Friendly | Lightweight | Static Text</text>
  </g>

  <!-- VS (Center) -->
  <circle cx="640" cy="330" r="40" fill="#0f172a" stroke="#334155" stroke-width="3"/>
  <text x="626" y="340" font-family="sans-serif" font-weight="800" font-size="28" fill="#e2e8f0">VS</text>

  <!-- HTML Panel (Right) -->
  <g filter="url(#glow)">
    <rect x="720" y="160" width="440" height="340" rx="16" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <rect x="720" y="160" width="440" height="50" rx="16" fill="#0f172a" opacity="0.6"/>
    <!-- HTML Logo representation / Icon -->
    <rect x="740" y="172" width="26" height="26" rx="4" fill="#f43f5e"/>
    <text x="744" y="191" font-family="monospace" font-weight="900" font-size="15" fill="#ffffff">&lt;&gt;</text>
    <text x="780" y="195" font-family="sans-serif" font-weight="700" font-size="16" fill="#94a3b8">HTML &amp; Agentic UI</text>
    
    <!-- Rendered Preview UI mockup -->
    <rect x="750" y="230" width="380" height="210" rx="8" fill="#0f172a" stroke="#1e293b"/>
    <text x="770" y="270" font-family="sans-serif" font-weight="700" font-size="18" fill="#f8fafc">System Dashboard</text>
    
    <!-- Visual Progress bar -->
    <text x="770" y="310" font-family="sans-serif" font-size="14" fill="#94a3b8">CPU Load (87%)</text>
    <rect x="770" y="322" width="340" height="12" rx="6" fill="#334155"/>
    <rect x="770" y="322" width="295" height="12" rx="6" fill="#f43f5e"/>
    
    <!-- Interactive Button -->
    <rect x="770" y="365" width="130" height="36" rx="6" fill="#10b981"/>
    <text x="795" y="388" font-family="sans-serif" font-weight="700" font-size="14" fill="#ffffff">One-click Fix</text>
    
    <!-- Real-time Chart indicator -->
    <path d="M960 395 l10 -15 l15 20 l20 -30 l20 10" fill="none" stroke="#60a5fa" stroke-width="3"/>
    
    <text x="750" y="475" font-family="sans-serif" font-size="14" fill="#64748b">Rich Media | Interactive | Adaptive Cards</text>
  </g>

  <!-- Title Bottom -->
  <text x="640" y="585" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="38" fill="#f8fafc">Markdown 王座崩塌：AI Agent 输出的静默革命</text>
  <text x="640" y="635" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">The Shift from Plain Text to Rich, Interactive Agentic Interfaces</text>
</svg>