<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Hybrid Agentic UI Architecture">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <text x="640" y="70" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="36" fill="#f8fafc">AI Agent 与人类协同的混合 UI 架构 (Hybrid Architecture)</text>
  <text x="640" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#94a3b8">兼顾 Token 效率、机器解析精度与人类交互体验的闭环设计</text>

  <!-- Agent Layer -->
  <rect x="80" y="240" width="220" height="180" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="190" y="290" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="20" fill="#f1f5f9">AI Agent</text>
  <text x="190" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#38bdf8">1. 思考与决策</text>
  <text x="190" y="350" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">输出 Markdown / JSON</text>
  <text x="190" y="375" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">保证 Token 效率与逻辑严密</text>

  <!-- Arrow 1 -->
  <path d="M300 330 L360 330" fill="none" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  
  <!-- Parser Layer -->
  <rect x="370" y="240" width="220" height="180" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="480" y="290" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="20" fill="#f1f5f9">UI 解析渲染层</text>
  <text x="480" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#38bdf8">2. 结构化解构</text>
  <text x="480" y="350" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">模板匹配 / 转换组件</text>
  <text x="480" y="375" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">将文本骨架还原为 UI 结构</text>

  <!-- Arrow 2 -->
  <path d="M590 330 L650 330" fill="none" stroke="#f43f5e" stroke-width="4"/>

  <!-- Sanitizer Layer -->
  <rect x="660" y="240" width="220" height="180" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="770" y="290" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="20" fill="#f1f5f9">安全过滤 (Sanitizer)</text>
  <text x="770" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ef4444">3. 安全边界防护</text>
  <text x="770" y="350" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">过滤 Script、事件绑定</text>
  <text x="770" y="375" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">防范提示词注入与恶意执行</text>

  <!-- Arrow 3 -->
  <path d="M880 330 L940 330" fill="none" stroke="#10b981" stroke-width="4"/>

  <!-- Sandbox UI Layer -->
  <rect x="950" y="240" width="250" height="180" rx="12" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="1075" y="290" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="20" fill="#f1f5f9">人类协同工作区</text>
  <text x="1075" y="325" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#10b981">4. 动态交互呈现</text>
  <text x="1075" y="350" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">沙箱组件 / 双向动作触达</text>
  <text x="1075" y="375" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a7f3d0">用户点击“运行”或“一键修复”</text>
  
  <!-- Marker defs -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>
  
  <!-- Feedback loop back to Agent -->
  <path d="M1075 420 L1075 540 L190 540 L190 420" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="632" y="525" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#10b981">交互反馈环 (Feedback loop) — 用户点击按钮触发 Agent 的下一步 Tool Call 动作</text>
</svg>