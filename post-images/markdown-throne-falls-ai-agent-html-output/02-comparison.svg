<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Markdown vs HTML Comparison">
  <rect width="1280" height="720" fill="#0f172a"/>
  
  <text x="640" y="70" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="36" fill="#f8fafc">Markdown vs HTML：核心特性 Side-by-Side 对决</text>
  <text x="640" y="110" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#94a3b8">在 AI Agent 生成与交付场景下的多维度技术指标对比</text>
  
  <!-- Table Header -->
  <rect x="100" y="160" width="1080" height="60" rx="8" fill="#1e293b"/>
  <text x="140" y="198" font-family="sans-serif" font-weight="700" font-size="20" fill="#f1f5f9">技术维度 (Dimension)</text>
  <text x="500" y="198" font-family="sans-serif" font-weight="700" font-size="20" fill="#38bdf8">Markdown</text>
  <text x="880" y="198" font-family="sans-serif" font-weight="700" font-size="20" fill="#f43f5e">HTML &amp; Agentic UI</text>
  
  <!-- Row 1: Token Cost -->
  <line x1="100" y1="290" x2="1180" y2="290" stroke="#334155" stroke-width="1"/>
  <text x="140" y="265" font-family="sans-serif" font-weight="700" font-size="18" fill="#f1f5f9">Token 消耗与成本</text>
  <text x="500" y="255" font-family="sans-serif" font-size="16" fill="#cbd5e1">● 极低 (节省约 68% - 87% token)</text>
  <text x="500" y="278" font-family="sans-serif" font-size="14" fill="#64748b">简洁的纯文本标志，无闭合标签噪声</text>
  <text x="880" y="255" font-family="sans-serif" font-size="16" fill="#cbd5e1">■ 较高 (体积膨胀 3 - 5 倍)</text>
  <text x="880" y="278" font-family="sans-serif" font-size="14" fill="#64748b">包含大量嵌套标签、属性及样式类名</text>

  <!-- Row 2: Expressiveness -->
  <line x1="100" y1="400" x2="1180" y2="400" stroke="#334155" stroke-width="1"/>
  <text x="140" y="375" font-family="sans-serif" font-weight="700" font-size="18" fill="#f1f5f9">可视化与表现力</text>
  <text x="500" y="365" font-family="sans-serif" font-size="16" fill="#cbd5e1">● 极弱 (仅支持基础排版)</text>
  <text x="500" y="388" font-family="sans-serif" font-size="14" fill="#64748b">无页面布局、无动画、图表极度受限</text>
  <text x="880" y="365" font-family="sans-serif" font-size="16" fill="#cbd5e1">■ 降维打击 (支持一切 Web 特性)</text>
  <text x="880" y="388" font-family="sans-serif" font-size="14" fill="#64748b">支持布局、CSS动画、内联SVG与JS交互</text>

  <!-- Row 3: Interactivity -->
  <line x1="100" y1="510" x2="1180" y2="510" stroke="#334155" stroke-width="1"/>
  <text x="140" y="485" font-family="sans-serif" font-weight="700" font-size="18" fill="#f1f5f9">人机交互深度</text>
  <text x="500" y="475" font-family="sans-serif" font-size="16" fill="#cbd5e1">● 单向展示 (只能读不能动)</text>
  <text x="500" y="498" font-family="sans-serif" font-size="14" fill="#64748b">用户无法在输出上做任何反馈交互</text>
  <text x="880" y="475" font-family="sans-serif" font-size="16" fill="#cbd5e1">■ 双向协同 (支持状态与按钮反馈)</text>
  <text x="880" y="498" font-family="sans-serif" font-size="14" fill="#64748b">点击触发 Agent 工具、动态修改与校验</text>

  <!-- Row 4: Security -->
  <line x1="100" y1="620" x2="1180" y2="620" stroke="#334155" stroke-width="1"/>
  <text x="140" y="595" font-family="sans-serif" font-weight="700" font-size="18" fill="#f1f5f9">安全性与沙箱隔离</text>
  <text x="500" y="585" font-family="sans-serif" font-size="16" fill="#10b981">● 天然安全 (Static Only)</text>
  <text x="500" y="608" font-family="sans-serif" font-size="14" fill="#64748b">无动态执行风险，无脚本执行边界问题</text>
  <text x="880" y="585" font-family="sans-serif" font-size="16" fill="#ef4444">■ 风险极高 (需要严苛沙箱与过滤)</text>
  <text x="880" y="608" font-family="sans-serif" font-size="14" fill="#64748b">容易被利用 XSS 注入，必须 iframe / CSP 保护</text>
</svg>