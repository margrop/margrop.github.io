<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f8fafc"/><text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Fix decision tree</text><g font-family="Arial, sans-serif"><rect x="430" y="135" width="340" height="85" rx="8" fill="#ffffff" stroke="#64748b"/><text x="505" y="185" font-size="22" font-weight="700" fill="#1f2937">Do you need this MCP server?</text><path d="M515 225 L310 315" stroke="#64748b" stroke-width="4"/><path d="M685 225 L895 315" stroke="#64748b" stroke-width="4"/><rect x="110" y="320" width="360" height="95" rx="8" fill="#ecfdf5" stroke="#2ca66f"/><text x="165" y="360" font-size="22" font-weight="700" fill="#166534">No / not now</text><text x="150" y="392" font-size="18" fill="#166534">Disable optional plugin temporarily</text><rect x="730" y="320" width="360" height="95" rx="8" fill="#fff7ed" stroke="#e27a2d"/><text x="805" y="360" font-size="22" font-weight="700" fill="#9a4a12">Yes</text><text x="770" y="392" font-size="18" fill="#9a4a12">Update plugin or use compatible build</text><path d="M910 420 V485" stroke="#64748b" stroke-width="4"/><rect x="730" y="490" width="360" height="95" rx="8" fill="#fff1f2" stroke="#d34c45"/><text x="782" y="530" font-size="22" font-weight="700" fill="#9f2b25">Still failing?</text><text x="758" y="562" font-size="18" fill="#9f2b25">Upgrade OS only when tradeoff is clear</text><rect x="110" y="490" width="430" height="95" rx="8" fill="#ffffff" stroke="#64748b"/><text x="150" y="530" font-size="22" font-weight="700" fill="#1f2937">Always verify</text><text x="150" y="562" font-size="18" fill="#4b5563">Run server binary directly, then refresh MCP tools</text></g></svg>