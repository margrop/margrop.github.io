<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f7f8fb"/><text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#18202f">MCP startup failure: follow the layers</text><text x="70" y="112" font-family="Arial, sans-serif" font-size="18" fill="#596273">The visible error may be several layers above the real cause.</text><g font-family="Arial, sans-serif"><rect x="80" y="170" width="210" height="110" rx="8" fill="#ffffff" stroke="#9aa6b2"/><text x="118" y="220" font-size="24" font-weight="700" fill="#263247">Agent Client</text><text x="118" y="252" font-size="16" fill="#596273">reports handshake failure</text><rect x="360" y="170" width="210" height="110" rx="8" fill="#ffffff" stroke="#9aa6b2"/><text x="405" y="220" font-size="24" font-weight="700" fill="#263247">MCP Transport</text><text x="399" y="252" font-size="16" fill="#596273">connection closes early</text><rect x="640" y="170" width="210" height="110" rx="8" fill="#ffffff" stroke="#9aa6b2"/><text x="686" y="220" font-size="24" font-weight="700" fill="#263247">MCP Server</text><text x="682" y="252" font-size="16" fill="#596273">process exits at launch</text><rect x="920" y="170" width="210" height="110" rx="8" fill="#fff2f0" stroke="#df6b5f"/><text x="965" y="220" font-size="24" font-weight="700" fill="#9e2f25">OS Runtime</text><text x="954" y="252" font-size="16" fill="#9e2f25">dyld symbol not found</text><path d="M300 225 H350" stroke="#697386" stroke-width="4"/><path d="M580 225 H630" stroke="#697386" stroke-width="4"/><path d="M860 225 H910" stroke="#df6b5f" stroke-width="4"/><rect x="120" y="365" width="960" height="170" rx="8" fill="#18202f"/><text x="160" y="420" font-size="24" font-weight="700" fill="#ffffff">Key idea</text><text x="160" y="465" font-size="22" fill="#e9eef5">A client-side MCP message is a symptom. Server stderr and manual reproduction identify the failing layer.</text><text x="160" y="506" font-size="22" fill="#e9eef5">In this case, the process never reached MCP initialize; the dynamic linker stopped it first.</text></g></svg>