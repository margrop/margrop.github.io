<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f5f7fa"/><text x="70" y="76" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Root cause chain</text><g font-family="Arial, sans-serif" font-size="20"><rect x="90" y="150" width="1010" height="80" rx="8" fill="#ffffff" stroke="#a3adba"/><text x="130" y="200" fill="#1f2937">Native MCP server binary built with a newer SDK / toolchain</text><rect x="150" y="270" width="890" height="80" rx="8" fill="#ffffff" stroke="#a3adba"/><text x="190" y="320" fill="#1f2937">Binary references a Swift Concurrency runtime symbol</text><rect x="210" y="390" width="770" height="80" rx="8" fill="#fff1f2" stroke="#e25a55"/><text x="250" y="440" fill="#9f2b25">Current system runtime does not provide that symbol</text><rect x="270" y="510" width="650" height="80" rx="8" fill="#1f2937"/><text x="315" y="560" fill="#ffffff">dyld terminates server before MCP initialize</text><path d="M595 235 V265" stroke="#667085" stroke-width="4"/><path d="M595 355 V385" stroke="#667085" stroke-width="4"/><path d="M595 475 V505" stroke="#e25a55" stroke-width="4"/></g></svg>