<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .sub   { font-size: 14px; fill: #475569; }
      .box   { fill: #ffffff; stroke: #0ea5e9; stroke-width: 1.6; }
      .box-r { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.8; }
      .box-g { fill: #ecfdf5; stroke: #059669; stroke-width: 1.8; }
      .lbl   { font-size: 16px; font-weight: 600; fill: #0f172a; }
      .body  { font-size: 13px; fill: #334155; }
      .arrow { stroke: #0ea5e9; stroke-width: 2.2; fill: none; stroke-linecap: round; }
      .arrow-r { stroke: #e11d48; stroke-width: 2.2; fill: none; stroke-linecap: round; }
      .arrow-g { stroke: #059669; stroke-width: 2.2; fill: none; stroke-linecap: round; }
      .note  { font-size: 12px; fill: #64748b; font-style: italic; }
    </style>
  </defs>

  <rect width="1000" height="560" fill="url(#bg2)"/>
  <text x="500" y="42" text-anchor="middle" class="title">脚本里的"改前 / 改后"双重校验</text>
  <text x="500" y="64" text-anchor="middle" class="sub">一个动作走两遍 synouser --get，不一致就退出。失败的命令不会留下"看起来改了但其实没改"的脏数据。</text>

  <!-- Step 1 -->
  <g transform="translate(40, 100)">
    <rect class="box" x="0" y="0" width="220" height="90" rx="10"/>
    <text x="110" y="32" text-anchor="middle" class="lbl">① 查 before</text>
    <text x="110" y="58" text-anchor="middle" class="body">synouser --get mykid1</text>
    <text x="110" y="78" text-anchor="middle" class="note">记下 expired = true / false</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(390, 100)">
    <rect class="box" x="0" y="0" width="220" height="90" rx="10"/>
    <text x="110" y="32" text-anchor="middle" class="lbl">② 改 expired</text>
    <text x="110" y="58" text-anchor="middle" class="body">synouser --modify mykid1 "" 1 ""</text>
    <text x="110" y="78" text-anchor="middle" class="note">0 = 启用，1 = 停用</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(740, 100)">
    <rect class="box" x="0" y="0" width="220" height="90" rx="10"/>
    <text x="110" y="32" text-anchor="middle" class="lbl">③ 查 after</text>
    <text x="110" y="58" text-anchor="middle" class="body">synouser --get mykid1</text>
    <text x="110" y="78" text-anchor="middle" class="note">必须变成期望的状态</text>
  </g>

  <!-- arrows -->
  <path class="arrow" d="M260 145 L 380 145"/>
  <polygon points="380,145 372,141 372,149" fill="#0ea5e9"/>
  <path class="arrow" d="M610 145 L 730 145"/>
  <polygon points="730,145 722,141 722,149" fill="#0ea5e9"/>

  <!-- Decision diamond -->
  <g transform="translate(500, 280)">
    <polygon points="0,-50 110,0 0,50 -110,0" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
    <text y="-6" text-anchor="middle" class="lbl">after 跟</text>
    <text y="14" text-anchor="middle" class="lbl">期望一致？</text>
  </g>
  <path class="arrow" d="M850 145 Q 870 200 600 240"/>
  <polygon points="600,240 608,236 608,244" fill="#0ea5e9"/>

  <!-- OK path -->
  <g transform="translate(160, 380)">
    <rect class="box-g" x="0" y="0" width="240" height="80" rx="10"/>
    <text x="120" y="32" text-anchor="middle" class="lbl" fill="#065f46">✓ 一致 → 继续下一个用户</text>
    <text x="120" y="56" text-anchor="middle" class="body">所有用户都校验通过</text>
    <text x="120" y="74" text-anchor="middle" class="note">在日志里写 DONE</text>
  </g>
  <path class="arrow-g" d="M420 305 Q 380 360 300 380"/>
  <polygon points="300,380 308,376 308,384" fill="#059669"/>
  <text x="370" y="332" class="lbl" fill="#065f46">是</text>

  <!-- Fail path -->
  <g transform="translate(600, 380)">
    <rect class="box-r" x="0" y="0" width="260" height="80" rx="10"/>
    <text x="130" y="32" text-anchor="middle" class="lbl" fill="#9f1239">✗ 不一致 → 立刻 exit 1</text>
    <text x="130" y="56" text-anchor="middle" class="body">脚本非 0 退出 → launchd 记 ERR</text>
    <text x="130" y="74" text-anchor="middle" class="note">家长 / 日志能马上发现</text>
  </g>
  <path class="arrow-r" d="M580 305 Q 620 360 700 380"/>
  <polygon points="700,380 692,376 692,384" fill="#e11d48"/>
  <text x="620" y="332" class="lbl" fill="#9f1239">否</text>

  <!-- caption -->
  <text x="500" y="510" text-anchor="middle" class="note">设计原则：先查询，后修改；改完再查；任何一步对不上号，宁可什么都不做，也别假装做了。</text>
  <text x="500" y="535" text-anchor="middle" class="note">这句话在 Synology CLI 官方指南和很多运维书里反复出现，但它不是口号，是脚本里真实存在的几行 if。</text>
</svg>
