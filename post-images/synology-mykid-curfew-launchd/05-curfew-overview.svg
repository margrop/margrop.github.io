<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef9c3"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>
    <style>
      .title { font-size: 28px; font-weight: 700; fill: #1f2937; }
      .sub   { font-size: 15px; fill: #4b5563; }
      .lbl   { font-size: 16px; font-weight: 600; fill: #1f2937; }
      .body  { font-size: 14px; fill: #374151; }
      .pill  { fill: #fff; stroke: #d97706; stroke-width: 1.6; }
      .time  { fill: #b45309; }
      .arrow { stroke: #b45309; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .head  { fill: #fde68a; stroke: #92400e; stroke-width: 1.8; }
      .note  { font-size: 13px; fill: #6b7280; font-style: italic; }
    </style>
  </defs>

  <rect width="1000" height="720" fill="url(#bg)"/>
  <text x="500" y="46" text-anchor="middle" class="title">晚 10 点准时"断网"，早 8 点自动"复电"</text>
  <text x="500" y="70" text-anchor="middle" class="sub">用 launchd 把群晖的"门禁"做成一盏每天准时的开关灯</text>

  <!-- Day strip -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="880" height="58" rx="10" fill="#fff" stroke="#d97706" stroke-width="1.4"/>
    <!-- tick marks for 24h -->
    <g stroke="#fbbf24" stroke-width="1">
      <line x1="0"   y1="58" x2="0"   y2="63"/>
      <line x1="73"  y1="58" x2="73"  y2="63"/>
      <line x1="147" y1="58" x2="147" y2="63"/>
      <line x1="220" y1="58" x2="220" y2="63"/>
      <line x1="293" y1="58" x2="293" y2="63"/>
      <line x1="367" y1="58" x2="367" y2="63"/>
      <line x1="440" y1="58" x2="440" y2="63"/>
      <line x1="513" y1="58" x2="513" y2="63"/>
      <line x1="587" y1="58" x2="587" y2="63"/>
      <line x1="660" y1="58" x2="660" y2="63"/>
      <line x1="733" y1="58" x2="733" y2="63"/>
      <line x1="807" y1="58" x2="807" y2="63"/>
      <line x1="880" y1="58" x2="880" y2="63"/>
    </g>
    <text x="0"   y="76" class="body" text-anchor="middle">00</text>
    <text x="220" y="76" class="body" text-anchor="middle">06</text>
    <text x="440" y="76" class="body" text-anchor="middle">12</text>
    <text x="660" y="76" class="body" text-anchor="middle">18</text>
    <text x="880" y="76" class="body" text-anchor="middle">24</text>
    <text x="293" y="35" class="lbl" text-anchor="middle" fill="#059669">8:00 起床 → 启用账号</text>
    <text x="807" y="35" class="lbl" text-anchor="middle" fill="#b91c1c">22:00 熄灯 → 停用账号</text>
  </g>

  <!-- Center: kid with NAS -->
  <g transform="translate(500, 280)">
    <circle r="60" fill="#fde68a" stroke="#92400e" stroke-width="2"/>
    <text y="8" text-anchor="middle" font-size="48">🙇</text>
  </g>
  <g transform="translate(280, 270)">
    <rect x="-70" y="-50" width="140" height="110" rx="8" fill="#1f2937" stroke="#0b1220" stroke-width="2"/>
    <rect x="-58" y="-38" width="116" height="14" rx="2" fill="#10b981"/>
    <text x="0" y="-28" text-anchor="middle" font-size="10" fill="#064e3b" font-weight="700">SYNOLOGY NAS</text>
    <g fill="#0f172a">
      <circle cx="-40" cy="20" r="3"/><circle cx="-20" cy="20" r="3"/><circle cx="0" cy="20" r="3"/><circle cx="20" cy="20" r="3"/><circle cx="40" cy="20" r="3"/>
    </g>
    <text y="46" text-anchor="middle" font-size="11" fill="#facc15">mykid1</text>
    <text y="58" text-anchor="middle" font-size="11" fill="#facc15">mykid2</text>
  </g>
  <g transform="translate(720, 270)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#fff" stroke="#374151" stroke-width="1.6"/>
    <text y="-15" text-anchor="middle" font-size="11" fill="#374151" font-weight="600">Mac (launchd)</text>
    <text y="0"  text-anchor="middle" font-size="10" fill="#6b7280">toggle-mykid.sh</text>
    <text y="16" text-anchor="middle" font-size="10" fill="#6b7280">StartCalendarInterval</text>
    <text y="32" text-anchor="middle" font-size="10" fill="#6b7280">SSH root@nas</text>
  </g>

  <!-- arrows -->
  <path class="arrow" d="M340 250 Q 410 230 460 250"/>
  <polygon points="460,250 452,246 452,254" fill="#b45309"/>
  <path class="arrow" d="M540 250 Q 600 230 660 250"/>
  <polygon points="660,250 652,246 652,254" fill="#b45309"/>

  <!-- bottom: 3 stages -->
  <g transform="translate(60, 420)">
    <!-- Stage 1 -->
    <g>
      <rect class="head" x="0" y="0" width="280" height="80" rx="10"/>
      <text x="140" y="28" text-anchor="middle" class="lbl">① 0:00 → 8:00  （夜间）</text>
      <text x="140" y="50" text-anchor="middle" class="body">两个账号 expired = true</text>
      <text x="140" y="68" text-anchor="middle" class="body">孩子登录不上 NAS</text>
    </g>
    <g transform="translate(300, 0)">
      <rect class="head" x="0" y="0" width="280" height="80" rx="10"/>
      <text x="140" y="28" text-anchor="middle" class="lbl">② 8:00 准时  启用</text>
      <text x="140" y="50" text-anchor="middle" class="body" fill="#059669">synouser --modify mykid1 0</text>
      <text x="140" y="68" text-anchor="middle" class="body" fill="#059669">synouser --modify mykid2 0</text>
    </g>
    <g transform="translate(600, 0)">
      <rect class="head" x="0" y="0" width="280" height="80" rx="10"/>
      <text x="140" y="28" text-anchor="middle" class="lbl">③ 22:00 准时  停用</text>
      <text x="140" y="50" text-anchor="middle" class="body" fill="#b91c1c">synouser --modify mykid1 1</text>
      <text x="140" y="68" text-anchor="middle" class="body" fill="#b91c1c">synouser --modify mykid2 1</text>
    </g>
  </g>

  <!-- bottom note -->
  <g transform="translate(60, 550)">
    <rect x="0" y="0" width="880" height="130" rx="10" fill="#fff" stroke="#92400e" stroke-width="1.4"/>
    <text x="20" y="30" class="lbl">为什么这套方案值得讲？</text>
    <text x="20" y="58" class="body">• 不靠意志力，也不靠家长手动到 DSM 控制台点停用</text>
    <text x="20" y="80" class="body">• 脚本自带"改前/改后两次 synouser --get 校验"，命令失败立刻退出，不静默带病</text>
    <text x="20" y="102" class="body">• launchd 唤醒后会自动补跑被错过的任务；比 cron 更适合笔记本</text>
    <text x="20" y="120" class="note">一句话总结：把"该睡觉了"这件事，从家长嘴里的话，搬到 Mac 的 LaunchAgent 里。</text>
  </g>
</svg>
