<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/></linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ar4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
  </defs>
  <rect width="880" height="540" fill="url(#bg4)"/>
  <text x="440" y="44" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Siyuan Docker 部署架构</text>
  <text x="440" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">Portainer Stack → 容器 → 数据卷 · entrypoint.sh 调用 kernel</text>

  <!-- Host boundary -->
  <rect x="30" y="92" width="820" height="210" rx="14" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="114" fill="#64748b" font-size="12">🖥️ Docker 宿主机</text>

  <!-- Portainer -->
  <rect x="60" y="130" width="210" height="78" rx="10" fill="#1e3a8a" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh4)"/>
  <text x="165" y="158" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">Portainer CE</text>
  <text x="165" y="178" text-anchor="middle" fill="#cbd5e1" font-size="11">Stack 管理 / 编辑器</text>
  <text x="165" y="196" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">/docker/portainer_data</text>

  <!-- Siyuan container -->
  <rect x="335" y="130" width="210" height="78" rx="10" fill="#14532d" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5" filter="url(#sh4)"/>
  <text x="440" y="158" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">📦 siyuan-qiniu</text>
  <text x="440" y="178" text-anchor="middle" fill="#cbd5e1" font-size="11">b3log/siyuan:v3.7.0</text>
  <text x="440" y="196" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">entrypoint.sh → serve</text>

  <!-- Volume -->
  <rect x="610" y="130" width="210" height="78" rx="10" fill="#78350f" fill-opacity="0.3" stroke="#fbbf24" stroke-width="1.5" filter="url(#sh4)"/>
  <text x="715" y="158" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">💾 数据卷</text>
  <text x="715" y="178" text-anchor="middle" fill="#cbd5e1" font-size="11">/docker/siyuan_data</text>
  <text x="715" y="196" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">PUID=1001 · PGID=1002</text>

  <line x1="270" y1="169" x2="335" y2="169" stroke="#64748b" stroke-width="2" marker-end="url(#ar4)"/>
  <line x1="545" y1="169" x2="610" y2="169" stroke="#64748b" stroke-width="2" marker-end="url(#ar4)"/>

  <!-- Network bar -->
  <rect x="60" y="232" width="760" height="52" rx="10" fill="#0a0e1a" stroke="#334155" filter="url(#sh4)"/>
  <text x="440" y="256" text-anchor="middle" fill="#cbd5e1" font-size="12">🔗 端口映射：宿主机 6001 → 容器 6806</text>
  <text x="440" y="274" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">env: TZ=Asia/Shanghai · SIYUAN_LANG=zh-CN · restart: always</text>

  <!-- Client -->
  <rect x="290" y="328" width="300" height="50" rx="10" fill="#1e293b" stroke="#334155" filter="url(#sh4)"/>
  <text x="440" y="352" text-anchor="middle" fill="#e2e8f0" font-size="13">🌐 客户端 http://&lt;host&gt;:6001</text>
  <text x="440" y="368" text-anchor="middle" fill="#64748b" font-size="10">锁屏密码保护（--accessAuthCode）</text>
  <line x1="440" y1="284" x2="440" y2="328" stroke="#64748b" stroke-width="2" marker-end="url(#ar4)"/>

  <!-- Key insight -->
  <rect x="60" y="408" width="760" height="108" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1" filter="url(#sh4)"/>
  <text x="440" y="438" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">⚠️ v3.7.0 关键变更</text>
  <text x="440" y="462" text-anchor="middle" fill="#cbd5e1" font-size="12">entrypoint.sh 不变，但 kernel CLI 架构变了</text>
  <text x="440" y="484" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="monospace">旧: kernel --workspace=...  →  新: kernel serve --workspace=...</text>
  <text x="440" y="504" text-anchor="middle" fill="#fca5a5" font-size="11">缺少 serve → kernel 报错退出 → Docker 重启 → 循环</text>
</svg>
