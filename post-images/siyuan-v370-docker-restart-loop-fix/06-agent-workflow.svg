<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/></linearGradient>
    <linearGradient id="st6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="ok6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#14532d"/><stop offset="100%" stop-color="#052e16"/></linearGradient>
    <filter id="sh6" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="880" height="560" fill="url(#bg6)"/>
  <text x="440" y="42" text-anchor="middle" fill="#f8fafc" font-size="23" font-weight="700">AI Agent 远程修复容器故障流程</text>
  <text x="440" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">SSH → 诊断 → 查文档 → 修复 → 验证</text>

  <!-- Flow steps -->
  <g filter="url(#sh6)">
    <rect x="30" y="88" width="170" height="54" rx="10" fill="url(#st6)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="115" y="111" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">1 · SSH 连接</text>
    <text x="115" y="129" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">ssh root@host</text>
  </g>
  <text x="212" y="119" fill="#475569" font-size="18">→</text>
  <g filter="url(#sh6)">
    <rect x="225" y="88" width="170" height="54" rx="10" fill="url(#st6)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="310" y="111" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">2 · 诊断</text>
    <text x="310" y="129" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">docker ps + logs</text>
  </g>
  <text x="407" y="119" fill="#475569" font-size="18">→</text>
  <g filter="url(#sh6)">
    <rect x="420" y="88" width="170" height="54" rx="10" fill="url(#st6)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="505" y="111" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">3 · 查文档</text>
    <text x="505" y="129" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">GitHub README</text>
  </g>
  <text x="602" y="119" fill="#475569" font-size="18">→</text>
  <g filter="url(#sh6)">
    <rect x="615" y="88" width="170" height="54" rx="10" fill="url(#st6)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="700" y="111" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">4 · 修复</text>
    <text x="700" y="129" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">sed + compose up</text>
  </g>

  <!-- Agent execution log -->
  <rect x="60" y="168" width="760" height="180" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#sh6)"/>
  <rect x="60" y="168" width="760" height="28" rx="12" fill="#0f172a"/>
  <rect x="60" y="184" width="760" height="12" fill="#0f172a"/>
  <circle cx="78" cy="182" r="5" fill="#ef4444"/><circle cx="94" cy="182" r="5" fill="#f59e0b"/><circle cx="110" cy="182" r="5" fill="#22c55e"/>
  <text x="440" y="186" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">Agent 执行轨迹</text>
  <text x="84" y="220" fill="#22c55e" font-size="12" font-family="monospace">▸ docker ps --filter name=siyuan</text>
  <text x="84" y="240" fill="#94a3b8" font-size="11" font-family="monospace">  → siyuan-qiniu  Restarting (1) 8 seconds ago</text>
  <text x="84" y="264" fill="#22c55e" font-size="12" font-family="monospace">▸ docker logs --tail 40 siyuan-qiniu</text>
  <text x="84" y="284" fill="#ef4444" font-size="11" font-family="monospace">  → Error: unknown flag: --accessAuthCode</text>
  <text x="84" y="308" fill="#22c55e" font-size="12" font-family="monospace">▸ docker inspect → 定位 compose 文件路径</text>
  <text x="84" y="332" fill="#22c55e" font-size="12" font-family="monospace">▸ sed 修改 command → docker compose up -d</text>

  <!-- Result -->
  <rect x="60" y="368" width="760" height="72" rx="12" fill="url(#ok6)" stroke="#22c55e" stroke-width="2" filter="url(#sh6)"/>
  <text x="440" y="398" text-anchor="middle" fill="#86efac" font-size="16" font-weight="700">✅ 从发现故障到修复完成：约 10 分钟</text>
  <text x="440" y="422" text-anchor="middle" fill="#cbd5e1" font-size="12">人工预估 20-30 分钟（搜索+阅读文档+试错）→ Agent 辅助 10 分钟</text>

  <!-- Lessons -->
  <rect x="60" y="460" width="760" height="80" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1" filter="url(#sh6)"/>
  <text x="440" y="488" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">📌 经验教训</text>
  <text x="440" y="510" text-anchor="middle" fill="#cbd5e1" font-size="11">① 升级前看 CHANGELOG 的破坏性变更说明</text>
  <text x="440" y="530" text-anchor="middle" fill="#cbd5e1" font-size="11">② docker logs 是容器问题排查的第一线索</text>
</svg>
