<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <marker id="ar1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
    </marker>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="880" height="540" fill="url(#bg1)"/>
  <circle cx="440" cy="270" r="200" fill="url(#glow1)"/>

  <text x="440" y="48" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Docker 容器无限重启循环</text>
  <text x="440" y="74" text-anchor="middle" fill="#94a3b8" font-size="13">Container Crash Loop · Restart Policy: always</text>

  <!-- Container card -->
  <rect x="310" y="100" width="260" height="88" rx="12" fill="url(#card1)" stroke="#ef4444" stroke-width="2" filter="url(#shadow1)"/>
  <circle cx="338" cy="128" r="8" fill="#ef4444"/>
  <circle cx="362" cy="128" r="8" fill="#f59e0b"/>
  <circle cx="386" cy="128" r="8" fill="#22c55e"/>
  <text x="440" y="155" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700" font-family="monospace">📦 siyuan-qiniu</text>
  <text x="440" y="175" text-anchor="middle" fill="#ef4444" font-size="12">⟳ Restarting (1) · exit code 1</text>

  <!-- Circular arrows -->
  <path d="M570,144 C 640,144 660,210 660,280 C 660,360 600,410 520,400" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#ar1)" stroke-dasharray="10,5"/>
  <path d="M310,400 C 230,410 200,360 200,280 C 200,210 220,144 310,144" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#ar1)" stroke-dasharray="10,5"/>
  <text x="680" y="285" fill="#ef4444" font-size="11" font-weight="600">restart</text>
  <text x="120" y="285" fill="#ef4444" font-size="11" font-weight="600">exit 1</text>

  <!-- Terminal log -->
  <rect x="80" y="425" width="720" height="95" rx="10" fill="#0a0e1a" stroke="#334155" stroke-width="1" filter="url(#shadow1)"/>
  <rect x="80" y="425" width="720" height="24" rx="10" fill="#1e293b"/>
  <rect x="80" y="440" width="720" height="9" fill="#1e293b"/>
  <circle cx="96" cy="437" r="5" fill="#ef4444"/><circle cx="112" cy="437" r="5" fill="#f59e0b"/><circle cx="128" cy="437" r="5" fill="#22c55e"/>
  <text x="440" y="441" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">docker logs --tail 20 siyuan-qiniu</text>
  <text x="100" y="471" fill="#ef4444" font-size="13" font-family="monospace" font-weight="700">Error: unknown flag: --accessAuthCode</text>
  <text x="100" y="491" fill="#64748b" font-size="11" font-family="monospace">Usage: kernel [command]   →   serve  Start kernel HTTP server</text>
  <text x="100" y="509" fill="#f59e0b" font-size="11" font-family="monospace">⚠ container exits → Docker restarts → loop forever</text>
</svg>
