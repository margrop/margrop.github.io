<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/></linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="crit3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7f1d1d"/><stop offset="100%" stop-color="#450a0a"/></linearGradient>
    <linearGradient id="ok3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#14532d"/><stop offset="100%" stop-color="#052e16"/></linearGradient>
    <filter id="sh3" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="880" height="640" fill="url(#bg3)"/>
  <text x="440" y="44" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Docker 容器故障排查流程</text>
  <text x="440" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">从现象到根因到修复 · 日志优先</text>

  <!-- Steps -->
  <g filter="url(#sh3)">
    <rect x="270" y="92" width="340" height="48" rx="10" fill="url(#step3)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="440" y="114" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">1 · docker ps -a</text>
    <text x="440" y="131" text-anchor="middle" fill="#cbd5e1" font-size="11">发现容器处于 Restarting 状态</text>
  </g>
  <line x1="440" y1="140" x2="440" y2="160" stroke="#475569" stroke-width="2"/>

  <g filter="url(#sh3)">
    <rect x="270" y="160" width="340" height="48" rx="10" fill="url(#step3)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="440" y="182" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">2 · docker logs --tail 40</text>
    <text x="440" y="199" text-anchor="middle" fill="#cbd5e1" font-size="11">读取容器错误日志（第一线索）</text>
  </g>
  <line x1="440" y1="208" x2="440" y2="228" stroke="#475569" stroke-width="2"/>

  <g filter="url(#sh3)">
    <rect x="210" y="228" width="460" height="62" rx="10" fill="url(#crit3)" stroke="#ef4444" stroke-width="2"/>
    <text x="440" y="253" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">3 · 关键发现</text>
    <text x="440" y="272" text-anchor="middle" fill="#fde68a" font-size="12" font-family="monospace">unknown flag: --accessAuthCode</text>
    <text x="440" y="287" text-anchor="middle" fill="#94a3b8" font-size="10">kernel 列出可用子命令：serve / asset / block ...</text>
  </g>
  <line x1="440" y1="290" x2="440" y2="310" stroke="#475569" stroke-width="2"/>

  <g filter="url(#sh3)">
    <rect x="270" y="310" width="340" height="48" rx="10" fill="url(#step3)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="440" y="332" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">4 · 查阅官方 README</text>
    <text x="440" y="349" text-anchor="middle" fill="#cbd5e1" font-size="11">v3.7.0 起需显式传入 serve 子命令</text>
  </g>
  <line x1="440" y1="358" x2="440" y2="378" stroke="#475569" stroke-width="2"/>

  <g filter="url(#sh3)">
    <rect x="270" y="378" width="340" height="48" rx="10" fill="url(#step3)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="440" y="400" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">5 · 修改 compose 的 command</text>
    <text x="440" y="417" text-anchor="middle" fill="#cbd5e1" font-size="11">数组最前面加 'serve'（先备份）</text>
  </g>
  <line x1="440" y1="426" x2="440" y2="446" stroke="#475569" stroke-width="2"/>

  <g filter="url(#sh3)">
    <rect x="240" y="446" width="400" height="56" rx="10" fill="url(#ok3)" stroke="#22c55e" stroke-width="2"/>
    <text x="440" y="470" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">6 · docker compose up -d ✅</text>
    <text x="440" y="490" text-anchor="middle" fill="#cbd5e1" font-size="11">Status: Up · curl 返回 401 = 锁屏密码生效</text>
  </g>

  <!-- Tools sidebar -->
  <rect x="640" y="92" width="200" height="410" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#sh3)"/>
  <text x="740" y="120" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">🧰 用到的命令</text>
  <line x1="660" y1="132" x2="820" y2="132" stroke="#334155"/>
  <text x="660" y="160" fill="#38bdf8" font-size="11" font-family="monospace">docker ps -a</text>
  <text x="660" y="188" fill="#38bdf8" font-size="11" font-family="monospace">docker logs</text>
  <text x="660" y="216" fill="#38bdf8" font-size="11" font-family="monospace">docker inspect</text>
  <text x="660" y="244" fill="#38bdf8" font-size="11" font-family="monospace">docker exec</text>
  <text x="660" y="272" fill="#38bdf8" font-size="11" font-family="monospace">docker compose up</text>
  <text x="660" y="300" fill="#38bdf8" font-size="11" font-family="monospace">curl -w '%{http_code}'</text>
  <line x1="660" y1="324" x2="820" y2="324" stroke="#334155"/>
  <text x="660" y="352" fill="#a78bfa" font-size="11" font-family="monospace">Portainer UI</text>
  <text x="660" y="380" fill="#a78bfa" font-size="11" font-family="monospace">GitHub README</text>
  <text x="660" y="408" fill="#a78bfa" font-size="11" font-family="monospace">CHANGELOG</text>

  <!-- Bottom lesson -->
  <rect x="60" y="540" width="760" height="72" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1" filter="url(#sh3)"/>
  <text x="440" y="570" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">📌 核心经验</text>
  <text x="440" y="593" text-anchor="middle" fill="#cbd5e1" font-size="12">容器重启循环时，docker logs 是第一线索 —— 不要只看 docker ps 的 Status</text>
</svg>
