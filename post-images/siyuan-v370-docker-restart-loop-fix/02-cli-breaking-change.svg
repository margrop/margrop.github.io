<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/></linearGradient>
    <linearGradient id="bad2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#450a0a"/><stop offset="100%" stop-color="#1c0a0a"/></linearGradient>
    <linearGradient id="good2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#052e16"/><stop offset="100%" stop-color="#022c1a"/></linearGradient>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="880" height="600" fill="url(#bg2)"/>
  <text x="440" y="44" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">v3.7.0 CLI 子命令架构变更</text>
  <text x="440" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">Breaking Change · 必须显式传入 serve 子命令</text>

  <!-- Left: old/broken -->
  <rect x="40" y="90" width="360" height="38" rx="8" fill="#7f1d1d" opacity="0.5"/>
  <text x="220" y="114" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">v3.6.x 及之前</text>
  <rect x="40" y="135" width="360" height="235" rx="12" fill="url(#bad2)" stroke="#ef4444" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="60" y="165" fill="#ef4444" font-size="13" font-weight="700">❌ v3.7.0 下已失效</text>
  <text x="60" y="195" fill="#cbd5e1" font-size="12" font-family="monospace">docker run b3log/siyuan \</text>
  <text x="60" y="217" fill="#cbd5e1" font-size="12" font-family="monospace">  --workspace=/siyuan/workspace/ \</text>
  <text x="60" y="239" fill="#cbd5e1" font-size="12" font-family="monospace">  --accessAuthCode=xxx</text>
  <line x1="60" y1="258" x2="380" y2="258" stroke="#7f1d1d" stroke-width="1"/>
  <text x="60" y="282" fill="#94a3b8" font-size="11" font-family="monospace">kernel 把第 1 个参数当作子命令名</text>
  <text x="60" y="302" fill="#94a3b8" font-size="11" font-family="monospace">→ 不认识 "--accessAuthCode"</text>
  <rect x="60" y="320" width="320" height="34" rx="6" fill="#450a0a"/>
  <text x="220" y="342" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="monospace" font-weight="600">Error: unknown flag: --accessAuthCode</text>

  <!-- Arrow -->
  <circle cx="440" cy="252" r="24" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="440" y="260" text-anchor="middle" fill="#38bdf8" font-size="22" font-weight="700">→</text>

  <!-- Right: new/working -->
  <rect x="480" y="90" width="360" height="38" rx="8" fill="#14532d" opacity="0.5"/>
  <text x="660" y="114" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">v3.7.0 起</text>
  <rect x="480" y="135" width="360" height="235" rx="12" fill="url(#good2)" stroke="#22c55e" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="500" y="165" fill="#22c55e" font-size="13" font-weight="700">✅ 正确写法</text>
  <text x="500" y="195" fill="#cbd5e1" font-size="12" font-family="monospace">docker run b3log/siyuan \</text>
  <text x="500" y="217" fill="#4ade80" font-size="12" font-family="monospace" font-weight="700">  serve \</text>
  <text x="500" y="239" fill="#cbd5e1" font-size="12" font-family="monospace">  --workspace=/siyuan/workspace/ \</text>
  <text x="500" y="261" fill="#cbd5e1" font-size="12" font-family="monospace">  --accessAuthCode=xxx</text>
  <line x1="500" y1="280" x2="820" y2="280" stroke="#14532d" stroke-width="1"/>
  <text x="500" y="304" fill="#94a3b8" font-size="11" font-family="monospace">serve 是子命令（启动 HTTP 服务）</text>
  <text x="500" y="324" fill="#94a3b8" font-size="11" font-family="monospace">--workspace / --accessAuthCode</text>
  <text x="500" y="344" fill="#94a3b8" font-size="11" font-family="monospace">作为 serve 的参数正常解析</text>

  <!-- Analogy box -->
  <rect x="40" y="395" width="800" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#sh2)"/>
  <text x="440" y="424" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">💡 生活类比 · 餐厅点餐系统升级</text>
  <text x="440" y="450" text-anchor="middle" fill="#cbd5e1" font-size="13">旧系统：直接说「宫保鸡丁」就能下单</text>
  <text x="440" y="472" text-anchor="middle" fill="#cbd5e1" font-size="13">新系统：必须先说「点菜」，再说「宫保鸡丁」 — 这里的「点菜」就是 serve</text>

  <!-- Timeline -->
  <line x1="140" y1="540" x2="740" y2="540" stroke="#334155" stroke-width="3"/>
  <circle cx="200" cy="540" r="7" fill="#22c55e"/><text x="200" y="568" text-anchor="middle" fill="#64748b" font-size="11">v3.5</text>
  <circle cx="320" cy="540" r="7" fill="#22c55e"/><text x="320" y="568" text-anchor="middle" fill="#64748b" font-size="11">v3.6</text>
  <circle cx="440" cy="540" r="10" fill="#ef4444"/><text x="440" y="568" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">v3.7.0 ⚡</text>
  <circle cx="560" cy="540" r="7" fill="#38bdf8"/><text x="560" y="568" text-anchor="middle" fill="#38bdf8" font-size="11">v3.7.1</text>
  <circle cx="680" cy="540" r="7" fill="#64748b"/><text x="680" y="568" text-anchor="middle" fill="#64748b" font-size="11">future</text>
</svg>
