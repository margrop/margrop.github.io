<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eaf4ff"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d9bf0"/>
      <stop offset="100%" stop-color="#0f6dff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="24" fill="#ffffff" filter="url(#shadow)"/>

  <text x="110" y="150" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#0f172a">
    Yuque URL Hack: Export Markdown without Membership
  </text>

  <rect x="110" y="200" width="980" height="90" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="135" y="255" font-family="Courier New, monospace" font-size="24" fill="#334155">
    https://www.yuque.com/ant-design/course/intro
  </text>

  <text x="560" y="336" font-family="Arial, Helvetica, sans-serif" font-size="56" fill="#2563eb">+</text>

  <rect x="110" y="365" width="980" height="95" rx="14" fill="url(#chip)"/>
  <text x="135" y="422" font-family="Courier New, monospace" font-size="23" fill="#ffffff">
    /markdown?plain=true&amp;linebreak=false&amp;anchor=false
  </text>

  <text x="110" y="520" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#0f172a">
    Result: clean Markdown output for Hugo / Git / Notes migration
  </text>
</svg>
