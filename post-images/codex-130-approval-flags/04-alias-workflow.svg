<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex alias workflow</title>
  <desc id="desc">A workflow showing aliases replacing repeated manual flag entry.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="78" y="92" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#111827">Turn long flags into explicit launch profiles</text>
  <text x="78" y="132" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#56616f">Aliases keep the new startup model convenient without hiding the policy.</text>
  <rect x="90" y="198" width="305" height="330" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="130" y="255" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1e40af">codex-ro</text>
  <text x="130" y="304" font-family="Menlo, Consolas, monospace" font-size="20" fill="#334155">-s read-only</text>
  <text x="130" y="338" font-family="Menlo, Consolas, monospace" font-size="20" fill="#334155">-a untrusted</text>
  <text x="130" y="418" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#475569">Explore, explain, audit.</text>
  <rect x="487" y="198" width="305" height="330" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="527" y="255" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#166534">codex-work</text>
  <text x="527" y="304" font-family="Menlo, Consolas, monospace" font-size="20" fill="#334155">-s workspace-write</text>
  <text x="527" y="338" font-family="Menlo, Consolas, monospace" font-size="20" fill="#334155">-a on-request</text>
  <text x="527" y="418" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#475569">Edit, test, refactor.</text>
  <rect x="884" y="198" width="305" height="330" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="924" y="255" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#991b1b">codex-yolo</text>
  <text x="924" y="304" font-family="Menlo, Consolas, monospace" font-size="18" fill="#334155">--dangerously-</text>
  <text x="924" y="334" font-family="Menlo, Consolas, monospace" font-size="18" fill="#334155">bypass-approvals...</text>
  <text x="924" y="418" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#475569">Use only when the OS already contains it.</text>
  <path d="M395 363h92M792 363h92" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 14"/>
  <rect x="180" y="590" width="920" height="48" rx="12" fill="#111827"/>
  <text x="220" y="622" font-family="Menlo, Consolas, monospace" font-size="20" fill="#f8fafc">alias codex-work='codex -s workspace-write -a on-request'</text>
</svg>
