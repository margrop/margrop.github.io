<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Recommended Codex launch combinations</title>
  <desc id="desc">Three common launch combinations for Codex approval and sandbox settings.</desc>
  <rect width="1280" height="720" fill="#f6f7f9"/>
  <text x="78" y="86" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#111827">Pick the smallest permission set that finishes the job</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="80" y="150" width="350" height="430" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="118" y="210" font-size="29" font-weight="700" fill="#1d4ed8">Read and plan</text>
    <text x="118" y="253" font-size="20" fill="#475569">Use when you want analysis only.</text>
    <rect x="118" y="300" width="274" height="88" rx="12" fill="#eff6ff"/>
    <text x="142" y="336" font-family="Menlo, Consolas, monospace" font-size="18" fill="#1e3a8a">codex -s read-only</text>
    <text x="142" y="365" font-family="Menlo, Consolas, monospace" font-size="18" fill="#1e3a8a">      -a untrusted</text>
    <text x="118" y="442" font-size="20" fill="#334155">Good for repository review, root-cause analysis, and planning.</text>
    <rect x="465" y="150" width="350" height="430" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="503" y="210" font-size="29" font-weight="700" fill="#15803d">Daily coding</text>
    <text x="503" y="253" font-size="20" fill="#475569">Let it edit the workspace.</text>
    <rect x="503" y="300" width="274" height="88" rx="12" fill="#f0fdf4"/>
    <text x="527" y="336" font-family="Menlo, Consolas, monospace" font-size="18" fill="#14532d">codex -s workspace-write</text>
    <text x="527" y="365" font-family="Menlo, Consolas, monospace" font-size="18" fill="#14532d">      -a on-request</text>
    <text x="503" y="442" font-size="20" fill="#334155">Best default for feature work, tests, and local edits.</text>
    <rect x="850" y="150" width="350" height="430" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="888" y="210" font-size="29" font-weight="700" fill="#b91c1c">External sandbox</text>
    <text x="888" y="253" font-size="20" fill="#475569">Only inside a container/VM.</text>
    <rect x="888" y="300" width="274" height="88" rx="12" fill="#fef2f2"/>
    <text x="912" y="336" font-family="Menlo, Consolas, monospace" font-size="17" fill="#7f1d1d">codex --dangerously-</text>
    <text x="912" y="365" font-family="Menlo, Consolas, monospace" font-size="17" fill="#7f1d1d">bypass-approvals...</text>
    <text x="888" y="442" font-size="20" fill="#334155">Fastest path, but no built-in approval or sandbox brake.</text>
  </g>
  <text x="80" y="650" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#334155">Rule of thumb: convenience should follow isolation, not replace it.</text>
</svg>
