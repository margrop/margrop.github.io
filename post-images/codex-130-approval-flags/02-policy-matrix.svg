<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex approval and sandbox matrix</title>
  <desc id="desc">A matrix comparing approval policies and sandbox modes.</desc>
  <rect width="1280" height="720" fill="#fbfbf8"/>
  <text x="80" y="92" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#1f2937">Two independent knobs: approval policy and sandbox policy</text>
  <text x="80" y="133" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#56616f">Approval decides when Codex asks. Sandbox decides where commands can act.</text>
  <rect x="90" y="190" width="500" height="400" rx="22" fill="#ffffff" stroke="#d0d7de" stroke-width="3"/>
  <text x="130" y="245" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1f2937">Approval policy</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#334155">
    <circle cx="145" cy="305" r="10" fill="#ef4444"/><text x="170" y="313">untrusted: ask for untrusted commands</text>
    <circle cx="145" cy="360" r="10" fill="#f59e0b"/><text x="170" y="368">on-request: agent decides when to ask</text>
    <circle cx="145" cy="415" r="10" fill="#64748b"/><text x="170" y="423">on-failure: deprecated compatibility path</text>
    <circle cx="145" cy="470" r="10" fill="#16a34a"/><text x="170" y="478">never: do not ask, return failures directly</text>
  </g>
  <rect x="690" y="190" width="500" height="400" rx="22" fill="#ffffff" stroke="#d0d7de" stroke-width="3"/>
  <text x="730" y="245" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1f2937">Sandbox policy</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#334155">
    <rect x="730" y="288" width="34" height="34" rx="8" fill="#dbeafe"/><text x="785" y="313">read-only: inspect, do not write</text>
    <rect x="730" y="343" width="34" height="34" rx="8" fill="#dcfce7"/><text x="785" y="368">workspace-write: edit project scope</text>
    <rect x="730" y="398" width="34" height="34" rx="8" fill="#fee2e2"/><text x="785" y="423">danger-full-access: no filesystem sandbox</text>
  </g>
  <path d="M600 390h80" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  <path d="M672 365l36 25-36 25" fill="none" stroke="#64748b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="165" y="624" width="950" height="46" rx="12" fill="#1f2937"/>
  <text x="205" y="655" font-family="Menlo, Consolas, monospace" font-size="20" fill="#f8fafc">codex --ask-for-approval never --sandbox workspace-write</text>
</svg>
