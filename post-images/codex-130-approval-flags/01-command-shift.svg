<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex approval command change</title>
  <desc id="desc">A clean diagram showing approval control moving from an in-session slash command to startup flags.</desc>
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <rect x="72" y="76" width="1136" height="568" rx="26" fill="#fff" stroke="#d8dee9" stroke-width="3"/>
  <text x="120" y="145" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#172033">Codex 0.130.0: approval control moved up front</text>
  <text x="120" y="188" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#526071">Less in-session toggling, more explicit launch-time policy.</text>
  <rect x="118" y="255" width="410" height="245" rx="18" fill="#fff4f0" stroke="#e8b8a6" stroke-width="2"/>
  <text x="150" y="310" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#8a321f">Before</text>
  <rect x="150" y="345" width="320" height="72" rx="12" fill="#222831"/>
  <text x="178" y="392" font-family="Menlo, Consolas, monospace" font-size="26" fill="#f6f8fa">/approvals</text>
  <text x="150" y="455" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#6a4237">Change behavior after entering a session.</text>
  <path d="M575 376h130" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
  <path d="M690 338l54 38-54 38" fill="none" stroke="#64748b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="760" y="255" width="400" height="245" rx="18" fill="#effaf4" stroke="#9ad7b3" stroke-width="2"/>
  <text x="792" y="310" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#17643a">Now</text>
  <rect x="792" y="345" width="318" height="72" rx="12" fill="#17324d"/>
  <text x="818" y="392" font-family="Menlo, Consolas, monospace" font-size="23" fill="#e8f3ff">codex -a never -s ...</text>
  <text x="792" y="455" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#345c45">Choose approval and sandbox policy at startup.</text>
  <rect x="120" y="548" width="1040" height="50" rx="12" fill="#eef2f7"/>
  <text x="150" y="581" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#334155">Practical fix: replace the old slash-command habit with aliases, shell functions, profiles, or explicit CLI flags.</text>
</svg>
