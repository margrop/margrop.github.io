<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cube" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ff9558;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <!-- Title -->
  <text x="800" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="2">
    Inside the Mavis Sandbox
  </text>
  <text x="800" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#8aa9ff" letter-spacing="4">
    2GB MEMORY  ·  1~2 CORES  ·  PERSISTENT WORKSPACE
  </text>

  <!-- Cloud platform -->
  <g transform="translate(550, 600)">
    <ellipse cx="0" cy="0" rx="350" ry="80" fill="url(#cloud)" />
    <ellipse cx="0" cy="-20" rx="250" ry="50" fill="#ff6b35" opacity="0.4" />
    <text x="0" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffb088">Cloud Container Platform</text>
  </g>

  <!-- Sandbox cube (isometric-style) -->
  <g transform="translate(800, 350)">
    <!-- top face -->
    <polygon points="-180,-80 0,-160 180,-80 0,0" fill="url(#cube)" stroke="#00d4ff" stroke-width="2" />
    <!-- left face -->
    <polygon points="-180,-80 0,0 0,200 -180,120" fill="url(#cube)" stroke="#00d4ff" stroke-width="2" opacity="0.7" />
    <!-- right face -->
    <polygon points="180,-80 0,0 0,200 180,120" fill="url(#cube)" stroke="#00d4ff" stroke-width="2" opacity="0.85" />

    <!-- Inside icons -->
    <g transform="translate(-100, 0)">
      <!-- code icon -->
      <rect x="-30" y="-30" width="60" height="60" fill="#0a0e27" stroke="#00d4ff" stroke-width="1.5" rx="5" />
      <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="20" fill="#00d4ff">&lt;/&gt;</text>
      <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8aa9ff">bash</text>
    </g>
    <g transform="translate(0, 30)">
      <!-- file icon -->
      <rect x="-30" y="-30" width="60" height="60" fill="#0a0e27" stroke="#00d4ff" stroke-width="1.5" rx="5" />
      <line x1="-15" y1="-12" x2="15" y2="-12" stroke="#00d4ff" stroke-width="2" />
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#00d4ff" stroke-width="2" />
      <line x1="-15" y1="12" x2="5" y2="12" stroke="#00d4ff" stroke-width="2" />
      <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8aa9ff">files</text>
    </g>
    <g transform="translate(100, 0)">
      <!-- network icon -->
      <rect x="-30" y="-30" width="60" height="60" fill="#0a0e27" stroke="#00d4ff" stroke-width="1.5" rx="5" />
      <circle cx="-12" cy="-8" r="4" fill="#00d4ff" />
      <circle cx="12" cy="-8" r="4" fill="#00d4ff" />
      <circle cx="0" cy="10" r="4" fill="#00d4ff" />
      <line x1="-12" y1="-8" x2="0" y2="10" stroke="#00d4ff" stroke-width="1.5" />
      <line x1="12" y1="-8" x2="0" y2="10" stroke="#00d4ff" stroke-width="1.5" />
      <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#00d4ff" stroke-width="1.5" />
      <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8aa9ff">net</text>
    </g>
  </g>

  <!-- Resource labels around the cube -->
  <g font-family="Arial, sans-serif">
    <!-- Memory: 2GB -->
    <g transform="translate(220, 200)">
      <rect x="0" y="0" width="220" height="70" fill="#0a0e27" stroke="#00d4ff" stroke-width="2" rx="8" />
      <text x="110" y="28" text-anchor="middle" font-size="14" fill="#8aa9ff">MEMORY HARD LIMIT</text>
      <text x="110" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#00d4ff">2.0 GB</text>
    </g>
    <line x1="440" y1="235" x2="640" y2="350" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- CPU: 1~2 cores -->
    <g transform="translate(220, 320)">
      <rect x="0" y="0" width="220" height="70" fill="#0a0e27" stroke="#00d4ff" stroke-width="2" rx="8" />
      <text x="110" y="28" text-anchor="middle" font-size="14" fill="#8aa9ff">CPU (BURST)</text>
      <text x="110" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#00d4ff">1 ~ 2 cores</text>
    </g>
    <line x1="440" y1="355" x2="640" y2="430" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- Local disk: 30GB -->
    <g transform="translate(220, 440)">
      <rect x="0" y="0" width="220" height="70" fill="#0a0e27" stroke="#ff6b35" stroke-width="2" rx="8" />
      <text x="110" y="28" text-anchor="middle" font-size="14" fill="#ffb088">CONTAINER DISK</text>
      <text x="110" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#ff6b35">30 GB</text>
    </g>
    <text x="330" y="535" text-anchor="middle" font-size="12" fill="#ffb088">(disappears with container)</text>
    <line x1="440" y1="475" x2="640" y2="500" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- Persistent workspace -->
    <g transform="translate(1160, 200)">
      <rect x="0" y="0" width="220" height="70" fill="#0a0e27" stroke="#00ff88" stroke-width="2" rx="8" />
      <text x="110" y="28" text-anchor="middle" font-size="14" fill="#88ffaa">PERSISTENT WORKSPACE</text>
      <text x="110" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#00ff88">/workspace</text>
    </g>
    <line x1="1160" y1="235" x2="980" y2="350" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- 4 processes -->
    <g transform="translate(1160, 320)">
      <rect x="0" y="0" width="220" height="70" fill="#0a0e27" stroke="#00d4ff" stroke-width="2" rx="8" />
      <text x="110" y="28" text-anchor="middle" font-size="14" fill="#8aa9ff">REAL PROCESSES</text>
      <text x="110" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#00d4ff">4</text>
    </g>
    <line x1="1160" y1="355" x2="980" y2="430" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- ICMP blocked, TCP open -->
    <g transform="translate(1160, 440)">
      <rect x="0" y="0" width="220" height="90" fill="#0a0e27" stroke="#00d4ff" stroke-width="2" rx="8" />
      <text x="110" y="26" text-anchor="middle" font-size="14" fill="#8aa9ff">NETWORK POLICY</text>
      <text x="110" y="52" text-anchor="middle" font-size="18" font-weight="700" fill="#ff6b35">ICMP blocked</text>
      <text x="110" y="76" text-anchor="middle" font-size="18" font-weight="700" fill="#00d4ff">TCP wide open</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="800" y="850" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5a6a9c" letter-spacing="1">
    Specifics generalized for privacy  ·  Concrete values observed in Mavis
  </text>
</svg>
