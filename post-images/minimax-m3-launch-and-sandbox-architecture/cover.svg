<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="dense" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ff9558;stop-opacity:0.7" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)" />

  <!-- Decorative grid -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="150" x2="1600" y2="150" />
    <line x1="0" y1="300" x2="1600" y2="300" />
    <line x1="0" y1="450" x2="1600" y2="450" />
    <line x1="0" y1="600" x2="1600" y2="600" />
    <line x1="0" y1="750" x2="1600" y2="750" />
    <line x1="200" y1="0" x2="200" y2="900" />
    <line x1="400" y1="0" x2="400" y2="900" />
    <line x1="600" y1="0" x2="600" y2="900" />
    <line x1="800" y1="0" x2="800" y2="900" />
    <line x1="1000" y1="0" x2="1000" y2="900" />
    <line x1="1200" y1="0" x2="1200" y2="900" />
    <line x1="1400" y1="0" x2="1400" y2="900" />
  </g>

  <!-- Title -->
  <text x="800" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="2">
    MiniMax M3 × MSA Architecture
  </text>
  <text x="800" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#8aa9ff" letter-spacing="4">
    SPARSE ATTENTION  ·  1M CONTEXT  ·  NATIVE MULTIMODAL
  </text>

  <!-- Two diagrams: sparse vs dense -->
  <!-- Left: Sparse Attention (8x8 matrix, mostly empty) -->
  <g transform="translate(200, 280)">
    <text x="200" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#00d4ff">
      MSA: Sparse Attention
    </text>
    <text x="200" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8aa9ff">
      Index + Sparse (O(n log n))
    </text>

    <!-- 8x8 matrix - sparse pattern -->
    <g transform="translate(0, 30)">
      <!-- Row guides -->
      <g stroke="#3a4a8c" stroke-width="0.5" opacity="0.3">
        <line x1="0" y1="0" x2="400" y2="0" />
        <line x1="0" y1="50" x2="400" y2="50" />
        <line x1="0" y1="100" x2="400" y2="100" />
        <line x1="0" y1="150" x2="400" y2="150" />
        <line x1="0" y1="200" x2="400" y2="200" />
        <line x1="0" y1="250" x2="400" y2="250" />
        <line x1="0" y1="300" x2="400" y2="300" />
        <line x1="0" y1="350" x2="400" y2="350" />
        <line x1="0" y1="400" x2="400" y2="400" />
        <line x1="0" y1="0" x2="0" y2="400" />
        <line x1="50" y1="0" x2="50" y2="400" />
        <line x1="100" y1="0" x2="100" y2="400" />
        <line x1="150" y1="0" x2="150" y2="400" />
        <line x1="200" y1="0" x2="200" y2="400" />
        <line x1="250" y1="0" x2="250" y2="400" />
        <line x1="300" y1="0" x2="300" y2="400" />
        <line x1="350" y1="0" x2="350" y2="400" />
        <line x1="400" y1="0" x2="400" y2="400" />
      </g>

      <!-- Filled cells (sparse pattern - only diagonal + a few connections) -->
      <rect x="0" y="0" width="50" height="50" fill="url(#sparse)" />
      <rect x="50" y="0" width="50" height="50" fill="url(#sparse)" />
      <rect x="0" y="50" width="50" height="50" fill="url(#sparse)" />

      <rect x="100" y="100" width="50" height="50" fill="url(#sparse)" />
      <rect x="150" y="100" width="50" height="50" fill="url(#sparse)" />
      <rect x="100" y="150" width="50" height="50" fill="url(#sparse)" />

      <rect x="200" y="200" width="50" height="50" fill="url(#sparse)" />
      <rect x="250" y="200" width="50" height="50" fill="url(#sparse)" />
      <rect x="200" y="250" width="50" height="50" fill="url(#sparse)" />

      <rect x="300" y="300" width="50" height="50" fill="url(#sparse)" />
      <rect x="350" y="300" width="50" height="50" fill="url(#sparse)" />
      <rect x="300" y="350" width="50" height="50" fill="url(#sparse)" />

      <!-- Off-diagonal skip connections -->
      <rect x="0" y="300" width="50" height="50" fill="#00d4ff" opacity="0.6" />
      <rect x="200" y="0" width="50" height="50" fill="#00d4ff" opacity="0.6" />
      <rect x="350" y="50" width="50" height="50" fill="#00d4ff" opacity="0.6" />
    </g>
  </g>

  <!-- Right: Dense Attention (8x8 matrix, fully filled) -->
  <g transform="translate(1000, 280)">
    <text x="200" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ff6b35">
      Classic Dense Attention
    </text>
    <text x="200" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffb088">
      Full Matrix (O(n²))
    </text>

    <g transform="translate(0, 30)">
      <!-- Fully filled 8x8 -->
      <g fill="url(#dense)" opacity="0.85">
        <rect x="0" y="0" width="400" height="50" />
        <rect x="0" y="50" width="400" height="50" />
        <rect x="0" y="100" width="400" height="50" />
        <rect x="0" y="150" width="400" height="50" />
        <rect x="0" y="200" width="400" height="50" />
        <rect x="0" y="250" width="400" height="50" />
        <rect x="0" y="300" width="400" height="50" />
        <rect x="0" y="350" width="400" height="50" />
      </g>

      <!-- Grid lines -->
      <g stroke="#0a0e27" stroke-width="1.5" opacity="0.4">
        <line x1="50" y1="0" x2="50" y2="400" />
        <line x1="100" y1="0" x2="100" y2="400" />
        <line x1="150" y1="0" x2="150" y2="400" />
        <line x1="200" y1="0" x2="200" y2="400" />
        <line x1="250" y1="0" x2="250" y2="400" />
        <line x1="300" y1="0" x2="300" y2="400" />
        <line x1="350" y1="0" x2="350" y2="400" />
        <line x1="0" y1="50" x2="400" y2="50" />
        <line x1="0" y1="100" x2="400" y2="100" />
        <line x1="0" y1="150" x2="400" y2="150" />
        <line x1="0" y1="200" x2="400" y2="200" />
        <line x1="0" y1="250" x2="400" y2="250" />
        <line x1="0" y1="300" x2="400" y2="300" />
        <line x1="0" y1="350" x2="400" y2="350" />
      </g>
    </g>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(0, 770)">
    <rect x="100" y="0" width="1400" height="100" fill="#0a0e27" stroke="#1a1f4e" stroke-width="2" rx="10" />

    <text x="200" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8aa9ff">SPEEDUP</text>
    <text x="200" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#00d4ff">9×~15×</text>

    <text x="475" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8aa9ff">COMPUTE / TOKEN</text>
    <text x="475" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#00d4ff">1/20</text>

    <text x="750" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8aa9ff">CONTEXT WINDOW</text>
    <text x="750" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#00d4ff">1M tokens</text>

    <text x="1025" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8aa9ff">SWE-BENCH PRO</text>
    <text x="1025" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#00d4ff">59.0</text>

    <text x="1300" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8aa9ff">CLAW-EVAL</text>
    <text x="1300" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#00d4ff">#1</text>
  </g>
</svg>
