<text x="824" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">显式 --execute</text>
<text x="824" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">错误即停止</text>
<text x="824" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">保留日志</text>
<path d="M 1018 350 L 1033 350" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
