<text x="116" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">只清理内置路径</text>
<text x="116" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">不碰业务目录</text>
<text x="116" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">不联网下载</text>
<path d="M 310 350 L 325 350" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
