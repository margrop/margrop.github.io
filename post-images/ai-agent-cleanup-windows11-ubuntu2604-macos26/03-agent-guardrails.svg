<circle cx="596" cy="271" r="16" fill="#f59e0b"/>
<text x="622" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">预演</text>
<text x="588" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">默认 dry-run</text>
<text x="588" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">输出候选清单</text>
<text x="588" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">等待确认</text>
<path d="M 782 350 L 797 350" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 797 350 l -10 -8 M 797 350 l -10 8" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="800" y="235" width="210" height="230" rx="16" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
<circle cx="832" cy="271" r="16" fill="#dc2626"/>
