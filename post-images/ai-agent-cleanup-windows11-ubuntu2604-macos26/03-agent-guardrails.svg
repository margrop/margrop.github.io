<text x="1060" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">du/日志</text>
<text x="1060" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">页面截图</text>
<rect x="92" y="530" width="1096" height="72" rx="14" fill="#eef6ff" stroke="#bfdbfe"/>
<text x="116" y="576" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">一句话需求必须带边界：先检查、再预演、确认后执行、最后给证据。</text>
