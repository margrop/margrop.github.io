<text x="352" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">Windows 管理员</text>
<text x="352" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">Linux sudo</text>
<text x="352" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">macOS sudo</text>
<path d="M 546 350 L 561 350" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
