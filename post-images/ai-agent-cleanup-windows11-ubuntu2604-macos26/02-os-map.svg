<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img">
<rect width="1280" height="720" fill="#f8fafc"/>
<rect x="52" y="48" width="1176" height="624" rx="22" fill="#ffffff" stroke="#dbe3ef"/>
<text x="92" y="112" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">三个系统，三种垃圾来源</text>
<text x="92" y="156" font-family="Arial, sans-serif" font-size="22" fill="#475569">Windows / Ubuntu / macOS 的清理对象名字不同，本质类似</text>
<rect x="92" y="235" width="210" height="230" rx="16" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
<circle cx="124" cy="271" r="16" fill="#2563eb"/>
<text x="150" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Windows</text>
<text x="116" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">Temp 目录</text>
<text x="116" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">回收站</text>
<text x="116" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">更新残留</text>
<text x="116" y="429" font-family="Arial, sans-serif" font-size="19" fill="#334155">缩略图缓存</text>
<path d="M 310 350 L 325 350" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 325 350 l -10 -8 M 325 350 l -10 8" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="328" y="235" width="210" height="230" rx="16" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
<circle cx="360" cy="271" r="16" fill="#16a34a"/>
<text x="386" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Ubuntu</text>
<text x="352" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">APT 缓存</text>
<text x="352" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">旧依赖包</text>
<text x="352" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">systemd 日志</text>
<text x="352" y="429" font-family="Arial, sans-serif" font-size="19" fill="#334155">临时目录</text>
<path d="M 546 350 L 561 350" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 561 350 l -10 -8 M 561 350 l -10 8" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="564" y="235" width="210" height="230" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
<circle cx="596" cy="271" r="16" fill="#f59e0b"/>
<text x="622" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">macOS</text>
<text x="588" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">Caches</text>
<text x="588" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">Logs</text>
<text x="588" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">Trash</text>
<text x="588" y="429" font-family="Arial, sans-serif" font-size="19" fill="#334155">下载残留</text>
<path d="M 782 350 L 797 350" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 797 350 l -10 -8 M 797 350 l -10 8" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="800" y="235" width="210" height="230" rx="16" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
<circle cx="832" cy="271" r="16" fill="#dc2626"/>
<text x="858" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">危险区</text>
<text x="824" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">个人文档</text>
<text x="824" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">浏览器资料</text>
<text x="824" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">密钥/证书</text>
<text x="824" y="429" font-family="Arial, sans-serif" font-size="19" fill="#334155">应用数据</text>
<path d="M 1018 350 L 1033 350" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<path d="M 1033 350 l -10 -8 M 1033 350 l -10 8" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="1036" y="235" width="210" height="230" rx="16" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
<circle cx="1068" cy="271" r="16" fill="#7c3aed"/>
<text x="1094" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">证据</text>
<text x="1060" y="327" font-family="Arial, sans-serif" font-size="19" fill="#334155">dry-run</text>
<text x="1060" y="361" font-family="Arial, sans-serif" font-size="19" fill="#334155">清单</text>
<text x="1060" y="395" font-family="Arial, sans-serif" font-size="19" fill="#334155">日志</text>
<text x="1060" y="429" font-family="Arial, sans-serif" font-size="19" fill="#334155">空间变化</text>
<rect x="92" y="530" width="1096" height="72" rx="14" fill="#eef6ff" stroke="#bfdbfe"/>
<text x="116" y="576" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">垃圾文件像厨房台面上的包装袋；真正的账本、钥匙和证件不能一起扔。</text>
</svg>