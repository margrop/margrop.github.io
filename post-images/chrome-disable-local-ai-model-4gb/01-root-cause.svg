<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
<rect width="1200" height="680" fill="#ffffff"/>
<rect x="0" y="0" width="1200" height="110" fill="#1a73e8"/>
<text x="70" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#fff">为什么删了还会回来</text>
<text x="70" y="145" font-family="Arial, sans-serif" font-size="24" fill="#5f6368">只删目录像倒掉快递盒，系统仍然会重新下单</text>
<g font-family="Arial, sans-serif"><rect x="70" y="190" width="235" height="270" rx="18" fill="#e8f0fe" stroke="#d0d7de"/><text x="94" y="248" font-size="28" font-weight="700" fill="#202124">触发</text><text x="94" y="300" font-size="20" fill="#3c4043">Chrome 功能需要</text><text x="94" y="334" font-size="20" fill="#3c4043">本地生成式 AI</text><text x="94" y="368" font-size="20" fill="#3c4043">保持随时可用</text><path d="M315 325 L342 325" stroke="#1a73e8" stroke-width="5" stroke-linecap="round"/><path d="M330 310 L345 325 L330 340" fill="none" stroke="#1a73e8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="350" y="190" width="235" height="270" rx="18" fill="#fce8e6" stroke="#d0d7de"/><text x="374" y="248" font-size="28" font-weight="700" fill="#202124">下载</text><text x="374" y="300" font-size="20" fill="#3c4043">后台组件拉取</text><text x="374" y="334" font-size="20" fill="#3c4043">模型权重文件</text><text x="374" y="368" font-size="20" fill="#3c4043">可能达到数 GB</text><path d="M595 325 L622 325" stroke="#1a73e8" stroke-width="5" stroke-linecap="round"/><path d="M610 310 L625 325 L610 340" fill="none" stroke="#1a73e8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="630" y="190" width="235" height="270" rx="18" fill="#e6f4ea" stroke="#d0d7de"/><text x="654" y="248" font-size="28" font-weight="700" fill="#202124">删除</text><text x="654" y="300" font-size="20" fill="#3c4043">手工删除目录</text><text x="654" y="334" font-size="20" fill="#3c4043">释放空间</text><text x="654" y="368" font-size="20" fill="#3c4043">但没有改规则</text><path d="M875 325 L902 325" stroke="#1a73e8" stroke-width="5" stroke-linecap="round"/><path d="M890 310 L905 325 L890 340" fill="none" stroke="#1a73e8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="910" y="190" width="235" height="270" rx="18" fill="#fef7e0" stroke="#d0d7de"/><text x="934" y="248" font-size="28" font-weight="700" fill="#202124">策略</text><text x="934" y="300" font-size="20" fill="#3c4043">禁用下载策略</text><text x="934" y="334" font-size="20" fill="#3c4043">阻止补货</text><text x="934" y="368" font-size="20" fill="#3c4043">再清理库存</text></g>
</svg>