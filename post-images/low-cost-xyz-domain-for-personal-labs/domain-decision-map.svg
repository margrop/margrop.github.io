<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Decision map for choosing a domain suffix</title>
  <desc id="desc">A decision diagram for choosing xyz domains for personal lab scenarios.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="80" y="86" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#111827">Should I use a cheap .xyz?</text>
  <g font-family="Arial, sans-serif" font-size="24" fill="#111827" stroke="#111827" stroke-width="3">
    <rect x="92" y="140" width="330" height="110" rx="18" fill="#ffffff"/>
    <text x="125" y="185" font-weight="700">Is this a brand site?</text>
    <text x="125" y="220" font-size="20" fill="#4b5563">Company, product, long-term public identity</text>
    <path d="M422 195 H530" fill="none"/>
    <polygon points="530,195 510,184 510,206" fill="#111827"/>
    <rect x="558" y="130" width="520" height="130" rx="18" fill="#fee2e2"/>
    <text x="594" y="178" font-weight="700" fill="#991b1b">Probably choose a serious brand domain</text>
    <text x="594" y="216" font-size="20" fill="#7f1d1d">Prefer .com, .net, regional ccTLD, or a memorable name.</text>
    <path d="M257 250 V342" fill="none"/>
    <polygon points="257,342 246,322 268,322" fill="#111827"/>
    <rect x="92" y="362" width="330" height="120" rx="18" fill="#ffffff"/>
    <text x="125" y="410" font-weight="700">Is it personal or test use?</text>
    <text x="125" y="446" font-size="20" fill="#4b5563">Home lab, demo, API callback, temporary site</text>
    <path d="M422 422 H530" fill="none"/>
    <polygon points="530,422 510,411 510,433" fill="#111827"/>
    <rect x="558" y="344" width="520" height="156" rx="18" fill="#dcfce7"/>
    <text x="594" y="397" font-weight="700" fill="#166534">A 6+ digit .xyz is a practical default</text>
    <text x="594" y="437" font-size="20" fill="#14532d">Low cost, easy to buy for many years, enough for non-formal use.</text>
    <text x="594" y="469" font-size="20" fill="#14532d">Register first, then bind DNS and HTTPS.</text>
    <path d="M257 482 V574" fill="none"/>
    <polygon points="257,574 246,554 268,554" fill="#111827"/>
    <rect x="92" y="594" width="986" height="72" rx="18" fill="#e0f2fe"/>
    <text x="125" y="640" font-weight="700" fill="#075985">Always check renewal price, transfer rules, real-name requirements, and the exact checkout total.</text>
  </g>
</svg>
