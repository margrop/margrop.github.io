<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Setup flow after buying a personal domain</title>
  <desc id="desc">A step-by-step flow from domain purchase to DNS, certificate, service binding, and renewal checks.</desc>
  <rect width="1200" height="700" fill="#f6f7f9"/>
  <text x="80" y="86" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">After Buying the Domain</text>
  <text x="80" y="126" font-family="Arial, sans-serif" font-size="23" fill="#4b5563">The domain is cheap; the checklist prevents annoying failures later.</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(88 190)">
      <rect width="210" height="130" rx="18" fill="#ffffff" stroke="#111827" stroke-width="3"/>
      <text x="28" y="52" font-size="27" font-weight="700" fill="#111827">1. Register</text>
      <text x="28" y="88" font-size="20" fill="#4b5563">Buy for multiple years</text>
    </g>
    <g transform="translate(352 190)">
      <rect width="210" height="130" rx="18" fill="#ffffff" stroke="#111827" stroke-width="3"/>
      <text x="28" y="52" font-size="27" font-weight="700" fill="#111827">2. DNS</text>
      <text x="28" y="88" font-size="20" fill="#4b5563">A, CNAME, TXT</text>
    </g>
    <g transform="translate(616 190)">
      <rect width="210" height="130" rx="18" fill="#ffffff" stroke="#111827" stroke-width="3"/>
      <text x="28" y="52" font-size="27" font-weight="700" fill="#111827">3. TLS</text>
      <text x="28" y="88" font-size="20" fill="#4b5563">ACME or CDN cert</text>
    </g>
    <g transform="translate(880 190)">
      <rect width="210" height="130" rx="18" fill="#ffffff" stroke="#111827" stroke-width="3"/>
      <text x="28" y="52" font-size="27" font-weight="700" fill="#111827">4. Bind</text>
      <text x="28" y="88" font-size="20" fill="#4b5563">Reverse proxy or app</text>
    </g>
    <path d="M302 255 H348 M566 255 H612 M830 255 H876" stroke="#111827" stroke-width="4"/>
    <polygon points="348,255 332,246 332,264" fill="#111827"/>
    <polygon points="612,255 596,246 596,264" fill="#111827"/>
    <polygon points="876,255 860,246 860,264" fill="#111827"/>
    <rect x="88" y="406" width="1002" height="156" rx="22" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
    <text x="128" y="456" font-size="30" font-weight="700" fill="#9a3412">Do not skip the boring parts</text>
    <text x="128" y="502" font-size="22" fill="#7c2d12">Enable renewal reminders, keep registrar login secure, and document which subdomain points to which service.</text>
    <text x="128" y="538" font-size="22" fill="#7c2d12">For public services, avoid exposing admin panels directly even if the domain itself is only a test domain.</text>
  </g>
</svg>
