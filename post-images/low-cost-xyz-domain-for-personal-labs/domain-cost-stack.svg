<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">A simple cost stack for a personal domain lab</title>
  <desc id="desc">An illustration comparing a low-cost domain with common personal lab expenses.</desc>
  <rect width="1200" height="680" fill="#f7f5ef"/>
  <rect x="70" y="62" width="1060" height="556" rx="28" fill="#ffffff" stroke="#222222" stroke-width="3"/>
  <text x="110" y="125" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#222222">Personal Lab Domain Cost</text>
  <text x="110" y="174" font-family="Arial, sans-serif" font-size="24" fill="#4b5563">For home use, testing, temporary services, and non-brand sites.</text>
  <g transform="translate(110 240)">
    <rect x="0" y="0" width="980" height="94" rx="16" fill="#e8f3ff" stroke="#2563eb" stroke-width="3"/>
    <text x="34" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d4ed8">Domain: 10 years can be less than one small dinner</text>
    <text x="770" y="58" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">about 80 RMB</text>
  </g>
  <g transform="translate(110 366)">
    <rect x="0" y="0" width="300" height="150" rx="18" fill="#fef3c7" stroke="#b45309" stroke-width="3"/>
    <text x="28" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#92400e">DNS</text>
    <text x="28" y="92" font-family="Arial, sans-serif" font-size="22" fill="#78350f">usually free</text>
    <text x="28" y="124" font-family="Arial, sans-serif" font-size="22" fill="#78350f">for basic use</text>
    <rect x="340" y="0" width="300" height="150" rx="18" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
    <text x="368" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#166534">TLS</text>
    <text x="368" y="92" font-family="Arial, sans-serif" font-size="22" fill="#14532d">free certs are</text>
    <text x="368" y="124" font-family="Arial, sans-serif" font-size="22" fill="#14532d">enough for labs</text>
    <rect x="680" y="0" width="300" height="150" rx="18" fill="#fae8ff" stroke="#a21caf" stroke-width="3"/>
    <text x="708" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#86198f">Hosting</text>
    <text x="708" y="92" font-family="Arial, sans-serif" font-size="22" fill="#701a75">usually costs</text>
    <text x="708" y="124" font-family="Arial, sans-serif" font-size="22" fill="#701a75">more than the name</text>
  </g>
  <text x="110" y="575" font-family="Arial, sans-serif" font-size="21" fill="#6b7280">Rule of thumb: spend little on the test domain, spend attention on renewal, DNS, and service isolation.</text>
</svg>
