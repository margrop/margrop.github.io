<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="goodG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ef4444"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="520" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">有无 Bufferbloat 时的延迟对比</text>

  <!-- Legend -->
  <circle cx="58" cy="62" r="7" fill="#22c55e"/><text x="72" y="67" font-family="Arial, sans-serif" font-size="13" fill="#374151">延迟稳定</text>
  <circle cx="218" cy="62" r="7" fill="#ef4444"/><text x="232" y="67" font-family="Arial, sans-serif" font-size="13" fill="#374151">延迟飙升</text>
  <circle cx="368" cy="62" r="7" fill="#3b82f6"/><text x="382" y="67" font-family="Arial, sans-serif" font-size="13" fill="#374151">下载开始/结束</text>

  <!-- LEFT: Without Bufferbloat -->
  <text x="225" y="100" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#16a34a" text-anchor="middle">✅ 无 Bufferbloat（SQM 开启）</text>
  <rect x="50" y="108" width="350" height="195" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="10"/>

  <!-- SQM badge -->
  <rect x="60" y="118" width="140" height="34" fill="url(#goodG)" rx="8"/>
  <text x="130" y="141" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SQM + Cake</text>

  <!-- Timeline bar idle -->
  <rect x="60" y="165" width="90" height="14" fill="#22c55e" rx="7"/>
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="13" fill="#16a34a" font-weight="bold">空载 5ms</text>

  <!-- Download start -->
  <line x1="155" y1="172" x2="155" y2="153" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="155" y="147" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="bold">下载开始</text>

  <!-- Under load - still low latency -->
  <rect x="160" y="165" width="90" height="14" fill="#86efac" rx="7"/>
  <text x="160" y="160" font-family="Arial, sans-serif" font-size="13" fill="#16a34a" font-weight="bold">下载时 12ms</text>

  <!-- Download end -->
  <line x1="255" y1="172" x2="255" y2="153" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="255" y="147" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="bold">下载结束</text>

  <!-- Back to idle -->
  <rect x="260" y="165" width="90" height="14" fill="#22c55e" rx="7"/>
  <text x="260" y="160" font-family="Arial, sans-serif" font-size="13" fill="#16a34a" font-weight="bold">恢复 5ms</text>

  <!-- Ping dots (stable) -->
  <circle cx="75" cy="205" r="5" fill="#22c55e"/><circle cx="95" cy="207" r="5" fill="#22c55e"/>
  <circle cx="115" cy="205" r="5" fill="#22c55e"/><circle cx="135" cy="208" r="5" fill="#86efac"/>
  <circle cx="155" cy="209" r="5" fill="#86efac"/><circle cx="175" cy="206" r="5" fill="#86efac"/>
  <circle cx="195" cy="207" r="5" fill="#86efac"/><circle cx="215" cy="205" r="5" fill="#86efac"/>
  <circle cx="235" cy="208" r="5" fill="#86efac"/><circle cx="255" cy="206" r="5" fill="#22c55e"/>
  <circle cx="275" cy="205" r="5" fill="#22c55e"/><circle cx="295" cy="207" r="5" fill="#22c55e"/>
  <circle cx="315" cy="206" r="5" fill="#22c55e"/><circle cx="335" cy="205" r="5" fill="#22c55e"/>

  <!-- Latency label -->
  <text x="60" y="230" font-family="Arial, sans-serif" font-size="13" fill="#374151">Ping 延迟: 5ms ~ 12ms（小波动）</text>

  <!-- Summary box -->
  <rect x="60" y="240" width="330" height="55" fill="#dcfce7" rx="8"/>
  <text x="225" y="263" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">Cake 精确控制队列</text>
  <text x="225" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">大流量下延迟稳定在 20ms 以内</text>

  <!-- RIGHT: With Bufferbloat -->
  <text x="675" y="100" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626" text-anchor="middle">❌ 有 Bufferbloat（无 SQM）</text>
  <rect x="500" y="108" width="350" height="195" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="10"/>

  <!-- No SQM badge -->
  <rect x="510" y="118" width="140" height="34" fill="url(#badG)" rx="8"/>
  <text x="580" y="141" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">无队列管理</text>

  <!-- Idle -->
  <rect x="510" y="165" width="90" height="14" fill="#22c55e" rx="7"/>
  <text x="510" y="160" font-family="Arial, sans-serif" font-size="13" fill="#16a34a" font-weight="bold">空载 5ms</text>

  <!-- Download starts -->
  <line x1="605" y1="172" x2="605" y2="153" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrR)"/>
  <text x="605" y="147" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="bold">下载开始</text>

  <!-- Buffer fills! -->
  <rect x="610" y="155" width="120" height="35" fill="url(#badG)" rx="7"/>
  <text x="670" y="172" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">BUFFER FILL!</text>
  <text x="670" y="187" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">队列爆满</text>

  <!-- Download ends -->
  <line x1="735" y1="172" x2="735" y2="153" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrR)"/>
  <text x="735" y="147" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="bold">下载结束</text>

  <!-- Back to idle -->
  <rect x="740" y="165" width="90" height="14" fill="#22c55e" rx="7"/>
  <text x="740" y="160" font-family="Arial, sans-serif" font-size="13" fill="#16a34a" font-weight="bold">恢复 5ms</text>

  <!-- Ping dots (SPIKING!) -->
  <circle cx="525" cy="205" r="5" fill="#22c55e"/><circle cx="545" cy="206" r="5" fill="#22c55e"/>
  <circle cx="565" cy="205" r="5" fill="#22c55e"/>
  <circle cx="585" cy="218" r="6" fill="#ef4444"/><circle cx="605" cy="245" r="7" fill="#dc2626"/>
  <circle cx="625" cy="272" r="8" fill="#dc2626"/><circle cx="645" cy="288" r="8" fill="#b91c1c"/>
  <circle cx="665" cy="293" r="8" fill="#b91c1c"/><circle cx="685" cy="288" r="8" fill="#dc2626"/>
  <circle cx="705" cy="272" r="7" fill="#dc2626"/><circle cx="725" cy="245" r="7" fill="#dc2626"/>
  <circle cx="745" cy="212" r="6" fill="#ef4444"/>
  <circle cx="765" cy="206" r="5" fill="#22c55e"/><circle cx="785" cy="205" r="5" fill="#22c55e"/>
  <circle cx="805" cy="206" r="5" fill="#22c55e"/><circle cx="825" cy="205" r="5" fill="#22c55e"/>

  <!-- Latency label -->
  <text x="510" y="230" font-family="Arial, sans-serif" font-size="13" fill="#374151">Ping 延迟: 5ms ~ 290ms（爆炸!）</text>

  <!-- Summary box -->
  <rect x="510" y="240" width="330" height="55" fill="#fee2e2" rx="8"/>
  <text x="675" y="263" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">路由器缓冲区爆满</text>
  <text x="675" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">Ping 从 5ms 飙到 290ms</text>

  <!-- Architecture diagram -->
  <text x="450" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">SQM + Cake 优化原理</text>
  <rect x="50" y="370" width="800" height="130" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" rx="10"/>

  <!-- Internet -->
  <rect x="65" y="390" width="110" height="45" fill="url(#blueG)" rx="8" filter="url(#shadow)"/>
  <text x="120" y="412" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">互联网</text>
  <text x="120" y="427" font-family="Arial, sans-serif" font-size="11" fill="#bfdbfe" text-anchor="middle">下载流量</text>

  <!-- Arrow -->
  <line x1="180" y1="412" x2="240" y2="412" stroke="#374151" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="210" y="405" font-family="Arial, sans-serif" font-size="11" fill="#374151">流量</text>

  <!-- Bad router -->
  <rect x="245" y="385" width="150" height="55" fill="url(#badG)" rx="8" filter="url(#shadow)"/>
  <text x="320" y="408" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">普通路由器</text>
  <text x="320" y="426" font-family="Arial, sans-serif" font-size="11" fill="#fecaca" text-anchor="middle">Bufferbloat 缓冲</text>

  <!-- Bad arrow -->
  <line x1="400" y1="412" x2="460" y2="412" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrR)"/>
  <text x="430" y="403" font-family="Arial, sans-serif" font-size="11" fill="#dc2626" font-weight="bold">延迟爆炸!</text>

  <!-- Good router -->
  <rect x="465" y="385" width="150" height="55" fill="url(#goodG)" rx="8" filter="url(#shadow)"/>
  <text x="540" y="408" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">SQM + Cake</text>
  <text x="540" y="426" font-family="Arial, sans-serif" font-size="11" fill="#bbf7d0" text-anchor="middle">智能丢包/排队</text>

  <!-- Good arrow -->
  <line x1="620" y1="412" x2="680" y2="412" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="650" y="403" font-family="Arial, sans-serif" font-size="11" fill="#22c55e" font-weight="bold">稳定!</text>

  <!-- LAN -->
  <rect x="685" y="390" width="110" height="45" fill="#6b7280" rx="8" filter="url(#shadow)"/>
  <text x="740" y="412" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">内网设备</text>
  <text x="740" y="427" font-family="Arial, sans-serif" font-size="11" fill="#d1d5db" text-anchor="middle">游戏/视频</text>

  <!-- Caption -->
  <text x="450" y="515" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Cake 队列通过「公平队列 + 精确限速」让每个连接有序通过，避免任何人独占缓冲区</text>
</svg>