<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="goodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neutralGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>

  <rect width="900" height="500" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e293b" text-anchor="middle">无 Bufferbloat 时 vs 有 Bufferbloat 时的延迟对比</text>

  <!-- Legend -->
  <rect x="50" y="55" width="16" height="16" fill="#22c55e" rx="2"/>
  <text x="72" y="68" font-family="Arial, sans-serif" font-size="13" fill="#374151">延迟稳定（< 20ms 波动）</text>
  <rect x="260" y="55" width="16" height="16" fill="#ef4444" rx="2"/>
  <text x="282" y="68" font-family="Arial, sans-serif" font-size="13" fill="#374151">延迟飙升（Bufferbloat）</text>
  <rect x="460" y="55" width="16" height="16" fill="#3b82f6" rx="2"/>
  <text x="482" y="68" font-family="Arial, sans-serif" font-size="13" fill="#374151">下载开始 / 结束</text>

  <!-- WITHOUT BUFFERBLOAT section -->
  <text x="225" y="108" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#16a34a" text-anchor="middle">无 Bufferbloat（SQM 开启）</text>
  <rect x="50" y="115" width="350" height="180" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" rx="8"/>

  <!-- SQM icon -->
  <rect x="60" y="125" width="120" height="30" fill="#22c55e" rx="6"/>
  <text x="120" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">SQM + Cake</text>

  <!-- Idle period (low latency) -->
  <rect x="60" y="165" width="100" height="10" fill="#22c55e" rx="5"/>
  <text x="60" y="158" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">空载 5ms</text>

  <!-- Download starts -->
  <line x1="165" y1="170" x2="165" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="165" y="150" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">下载开始</text>

  <!-- Under load - still stable -->
  <rect x="170" y="165" width="110" height="10" fill="#facc15" rx="5"/>
  <text x="170" y="158" font-family="Arial, sans-serif" font-size="10" fill="#ca8a04">下载时 12ms</text>

  <!-- Download ends -->
  <line x1="285" y1="170" x2="285" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="285" y="150" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">下载结束</text>

  <!-- Back to idle -->
  <rect x="290" y="165" width="100" height="10" fill="#22c55e" rx="5"/>
  <text x="290" y="158" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">恢复 5ms</text>

  <!-- Ping dots (with SQM) -->
  <circle cx="80" cy="200" r="4" fill="#22c55e"/>
  <circle cx="100" cy="201" r="4" fill="#22c55e"/>
  <circle cx="120" cy="199" r="4" fill="#22c55e"/>
  <circle cx="140" cy="200" r="4" fill="#facc15"/>
  <circle cx="160" cy="201" r="4" fill="#facc15"/>
  <circle cx="180" cy="203" r="4" fill="#facc15"/>
  <circle cx="200" cy="201" r="4" fill="#facc15"/>
  <circle cx="220" cy="202" r="4" fill="#facc15"/>
  <circle cx="240" cy="200" r="4" fill="#facc15"/>
  <circle cx="260" cy="199" r="4" fill="#facc15"/>
  <circle cx="280" cy="201" r="4" fill="#facc15"/>
  <circle cx="300" cy="200" r="4" fill="#22c55e"/>
  <circle cx="320" cy="199" r="4" fill="#22c55e"/>
  <circle cx="340" cy="201" r="4" fill="#22c55e"/>

  <!-- Latency label -->
  <text x="60" y="225" font-family="Arial, sans-serif" font-size="11" fill="#374151">Ping 延迟: 5ms ~ 12ms（小波动）</text>

  <!-- SQM summary -->
  <rect x="60" y="235" width="330" height="50" fill="#dcfce7" rx="6"/>
  <text x="225" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">Cake 队列算法精确控制，</text>
  <text x="225" y="273" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">大流量下延迟仍稳定在 20ms 以内</text>


  <!-- WITH BUFFERBLOAT section -->
  <text x="675" y="108" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#dc2626" text-anchor="middle">有 Bufferbloat（无 SQM）</text>
  <rect x="500" y="115" width="350" height="180" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="8"/>

  <!-- No SQM -->
  <rect x="510" y="125" width="120" height="30" fill="#ef4444" rx="6"/>
  <text x="570" y="145" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">无队列管理</text>

  <!-- Idle period -->
  <rect x="510" y="165" width="100" height="10" fill="#22c55e" rx="5"/>
  <text x="510" y="158" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">空载 5ms</text>

  <!-- Download starts -->
  <line x1="615" y1="170" x2="615" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="615" y="150" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">下载开始</text>

  <!-- Buffer fills - latency EXPLODES -->
  <rect x="620" y="155" width="110" height="30" fill="#ef4444" rx="5"/>
  <text x="675" y="165" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">BUFFER</text>
  <text x="675" y="178" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">FILL!</text>

  <!-- Download ends -->
  <line x1="735" y1="170" x2="735" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="735" y="150" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">下载结束</text>

  <!-- Back to idle -->
  <rect x="740" y="165" width="100" height="10" fill="#22c55e" rx="5"/>
  <text x="740" y="158" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">恢复 5ms</text>

  <!-- Ping dots (with Bufferbloat) -->
  <circle cx="530" cy="200" r="4" fill="#22c55e"/>
  <circle cx="550" cy="199" r="4" fill="#22c55e"/>
  <circle cx="570" cy="200" r="4" fill="#22c55e"/>
  <circle cx="590" cy="215" r="5" fill="#ef4444"/>
  <circle cx="610" cy="240" r="6" fill="#dc2626"/>
  <circle cx="630" cy="270" r="7" fill="#dc2626"/>
  <circle cx="650" cy="285" r="7" fill="#b91c1c"/>
  <circle cx="670" cy="290" r="7" fill="#b91c1c"/>
  <circle cx="690" cy="285" r="7" fill="#dc2626"/>
  <circle cx="710" cy="270" r="6" fill="#dc2626"/>
  <circle cx="730" cy="240" r="6" fill="#dc2626"/>
  <circle cx="750" cy="200" r="4" fill="#ef4444"/>
  <circle cx="770" cy="201" r="4" fill="#22c55e"/>
  <circle cx="790" cy="199" r="4" fill="#22c55e"/>
  <circle cx="810" cy="200" r="4" fill="#22c55e"/>

  <!-- Latency label -->
  <text x="510" y="225" font-family="Arial, sans-serif" font-size="11" fill="#374151">Ping 延迟: 5ms ~ 290ms（爆炸！）</text>

  <!-- Bufferbloat summary -->
  <rect x="510" y="235" width="330" height="50" fill="#fee2e2" rx="6"/>
  <text x="675" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">路由器缓冲区爆满，</text>
  <text x="675" y="273" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">Ping 从 5ms 飙到 290ms，游戏卡成 PPT</text>

  <!-- Bottom architecture diagram -->
  <text x="450" y="340" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">SQM + Cake 队列优化原理</text>

  <rect x="50" y="355" width="800" height="120" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" rx="8"/>

  <!-- Internet -->
  <rect x="60" y="370" width="120" height="40" fill="#3b82f6" rx="6"/>
  <text x="120" y="395" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">互联网</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="390" x2="255" y2="390" stroke="#374151" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="220" y="383" font-family="Arial, sans-serif" font-size="10" fill="#374151">下载流量</text>

  <!-- Router without SQM -->
  <rect x="260" y="365" width="160" height="50" fill="#ef4444" rx="6"/>
  <text x="340" y="385" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">普通路由器</text>
  <text x="340" y="402" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Bufferbloat 缓冲</text>

  <!-- Bad arrow -->
  <line x1="425" y1="390" x2="495" y2="390" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="460" y="383" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">延迟爆炸的包</text>

  <!-- Router with SQM (good) -->
  <rect x="500" y="365" width="160" height="50" fill="#22c55e" rx="6"/>
  <text x="580" y="385" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">SQM + Cake</text>
  <text x="580" y="402" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">智能丢包/排队</text>

  <!-- Good arrow -->
  <line x1="665" y1="390" x2="735" y2="390" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="700" y="383" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">稳定延迟的包</text>

  <!-- LAN -->
  <rect x="740" y="370" width="100" height="40" fill="#6b7280" rx="6"/>
  <text x="790" y="395" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">内网设备</text>

  <!-- Caption -->
  <text x="450" y="495" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Cake 队列通过 "公平队列 + 精确限速" 让每个连接有序通过，避免任何人独占缓冲区</text>
</svg>