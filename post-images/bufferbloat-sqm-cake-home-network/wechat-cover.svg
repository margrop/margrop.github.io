<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bgGrad)" rx="0"/>

  <!-- Decorative grid lines -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="383"/>
    <line x1="300" y1="0" x2="300" y2="383"/>
    <line x1="450" y1="0" x2="450" y2="383"/>
    <line x1="600" y1="0" x2="600" y2="383"/>
    <line x1="750" y1="0" x2="750" y2="383"/>
  </g>

  <!-- Left side: Problem indicator -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="260" height="260" fill="#1a1a2e" rx="16" stroke="#ef4444" stroke-width="2" opacity="0.9"/>
    <!-- Warning icon -->
    <circle cx="160" cy="105" r="28" fill="#ef4444" opacity="0.9"/>
    <text x="160" y="114" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">!</text>
    <!-- Lag spikes visual -->
    <text x="160" y="155" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">延迟 spike</text>
    <!-- Spike bars -->
    <rect x="55" y="170" width="12" height="30" fill="#ef4444" rx="3" opacity="0.4"/>
    <rect x="75" y="165" width="12" height="35" fill="#ef4444" rx="3" opacity="0.5"/>
    <rect x="95" y="160" width="12" height="40" fill="#ef4444" rx="3" opacity="0.6"/>
    <rect x="115" y="145" width="12" height="55" fill="#ef4444" rx="3" opacity="0.8"/>
    <rect x="135" y="125" width="12" height="75" fill="#ef4444" rx="3" opacity="0.9"/>
    <rect x="155" y="120" width="12" height="80" fill="#ef4444" rx="3"/>
    <rect x="175" y="130" width="12" height="70" fill="#ef4444" rx="3" opacity="0.9"/>
    <rect x="195" y="150" width="12" height="50" fill="#ef4444" rx="3" opacity="0.7"/>
    <rect x="215" y="162" width="12" height="38" fill="#ef4444" rx="3" opacity="0.5"/>
    <rect x="235" y="168" width="12" height="32" fill="#ef4444" rx="3" opacity="0.4"/>
    <!-- Label -->
    <text x="160" y="230" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ef4444" text-anchor="middle">⚠️ Bufferbloat</text>
    <text x="160" y="255" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">下载时 Ping 飙升</text>
    <text x="160" y="275" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">50ms → 500ms</text>
  </g>

  <!-- Center divider -->
  <line x1="320" y1="50" x2="320" y2="333" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="320" cy="190" r="22" fill="url(#accentGrad)" opacity="0.9"/>
  <text x="320" y="197" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">→</text>

  <!-- Right side: Solution indicator -->
  <g filter="url(#shadow)">
    <rect x="610" y="60" width="260" height="260" fill="#1a1a2e" rx="16" stroke="#22c55e" stroke-width="2" opacity="0.9"/>
    <!-- Checkmark icon -->
    <circle cx="740" cy="105" r="28" fill="#22c55e" opacity="0.9"/>
    <text x="740" y="114" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">✓</text>
    <!-- Stable bars -->
    <text x="740" y="155" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#22c55e" text-anchor="middle">延迟 稳定</text>
    <rect x="635" y="170" width="12" height="28" fill="#22c55e" rx="3" opacity="0.4"/>
    <rect x="655" y="172" width="12" height="26" fill="#22c55e" rx="3" opacity="0.5"/>
    <rect x="675" y="168" width="12" height="30" fill="#22c55e" rx="3" opacity="0.6"/>
    <rect x="695" y="170" width="12" height="28" fill="#22c55e" rx="3" opacity="0.7"/>
    <rect x="715" y="171" width="12" height="27" fill="#22c55e" rx="3" opacity="0.8"/>
    <rect x="735" y="170" width="12" height="28" fill="#22c55e" rx="3" opacity="0.9"/>
    <rect x="755" y="172" width="12" height="26" fill="#22c55e" rx="3" opacity="0.7"/>
    <rect x="775" y="169" width="12" height="29" fill="#22c55e" rx="3" opacity="0.6"/>
    <rect x="795" y="171" width="12" height="27" fill="#22c55e" rx="3" opacity="0.5"/>
    <rect x="815" y="173" width="12" height="25" fill="#22c55e" rx="3" opacity="0.4"/>
    <!-- Label -->
    <text x="740" y="230" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#22c55e" text-anchor="middle">✅ SQM + Cake</text>
    <text x="740" y="255" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Ping 稳定在</text>
    <text x="740" y="275" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">176ms 几乎不抖动</text>
  </g>

  <!-- Title area at bottom -->
  <g filter="url(#glow)">
    <text x="450" y="355" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="2">BUFFERBLOAT</text>
  </g>

  <!-- Top label -->
  <rect x="350" y="15" width="200" height="28" rx="14" fill="url(#accentGrad)" opacity="0.9"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">网络优化 / 家庭网络</text>

  <!-- Bottom tagline -->
  <text x="450" y="378" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="1">家里网速明明很快，打游戏却卡成 PPT？一次 Bufferbloat 的完整排查与解决</text>
</svg>