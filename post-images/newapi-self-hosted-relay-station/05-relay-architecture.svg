<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">New API relay architecture</title>
  <desc id="desc">Apps connect to New API, New API routes requests to authorized upstream model providers, then returns compatible API responses.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#132b3f"/>
    </linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M2,2 L14,8 L2,14 Z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <g opacity=".18">
    <circle cx="115" cy="120" r="80" fill="#14b8a6"/>
    <circle cx="1260" cy="690" r="120" fill="#2563eb"/>
  </g>
  <text x="720" y="78" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">A self-hosted model relay is a front desk, not a magic model</text>
  <text x="720" y="124" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="24">One endpoint in, policy and accounting in the middle, authorized providers out</text>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="95" y="220" width="275" height="96" rx="18" fill="#f8fafc"/>
    <text x="232" y="258" text-anchor="middle" fill="#0f172a" font-size="26" font-weight="800">Apps</text>
    <text x="232" y="291" text-anchor="middle" fill="#475569" font-size="18">CLI, chat UI, workflow</text>

    <rect x="95" y="362" width="275" height="96" rx="18" fill="#f8fafc"/>
    <text x="232" y="400" text-anchor="middle" fill="#0f172a" font-size="26" font-weight="800">Tokens</text>
    <text x="232" y="433" text-anchor="middle" fill="#475569" font-size="18">Quota, group, model scope</text>

    <rect x="95" y="504" width="275" height="96" rx="18" fill="#f8fafc"/>
    <text x="232" y="542" text-anchor="middle" fill="#0f172a" font-size="26" font-weight="800">Operators</text>
    <text x="232" y="575" text-anchor="middle" fill="#475569" font-size="18">Dashboard and logs</text>

    <rect x="560" y="282" width="320" height="230" rx="28" fill="url(#node)" stroke="#a7f3d0" stroke-width="3"/>
    <text x="720" y="357" text-anchor="middle" fill="#ffffff" font-size="42" font-weight="900">New API</text>
    <text x="720" y="403" text-anchor="middle" fill="#e0f2fe" font-size="22">routing + accounting + compatibility</text>
    <text x="720" y="443" text-anchor="middle" fill="#e0f2fe" font-size="22">OpenAI / Claude / Gemini style APIs</text>

    <rect x="1065" y="220" width="280" height="96" rx="18" fill="#f8fafc"/>
    <text x="1205" y="258" text-anchor="middle" fill="#0f172a" font-size="26" font-weight="800">Provider A</text>
    <text x="1205" y="291" text-anchor="middle" fill="#475569" font-size="18">Authorized upstream</text>

    <rect x="1065" y="362" width="280" height="96" rx="18" fill="#f8fafc"/>
    <text x="1205" y="400" text-anchor="middle" fill="#0f172a" font-size="26" font-weight="800">Provider B</text>
    <text x="1205" y="433" text-anchor="middle" fill="#475569" font-size="18">Fallback or weighted route</text>

    <rect x="1065" y="504" width="280" height="96" rx="18" fill="#f8fafc"/>
    <text x="1205" y="542" text-anchor="middle" fill="#0f172a" font-size="26" font-weight="800">Provider C</text>
    <text x="1205" y="575" text-anchor="middle" fill="#475569" font-size="18">Different model family</text>
  </g>

  <g fill="none" stroke="#7dd3fc" stroke-width="6" marker-end="url(#arrow)">
    <path d="M375 268 C440 268 478 330 548 352"/>
    <path d="M375 410 C450 410 470 398 542 398"/>
    <path d="M375 552 C440 552 478 474 548 445"/>
    <path d="M890 352 C960 330 990 268 1050 268"/>
    <path d="M890 398 C960 398 990 410 1050 410"/>
    <path d="M890 445 C960 474 990 552 1050 552"/>
  </g>

  <text x="720" y="710" text-anchor="middle" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Think of it like a canteen card system: users swipe one card, the counter decides which kitchen serves the meal.</text>
</svg>
