<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">New API deployment checklist</title>
  <desc id="desc">A deployment checklist for New API: compose file, persistent data, secrets, startup, initialization, model channel, verification, and backup.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#64748b" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="720" y="82" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="900">Do not just start the container. Close the loop.</text>
  <text x="720" y="128" text-anchor="middle" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24">A practical self-hosted New API deployment checklist</text>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(110,205)">
      <rect width="260" height="150" rx="16" fill="url(#card)"/>
      <circle cx="44" cy="44" r="24" fill="#0ea5e9"/><text x="44" y="53" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">1</text>
      <text x="82" y="48" fill="#0f172a" font-size="24" font-weight="800">Compose</text>
      <text x="32" y="92" fill="#475569" font-size="18">Pin image tag, map port,</text>
      <text x="32" y="120" fill="#475569" font-size="18">keep data on disk.</text>
    </g>
    <g transform="translate(430,205)">
      <rect width="260" height="150" rx="16" fill="url(#card)"/>
      <circle cx="44" cy="44" r="24" fill="#10b981"/><text x="44" y="53" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">2</text>
      <text x="82" y="48" fill="#0f172a" font-size="24" font-weight="800">Secrets</text>
      <text x="32" y="92" fill="#475569" font-size="18">Generate session secret,</text>
      <text x="32" y="120" fill="#475569" font-size="18">never paste API keys.</text>
    </g>
    <g transform="translate(750,205)">
      <rect width="260" height="150" rx="16" fill="url(#card)"/>
      <circle cx="44" cy="44" r="24" fill="#f59e0b"/><text x="44" y="53" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">3</text>
      <text x="82" y="48" fill="#0f172a" font-size="24" font-weight="800">Start</text>
      <text x="32" y="92" fill="#475569" font-size="18">Run docker compose up,</text>
      <text x="32" y="120" fill="#475569" font-size="18">watch logs once.</text>
    </g>
    <g transform="translate(1070,205)">
      <rect width="260" height="150" rx="16" fill="url(#card)"/>
      <circle cx="44" cy="44" r="24" fill="#8b5cf6"/><text x="44" y="53" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">4</text>
      <text x="82" y="48" fill="#0f172a" font-size="24" font-weight="800">Init</text>
      <text x="32" y="92" fill="#475569" font-size="18">Create admin account,</text>
      <text x="32" y="120" fill="#475569" font-size="18">then enable 2FA.</text>
    </g>
    <g transform="translate(110,455)">
      <rect width="260" height="150" rx="16" fill="url(#card)"/>
      <circle cx="44" cy="44" r="24" fill="#ec4899"/><text x="44" y="53" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">5</text>
      <text x="82" y="48" fill="#0f172a" font-size="24" font-weight="800">Channel</text>
      <text x="32" y="92" fill="#475569" font-size="18">Add authorized upstream,</text>
      <text x="32" y="120" fill="#475569" font-size="18">test one cheap model.</text>
    </g>
    <g transform="translate(430,455)">
      <rect width="260" height="150" rx="16" fill="url(#card)"/>
      <circle cx="44" cy="44" r="24" fill="#14b8a6"/><text x="44" y="53" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">6</text>
      <text x="82" y="48" fill="#0f172a" font-size="24" font-weight="800">Token</text>
      <text x="32" y="92" fill="#475569" font-size="18">Create scoped user token,</text>
      <text x="32" y="120" fill="#475569" font-size="18">limit quota and models.</text>
    </g>
    <g transform="translate(750,455)">
      <rect width="260" height="150" rx="16" fill="url(#card)"/>
      <circle cx="44" cy="44" r="24" fill="#2563eb"/><text x="44" y="53" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">7</text>
      <text x="82" y="48" fill="#0f172a" font-size="24" font-weight="800">Verify</text>
      <text x="32" y="92" fill="#475569" font-size="18">Check status endpoint,</text>
      <text x="32" y="120" fill="#475569" font-size="18">logs, and one request.</text>
    </g>
    <g transform="translate(1070,455)">
      <rect width="260" height="150" rx="16" fill="url(#card)"/>
      <circle cx="44" cy="44" r="24" fill="#dc2626"/><text x="44" y="53" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">8</text>
      <text x="82" y="48" fill="#0f172a" font-size="24" font-weight="800">Backup</text>
      <text x="32" y="92" fill="#475569" font-size="18">Copy data directory,</text>
      <text x="32" y="120" fill="#475569" font-size="18">test restore once.</text>
    </g>
  </g>
  <text x="720" y="720" text-anchor="middle" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">The container running is only step 3. The useful system starts after verification.</text>
</svg>
