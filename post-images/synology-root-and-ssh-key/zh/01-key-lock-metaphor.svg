<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="nas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="laptop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="800" height="460" fill="url(#bg)"/>

  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">SSH 登录的「钥匙与锁」比喻</text>
  <text x="400" y="66" text-anchor="middle" font-size="14" fill="#475569">客户端是房客，服务器是大门；公钥是锁孔，私钥是钥匙</text>

  <!-- Client side -->
  <g transform="translate(60,120)">
    <rect width="240" height="240" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="120" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">你的电脑（客户端）</text>

    <!-- laptop icon -->
    <rect x="60" y="60" width="120" height="80" rx="6" fill="url(#laptop)"/>
    <rect x="68" y="68" width="104" height="58" rx="3" fill="#0f172a"/>
    <text x="120" y="105" text-anchor="middle" font-size="11" fill="#fbbf24" font-family="monospace">$ ssh root@nas</text>
    <rect x="50" y="140" width="140" height="10" rx="3" fill="#92400e"/>

    <!-- private key -->
    <g transform="translate(40,170)">
      <rect width="160" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="3 3"/>
      <text x="80" y="18" text-anchor="middle" font-size="11" fill="#475569">~/.ssh/id_ed25519</text>
      <text x="80" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">🔑 私钥（绝不外传）</text>
    </g>
  </g>

  <!-- Network pipe -->
  <g transform="translate(310,200)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="26" text-anchor="middle" font-size="14" fill="#1e3a8a">🔒 加密信道（22 端口）</text>
  </g>

  <!-- arrow -->
  <path d="M300 220 L310 220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M490 220 L500 220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Server side -->
  <g transform="translate(500,120)">
    <rect width="240" height="240" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="120" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">群晖 NAS（服务器）</text>

    <!-- NAS icon -->
    <rect x="50" y="55" width="140" height="90" rx="6" fill="url(#nas)"/>
    <rect x="60" y="68" width="120" height="10" rx="2" fill="#475569"/>
    <circle cx="68" cy="73" r="2" fill="#10b981"/>
    <rect x="60" y="84" width="120" height="10" rx="2" fill="#475569"/>
    <circle cx="68" cy="89" r="2" fill="#fbbf24"/>
    <rect x="60" y="100" width="120" height="10" rx="2" fill="#475569"/>
    <circle cx="68" cy="105" r="2" fill="#64748b"/>
    <rect x="60" y="116" width="120" height="22" rx="3" fill="#0f172a"/>
    <text x="120" y="131" text-anchor="middle" font-size="10" fill="#10b981" font-family="monospace">DSM 7.2 ready</text>

    <!-- public key -->
    <g transform="translate(40,170)">
      <rect width="160" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="3 3"/>
      <text x="80" y="18" text-anchor="middle" font-size="11" fill="#475569">/root/.ssh/authorized_keys</text>
      <text x="80" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">🔓 公钥（谁都可以看）</text>
    </g>
  </g>

  <!-- bottom note -->
  <g transform="translate(60,390)">
    <rect width="680" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="20" y="22" font-size="13" fill="#065f46" font-weight="600">✅ 匹配：客户端拿私钥签名 → 服务器拿公钥验签 → 放行</text>
    <text x="20" y="40" font-size="12" fill="#065f46">公钥/私钥是配对生成的数学兄弟，一对一才能开门。公钥放服务器，私钥留本地。</text>
  </g>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>