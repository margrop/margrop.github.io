<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="client" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#064e3b">免密 SSH 登录的六次握手</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#0f766e">私钥从不离开本地；网络上传的只是一段"谁也算不出来"的数学题答案</text>

  <!-- Client -->
  <g transform="translate(50,100)">
    <rect width="200" height="280" rx="12" fill="url(#client)" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">💻 客户端（你的电脑）</text>
    <text x="20" y="60" font-size="11" fill="#7c2d12">持有：私钥 id_ed25519</text>
    <text x="20" y="78" font-size="11" fill="#7c2d12">密码：从不发送</text>

    <g transform="translate(20,110)">
      <rect width="160" height="34" rx="6" fill="#ffffff" stroke="#92400e"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" fill="#7c2d12">① ssh root@nas 发起连接</text>
    </g>
    <g transform="translate(20,150)">
      <rect width="160" height="34" rx="6" fill="#ffffff" stroke="#92400e"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" fill="#7c2d12">③ 收到随机挑战 challenge</text>
    </g>
    <g transform="translate(20,190)">
      <rect width="160" height="34" rx="6" fill="#ffffff" stroke="#92400e"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" fill="#7c2d12">④ 用私钥签名 challenge</text>
    </g>
    <g transform="translate(20,230)">
      <rect width="160" height="34" rx="6" fill="#10b981"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">⑥ 进入 shell</text>
    </g>
  </g>

  <!-- Server -->
  <g transform="translate(550,100)">
    <rect width="200" height="280" rx="12" fill="url(#server)" stroke="#0f172a" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">🖥️ 群晖 NAS</text>
    <text x="20" y="60" font-size="11" fill="#fbbf24">持有：公钥 authorized_keys</text>
    <text x="20" y="78" font-size="11" fill="#fbbf24">密码：从不要求</text>

    <g transform="translate(20,110)">
      <rect width="160" height="34" rx="6" fill="#1e293b" stroke="#475569"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" fill="#fbbf24">② 生成一个随机字符串</text>
    </g>
    <g transform="translate(20,150)">
      <rect width="160" height="34" rx="6" fill="#1e293b" stroke="#475569"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" fill="#fbbf24">⑤ 用公钥验签</text>
    </g>
    <g transform="translate(20,190)">
      <rect width="160" height="34" rx="6" fill="#1e293b" stroke="#475569"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" fill="#fbbf24">    签名匹配 → 放行</text>
    </g>
    <g transform="translate(20,230)">
      <rect width="160" height="34" rx="6" fill="#10b981"/>
      <text x="80" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">⑥ 打开 shell</text>
    </g>
  </g>

  <!-- arrows between them -->
  <g stroke="#0f766e" stroke-width="2" fill="none">
    <path d="M250 144 L550 144" marker-end="url(#arr)"/>
    <text x="400" y="138" text-anchor="middle" font-size="10" fill="#0f766e">TCP 三次握手 + 加密算法协商</text>

    <path d="M550 184 L250 184" marker-end="url(#arr2)"/>
    <text x="400" y="178" text-anchor="middle" font-size="10" fill="#0f766e">发回 challenge（公开）</text>

    <path d="M250 224 L550 224" marker-end="url(#arr)"/>
    <text x="400" y="218" text-anchor="middle" font-size="10" fill="#0f766e">签名结果（公开）</text>

    <path d="M550 264 L250 264" marker-end="url(#arr2)"/>
    <text x="400" y="258" text-anchor="middle" font-size="10" fill="#0f766e">验证通过 ✅</text>
  </g>

  <!-- bottom note -->
  <g transform="translate(50,410)">
    <rect width="700" height="60" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#064e3b">为什么私钥不上网？</text>
    <text x="20" y="46" font-size="12" fill="#064e3b">服务器给你的是一道"只能用你那把钥匙才能解"的数学题；网络中间的黑客就算截获了题目和答案，</text>
    <text x="20" y="60" font-size="12" fill="#064e3b">也算不出私钥本身。这就是"非对称加密"的精髓——锁和钥匙是两种东西，锁可以广播，钥匙不行。</text>
  </g>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
</svg>