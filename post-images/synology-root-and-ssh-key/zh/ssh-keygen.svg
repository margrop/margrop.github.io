<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <linearGradient id="term2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="380" rx="10" fill="#cbd5e1"/>
  <rect x="2" y="2" width="1096" height="376" rx="8" fill="#e2e8f0"/>
  <rect x="2" y="2" width="1096" height="40" rx="8" fill="#e2e8f0"/>
  <rect x="2" y="30" width="1096" height="12" fill="#e2e8f0"/>
  <circle cx="24" cy="22" r="7" fill="#ef4444"/>
  <circle cx="46" cy="22" r="7" fill="#fbbf24"/>
  <circle cx="68" cy="22" r="7" fill="#22c55e"/>
  <text x="550" y="26" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#475569">user@macbook — ssh-keygen</text>

  <rect x="2" y="42" width="1096" height="336" fill="url(#term2)"/>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14">
    <text x="20" y="78" fill="#a6e3a1">$ ssh-keygen -t ed25519 -C "macbook@home"</text>
    <text x="20" y="103" fill="#cdd6f4">Generating public/private ed25519 key pair.</text>
    <text x="20" y="128" fill="#a6adc8">Enter file in which to save the key (/Users/you/.ssh/id_ed25519): </text>
    <text x="20" y="153" fill="#cdd6f4">/Users/you/.ssh/id_ed25519</text>
    <text x="20" y="178" fill="#a6adc8">Enter passphrase (empty for no passphrase): </text>
    <text x="20" y="203" fill="#cdd6f4">[直接回车，不设密码]</text>
    <text x="20" y="228" fill="#a6adc8">Enter same passphrase again: </text>
    <text x="20" y="253" fill="#cdd6f4">[直接回车]</text>
    <text x="20" y="278" fill="#a6e3a1">Your identification has been saved in /Users/you/.ssh/id_ed25519</text>
    <text x="20" y="303" fill="#a6e3a1">Your public key has been saved in /Users/you/.ssh/id_ed25519.pub</text>
    <text x="20" y="328" fill="#f9e2af">The key fingerprint is:</text>
    <text x="20" y="353" fill="#f9e2af">SHA256:AbCdEf1234567... macbook@home</text>
  </g>
</svg>