<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="460" fill="url(#bg)"/>

  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1b4b">为什么群晖默认不让你 root 直接 SSH？</text>

  <!-- Center: a door -->
  <g transform="translate(330,90)">
    <rect width="140" height="220" rx="8" fill="#78350f" stroke="#451a03" stroke-width="3"/>
    <rect x="10" y="20" width="120" height="120" rx="4" fill="#451a03"/>
    <circle cx="118" cy="120" r="5" fill="#fbbf24"/>
    <text x="70" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">SSH 22 号门</text>
    <text x="70" y="200" text-anchor="middle" font-size="11" fill="#fbbf24">root: 进不来</text>
  </g>

  <!-- Left: brute force attacker -->
  <g transform="translate(60,150)">
    <rect width="220" height="100" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">🌐 互联网上成千上万的脚本</text>
    <text x="110" y="55" text-anchor="middle" font-size="12" fill="#7f1d1d">每天 24 小时不间断尝试</text>
    <text x="110" y="74" text-anchor="middle" font-size="12" fill="#7f1d1d">ssh root@你的IP</text>
    <text x="110" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">爆破 root 弱口令</text>
  </g>

  <path d="M280 200 L330 200" stroke="#dc2626" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="305" y="195" text-anchor="middle" font-size="11" fill="#dc2626">暴力敲门</text>

  <!-- Right: defense strategy -->
  <g transform="translate(520,120)">
    <rect width="220" height="180" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">🛡️ DSM 的两道防线</text>

    <text x="20" y="62" font-size="12" fill="#064e3b">① 默认关 SSH 22 端口</text>
    <text x="20" y="82" font-size="11" fill="#475569">门是关着的，扫到也没用</text>

    <text x="20" y="110" font-size="12" fill="#064e3b">② 即便打开也禁止 root 直登</text>
    <text x="20" y="130" font-size="11" fill="#475569">让攻击者多猜一道用户名</text>

    <text x="20" y="158" font-size="12" fill="#064e3b">③ 非对称加密 + 密钥长度</text>
    <text x="20" y="178" font-size="11" fill="#475569">Ed25519 / RSA-4096 算不动</text>
  </g>

  <path d="M470 200 L520 200" stroke="#10b981" stroke-width="3" marker-end="url(#arr)"/>
  <text x="495" y="195" text-anchor="middle" font-size="11" fill="#10b981">群晖的回应</text>

  <!-- bottom -->
  <g transform="translate(60,350)">
    <rect width="680" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#7c2d12">一个比喻：</text>
    <text x="20" y="50" font-size="13" fill="#7c2d12">这就像你家门上装了"指纹锁 + 猫眼监控 + 防撬报警"三件套——不是不让你回家，是</text>
    <text x="20" y="68" font-size="13" font-weight="700" fill="#7c2d12">不让你家变成全互联网都能敲门的路边摊。</text>
  </g>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>