<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <!-- macOS terminal chrome -->
  <rect width="1100" height="460" rx="10" fill="#cbd5e1"/>
  <rect x="2" y="2" width="1096" height="456" rx="8" fill="#e2e8f0"/>

  <!-- title bar -->
  <rect x="2" y="2" width="1096" height="40" rx="8" fill="#e2e8f0"/>
  <rect x="2" y="30" width="1096" height="12" fill="#e2e8f0"/>
  <circle cx="24" cy="22" r="7" fill="#ef4444"/>
  <circle cx="46" cy="22" r="7" fill="#fbbf24"/>
  <circle cx="68" cy="22" r="7" fill="#22c55e"/>
  <text x="550" y="26" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#475569">user@macbook — ssh root@nas — 92×24</text>

  <!-- terminal content -->
  <rect x="2" y="42" width="1096" height="416" fill="url(#term)"/>

  <!-- text content -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14">
    <text x="20" y="80" fill="#a6e3a1">$ ssh admin@nas.local</text>
    <text x="20" y="105" fill="#cdd6f4">admin@nas.local's password: </text>
    <text x="20" y="130" fill="#a6adc8">Last login: Wed Jun 18 09:14:23 2026 from 192.168.x.x</text>
    <text x="20" y="155" fill="#a6e3a1">admin@nas:~$ sudo -i</text>
    <text x="20" y="180" fill="#cdd6f4">Password:</text>
    <text x="20" y="205" fill="#a6e3a1">root@nas:~# vi /etc/ssh/sshd_config</text>
    <text x="20" y="240" fill="#f38ba8"># Authentication:</text>
    <text x="20" y="265" fill="#cdd6f4">#LoginGraceTime 2m</text>
    <text x="20" y="290" fill="#cdd6f4">#PermitRootLogin prohibit-password</text>
    <text x="20" y="315" fill="#a6e3a1">PermitRootLogin yes</text>
    <text x="20" y="340" fill="#cdd6f4">#StrictModes yes</text>
    <text x="20" y="365" fill="#cdd6f4">#MaxAuthTries 6</text>
    <text x="20" y="395" fill="#fab387">~</text>
    <text x="20" y="412" fill="#fab387">~</text>
    <text x="20" y="432" fill="#a6e3a1">:wq</text>
    <text x="40" y="450" fill="#f38ba8">[已完成编辑]</text>
  </g>
</svg>