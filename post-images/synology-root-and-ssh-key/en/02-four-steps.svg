<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg)"/>

  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#7c2d12">四步走：把群晖 SSH root + 免密全打通</text>

  <!-- 4 steps -->
  <g transform="translate(40,90)">
    <!-- Step 1 -->
    <g>
      <circle cx="50" cy="50" r="32" fill="url(#ok)"/>
      <text x="50" y="58" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">1</text>
      <rect x="100" y="20" width="600" height="64" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
      <text x="116" y="44" font-size="15" font-weight="700" fill="#0f172a">控制面板 → 终端机和 SNMP → 启用 SSH</text>
      <text x="116" y="66" font-size="12" fill="#475569">先把"门"打开。DSM 默认把 SSH 关掉，这是第一道门槛。</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(0,110)">
      <circle cx="50" cy="50" r="32" fill="url(#ok)"/>
      <text x="50" y="58" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">2</text>
      <rect x="100" y="20" width="600" height="64" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
      <text x="116" y="44" font-size="15" font-weight="700" fill="#0f172a">用 admin 登录后 sudo -i 切换到 root</text>
      <text x="116" y="66" font-size="12" fill="#475569">SSH 默认拒绝 root 直登；用普通账户"借权限"绕过去。</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(0,220)">
      <circle cx="50" cy="50" r="32" fill="url(#warn)"/>
      <text x="50" y="58" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">3</text>
      <rect x="100" y="20" width="600" height="64" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
      <text x="116" y="44" font-size="15" font-weight="700" fill="#0f172a">改 /etc/ssh/sshd_config：PermitRootLogin yes</text>
      <text x="116" y="66" font-size="12" fill="#475569">这一行不改，前面所有的"钥匙"都被门卫拦下。</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(0,330)">
      <circle cx="50" cy="50" r="32" fill="url(#ok)"/>
      <text x="50" y="58" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">4</text>
      <rect x="100" y="20" width="600" height="64" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
      <text x="116" y="44" font-size="15" font-weight="700" fill="#0f172a">synouser --setpw root + 写 authorized_keys</text>
      <text x="116" y="66" font-size="12" fill="#475569">设密码 + 放公钥，从此 root 直登 + 免密，爽。</text>
    </g>
  </g>
</svg>