<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="600" ry="300" fill="url(#glow)"/>

  <!-- decorative grid -->
  <g stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- title -->
  <text x="600" y="200" text-anchor="middle" font-size="56" font-weight="900" fill="#fbbf24">群晖的 root 不让你 SSH？</text>
  <text x="600" y="280" text-anchor="middle" font-size="38" font-weight="700" fill="#ffffff">那就把它重新"教会"</text>

  <text x="600" y="360" text-anchor="middle" font-size="22" fill="#cbd5e1">从 sudo 到 sshd_config</text>
  <text x="600" y="394" text-anchor="middle" font-size="22" fill="#cbd5e1">再到免密登录，一次讲透</text>

  <!-- terminal mock -->
  <g transform="translate(150,440)">
    <rect width="900" height="130" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#fbbf24"/>
    <circle cx="60" cy="20" r="6" fill="#22c55e"/>
    <text x="80" y="24" font-size="11" fill="#94a3b8" font-family="monospace">root@nas:~#</text>

    <text x="30" y="60" font-family="monospace" font-size="16" fill="#22c55e">$ ssh root@nas</text>
    <text x="30" y="86" font-family="monospace" font-size="16" fill="#fbbf24">Last login: Wed Jun 18 09:42 from 192.168.x.x</text>
    <text x="30" y="112" font-family="monospace" font-size="16" fill="#cbd5e1">root@nas:~# <tspan fill="#fbbf24">█</tspan></text>
  </g>

  <text x="600" y="610" text-anchor="middle" font-size="14" fill="#64748b">blog.margrop.net · 魔都水滴 · 2026</text>
</svg>