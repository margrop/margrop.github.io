<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#7f1d1d">vi 编辑器三秒钟入门（够用版）</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#9f1239">vi 一共就三种模式：能看、能改、能搜</text>

  <!-- Mode boxes -->
  <g transform="translate(40,100)">
    <!-- Normal mode -->
    <rect width="230" height="160" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="115" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">① 普通模式（默认）</text>
    <text x="20" y="60" font-size="12" fill="#1e3a8a">一打开 vi 就是这个模式</text>
    <text x="20" y="84" font-size="12" fill="#1e3a8a">光标可以移动，但不能打字</text>
    <text x="20" y="116" font-size="12" font-weight="700" fill="#1e3a8a">按 i → 进入插入模式</text>
    <text x="20" y="138" font-size="12" font-weight="700" fill="#1e3a8a">按 : → 进入命令模式</text>
  </g>

  <g transform="translate(290,100)">
    <!-- Insert mode -->
    <rect width="220" height="160" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">② 插入模式</text>
    <text x="20" y="60" font-size="12" fill="#14532d">可以像记事本一样打字</text>
    <text x="20" y="84" font-size="12" fill="#14532d">左下角显示 -- INSERT --</text>
    <text x="20" y="116" font-size="12" font-weight="700" fill="#14532d">编辑完按 Esc 退回普通模式</text>
    <text x="20" y="138" font-size="12" fill="#14532d">（重要：否则保存会失败）</text>
  </g>

  <g transform="translate(530,100)">
    <!-- Command mode -->
    <rect width="230" height="160" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="115" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">③ 命令模式</text>
    <text x="20" y="60" font-size="12" fill="#7c2d12">左下角出现 : 光标</text>
    <text x="20" y="84" font-size="12" fill="#7c2d12">输入命令，回车执行</text>
    <text x="20" y="116" font-size="12" font-weight="700" fill="#7c2d12">:w 保存（不退出）</text>
    <text x="20" y="138" font-size="12" font-weight="700" fill="#7c2d12">:q 退出（不保存）</text>
    <text x="20" y="156" font-size="12" font-weight="700" fill="#7c2d12">:wq 保存并退出</text>
  </g>

  <!-- Arrow flow -->
  <g stroke="#475569" stroke-width="2" fill="none">
    <path d="M270 180 L290 180" marker-end="url(#arr)"/>
    <text x="280" y="172" text-anchor="middle" font-size="11" fill="#475569">i</text>

    <path d="M510 180 L530 180" marker-end="url(#arr)"/>
    <text x="520" y="172" text-anchor="middle" font-size="11" fill="#475569">Esc</text>

    <path d="M155 260 L155 290 L645 290 L645 260" marker-end="url(#arr)"/>
    <text x="400" y="285" text-anchor="middle" font-size="11" fill="#475569">Esc → :</text>
  </g>

  <!-- Quick reference -->
  <g transform="translate(40,310)">
    <rect width="720" height="140" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#0f172a">急救包（够用到 sshd_config 修改完成）：</text>

    <g font-family="monospace" font-size="12" fill="#0f172a">
      <text x="20" y="56">$ vi /etc/ssh/sshd_config     ← 打开文件</text>
      <text x="20" y="76">  按 /PermitRootLogin          ← 搜索这行</text>
      <text x="20" y="96">  按 i                          ← 进入编辑模式（关键！）</text>
      <text x="20" y="116">  删掉 # 改成 PermitRootLogin yes</text>
      <text x="20" y="136">  按 Esc → 输入 :wq → 回车      ← 保存退出</text>
    </g>

    <text x="500" y="56" font-size="11" fill="#dc2626">⚠️ 报错 E353: Nothing in register</text>
    <text x="500" y="76" font-size="11" fill="#dc2626">   说明你还在普通模式就按了 :</text>
    <text x="500" y="96" font-size="11" fill="#dc2626">   按 Esc 退回普通模式再 :wq</text>
    <text x="500" y="116" font-size="11" fill="#dc2626">⚠️ 改动没生效？改完一定要</text>
    <text x="500" y="136" font-size="11" fill="#dc2626">   synosystemctl restart sshd</text>
  </g>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>