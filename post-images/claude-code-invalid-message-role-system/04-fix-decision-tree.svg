<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111f"/><stop offset="1" stop-color="#111827"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".3"/></filter></defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="80" y="82" font-family="Arial" font-size="38" font-weight="700" fill="#f8fafc">Fix strategy: choose the smallest reversible change</text>
  <g font-family="Arial" filter="url(#s)">
    <rect x="450" y="145" width="380" height="90" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/><text x="490" y="200" fill="#f8fafc" font-size="25" font-weight="700">Can another provider answer?</text>
    <rect x="120" y="330" width="290" height="135" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="3"/><text x="155" y="380" fill="#bbf7d0" font-size="24" font-weight="700">Yes, switch provider</text><text x="155" y="420" fill="#dcfce7" font-size="18">Fast workaround</text>
    <rect x="495" y="330" width="290" height="135" rx="18" fill="#422006" stroke="#f59e0b" stroke-width="3"/><text x="530" y="380" fill="#fde68a" font-size="24" font-weight="700">Need same gateway</text><text x="530" y="420" fill="#ffedd5" font-size="18">Pin client version</text>
    <rect x="870" y="330" width="290" height="135" rx="18" fill="#450a0a" stroke="#ef4444" stroke-width="3"/><text x="905" y="380" fill="#fecaca" font-size="24" font-weight="700">Need latest client</text><text x="905" y="420" fill="#fee2e2" font-size="18">Fix gateway adapter</text>
    <rect x="355" y="555" width="570" height="75" rx="16" fill="#1f2937" stroke="#475569"/><text x="390" y="602" fill="#e5e7eb" font-size="22">Always verify with: claude -p "reply OK" before declaring recovery.</text>
  </g>
  <g stroke="#64748b" stroke-width="4" fill="none"><path d="M640 235 V285 H265 V330"/><path d="M640 235 V330"/><path d="M640 285 H1015 V330"/></g>
</svg>
