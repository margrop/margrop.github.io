<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#08111f"/><stop offset="1" stop-color="#101827"/></linearGradient>
    <linearGradient id="red" x1="0" x2="1"><stop stop-color="#ef4444"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="80" y="86" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">Do not stop at the first error line</text>
  <text x="80" y="126" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">The visible 400 is only the symptom. Trace the request path before changing configuration.</text>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="80" y="195" width="245" height="135" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="110" y="246" fill="#f8fafc" font-size="24" font-weight="700">Claude Code</text>
    <text x="110" y="284" fill="#cbd5e1" font-size="18">CLI version</text><text x="110" y="310" fill="#cbd5e1" font-size="18">request builder</text>
    <rect x="385" y="195" width="245" height="135" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="415" y="246" fill="#f8fafc" font-size="24" font-weight="700">Anthropic API</text>
    <text x="415" y="284" fill="#cbd5e1" font-size="18">Messages shape</text><text x="415" y="310" fill="#cbd5e1" font-size="18">system prompt semantics</text>
    <rect x="690" y="195" width="245" height="135" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="720" y="246" fill="#f8fafc" font-size="24" font-weight="700">Compatible gateway</text>
    <text x="720" y="284" fill="#cbd5e1" font-size="18">schema conversion</text><text x="720" y="310" fill="#cbd5e1" font-size="18">role validation</text>
    <rect x="995" y="195" width="205" height="135" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="1025" y="246" fill="#f8fafc" font-size="24" font-weight="700">Model</text>
    <text x="1025" y="284" fill="#cbd5e1" font-size="18">provider backend</text><text x="1025" y="310" fill="#cbd5e1" font-size="18">final answer</text>
  </g>
  <g stroke-width="4" fill="none">
    <path d="M325 262 L385 262" stroke="url(#blue)"/><path d="M630 262 L690 262" stroke="url(#blue)"/><path d="M935 262 L995 262" stroke="url(#blue)"/>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="150" y="430" width="980" height="135" rx="20" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
    <text x="200" y="482" fill="#fca5a5" font-size="28" font-weight="700">400 invalid params: chat content has invalid message role: system</text>
    <text x="200" y="525" fill="#e5e7eb" font-size="21">The useful question is not "which model is bad?" but "which layer rejects the message shape?"</text>
  </g>
</svg>
