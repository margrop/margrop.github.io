<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs>
<style>
.bg{fill:#f7f8fb}.panel{fill:#ffffff;stroke:#d7dde8;stroke-width:2}.dark{fill:#243042}.muted{fill:#5d6b82}.accent{fill:#2563eb}.warn{fill:#dc7a15}.good{fill:#169b62}.bad{fill:#c2410c}.line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:3;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif} .h{font-size:34px;font-weight:800}.s{font-size:22px;font-weight:700}.t{font-size:18px}.small{font-size:15px}.code{font-family:"SFMono-Regular",Consolas,monospace;font-size:17px}</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
</defs><rect class="bg" width="1280" height="720"/><rect x="70" y="70" width="1140" height="580" rx="24" fill="#fff" stroke="#d7dde8" stroke-width="2"/><text x="115" y="160" class="h dark">新电脑登录失败，旧电脑却正常？</text><text x="115" y="214" class="s muted">Bitwarden 2026.4.1 + Vaultwarden 1.35.4 的一次兼容性排障</text><rect x="115" y="285" width="330" height="150" rx="16" fill="#e8f1ff"/><text x="145" y="335" class="s accent">Chrome 新装扩展</text><text x="145" y="380" class="t dark">首次登录走新接口</text><rect x="475" y="285" width="330" height="150" rx="16" fill="#fff4e6"/><text x="505" y="335" class="s warn">Vaultwarden 旧版</text><text x="505" y="380" class="t dark">缺少 prelogin/password</text><rect x="835" y="285" width="330" height="150" rx="16" fill="#eafaf2"/><text x="865" y="335" class="s good">升级到 1.36.0</text><text x="865" y="380" class="t dark">接口补齐，登录恢复</text><path class="line" d="M445 360H475"/><path class="line" d="M805 360H835"/><text x="115" y="535" class="code dark">POST /identity/accounts/prelogin/password -> 404</text><text x="115" y="585" class="t muted">真正的问题不在 Chrome，而在客户端登录流程和服务端 API 版本之间。</text></svg>