<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760"><defs>
<style>
.bg{fill:#f7f8fb}.panel{fill:#ffffff;stroke:#d7dde8;stroke-width:2}.dark{fill:#243042}.muted{fill:#5d6b82}.accent{fill:#2563eb}.warn{fill:#dc7a15}.good{fill:#169b62}.bad{fill:#c2410c}.line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:3;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif} .h{font-size:34px;font-weight:800}.s{font-size:22px;font-weight:700}.t{font-size:18px}.small{font-size:15px}.code{font-family:"SFMono-Regular",Consolas,monospace;font-size:17px}</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
</defs><rect class="bg" width="1280" height="760"/><text x="70" y="80" class="h dark">最小安全修复路径</text><rect class="panel" x="110" y="150" width="250" height="420" rx="18"/><text x="145" y="215" class="s dark">备份</text><text x="145" y="265" class="t muted">data 目录</text><text x="145" y="300" class="t muted">数据库</text><text x="145" y="335" class="t muted">compose 文件</text><rect class="panel" x="400" y="150" width="250" height="420" rx="18"/><text x="435" y="215" class="s dark">只改镜像</text><text x="435" y="265" class="code muted">1.35.4</text><text x="435" y="305" class="t muted">升级到</text><text x="435" y="345" class="code good">1.36.0</text><rect class="panel" x="690" y="150" width="250" height="420" rx="18"/><text x="725" y="215" class="s dark">启动验证</text><text x="725" y="265" class="code muted">docker compose up -d</text><text x="725" y="315" class="code muted">docker logs -f</text><text x="725" y="365" class="code muted">/api/config</text><rect class="panel" x="980" y="150" width="220" height="420" rx="18"/><text x="1015" y="215" class="s dark">新机重试</text><text x="1015" y="265" class="t muted">Self-hosted</text><text x="1015" y="305" class="t muted">干净域名</text><text x="1015" y="345" class="t muted">重新登录</text><path class="line" d="M360 360H400"/><path class="line" d="M650 360H690"/><path class="line" d="M940 360H980"/><text x="110" y="675" class="t muted">只改 image，保留原有 SMTP、反代、ADMIN_TOKEN、volume 和网络配置，降低修复面。</text></svg>