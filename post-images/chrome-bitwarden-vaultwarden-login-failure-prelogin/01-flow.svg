<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760"><defs>
<style>
.bg{fill:#f7f8fb}.panel{fill:#ffffff;stroke:#d7dde8;stroke-width:2}.dark{fill:#243042}.muted{fill:#5d6b82}.accent{fill:#2563eb}.warn{fill:#dc7a15}.good{fill:#169b62}.bad{fill:#c2410c}.line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:3;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif} .h{font-size:34px;font-weight:800}.s{font-size:22px;font-weight:700}.t{font-size:18px}.small{font-size:15px}.code{font-family:"SFMono-Regular",Consolas,monospace;font-size:17px}</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
</defs><rect class="bg" width="1280" height="760"/><text x="70" y="80" class="h dark">旧设备为什么没事，新设备为什么翻车</text><rect class="panel" x="90" y="150" width="300" height="150" rx="18"/><text x="125" y="205" class="s dark">旧电脑</text><text x="125" y="250" class="t muted">已有登录态 / 本地缓存</text><text x="125" y="282" class="t muted">不一定重新走完整登录</text><rect class="panel" x="90" y="460" width="300" height="150" rx="18"/><text x="125" y="515" class="s dark">新电脑</text><text x="125" y="560" class="t muted">新装 Chrome + 扩展</text><text x="125" y="592" class="t muted">首次登录走新版流程</text><rect class="panel" x="500" y="270" width="360" height="220" rx="18"/><text x="535" y="325" class="s accent">Bitwarden 2026.4.1</text><text x="535" y="375" class="code dark">prelogin/password</text><text x="535" y="418" class="t muted">先取 KDF / 登录准备信息</text><text x="535" y="450" class="t muted">再提交账号密码登录</text><rect class="panel" x="970" y="270" width="240" height="220" rx="18"/><text x="1000" y="325" class="s warn">Vaultwarden</text><text x="1000" y="370" class="code dark">1.35.4</text><text x="1000" y="418" class="t muted">缺少新接口</text><text x="1000" y="450" class="t bad">返回 404</text><path class="dash" d="M390 225C450 225 450 340 500 340"/><path class="line" d="M390 535C450 535 450 410 500 410"/><path class="line" d="M860 380H970"/><text x="470" y="690" class="t muted">现象差异来自“是否触发完整首次登录流程”，不是旧电脑更健康。</text></svg>