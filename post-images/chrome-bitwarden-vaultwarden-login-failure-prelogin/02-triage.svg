<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760"><defs>
<style>
.bg{fill:#f7f8fb}.panel{fill:#ffffff;stroke:#d7dde8;stroke-width:2}.dark{fill:#243042}.muted{fill:#5d6b82}.accent{fill:#2563eb}.warn{fill:#dc7a15}.good{fill:#169b62}.bad{fill:#c2410c}.line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:3;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif} .h{font-size:34px;font-weight:800}.s{font-size:22px;font-weight:700}.t{font-size:18px}.small{font-size:15px}.code{font-family:"SFMono-Regular",Consolas,monospace;font-size:17px}</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
</defs><rect class="bg" width="1280" height="760"/><text x="70" y="80" class="h dark">排查时不要一上来就重装 Chrome</text><rect class="panel" x="80" y="145" width="330" height="120" rx="16"/><text x="115" y="195" class="s dark">1. 看服务端版本</text><text x="115" y="235" class="code muted">/api/config 或容器日志</text><rect class="panel" x="475" y="145" width="330" height="120" rx="16"/><text x="510" y="195" class="s dark">2. 盯登录请求</text><text x="510" y="235" class="code muted">prelogin / connect/token</text><rect class="panel" x="870" y="145" width="330" height="120" rx="16"/><text x="905" y="195" class="s dark">3. 再查客户端</text><text x="905" y="235" class="code muted">Self-hosted URL / 权限</text><path class="line" d="M410 205H475"/><path class="line" d="M805 205H870"/><rect x="120" y="360" width="1040" height="260" rx="22" fill="#ffffff" stroke="#d7dde8" stroke-width="2"/><text x="160" y="420" class="s bad">关键判断</text><text x="160" y="475" class="code dark">POST /identity/accounts/prelogin/password 404</text><text x="160" y="530" class="t dark">优先怀疑服务端版本不支持新客户端登录接口。</text><text x="160" y="575" class="t muted">如果服务端完全没有请求，再回头排查 URL、证书、代理、扩展权限和反向代理。</text></svg>