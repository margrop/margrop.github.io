<svg xmlns='http://www.w3.org/2000/svg' width='1500' height='720' viewBox='0 0 1500 720'>
<rect width='1500' height='720' fill='#111827'/>
<style>.h{font:700 34px Arial;fill:#f8fafc}.b{fill:#0f172a;stroke:#64748b;stroke-width:2;rx:16}.g{stroke:#4ade80}.r{stroke:#fb7185}.txt{font:22px Arial;fill:#d1d5db}.small{font:18px Arial;fill:#94a3b8}.arr{stroke:#94a3b8;stroke-width:4;marker-end:url(#m)}</style>
<defs><marker id='m' markerWidth='12' markerHeight='12' refX='10' refY='6' orient='auto'><path d='M0,0 L12,6 L0,12 z' fill='#94a3b8'/></marker></defs>
<text x='60' y='60' class='h'>Fix path: keep fallback config, repair gateway authorization path</text>
<rect x='70' y='130' width='290' height='140' class='b r'/><text x='105' y='185' class='txt'>1. Reproduce</text><text x='105' y='225' class='small'>gateway model run fails fast</text>
<line x1='360' y1='200' x2='500' y2='200' class='arr'/>
<rect x='500' y='130' width='310' height='140' class='b'/><text x='535' y='185' class='txt'>2. Compare</text><text x='535' y='225' class='small'>local model run succeeds</text>
<line x1='810' y1='200' x2='950' y2='200' class='arr'/>
<rect x='950' y='130' width='430' height='140' class='b'/><text x='985' y='185' class='txt'>3. Inspect auth</text><text x='985' y='225' class='small'>paired device has operator.write</text>
<rect x='190' y='410' width='360' height='140' class='b'/><text x='225' y='465' class='txt'>4. Find code path</text><text x='225' y='505' class='small'>model override omits device identity</text>
<line x1='550' y1='480' x2='720' y2='480' class='arr'/>
<rect x='720' y='410' width='360' height='140' class='b g'/><text x='755' y='465' class='txt'>5. Patch narrowly</text><text x='755' y='505' class='small'>useStoredDeviceAuth + required scope</text>
<line x1='1080' y1='480' x2='1235' y2='480' class='arr'/>
<rect x='1235' y='410' width='210' height='140' class='b g'/><text x='1260' y='465' class='txt'>6. Verify</text><text x='1260' y='505' class='small'>gateway OK</text>
</svg>