<svg xmlns='http://www.w3.org/2000/svg' width='1500' height='760' viewBox='0 0 1500 760'>
<rect width='1500' height='760' fill='#0f172a'/>
<style>.t{font:700 34px Arial;fill:#e5e7eb}.s{font:22px Arial;fill:#cbd5e1}.box{fill:#111827;stroke:#38bdf8;stroke-width:3;rx:18}.bad{stroke:#fb7185}.good{stroke:#4ade80}.arrow{stroke:#94a3b8;stroke-width:5;marker-end:url(#m)}.note{font:20px Arial;fill:#93c5fd}</style>
<defs><marker id='m' markerWidth='12' markerHeight='12' refX='10' refY='6' orient='auto'><path d='M0,0 L12,6 L0,12 z' fill='#94a3b8'/></marker></defs>
<text x='60' y='70' class='t'>Two locks, not one: shared gateway token vs operator device token</text>
<rect x='80' y='150' width='300' height='160' class='box'/><text x='120' y='210' class='t'>Shared token</text><text x='120' y='255' class='s'>Can open the building door</text>
<line x1='380' y1='230' x2='560' y2='230' class='arrow'/>
<rect x='560' y='150' width='340' height='160' class='box bad'/><text x='600' y='210' class='t'>No device identity</text><text x='600' y='255' class='s'>Scopes are not trusted</text>
<line x1='900' y1='230' x2='1080' y2='230' class='arrow'/>
<rect x='1080' y='150' width='330' height='160' class='box bad'/><text x='1120' y='210' class='t'>agent RPC</text><text x='1120' y='255' class='s'>missing operator.write</text>
<rect x='80' y='440' width='300' height='160' class='box'/><text x='120' y='500' class='t'>Stored device token</text><text x='120' y='545' class='s'>Proves who is calling</text>
<line x1='380' y1='520' x2='560' y2='520' class='arrow'/>
<rect x='560' y='440' width='340' height='160' class='box good'/><text x='600' y='500' class='t'>operator scopes</text><text x='600' y='545' class='s'>operator.admin/write/read</text>
<line x1='900' y1='520' x2='1080' y2='520' class='arrow'/>
<rect x='1080' y='440' width='330' height='160' class='box good'/><text x='1120' y='500' class='t'>agent RPC</text><text x='1120' y='545' class='s'>request accepted</text>
<text x='90' y='675' class='note'>Analogy: the shared token opens the office door; the device token is your employee badge. Some rooms require the badge.</text>
</svg>