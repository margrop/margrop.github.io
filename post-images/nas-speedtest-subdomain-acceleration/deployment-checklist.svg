<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#22C55E"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="url(#bg3)"/>
  <text x="70" y="76" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">Minimal deployment checklist</text>
  <text x="70" y="116" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">A practical path for testing a `speedtest` subdomain on a home NAS</text>

  <g filter="url(#shadow3)">
    <rect x="80" y="170" rx="24" ry="24" width="290" height="220" fill="#0B1120" stroke="#334155"/>
    <text x="225" y="224" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">1. DNS</text>
    <text x="225" y="264" text-anchor="middle" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18">nas.speedtest.001122.xyz</text>
    <text x="225" y="304" text-anchor="middle" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">A / AAAA / CNAME</text>
    <text x="225" y="344" text-anchor="middle" fill="#86EFAC" font-family="Arial, Helvetica, sans-serif" font-size="18">keep the label visible</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="390" y="170" rx="24" ry="24" width="290" height="220" fill="#0B1120" stroke="#334155"/>
    <text x="535" y="224" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">2. Proxy</text>
    <text x="535" y="264" text-anchor="middle" fill="#C4B5FD" font-family="Arial, Helvetica, sans-serif" font-size="18">Lucky / Caddy / Nginx</text>
    <text x="535" y="304" text-anchor="middle" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">preserve Host and SNI</text>
    <text x="535" y="344" text-anchor="middle" fill="#86EFAC" font-family="Arial, Helvetica, sans-serif" font-size="18">forward to the NAS</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="700" y="170" rx="24" ry="24" width="290" height="220" fill="#0B1120" stroke="#334155"/>
    <text x="845" y="224" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">3. TLS</text>
    <text x="845" y="264" text-anchor="middle" fill="#FDE68A" font-family="Arial, Helvetica, sans-serif" font-size="18">certificate matches hostname</text>
    <text x="845" y="304" text-anchor="middle" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">browser trust stays clean</text>
    <text x="845" y="344" text-anchor="middle" fill="#86EFAC" font-family="Arial, Helvetica, sans-serif" font-size="18">no mismatch warnings</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="1010" y="170" rx="24" ry="24" width="310" height="220" fill="#0B1120" stroke="#334155"/>
    <text x="1165" y="224" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">4. Test</text>
    <text x="1165" y="264" text-anchor="middle" fill="#FCA5A5" font-family="Arial, Helvetica, sans-serif" font-size="18">normal host</text>
    <rect x="1060" y="280" rx="10" ry="10" width="210" height="14" fill="#374151"/>
    <rect x="1060" y="280" rx="10" ry="10" width="90" height="14" fill="#EF4444"/>
    <text x="1165" y="324" text-anchor="middle" fill="#86EFAC" font-family="Arial, Helvetica, sans-serif" font-size="18">speedtest host</text>
    <rect x="1060" y="340" rx="10" ry="10" width="210" height="14" fill="#374151"/>
    <rect x="1060" y="340" rx="10" ry="10" width="175" height="14" fill="url(#accent)"/>
  </g>

  <path d="M370 280H390" stroke="#22C55E" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow3)"/>
  <path d="M680 280H700" stroke="#22C55E" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow3)"/>
  <path d="M990 280H1010" stroke="#22C55E" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow3)"/>

  <g filter="url(#shadow3)">
    <rect x="80" y="450" rx="26" ry="26" width="1250" height="280" fill="#0B1120" stroke="#334155"/>
    <text x="120" y="506" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">What to compare</text>
    <text x="120" y="548" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">Same NAS file, same client, same network, same time window, only the hostname changes.</text>

    <rect x="120" y="590" rx="18" ry="18" width="500" height="110" fill="#111827" stroke="#334155"/>
    <text x="370" y="632" text-anchor="middle" fill="#FCA5A5" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">ordinary hostname</text>
    <text x="370" y="666" text-anchor="middle" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">if this is slow, it may be shaped</text>
    <rect x="120" y="700" rx="10" ry="10" width="430" height="10" fill="#374151"/>
    <rect x="120" y="700" rx="10" ry="10" width="180" height="10" fill="#EF4444"/>

    <rect x="700" y="590" rx="18" ry="18" width="500" height="110" fill="#111827" stroke="#334155"/>
    <text x="950" y="632" text-anchor="middle" fill="#86EFAC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">`speedtest` hostname</text>
    <text x="950" y="666" text-anchor="middle" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">if this improves, the label matters</text>
    <rect x="700" y="700" rx="10" ry="10" width="430" height="10" fill="#374151"/>
    <rect x="700" y="700" rx="10" ry="10" width="330" height="10" fill="url(#accent)"/>
  </g>
</svg>
