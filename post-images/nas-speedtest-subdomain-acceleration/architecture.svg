<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB7185"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#10B981"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#EF4444"/>
    </marker>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#334155" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <rect width="1400" height="780" fill="url(#grid)"/>

  <text x="70" y="78" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">Why a `speedtest` hostname can change the path</text>
  <text x="70" y="118" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="20">Illustration of a policy-sensitive home NAS access flow</text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" rx="24" ry="24" width="210" height="150" fill="url(#card)" stroke="#334155"/>
    <text x="175" y="272" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Client</text>
    <text x="175" y="308" text-anchor="middle" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">Browser / App</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="210" rx="24" ry="24" width="240" height="150" fill="url(#card)" stroke="#334155"/>
    <text x="450" y="264" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">DNS</text>
    <text x="450" y="300" text-anchor="middle" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18">nas.speedtest.001122.xyz</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="170" rx="26" ry="26" width="290" height="230" fill="url(#card)" stroke="#334155"/>
    <text x="765" y="228" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Carrier policy</text>
    <text x="765" y="264" text-anchor="middle" fill="#F59E0B" font-family="Arial, Helvetica, sans-serif" font-size="18">hostname / SNI / reputation</text>
    <rect x="685" y="284" rx="18" ry="18" width="160" height="42" fill="#0F172A" stroke="#475569"/>
    <text x="765" y="311" text-anchor="middle" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="18">speedtest hint</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="980" y="210" rx="24" ry="24" width="220" height="150" fill="url(#card)" stroke="#334155"/>
    <text x="1090" y="272" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Reverse proxy</text>
    <text x="1090" y="308" text-anchor="middle" fill="#A7F3D0" font-family="Arial, Helvetica, sans-serif" font-size="18">Lucky / Caddy / Nginx</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1270" y="210" rx="24" ry="24" width="200" height="150" fill="url(#card)" stroke="#334155" transform="translate(-70,0)"/>
    <text x="1270" y="272" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">NAS</text>
    <text x="1270" y="308" text-anchor="middle" fill="#C4B5FD" font-family="Arial, Helvetica, sans-serif" font-size="18">Web / files / media</text>
  </g>

  <path d="M280 285H330" stroke="url(#green)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M570 285H620" stroke="url(#green)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M910 285H980" stroke="url(#green)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M1200 285H1230" stroke="url(#green)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <path d="M450 388C450 500 470 560 610 560H1020" stroke="url(#red)" stroke-width="7" stroke-linecap="round" stroke-dasharray="16 12" marker-end="url(#arrowRed)"/>
  <text x="676" y="542" fill="#FCA5A5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">ordinary hostname</text>
  <text x="676" y="570" fill="#FB7185" font-family="Arial, Helvetica, sans-serif" font-size="16">more shaping, slower path in some lines</text>

  <path d="M765 400C765 500 815 560 945 560H1230" stroke="url(#green)" stroke-width="7" stroke-linecap="round" stroke-dasharray="16 12" marker-end="url(#arrowGreen)"/>
  <text x="964" y="542" fill="#A7F3D0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">speedtest hostname</text>
  <text x="964" y="570" fill="#34D399" font-family="Arial, Helvetica, sans-serif" font-size="16">often gets a more permissive path</text>

  <g>
    <rect x="70" y="620" rx="18" ry="18" width="1260" height="90" fill="#0B1120" stroke="#334155"/>
    <text x="100" y="658" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Practical note</text>
    <text x="100" y="688" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">This is an empirical trick, not a guaranteed rule. The exact policy can vary by carrier, region, and proxy setup.</text>
  </g>
</svg>
