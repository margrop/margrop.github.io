<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1400" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB7185"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowG" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#10B981"/>
    </marker>
    <marker id="arrowR" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="url(#bg2)"/>
  <text x="70" y="78" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">How a `speedtest` label may move traffic into a different bucket</text>
  <text x="70" y="118" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">The exact rule may be string matching, SNI inspection, reputation, or a broader heuristic</text>

  <g filter="url(#shadow2)">
    <rect x="510" y="220" rx="34" ry="34" width="380" height="260" fill="url(#engine)"/>
    <text x="700" y="282" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Carrier policy engine</text>
    <text x="700" y="318" text-anchor="middle" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">what it sees before the transfer starts</text>
    <rect x="584" y="350" rx="20" ry="20" width="232" height="48" fill="#0B1120" stroke="#475569"/>
    <text x="700" y="381" text-anchor="middle" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="18">hostname / SNI / pattern</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="80" y="190" rx="24" ry="24" width="290" height="120" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="225" y="235" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">ordinary hostname</text>
    <text x="225" y="268" text-anchor="middle" fill="#EF4444" font-family="Arial, Helvetica, sans-serif" font-size="18">more likely to be shaped</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="80" y="370" rx="24" ry="24" width="290" height="120" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="225" y="415" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">`speedtest` hostname</text>
    <text x="225" y="448" text-anchor="middle" fill="#10B981" font-family="Arial, Helvetica, sans-serif" font-size="18">may get a lighter path</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1030" y="190" rx="24" ry="24" width="290" height="120" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="1175" y="235" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">throttle / queue</text>
    <rect x="1070" y="255" rx="10" ry="10" width="220" height="16" fill="#FEE2E2"/>
    <rect x="1070" y="255" rx="10" ry="10" width="130" height="16" fill="url(#bad)"/>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1030" y="370" rx="24" ry="24" width="290" height="120" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="1175" y="415" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">more relaxed path</text>
    <rect x="1070" y="435" rx="10" ry="10" width="220" height="16" fill="#DCFCE7"/>
    <rect x="1070" y="435" rx="10" ry="10" width="195" height="16" fill="url(#good)"/>
  </g>

  <path d="M370 250H470" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowR)"/>
  <path d="M370 430H470" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowG)"/>
  <path d="M890 250H1030" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowR)"/>
  <path d="M890 430H1030" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowG)"/>

  <g>
    <rect x="500" y="520" rx="18" ry="18" width="400" height="110" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="700" y="560" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Keep the signal in the hostname</text>
    <text x="700" y="594" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Path alone is often too late to influence policy</text>
  </g>
</svg>
