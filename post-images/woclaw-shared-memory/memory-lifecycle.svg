<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fff9"/>
      <stop offset="100%" stop-color="#eef8ff"/>
    </linearGradient>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d7b57"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #184c38; }
      .small { font: 500 16px Arial, sans-serif; fill: #32594a; }
      .label { font: 700 18px Arial, sans-serif; fill: #184c38; }
      .box { fill: #ffffff; stroke: #84c9a5; stroke-width: 2; rx: 18; ry: 18; }
      .center { fill: #1f7a56; stroke: #15533b; stroke-width: 3; rx: 22; ry: 22; }
      .centerText { font: 700 26px Arial, sans-serif; fill: #ffffff; }
      .accent { fill: #eefaf2; stroke: #84c9a5; stroke-width: 2; rx: 16; ry: 16; }
    </style>
  </defs>
  <rect width="1200" height="600" fill="url(#bg3)"/>
  <text x="600" y="56" text-anchor="middle" class="title">Memory lifecycle in WoClaw</text>
  <text x="600" y="88" text-anchor="middle" class="small">Import existing history once, then keep writing, versioning, searching, and replaying</text>

  <rect x="55" y="160" width="190" height="280" class="accent"/>
  <text x="150" y="194" text-anchor="middle" class="label">Import sources</text>
  <rect x="85" y="226" width="130" height="40" class="box"/>
  <text x="150" y="252" text-anchor="middle" class="small">OpenClaw</text>
  <rect x="85" y="276" width="130" height="40" class="box"/>
  <text x="150" y="302" text-anchor="middle" class="small">Codex</text>
  <rect x="85" y="326" width="130" height="40" class="box"/>
  <text x="150" y="352" text-anchor="middle" class="small">Claude</text>
  <rect x="85" y="376" width="130" height="40" class="box"/>
  <text x="150" y="402" text-anchor="middle" class="small">Gemini</text>

  <rect x="355" y="168" width="220" height="264" class="center"/>
  <text x="465" y="216" text-anchor="middle" class="centerText">WoClaw Memory</text>
  <text x="465" y="256" text-anchor="middle" class="centerText" style="font-size:18px;">tags / ttl / versions</text>
  <text x="465" y="292" text-anchor="middle" class="centerText" style="font-size:18px;">SQLite default</text>
  <text x="465" y="326" text-anchor="middle" class="centerText" style="font-size:18px;">MySQL optional</text>
  <rect x="395" y="350" width="140" height="38" rx="10" ry="10" fill="#d7f0e3" opacity="0.9"/>
  <text x="465" y="375" text-anchor="middle" class="small">durable history</text>

  <rect x="680" y="144" width="210" height="312" class="accent"/>
  <text x="785" y="178" text-anchor="middle" class="label">Read paths</text>
  <rect x="710" y="230" width="150" height="44" class="box"/>
  <text x="785" y="258" text-anchor="middle" class="small">search</text>
  <rect x="710" y="286" width="150" height="44" class="box"/>
  <text x="785" y="314" text-anchor="middle" class="small">versions</text>
  <rect x="710" y="342" width="150" height="44" class="box"/>
  <text x="785" y="370" text-anchor="middle" class="small">recall</text>
  <rect x="710" y="398" width="150" height="44" class="box"/>
  <text x="785" y="426" text-anchor="middle" class="small">topic history</text>

  <rect x="960" y="220" width="180" height="160" class="accent"/>
  <text x="1050" y="255" text-anchor="middle" class="label">Replay</text>
  <text x="1050" y="288" text-anchor="middle" class="small">write back to</text>
  <text x="1050" y="314" text-anchor="middle" class="small">the next agent</text>
  <text x="1050" y="340" text-anchor="middle" class="small">or topic thread</text>

  <line x1="245" y1="300" x2="340" y2="300" stroke="#2d7b57" stroke-width="4" marker-end="url(#arrow3)"/>
  <line x1="575" y1="300" x2="665" y2="300" stroke="#2d7b57" stroke-width="4" marker-end="url(#arrow3)"/>
  <line x1="895" y1="300" x2="945" y2="300" stroke="#2d7b57" stroke-width="4" marker-end="url(#arrow3)"/>

  <text x="600" y="540" text-anchor="middle" class="small">The point is not one file. The point is a stable memory layer with multiple readers and writers.</text>
</svg>
