<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="100%" stop-color="#f3f6ff"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#b85c00"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #52310d; }
      .small { font: 500 16px Arial, sans-serif; fill: #5d4b35; }
      .label { font: 700 18px Arial, sans-serif; fill: #52310d; }
      .room { fill: #ffffff; stroke: #f0c27b; stroke-width: 3; rx: 24; ry: 24; }
      .agent { fill: #ffffff; stroke: #9bb5d9; stroke-width: 2; rx: 16; ry: 16; }
      .target { fill: #fff3df; stroke: #e0a94f; stroke-width: 3; rx: 16; ry: 16; }
      .dim { opacity: 0.35; }
    </style>
  </defs>
  <rect width="1200" height="600" fill="url(#bg2)"/>
  <text x="600" y="56" text-anchor="middle" class="title">@agent routing inside a topic</text>
  <text x="600" y="88" text-anchor="middle" class="small">Only topic members that are mentioned receive the message</text>

  <rect x="410" y="150" width="380" height="240" class="room"/>
  <text x="600" y="190" text-anchor="middle" class="label">Topic: design-review</text>
  <rect x="468" y="232" width="264" height="80" rx="18" ry="18" fill="#fff7ec" stroke="#e0a94f" stroke-width="2"/>
  <text x="600" y="264" text-anchor="middle" class="small" style="font-size:18px;">"@alice @carol please check the patch"</text>
  <text x="600" y="292" text-anchor="middle" class="small">explicit mentions are resolved before routing</text>

  <rect x="70" y="120" width="180" height="76" class="target"/>
  <text x="160" y="150" text-anchor="middle" class="label">alice</text>
  <text x="160" y="174" text-anchor="middle" class="small">mentioned ✓</text>

  <rect x="70" y="250" width="180" height="76" class="agent"/>
  <text x="160" y="280" text-anchor="middle" class="label">bob</text>
  <text x="160" y="304" text-anchor="middle" class="small">not mentioned</text>

  <rect x="70" y="380" width="180" height="76" class="target"/>
  <text x="160" y="410" text-anchor="middle" class="label">carol</text>
  <text x="160" y="434" text-anchor="middle" class="small">mentioned ✓</text>

  <rect x="950" y="120" width="180" height="76" class="agent"/>
  <text x="1040" y="150" text-anchor="middle" class="label">dave</text>
  <text x="1040" y="174" text-anchor="middle" class="small">not in topic</text>

  <line x1="400" y1="272" x2="255" y2="158" stroke="#b85c00" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="400" y1="298" x2="255" y2="418" stroke="#b85c00" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="790" y1="272" x2="935" y2="158" stroke="#b85c00" stroke-width="4" marker-end="url(#arrow2)" opacity="0.2"/>
  <line x1="790" y1="298" x2="935" y2="418" stroke="#b85c00" stroke-width="4" marker-end="url(#arrow2)" opacity="0.2"/>

  <text x="600" y="520" text-anchor="middle" class="small">Broadcast remains the default, but mention-aware routing becomes targeted delivery.</text>
</svg>
