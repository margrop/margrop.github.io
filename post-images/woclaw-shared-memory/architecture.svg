<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f4b99"/>
      <stop offset="100%" stop-color="#2a82c7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b5b8a"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #17324d; }
      .label { font: 700 20px Arial, sans-serif; fill: #17324d; }
      .small { font: 500 16px Arial, sans-serif; fill: #35516f; }
      .box { fill: #ffffff; stroke: #9bb5d9; stroke-width: 2; rx: 16; ry: 16; }
      .soft { fill: #f3f7fd; stroke: #9bb5d9; stroke-width: 2; rx: 16; ry: 16; }
      .hubText { font: 700 28px Arial, sans-serif; fill: #ffffff; }
      .white { fill: #ffffff; }
      .muted { fill: #e9f0fb; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" class="title">WoClaw Shared Memory Architecture</text>
  <text x="600" y="96" text-anchor="middle" class="small">OpenClaw / Codex / Claude / Gemini share topics, memory, history, and mentions</text>

  <rect x="70" y="150" width="210" height="350" class="soft"/>
  <text x="175" y="188" text-anchor="middle" class="label">Agents</text>
  <rect x="100" y="225" width="150" height="48" class="box"/>
  <text x="175" y="255" text-anchor="middle" class="small">OpenClaw</text>
  <rect x="100" y="285" width="150" height="48" class="box"/>
  <text x="175" y="315" text-anchor="middle" class="small">Codex</text>
  <rect x="100" y="345" width="150" height="48" class="box"/>
  <text x="175" y="375" text-anchor="middle" class="small">Claude</text>
  <rect x="100" y="405" width="150" height="48" class="box"/>
  <text x="175" y="435" text-anchor="middle" class="small">Gemini</text>

  <rect x="470" y="188" width="260" height="264" rx="28" ry="28" fill="url(#hub)" stroke="#1b3c70" stroke-width="3"/>
  <text x="600" y="244" text-anchor="middle" class="hubText">WoClaw Hub</text>
  <text x="600" y="284" text-anchor="middle" class="hubText" style="font-size:20px;">Topics + Memory + Search</text>
  <rect x="520" y="318" width="160" height="40" rx="10" ry="10" class="muted" opacity="0.95"/>
  <text x="600" y="344" text-anchor="middle" class="small">Storage backend</text>
  <text x="600" y="382" text-anchor="middle" class="small" style="fill:#ffffff;">SQLite default / MySQL optional</text>

  <rect x="895" y="138" width="240" height="368" class="soft"/>
  <text x="1015" y="176" text-anchor="middle" class="label">Capabilities</text>
  <rect x="930" y="210" width="170" height="48" class="box"/>
  <text x="1015" y="240" text-anchor="middle" class="small">Topic Pub/Sub</text>
  <rect x="930" y="272" width="170" height="48" class="box"/>
  <text x="1015" y="302" text-anchor="middle" class="small">Mention routing</text>
  <rect x="930" y="334" width="170" height="48" class="box"/>
  <text x="1015" y="364" text-anchor="middle" class="small">Memory versions</text>
  <rect x="930" y="396" width="170" height="48" class="box"/>
  <text x="1015" y="426" text-anchor="middle" class="small">Search / recall</text>
  <rect x="930" y="458" width="170" height="28" class="box"/>
  <text x="1015" y="478" text-anchor="middle" class="small">CLI / Hooks / MCP</text>

  <line x1="280" y1="250" x2="455" y2="250" stroke="#3b5b8a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="280" y1="310" x2="455" y2="280" stroke="#3b5b8a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="280" y1="370" x2="455" y2="320" stroke="#3b5b8a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="280" y1="430" x2="455" y2="360" stroke="#3b5b8a" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="735" y1="250" x2="885" y2="240" stroke="#3b5b8a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="735" y1="290" x2="885" y2="302" stroke="#3b5b8a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="735" y1="330" x2="885" y2="364" stroke="#3b5b8a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="735" y1="370" x2="885" y2="426" stroke="#3b5b8a" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="600" y="540" text-anchor="middle" class="small">A single shared hub keeps memory durable while topics stay realtime.</text>
</svg>
