<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#51cf66"/>
      <stop offset="100%" stop-color="#37b24d"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a52"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrOk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37b24d"/>
    </marker>
    <marker id="arrBad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ee5a52"/>
    </marker>
  </defs>

  <rect width="1080" height="720" fill="url(#bg)"/>
  <text x="540" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#212529">完整的访问链：哪一环"看起来活着、其实没在"</text>
  <text x="540" y="64" text-anchor="middle" font-size="13" fill="#868e96">从 VPN 内其他节点 → host 端口 → docker-proxy → 容器内 0.0.0.0:3000</text>

  <!-- Step boxes -->
  <g>
    <!-- 1. VPN peer (sender) -->
    <g filter="url(#shadow)">
      <rect x="60" y="110" width="160" height="80" rx="10" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
      <text x="140" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#212529">1. VPN 节点</text>
      <text x="140" y="158" text-anchor="middle" font-size="11" fill="#495057">curl 192.168.160.14:3001</text>
      <text x="140" y="174" text-anchor="middle" font-size="11" fill="#37b24d">正常发包</text>
    </g>

    <!-- 2. host kernel -->
    <g filter="url(#shadow)">
      <rect x="280" y="110" width="160" height="80" rx="10" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
      <text x="360" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#212529">2. 内核</text>
      <text x="360" y="158" text-anchor="middle" font-size="11" fill="#495057">PREROUTING → INPUT</text>
      <text x="360" y="174" text-anchor="middle" font-size="11" fill="#37b24d">包抵达 192.168.160.14</text>
    </g>

    <!-- 3. iptables DOCKER chain -->
    <g filter="url(#shadow)">
      <rect x="500" y="110" width="160" height="80" rx="10" fill="url(#box)" stroke="#ee5a52" stroke-width="2"/>
      <text x="580" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#212529">3. iptables nat/DOCKER</text>
      <text x="580" y="158" text-anchor="middle" font-size="11" fill="#495057">DNAT 3001 → 172.20.0.2:3000</text>
      <text x="580" y="174" text-anchor="middle" font-size="11" fill="#ee5a52">⚠ 规则缺失</text>
    </g>

    <!-- 4. docker-proxy -->
    <g filter="url(#shadow)">
      <rect x="720" y="110" width="160" height="80" rx="10" fill="url(#box)" stroke="#ee5a52" stroke-width="2"/>
      <text x="800" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#212529">4. docker-proxy</text>
      <text x="800" y="158" text-anchor="middle" font-size="11" fill="#495057">127.0.0.1:3001 ↔ …</text>
      <text x="800" y="174" text-anchor="middle" font-size="11" fill="#ee5a52">⚠ 进程没启</text>
    </g>

    <!-- 5. container -->
    <g filter="url(#shadow)">
      <rect x="940" y="110" width="100" height="80" rx="10" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
      <text x="990" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#212529">5. new-api</text>
      <text x="990" y="158" text-anchor="middle" font-size="11" fill="#495057">0.0.0.0:3000</text>
      <text x="990" y="174" text-anchor="middle" font-size="11" fill="#37b24d">正常 listen</text>
    </g>
  </g>

  <!-- Flow arrows -->
  <g>
    <path d="M220,150 L280,150" stroke="url(#ok)" stroke-width="3" fill="none" marker-end="url(#arrOk)"/>
    <path d="M440,150 L500,150" stroke="url(#ok)" stroke-width="3" fill="none" marker-end="url(#arrOk)"/>
    <text x="470" y="142" text-anchor="middle" font-size="14" fill="#ee5a52" font-weight="700">✕</text>
    <path d="M660,150 L720,150" stroke="url(#bad)" stroke-width="3" fill="none" marker-end="url(#arrBad)"/>
    <text x="690" y="142" text-anchor="middle" font-size="14" fill="#ee5a52" font-weight="700">✕</text>
    <path d="M880,150 L940,150" stroke="url(#bad)" stroke-width="3" fill="none" marker-end="url(#arrBad)"/>
  </g>

  <!-- Why panel: docker-proxy NOT started -->
  <g filter="url(#shadow)">
    <rect x="60" y="240" width="980" height="220" rx="12" fill="#fff5f5" stroke="#ee5a52" stroke-width="2"/>
    <text x="80" y="270" font-size="15" font-weight="700" fill="#c92a2a">为什么 docker-proxy 没起来？(Moby 源码视角)</text>
    <text x="80" y="298" font-size="12" fill="#212529">Moby 在 <tspan font-family="ui-monospace" fill="#c92a2a">daemon/libnetwork/portmapper/proxy_linux.go</tspan> 的 <tspan font-weight="700">StartProxy()</tspan> 启动代理，参数直接来自 HostConfig：</text>
    <text x="80" y="324" font-family="ui-monospace" font-size="11" fill="#212529">   -host-ip 192.168.160.14  -host-port 3001  -container-ip 172.20.0.2  -container-port 3000</text>
    <text x="80" y="354" font-size="12" fill="#212529">· 该文件 <tspan font-weight="700" fill="#37b24d">不做</tspan> HostIP 是否在本机接口上的校验；</text>
    <text x="80" y="374" font-size="12" fill="#212529">· iptables DNAT 由 <tspan font-family="ui-monospace" fill="#c92a2a">setChildHostIP</tspan> 决定是否插入；rootless 之外路径，缺少接口时静默返回；</text>
    <text x="80" y="394" font-size="12" fill="#212529">· 若 libnetwork 创建 Sandbox 时 HostIP 对应的本地接口尚未就绪 → endpoint 创建被回滚 →</text>
    <text x="100" y="412" font-size="12" font-weight="700" fill="#c92a2a">  NetworkSettings.Networks 与 Ports 同时清空，HostConfig 却纹丝不动</text>
    <text x="80" y="436" font-size="12" fill="#868e96">参考：moby/moby#9818 "Container port not expose; neither iptables rules added nor userland proxy started"</text>
  </g>

  <!-- Why panel: when does this happen? -->
  <g filter="url(#shadow)">
    <rect x="60" y="490" width="980" height="180" rx="12" fill="#fff9db" stroke="#fab005" stroke-width="2"/>
    <text x="80" y="520" font-size="15" font-weight="700" fill="#e67700">什么场景会"刻意"把 HostIp 绑到一个晚于 docker 启动的接口？</text>
    <text x="80" y="548" font-size="12" fill="#212529">· WireGuard / easytier / Tailscale 这类 <tspan font-weight="700">用户态 TUN 隧道</tspan>，接口在 daemon 之后才 up；</text>
    <text x="80" y="568" font-size="12" fill="#212529">· 云上给辅助网卡绑的浮动 IP（secondary IP / floating IP）；</text>
    <text x="80" y="588" font-size="12" fill="#212529">· 物理网卡需要 DHCP 续约、bond 切换、IP 漂移后才能到达；</text>
    <text x="80" y="608" font-size="12" fill="#212529">· compose 文件里写死了 <tspan font-family="ui-monospace">"192.168.160.14:3001:3000"</tspan> 这类"按 IP 绑定"的形式；</text>
    <text x="80" y="628" font-size="12" fill="#212529">· 守护进程开机自启 vs TUN 接口网络层握手之间有一个不可避免的<tspan font-weight="700" fill="#e67700">时序窗口</tspan>。</text>
  </g>
</svg>
