<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a52"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#51cf66"/>
      <stop offset="100%" stop-color="#37b24d"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1080" height="640" fill="url(#bg)"/>
  <text x="540" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#212529">五分钟诊断清单：从症状到根因的六步走</text>
  <text x="540" y="64" text-anchor="middle" font-size="13" fill="#868e96">抄下来，下次遇到"容器活着、端口死了"30 秒就能判断</text>

  <!-- Step cards (3x2 grid) -->
  <g filter="url(#shadow)">
    <!-- step 1 -->
    <rect x="60" y="100" width="320" height="180" rx="12" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
    <text x="80" y="128" font-size="12" font-weight="700" fill="#37b24d">STEP 1</text>
    <text x="80" y="154" font-size="14" font-weight="700" fill="#212529">在容器里 curl 自己</text>
    <text x="80" y="180" font-family="ui-monospace" font-size="11" fill="#495057">docker exec new-api \</text>
    <text x="80" y="196" font-family="ui-monospace" font-size="11" fill="#495057">  curl 127.0.0.1:3000/</text>
    <text x="80" y="226" font-size="12" fill="#37b24d">→ 200：进程没问题，怀疑 host 侧</text>
    <text x="80" y="244" font-size="12" fill="#ee5a52">→ 失败：进程死了，与本文无关</text>
    <text x="80" y="266" font-size="11" fill="#868e96">★ 这是第一步的"分诊"判定</text>
  </g>

  <g filter="url(#shadow)">
    <!-- step 2 -->
    <rect x="380" y="100" width="320" height="180" rx="12" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
    <text x="400" y="128" font-size="12" font-weight="700" fill="#37b24d">STEP 2</text>
    <text x="400" y="154" font-size="14" font-weight="700" fill="#212529">看 host 上有没有进程监听</text>
    <text x="400" y="180" font-family="ui-monospace" font-size="11" fill="#495057">ss -tlnp | grep 3001</text>
    <text x="400" y="226" font-size="12" fill="#37b24d">→ 看到 docker-proxy 进程在</text>
    <text x="400" y="244" font-size="12" fill="#ee5a52">→ 空：docker-proxy 没起，看 Step 3</text>
    <text x="400" y="266" font-size="11" fill="#868e96">★ 比 docker port 更直接</text>
  </g>

  <g filter="url(#shadow)">
    <!-- step 3 -->
    <rect x="700" y="100" width="320" height="180" rx="12" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
    <text x="720" y="128" font-size="12" font-weight="700" fill="#37b24d">STEP 3</text>
    <text x="720" y="154" font-size="14" font-weight="700" fill="#212529">看 iptables 有没有 DNAT</text>
    <text x="720" y="180" font-family="ui-monospace" font-size="11" fill="#495057">iptables -t nat -L DOCKER -n -v</text>
    <text x="720" y="226" font-size="12" fill="#37b24d">→ 有 3001 → 172.x.x.x:3000：OK</text>
    <text x="720" y="244" font-size="12" fill="#ee5a52">→ 没有：NAT 没插，看 Step 4</text>
    <text x="720" y="266" font-size="11" fill="#868e96">★ 这两条同时为空 = 100% 命中本文</text>
  </g>

  <g filter="url(#shadow)">
    <!-- step 4 -->
    <rect x="60" y="310" width="320" height="180" rx="12" fill="url(#box)" stroke="#fab005" stroke-width="2"/>
    <text x="80" y="338" font-size="12" font-weight="700" fill="#e67700">STEP 4</text>
    <text x="80" y="364" font-size="14" font-weight="700" fill="#212529">看 inspect 的"两个字段"</text>
    <text x="80" y="388" font-family="ui-monospace" font-size="11" fill="#495057">docker inspect new-api \</text>
    <text x="80" y="404" font-family="ui-monospace" font-size="11" fill="#495057">  --format '{{json .NetworkSettings}}'</text>
    <text x="80" y="434" font-size="12" fill="#212529">Networks: {} &amp; Ports: {} = 命中</text>
    <text x="80" y="452" font-size="12" fill="#868e96">HostConfig.PortBindings 仍是写好的</text>
    <text x="80" y="474" font-size="11" fill="#fab005">★ 意图 vs 现实 的"裂缝"</text>
  </g>

  <g filter="url(#shadow)">
    <!-- step 5 -->
    <rect x="380" y="310" width="320" height="180" rx="12" fill="url(#box)" stroke="#fab005" stroke-width="2"/>
    <text x="400" y="338" font-size="12" font-weight="700" fill="#e67700">STEP 5</text>
    <text x="400" y="364" font-size="14" font-weight="700" fill="#212529">看 bridge 网络上有没有人</text>
    <text x="400" y="388" font-family="ui-monospace" font-size="11" fill="#495057">docker network inspect \</text>
    <text x="400" y="404" font-family="ui-monospace" font-size="11" fill="#495057">  newapi_data_default</text>
    <text x="400" y="434" font-size="12" fill="#212529">"Containers": {} = 没人挂上</text>
    <text x="400" y="452" font-size="12" fill="#868e96">这与 Step 4 的 Networks: {} 对应</text>
    <text x="400" y="474" font-size="11" fill="#fab005">★ 验证整个 attach 流程被回滚</text>
  </g>

  <g filter="url(#shadow)">
    <!-- step 6 -->
    <rect x="700" y="310" width="320" height="180" rx="12" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
    <text x="720" y="338" font-size="12" font-weight="700" fill="#37b24d">STEP 6</text>
    <text x="720" y="364" font-size="14" font-weight="700" fill="#212529">修：重新 attach 网络</text>
    <text x="720" y="388" font-family="ui-monospace" font-size="11" fill="#495057">docker network connect \</text>
    <text x="720" y="404" font-family="ui-monospace" font-size="11" fill="#495057">  newapi_data_default new-api</text>
    <text x="720" y="434" font-size="12" fill="#37b24d">→ 200，docker-proxy 起来</text>
    <text x="720" y="452" font-size="12" fill="#868e96">30 秒，3 个容器同时搞定</text>
    <text x="720" y="474" font-size="11" fill="#37b24d">★ 这是临时治标的最小动作</text>
  </g>

  <!-- Bottom note -->
  <g>
    <rect x="60" y="510" width="960" height="90" rx="10" fill="url(#box)" stroke="#adb5bd"/>
    <text x="80" y="538" font-size="14" font-weight="700" fill="#212529">一条捷径：</text>
    <text x="80" y="562" font-size="12" fill="#495057">如果你看到 <tspan font-family="ui-monospace" fill="#212529">docker port new-api 3000/tcp</tspan> 输出为空，但 HostConfig 里又写好了映射 ——</text>
    <text x="80" y="582" font-size="12" fill="#495057">直接跳到 Step 6 重连网络。剩下的 5 步只为说服自己"为什么一定要这么干"。</text>
  </g>
</svg>
