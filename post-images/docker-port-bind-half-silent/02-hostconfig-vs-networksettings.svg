<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#51cf66"/>
      <stop offset="100%" stop-color="#37b24d"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a52"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1080" height="700" fill="url(#bg)"/>
  <text x="540" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#212529">端口映射的"半残"：HostConfig 与 NetworkSettings 之间的断裂</text>
  <text x="540" y="64" text-anchor="middle" font-size="13" fill="#868e96">docker inspect 返回的两个字段，一个还活着，一个已经"忘记"了</text>

  <!-- Column 1: HostConfig -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="440" height="500" rx="12" fill="#ffffff" stroke="#495057" stroke-width="2"/>
    <text x="280" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#212529">HostConfig (磁盘上写的意图)</text>
    <text x="280" y="160" text-anchor="middle" font-size="11" fill="#868e96">docker inspect &lt;ctr&gt; — 容器"想"做什么</text>

    <!-- PortBindings -->
    <rect x="90" y="190" width="380" height="80" rx="8" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
    <text x="280" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">PortBindings</text>
    <text x="100" y="240" font-family="ui-monospace" font-size="11" fill="#212529">"3000/tcp": [{</text>
    <text x="100" y="256" font-family="ui-monospace" font-size="11" fill="#212529">  "HostIp": "192.168.160.14",</text>
    <text x="100" y="270" font-family="ui-monospace" font-size="11" fill="#212529">  "HostPort": "3001"</text>

    <!-- NetworkMode -->
    <rect x="90" y="290" width="380" height="56" rx="8" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
    <text x="280" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">NetworkMode: newapi_data_default</text>
    <text x="280" y="334" text-anchor="middle" font-size="11" fill="#868e96">(意图加入的 bridge 网络名)</text>

    <!-- Status -->
    <rect x="90" y="370" width="380" height="220" rx="8" fill="url(#box)" stroke="#37b24d" stroke-width="2"/>
    <text x="280" y="396" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">State</text>
    <text x="100" y="420" font-family="ui-monospace" font-size="11" fill="#212529">Status: "Up 4 hours"</text>
    <text x="100" y="436" font-family="ui-monospace" font-size="11" fill="#212529">Running: true</text>
    <text x="100" y="452" font-family="ui-monospace" font-size="11" fill="#212529">Pid: 35883</text>
    <text x="100" y="468" font-family="ui-monospace" font-size="11" fill="#212529">Health: healthy (或无)</text>
    <text x="100" y="498" font-size="11" fill="#37b24d">✓ 一切看起来都正常</text>
    <text x="100" y="520" font-size="11" fill="#868e96">RestartCount: 0</text>
    <text x="100" y="540" font-size="11" fill="#868e96">OOMKilled: false</text>
    <text x="100" y="560" font-size="11" fill="#868e96">Error: ""</text>
  </g>

  <!-- Column 2: NetworkSettings -->
  <g filter="url(#shadow)">
    <rect x="580" y="110" width="440" height="500" rx="12" fill="#ffffff" stroke="#495057" stroke-width="2"/>
    <text x="800" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#212529">NetworkSettings (运行时实际状态)</text>
    <text x="800" y="160" text-anchor="middle" font-size="11" fill="#868e96">docker inspect &lt;ctr&gt; — 此刻 Docker 真正做了啥</text>

    <!-- Ports EMPTY -->
    <rect x="610" y="190" width="380" height="100" rx="8" fill="url(#box)" stroke="#ee5a52" stroke-width="2"/>
    <text x="800" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">Ports</text>
    <text x="620" y="240" font-family="ui-monospace" font-size="11" fill="#212529">"Ports": {}</text>
    <text x="620" y="258" font-size="11" fill="#ee5a52">⚠ 空 —— 没有端口映射生效</text>
    <text x="620" y="276" font-size="11" fill="#868e96">→ docker-proxy 未启动</text>

    <!-- Networks EMPTY -->
    <rect x="610" y="310" width="380" height="100" rx="8" fill="url(#box)" stroke="#ee5a52" stroke-width="2"/>
    <text x="800" y="336" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">Networks</text>
    <text x="620" y="360" font-family="ui-monospace" font-size="11" fill="#212529">"Networks": {}</text>
    <text x="620" y="378" font-size="11" fill="#ee5a52">⚠ 空 —— 没有网络端点</text>
    <text x="620" y="396" font-size="11" fill="#868e96">→ 没有 SandboxID，没有 veth</text>

    <!-- IPAddress -->
    <rect x="610" y="430" width="380" height="50" rx="8" fill="url(#box)" stroke="#adb5bd"/>
    <text x="800" y="456" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">IPAddress: ""</text>

    <!-- Bridge containers empty -->
    <rect x="610" y="495" width="380" height="100" rx="8" fill="url(#box)" stroke="#ee5a52" stroke-width="2"/>
    <text x="800" y="520" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">上游：bridge 网络上</text>
    <text x="620" y="544" font-family="ui-monospace" font-size="11" fill="#212529">"Containers": {}</text>
    <text x="620" y="564" font-size="11" fill="#ee5a52">→ bridge 自认为没人接入</text>
    <text x="620" y="582" font-size="11" fill="#868e96">→ 也就没有 DNAT 规则</text>
  </g>

  <!-- Big arrow connecting both sides -->
  <g>
    <path d="M510,360 L580,360" stroke="url(#bad)" stroke-width="4" fill="none"/>
    <path d="M572,352 L580,360 L572,368 Z" fill="#ee5a52"/>
    <text x="540" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#ee5a52">意图 vs 现实</text>
  </g>

  <!-- Bottom: what still works inside container -->
  <g>
    <rect x="60" y="630" width="960" height="50" rx="8" fill="url(#box)" stroke="#37b24d"/>
    <text x="540" y="660" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">容器内部 netstat 看到 0.0.0.0:3000 仍在监听 —— 进程是好的，缺的只是"从外面进来"的那一截</text>
  </g>
</svg>
