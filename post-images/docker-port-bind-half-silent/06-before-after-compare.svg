<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="terminalOk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1f12"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
    <linearGradient id="terminalBad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#15080a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#212529">修复前 vs 修复后：同一台 host，同一个 docker inspect 命令</text>
  <text x="600" y="64" text-anchor="middle" font-size="13" fill="#868e96">两个 NetworkSettings 输出摆在一起，对比一下"空"和"满"的差距</text>

  <!-- LEFT: bad -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="540" height="560" rx="12" fill="url(#terminalBad)"/>
    <text x="80" y="130" font-size="13" font-weight="700" fill="#ff6b6b">▌修复前 · docker inspect new-api --format '{{json .NetworkSettings}}'</text>
    <text x="80" y="170" font-family="ui-monospace" font-size="13" fill="#e03131">{</text>
    <text x="100" y="190" font-family="ui-monospace" font-size="13" fill="#ff8787">"SandboxID": "",</text>
    <text x="100" y="210" font-family="ui-monospace" font-size="13" fill="#ff8787">"SandboxKey": "",</text>
    <text x="100" y="230" font-family="ui-monospace" font-size="13" fill="#ff8787">"Ports": <tspan font-weight="700" fill="#ffd8a8">{}</tspan>,</text>
    <text x="100" y="250" font-family="ui-monospace" font-size="13" fill="#ff8787">"Networks": <tspan font-weight="700" fill="#ffd8a8">{}</tspan>,</text>
    <text x="100" y="270" font-family="ui-monospace" font-size="13" fill="#ff8787">"NetworkID": "",</text>
    <text x="100" y="290" font-family="ui-monospace" font-size="13" fill="#ff8787">"EndpointID": "",</text>
    <text x="100" y="310" font-family="ui-monospace" font-size="13" fill="#ff8787">"MacAddress": "",</text>
    <text x="100" y="330" font-family="ui-monospace" font-size="13" fill="#ff8787">"IPAddress": ""</text>
    <text x="80" y="350" font-family="ui-monospace" font-size="13" fill="#e03131">}</text>

    <text x="80" y="395" font-size="13" font-weight="700" fill="#ff6b6b">▌docker network inspect newapi_data_default</text>
    <text x="80" y="420" font-family="ui-monospace" font-size="13" fill="#ff8787">"Containers": <tspan font-weight="700" fill="#ffd8a8">{}</tspan></text>
    <text x="80" y="445" font-family="ui-monospace" font-size="13" fill="#ff8787">"IPAM": { Subnets: [ 172.20.0.0/16 ] }</text>

    <text x="80" y="490" font-size="13" font-weight="700" fill="#ff6b6b">▌ss -tlnp | grep 3001</text>
    <text x="80" y="515" font-family="ui-monospace" font-size="13" fill="#ff8787">→ 空</text>

    <text x="80" y="555" font-size="13" font-weight="700" fill="#ff6b6b">▌curl 192.168.160.14:3001</text>
    <text x="80" y="580" font-family="ui-monospace" font-size="13" fill="#ff8787">curl: (7) Failed to connect</text>
    <text x="80" y="600" font-family="ui-monospace" font-size="13" fill="#ff8787">Connection refused</text>

    <text x="80" y="640" font-size="12" font-weight="700" fill="#ffd8a8">★ 进程是 Up，配置在 HostConfig 里写着，但 host 上没人监听</text>
  </g>

  <!-- RIGHT: ok -->
  <g filter="url(#shadow)">
    <rect x="620" y="100" width="540" height="560" rx="12" fill="url(#terminalOk)"/>
    <text x="640" y="130" font-size="13" font-weight="700" fill="#51cf66">▌修复后 · docker inspect new-api --format '{{json .NetworkSettings}}'</text>
    <text x="640" y="170" font-family="ui-monospace" font-size="13" fill="#69db7c">{</text>
    <text x="660" y="190" font-family="ui-monospace" font-size="13" fill="#b2f2bb">"SandboxID": "4f49217be3ca...",</text>
    <text x="660" y="210" font-family="ui-monospace" font-size="13" fill="#b2f2bb">"Ports": <tspan font-weight="700" fill="#ffd43b">{</tspan></text>
    <text x="680" y="230" font-family="ui-monospace" font-size="11" fill="#ffd43b">"3000/tcp": [</text>
    <text x="700" y="248" font-family="ui-monospace" font-size="11" fill="#ffd43b">{"HostIp": "192.168.160.14",</text>
    <text x="700" y="263" font-family="ui-monospace" font-size="11" fill="#ffd43b">"HostPort": "3001"}</text>
    <text x="680" y="278" font-family="ui-monospace" font-size="11" fill="#ffd43b">]</text>
    <text x="660" y="295" font-family="ui-monospace" font-size="11" fill="#ffd43b">},</text>
    <text x="660" y="315" font-family="ui-monospace" font-size="13" fill="#b2f2bb">"Networks": <tspan font-weight="700" fill="#ffd43b">{</tspan></text>
    <text x="680" y="335" font-family="ui-monospace" font-size="11" fill="#ffd43b">"newapi_data_default": {</text>
    <text x="700" y="350" font-family="ui-monospace" font-size="11" fill="#ffd43b">"IPAddress": "172.20.0.2",</text>
    <text x="700" y="365" font-family="ui-monospace" font-size="11" fill="#ffd43b">"EndpointID": "18c4827b..."</text>
    <text x="680" y="380" font-family="ui-monospace" font-size="11" fill="#ffd43b">}</text>
    <text x="660" y="395" font-family="ui-monospace" font-size="11" fill="#ffd43b">}</text>
    <text x="640" y="415" font-family="ui-monospace" font-size="13" fill="#69db7c">}</text>

    <text x="640" y="460" font-size="13" font-weight="700" fill="#51cf66">▌ss -tlnp | grep 3001</text>
    <text x="640" y="482" font-family="ui-monospace" font-size="12" fill="#b2f2bb">LISTEN docker-proxy 192.168.160.14:3001</text>

    <text x="640" y="520" font-size="13" font-weight="700" fill="#51cf66">▌curl 192.168.160.14:3001/</text>
    <text x="640" y="542" font-family="ui-monospace" font-size="12" fill="#b2f2bb">HTTP 200 in 0.001895s</text>
    <text x="640" y="562" font-family="ui-monospace" font-size="12" fill="#b2f2bb">1020 bytes returned</text>

    <text x="640" y="640" font-size="12" font-weight="700" fill="#ffd43b">★ 三行命令把意图"重新"变回现实，过程无需重启容器</text>
  </g>
</svg>
