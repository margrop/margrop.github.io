<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="hostOk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#51cf66"/>
      <stop offset="100%" stop-color="#37b24d"/>
    </linearGradient>
    <linearGradient id="hostBad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a52"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowOk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37b24d"/>
    </marker>
    <marker id="arrowBad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ee5a52"/>
    </marker>
  </defs>

  <rect width="1080" height="640" fill="url(#bg)"/>
  <text x="540" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#212529">故障现场：docker ps 显示一切正常，端口就是访问不了</text>
  <text x="540" y="64" text-anchor="middle" font-size="13" fill="#868e96">三个"看起来健康"的服务同时掉线，container 进程在跑、port-binding 在 HostConfig 里写着——但 host 上没人监听</text>

  <!-- External client -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="200" height="80" rx="10" fill="url(#box)" stroke="#adb5bd"/>
    <text x="160" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#212529">VPN 内其他节点</text>
    <text x="160" y="170" text-anchor="middle" font-size="11" fill="#868e96">curl / TCP probe</text>
    <text x="160" y="188" text-anchor="middle" font-size="11" fill="#868e96">→ Connection refused</text>
  </g>

  <!-- Host machine -->
  <g filter="url(#shadow)">
    <rect x="340" y="100" width="400" height="380" rx="14" fill="#ffffff" stroke="#495057" stroke-width="2"/>
    <text x="540" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#212529">Host (tun0: <tspan font-family="ui-monospace">192.168.160.14</tspan>)</text>

    <!-- iptables DOCKER chain -->
    <g>
      <rect x="370" y="160" width="340" height="56" rx="8" fill="#fff3bf" stroke="#fab005" stroke-dasharray="6 4"/>
      <text x="540" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">iptables nat/DOCKER 链</text>
      <text x="540" y="204" text-anchor="middle" font-size="11" fill="#868e96">-A DOCKER ... 3001 → 172.20.0.2:3000 &lt;空&gt;</text>
    </g>

    <!-- docker-proxy -->
    <g>
      <rect x="370" y="236" width="340" height="56" rx="8" fill="#fff3bf" stroke="#fab005" stroke-dasharray="6 4"/>
      <text x="540" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">docker-proxy 进程</text>
      <text x="540" y="280" text-anchor="middle" font-size="11" fill="#868e96">-host-ip 192.168.160.14 -host-port 3001 &lt;未启动&gt;</text>
    </g>

    <!-- Containers -->
    <g filter="url(#shadow)">
      <rect x="380" y="320" width="100" height="130" rx="10" fill="url(#box)" stroke="#37b24d"/>
      <text x="430" y="346" text-anchor="middle" font-size="12" font-weight="700" fill="#212529">new-api</text>
      <circle cx="430" cy="365" r="6" fill="#37b24d"/>
      <text x="430" y="385" text-anchor="middle" font-size="10" fill="#37b24d">Up 4 hours</text>
      <text x="430" y="410" text-anchor="middle" font-size="10" fill="#495057">ports 3000</text>
      <text x="430" y="430" text-anchor="middle" font-size="10" fill="#495057">networks {}</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="490" y="320" width="100" height="130" rx="10" fill="url(#box)" stroke="#37b24d"/>
      <text x="540" y="346" text-anchor="middle" font-size="12" font-weight="700" fill="#212529">dockhand</text>
      <circle cx="540" cy="365" r="6" fill="#37b24d"/>
      <text x="540" y="385" text-anchor="middle" font-size="10" fill="#37b24d">Up 4 hours</text>
      <text x="540" y="410" text-anchor="middle" font-size="10" fill="#495057">ports 3000</text>
      <text x="540" y="430" text-anchor="middle" font-size="10" fill="#495057">networks {}</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="600" y="320" width="100" height="130" rx="10" fill="url(#box)" stroke="#37b24d"/>
      <text x="650" y="346" text-anchor="middle" font-size="12" font-weight="700" fill="#212529">headroom</text>
      <circle cx="650" cy="365" r="6" fill="#37b24d"/>
      <text x="650" y="385" text-anchor="middle" font-size="10" fill="#37b24d">Up 4 hours</text>
      <text x="650" y="410" text-anchor="middle" font-size="10" fill="#495057">ports 0</text>
      <text x="650" y="430" text-anchor="middle" font-size="10" fill="#495057">networks {}</text>
    </g>
  </g>

  <!-- ss show no listener -->
  <g filter="url(#shadow)">
    <rect x="800" y="120" width="220" height="80" rx="10" fill="url(#box)" stroke="#adb5bd"/>
    <text x="910" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#212529">ss -tlnp | grep 3001</text>
    <text x="910" y="170" text-anchor="middle" font-size="11" fill="#868e96">NO LISTENER ON 3001</text>
    <text x="910" y="188" text-anchor="middle" font-size="11" fill="#ee5a52"># HostConfig 写的是 3001</text>
  </g>

  <!-- Connecting arrows -->
  <path d="M260,160 L340,160" stroke="url(#hostBad)" stroke-width="3" fill="none" marker-end="url(#arrowBad)"/>
  <path d="M800,160 L740,160" stroke="url(#hostBad)" stroke-width="2" fill="none" marker-end="url(#arrowBad)"/>

  <!-- X marks -->
  <g>
    <text x="290" y="155" font-size="22" fill="#ee5a52" font-weight="700">✕</text>
    <text x="785" y="155" font-size="22" fill="#ee5a52" font-weight="700">✕</text>
  </g>

  <!-- Bottom legend -->
  <g>
    <rect x="80" y="520" width="920" height="80" rx="10" fill="url(#box)" stroke="#adb5bd"/>
    <text x="100" y="548" font-size="14" font-weight="700" fill="#212529">症状摘要</text>
    <text x="100" y="572" font-size="12" fill="#495057">· docker ps 全是 Up / healthy；</text>
    <text x="100" y="590" font-size="12" fill="#495057">· HostConfig.PortBindings 仍然有 3001→3000 映射；</text>
    <text x="540" y="572" font-size="12" fill="#495057">· 但 NetworkSettings.Networks 与 Ports 都是空 {}；</text>
    <text x="540" y="590" font-size="12" fill="#495057">· 容器内 netstat / ss 看到 3000 是正常监听的；</text>
  </g>
</svg>
