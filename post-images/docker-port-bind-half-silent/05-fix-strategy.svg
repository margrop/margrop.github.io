<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#51cf66"/>
      <stop offset="100%" stop-color="#37b24d"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a52"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1080" height="720" fill="url(#bg)"/>
  <text x="540" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#212529">治本 vs 治标：把这种"半残"挡在启动链路里</text>
  <text x="540" y="64" text-anchor="middle" font-size="13" fill="#868e96">单次重连只能救火；让开机顺序本身不会再让 docker 抢在 TUN 之前，是更稳的做法</text>

  <!-- Two columns -->
  <g filter="url(#shadow)">
    <!-- Left: 治标 -->
    <rect x="60" y="100" width="470" height="580" rx="12" fill="#fff5f5" stroke="#ee5a52" stroke-width="2"/>
    <text x="295" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#c92a2a">治标（临时救命）</text>
    <text x="295" y="150" text-anchor="middle" font-size="11" fill="#868e96">症状消失，但下次重启可能复发</text>

    <rect x="80" y="170" width="430" height="80" rx="8" fill="url(#box)" stroke="#ee5a52"/>
    <text x="100" y="194" font-family="ui-monospace" font-size="12" fill="#212529"># 一行命令，让 libnetwork 重新</text>
    <text x="100" y="212" font-family="ui-monospace" font-size="12" fill="#212529"># 走一遍 attach + iptables + proxy</text>
    <text x="100" y="232" font-family="ui-monospace" font-size="12" font-weight="700" fill="#c92a2a">docker network connect &lt;net&gt; &lt;ctr&gt;</text>

    <rect x="80" y="270" width="430" height="80" rx="8" fill="url(#box)" stroke="#ee5a52"/>
    <text x="100" y="294" font-size="12" fill="#212529">· 适用：临时救火、不想动系统配置</text>
    <text x="100" y="314" font-size="12" fill="#212529">· 不会修改 HostConfig，意图仍在</text>
    <text x="100" y="334" font-size="12" fill="#212529">· 不会重启容器内的进程，无停服</text>

    <rect x="80" y="370" width="430" height="80" rx="8" fill="url(#box)" stroke="#ee5a52"/>
    <text x="100" y="394" font-size="12" fill="#212529">· 失败兜底：加 <tspan font-family="ui-monospace" fill="#212529">--restart=always</tspan></text>
    <text x="100" y="414" font-size="12" fill="#212529">  不会自愈（network attach 状态不持久）</text>
    <text x="100" y="434" font-size="12" fill="#212529">· 必须配合开机顺序调整</text>

    <text x="80" y="500" font-size="13" font-weight="700" fill="#212529">短板：</text>
    <text x="80" y="520" font-size="12" fill="#495057">没有解决"为什么 TUN 还没起 Docker 就跑了"</text>
    <text x="80" y="540" font-size="12" fill="#495057">也没有解决"如何让 host IP 严格先于端口绑定"</text>
    <text x="80" y="560" font-size="12" fill="#495057">下次机器重启 / easytier 重连 / IP 漂移会再次复发</text>
  </g>

  <g filter="url(#shadow)">
    <!-- Right: 治本 -->
    <rect x="550" y="100" width="470" height="580" rx="12" fill="#f4fbf6" stroke="#37b24d" stroke-width="2"/>
    <text x="785" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#2b8a3e">治本（开机链路改造）</text>
    <text x="785" y="150" text-anchor="middle" font-size="11" fill="#868e96">让 docker 永远在接口就绪后才尝试 attach</text>

    <rect x="570" y="170" width="430" height="100" rx="8" fill="url(#box)" stroke="#37b24d"/>
    <text x="590" y="194" font-size="12" font-weight="700" fill="#212529">① systemd 依赖：让 docker 等 TUN</text>
    <text x="590" y="216" font-family="ui-monospace" font-size="10" fill="#495057">[Unit]</text>
    <text x="590" y="232" font-family="ui-monospace" font-size="10" fill="#495057">After=network-online.target easytier-core.service</text>
    <text x="590" y="248" font-family="ui-monospace" font-size="10" fill="#495057">Wants=network-online.target</text>
    <text x="590" y="264" font-size="10" fill="#868e96">配 systemd-socket-activatable 也不要漏</text>

    <rect x="570" y="290" width="430" height="100" rx="8" fill="url(#box)" stroke="#37b24d"/>
    <text x="590" y="314" font-size="12" font-weight="700" fill="#212529">② compose 改写：去 HostIp 直接绑 0.0.0.0</text>
    <text x="590" y="336" font-family="ui-monospace" font-size="10" fill="#495057">- "192.168.160.14:3001:3000"</text>
    <text x="590" y="352" font-family="ui-monospace" font-size="10" fill="#37b24d" font-weight="700">+ "3001:3000"</text>
    <text x="590" y="368" font-size="10" fill="#868e6e">让 host 防火墙策略去管"谁能进"</text>

    <rect x="570" y="410" width="430" height="100" rx="8" fill="url(#box)" stroke="#37b24d"/>
    <text x="590" y="434" font-size="12" font-weight="700" fill="#212529">③ 健康探针：开机脚本轮询 3001</text>
    <text x="590" y="456" font-family="ui-monospace" font-size="10" fill="#495057">until curl -sf 127.0.0.1:3001/; do</text>
    <text x="590" y="472" font-family="ui-monospace" font-size="10" fill="#495057">  docker network connect net ctr || true</text>
    <text x="590" y="488" font-family="ui-monospace" font-size="10" fill="#495057">  sleep 5</text>
    <text x="590" y="504" font-family="ui-monospace" font-size="10" fill="#495057">done</text>

    <text x="570" y="560" font-size="13" font-weight="700" fill="#212529">好处：</text>
    <text x="570" y="580" font-size="12" fill="#495057">即使 TUN 接口偶尔迟到，docker 也不会"带着</text>
    <text x="570" y="600" font-size="12" fill="#495057">错误状态"继续执行；网络 ready 是 attach 的前提。</text>
  </g>
</svg>
