<text x="146" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Path</text>
<text x="146" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">二进制/配置不存在</text>
<rect x="460" y="170" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
