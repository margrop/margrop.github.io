<text x="536" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Privilege</text>
<text x="536" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">权限或账户错误</text>
<rect x="850" y="170" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="892" cy="212" r="20" fill="#2563eb"/>
