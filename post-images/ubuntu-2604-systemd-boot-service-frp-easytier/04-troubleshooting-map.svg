<text x="926" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Timing</text>
<text x="926" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">网络尚未就绪</text>
<rect x="70" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="112" cy="422" r="20" fill="#2563eb"/>
