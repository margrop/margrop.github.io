<text x="146" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Logs</text>
<text x="146" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">日志指向根因</text>
<rect x="460" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="502" cy="422" r="20" fill="#2563eb"/>
<text x="502" y="430" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">5</text>
<text x="536" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Restart</text>
<text x="536" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">反复拉起失败</text>
<rect x="850" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="892" cy="422" r="20" fill="#2563eb"/>
<text x="892" y="430" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">6</text>
<text x="926" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Secrets</text>
<text x="926" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">参数泄露风险</text>
