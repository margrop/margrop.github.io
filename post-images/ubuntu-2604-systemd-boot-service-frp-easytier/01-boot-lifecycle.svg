<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#f8fafc"/>
<rect x="0" y="0" width="1280" height="18" fill="#2563eb"/>
<text x="70" y="82" font-family="Arial, PingFang SC, sans-serif" font-size="42" font-weight="700" fill="#111827">后台服务启动生命周期</text>
<text x="72" y="126" font-family="Arial, PingFang SC, sans-serif" font-size="22" fill="#475569">开机 -&gt; 网络/系统准备 -&gt; 服务启动 -&gt; 失败重启 -&gt; 有序停止</text>
<rect x="70" y="170" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="112" cy="212" r="20" fill="#2563eb"/>
<text x="112" y="220" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">1</text>
<text x="146" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Power on</text>
<text x="146" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">系统开始启动</text>
<rect x="460" y="170" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="502" cy="212" r="20" fill="#2563eb"/>
<text x="502" y="220" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">2</text>
<text x="536" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Native manager</text>
<text x="536" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">接管后台服务</text>
<rect x="850" y="170" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="892" cy="212" r="20" fill="#2563eb"/>
<text x="892" y="220" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">3</text>
<text x="926" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Network ready</text>
<text x="926" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">隧道具备条件</text>
<rect x="70" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="112" cy="422" r="20" fill="#2563eb"/>
<text x="112" y="430" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">4</text>
<text x="146" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Daemon running</text>
<text x="146" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">frp / EasyTier 常驻</text>
<rect x="460" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="502" cy="422" r="20" fill="#2563eb"/>
<text x="502" y="430" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">5</text>
<text x="536" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Restart policy</text>
<text x="536" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">异常退出自动拉起</text>
<rect x="850" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="892" cy="422" r="20" fill="#2563eb"/>
<text x="892" y="430" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">6</text>
<text x="926" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Shutdown</text>
<text x="926" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">按顺序释放资源</text>
</svg>