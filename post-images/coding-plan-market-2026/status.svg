<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="680"><rect width="1400" height="680" rx="24" fill="#0f172a"/><text x="70" y="90" fill="#fff" font-size="42" font-family="Arial" font-weight="700">Purchase status is not the same as usage status</text><g font-family="Arial" font-size="28"><rect x="90" y="160" width="360" height="360" rx="22" fill="#064e3b"/><text x="135" y="240" fill="#6ee7b7" font-weight="700">BUYABLE</text><text x="135" y="310" fill="#d1fae5">Checkout works</text><text x="135" y="355" fill="#d1fae5">Usage still has caps</text><rect x="520" y="160" width="360" height="360" rx="22" fill="#713f12"/><text x="565" y="240" fill="#fde68a" font-weight="700">LIMITED</text><text x="565" y="310" fill="#fef3c7">Plan is on sale</text><text x="565" y="355" fill="#fef3c7">But quota is tight</text><rect x="950" y="160" width="360" height="360" rx="22" fill="#7f1d1d"/><text x="995" y="240" fill="#fca5a5" font-weight="700">PAUSED</text><text x="995" y="310" fill="#fee2e2">No new checkout</text><text x="995" y="355" fill="#fee2e2">Waitlist or region lock</text></g></svg>
