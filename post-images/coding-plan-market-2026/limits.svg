<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700"><rect width="1400" height="700" rx="24" fill="#fff7ed"/><text x="60" y="85" font-family="Arial" font-size="42" font-weight="700" fill="#7c2d12">What “limit” can mean</text><g font-family="Arial" font-size="27"><rect x="75" y="150" width="370" height="390" rx="20" fill="#fed7aa"/><text x="115" y="230" font-weight="700" fill="#9a3412">Messages</text><text x="115" y="295">You can send fewer</text><text x="115" y="340">requests per window.</text><rect x="515" y="150" width="370" height="390" rx="20" fill="#fde68a"/><text x="555" y="230" font-weight="700" fill="#854d0e">Tokens</text><text x="555" y="295">Long codebases cost</text><text x="555" y="340">more context budget.</text><rect x="955" y="150" width="370" height="390" rx="20" fill="#bbf7d0"/><text x="995" y="230" font-weight="700" fill="#166534">Credits</text><text x="995" y="295">Fast models consume</text><text x="995" y="340">a shared allowance.</text></g></svg>
