<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760"><rect width="1400" height="760" rx="24" fill="#f8fafc"/><text x="70" y="90" font-family="Arial" font-size="44" font-weight="700" fill="#0f172a">The three questions before you pay</text><g font-family="Arial" font-size="28"><rect x="70" y="150" width="380" height="470" rx="20" fill="#dbeafe"/><text x="105" y="225" font-weight="700" fill="#1e3a8a">1. Can I buy it?</text><text x="105" y="285" fill="#334155">Region, payment,</text><text x="105" y="330" fill="#334155">account eligibility</text><rect x="510" y="150" width="380" height="470" rx="20" fill="#dcfce7"/><text x="545" y="225" font-weight="700" fill="#166534">2. What is limited?</text><text x="545" y="285" fill="#334155">Messages, tokens,</text><text x="545" y="330" fill="#334155">agents, or credits</text><rect x="950" y="150" width="380" height="470" rx="20" fill="#fef3c7"/><text x="985" y="225" font-weight="700" fill="#92400e">3. What is the fallback?</text><text x="985" y="285" fill="#334155">API, second tool,</text><text x="985" y="330" fill="#334155">or smaller model</text><path d="M450 385h60M890 385h60" stroke="#64748b" stroke-width="8"/><path d="M495 365l25 20-25 20M935 365l25 20-25 20" fill="none" stroke="#64748b" stroke-width="8"/></g></svg>
