<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7ef"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <linearGradient id="main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="960" rx="28" fill="url(#bg)"/>
  <text x="70" y="84" font-size="40" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1f2937" font-weight="700">Clawd Code 2026.03 的仓库结构</text>
  <text x="70" y="126" font-size="20" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">当前 tracked tree 不是旧快照本体，而是 Python-first 的 porting workspace + archive + snapshots.</text>

  <g filter="url(#shadow)">
    <rect x="100" y="220" width="260" height="120" rx="24" fill="url(#main)"/>
    <rect x="430" y="220" width="260" height="120" rx="24" fill="url(#accent1)"/>
    <rect x="760" y="220" width="260" height="120" rx="24" fill="url(#accent2)"/>
    <rect x="1090" y="220" width="360" height="120" rx="24" fill="url(#accent3)"/>
  </g>

  <text x="150" y="265" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">src/</text>
  <text x="150" y="300" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#e0f2fe">Python porting workspace</text>

  <text x="470" y="265" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">tests/</text>
  <text x="470" y="300" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#ecfdf5">verification and parity checks</text>

  <text x="805" y="265" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">archive/</text>
  <text x="805" y="300" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f5f3ff">ignored TS snapshot mirror</text>

  <text x="1135" y="255" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">reference_data/</text>
  <text x="1135" y="290" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fffbeb">commands / tools / surfaces</text>

  <g stroke="#64748b" stroke-width="4" fill="none">
    <path d="M230 340 V410"/>
    <path d="M560 340 V410"/>
    <path d="M890 340 V410"/>
    <path d="M1270 340 V410"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="410" width="300" height="170" rx="24" fill="#ffffff"/>
    <rect x="450" y="410" width="300" height="170" rx="24" fill="#ffffff"/>
    <rect x="810" y="410" width="300" height="170" rx="24" fill="#ffffff"/>
    <rect x="1170" y="410" width="340" height="170" rx="24" fill="#ffffff"/>
  </g>

  <text x="126" y="455" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1d4ed8" font-weight="700">main.py</text>
  <text x="126" y="490" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">summary / parity-audit</text>
  <text x="126" y="522" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">route / bootstrap / turn-loop</text>

  <text x="486" y="455" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#0f766e" font-weight="700">command graph</text>
  <text x="486" y="490" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">builtins / plugin-like / skill-like</text>
  <text x="486" y="522" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">registry over switch statements</text>

  <text x="846" y="455" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#7c3aed" font-weight="700">tool pool</text>
  <text x="846" y="490" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">permissions / mcp / simple mode</text>
  <text x="846" y="522" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">tool filtering as policy</text>

  <text x="1206" y="455" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#b45309" font-weight="700">bootstrap graph</text>
  <text x="1206" y="490" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">prefetch -> trust gate -> runtime</text>
  <text x="1206" y="522" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">startup order as doctrine</text>

  <text x="70" y="690" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">这张图的重点不是文件名，而是“入口薄、态度厚、状态集中、动作分层”。这正是新仓库最重要的工程气质。</text>
</svg>
