<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="panic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>

  <text x="400" y="50" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">AnythingLLM 与「共享柜子」的故事</text>
  <text x="400" y="78" fill="#94a3b8" font-size="13" text-anchor="middle">一家 AI 公司和一群用户共用同一台电脑上的同一个柜子</text>

  <rect x="60" y="120" width="220" height="300" rx="14" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="170" y="150" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">Host</text>
  <text x="170" y="170" fill="#94a3b8" font-size="12" text-anchor="middle">root user / home dir</text>

  <rect x="85" y="190" width="170" height="200" rx="10" fill="url(#box)" stroke="#92400e" stroke-width="2"/>
  <rect x="105" y="210" width="130" height="40" rx="4" fill="#fde68a" stroke="#92400e"/>
  <rect x="105" y="260" width="130" height="40" rx="4" fill="#fde68a" stroke="#92400e"/>
  <rect x="105" y="310" width="130" height="40" rx="4" fill="#fde68a" stroke="#92400e"/>
  <text x="170" y="235" fill="#78350f" font-size="13" text-anchor="middle">anythingllm.db</text>
  <text x="170" y="285" fill="#78350f" font-size="13" text-anchor="middle">documents/</text>
  <text x="170" y="335" fill="#78350f" font-size="13" text-anchor="middle">models/</text>

  <g transform="translate(280, 260)">
    <rect x="-18" y="-12" width="36" height="26" rx="4" fill="url(#panic)" stroke="#991b1b" stroke-width="2"/>
    <path d="M-10,-12 v-10 a10 10 0 0 1 20 0 v10" fill="none" stroke="#991b1b" stroke-width="3"/>
    <text x="0" y="6" font-size="20" fill="#991b1b" text-anchor="middle" font-weight="700">✕</text>
  </g>

  <rect x="370" y="120" width="370" height="300" rx="14" fill="#0f766e" stroke="#14b8a6" stroke-width="2"/>
  <text x="555" y="150" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">Docker container (AnythingLLM)</text>
  <text x="555" y="170" fill="#a5f3fc" font-size="12" text-anchor="middle">process UID 1000</text>

  <circle cx="555" cy="240" r="32" fill="#14b8a6" stroke="#0f766e" stroke-width="2"/>
  <text x="555" y="247" fill="#0f172a" font-size="22" text-anchor="middle" font-weight="700">A</text>
  <text x="555" y="290" fill="#f8fafc" font-size="12" text-anchor="middle">app process (Node.js)</text>

  <path d="M380 250 q-30 0 -30 30" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  <text x="360" y="320" fill="#fca5a5" font-size="13" text-anchor="middle">wants the cabinet → denied!</text>

  <text x="400" y="450" fill="#cbd5e1" font-size="13" text-anchor="middle">Cabinet belongs to root, key is for anythingllm. Wrong key → can't open → SQLite error → container keeps restarting.</text>
</svg>
