<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system, Segoe UI, sans-serif">
  <rect width="900" height="520" fill="#0f172a"/>
  <text x="450" y="40" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">Restart loop — when SQLite can't open the file</text>

  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#cbd5e1">
    <rect x="40" y="80" width="820" height="44" rx="6" fill="#1e293b"/>
    <text x="56" y="106">$ docker ps -a --format '{{.Names}}\t{{.Status}}'</text>

    <rect x="40" y="130" width="820" height="44" rx="6" fill="#0f172a"/>
    <text x="56" y="156">anythingllm    Restarting (1) 2 seconds ago</text>
    <rect x="40" y="180" width="820" height="44" rx="6" fill="#1e293b"/>
    <text x="56" y="206">one-api        Up 2 days</text>
    <rect x="40" y="230" width="820" height="44" rx="6" fill="#0f172a"/>
    <text x="56" y="256">open-webui     Up 2 weeks (healthy)</text>
  </g>

  <g transform="translate(40,300)">
    <rect width="820" height="190" rx="10" fill="#7f1d1d" opacity="0.18"/>
    <rect width="820" height="190" rx="10" fill="none" stroke="#b91c1c" stroke-width="2"/>
    <text x="20" y="28" fill="#fecaca" font-size="14" font-weight="700">docker logs anythingllm --tail 5</text>
    <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fecaca">
      <text x="20" y="58">Datasource "db": SQLite database "anythingllm.db" at "file:../storage/anythingllm.db"</text>
      <text x="20" y="78">Error: Schema engine error:</text>
      <text x="20" y="98">SQLite database error</text>
      <text x="20" y="118">unable to open database file: ../storage/anythingllm.db</text>
      <text x="20" y="148" fill="#fde68a">[collector] info: Document processor app listening on port 8888</text>
      <text x="20" y="168" fill="#fde68a">...</text>
    </g>
  </g>

  <text x="450" y="510" fill="#94a3b8" font-size="12" text-anchor="middle">Notice the loop: the node process keeps dying on Prisma, the collector keeps listening, then docker restarts.</text>
</svg>
