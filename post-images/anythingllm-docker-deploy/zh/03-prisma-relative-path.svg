<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="-apple-system, Segoe UI, sans-serif">
  <rect width="900" height="540" fill="#0f172a"/>
  <text x="450" y="42" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">Prisma's quirky relative path: file:../storage/anythingllm.db</text>
  <text x="450" y="70" fill="#94a3b8" font-size="13" text-anchor="middle">Why not absolute? Blame the Node project layout convention.</text>

  <g transform="translate(80,110)">
    <rect width="380" height="380" rx="12" fill="#1e293b" stroke="#475569"/>
    <text x="190" y="30" fill="#f8fafc" font-size="15" font-weight="700" text-anchor="middle">/app/server/</text>
    <rect x="30" y="55" width="320" height="56" rx="6" fill="#fde68a" stroke="#92400e"/>
    <text x="190" y="78" fill="#78350f" font-size="13" text-anchor="middle" font-weight="700">.env (loaded by dotenv)</text>
    <text x="190" y="98" fill="#78350f" font-size="11" text-anchor="middle">STORAGE_DIR=/app/server/storage</text>
    <rect x="30" y="135" width="320" height="80" rx="6" fill="#bae6fd" stroke="#0369a1"/>
    <text x="190" y="158" fill="#0c4a6e" font-size="13" text-anchor="middle" font-weight="700">prisma/schema.prisma</text>
    <text x="190" y="180" fill="#0c4a6e" font-size="11" text-anchor="middle">datasource db {</text>
    <text x="190" y="198" fill="#0c4a6e" font-size="11" text-anchor="middle">  url = "file:../storage/anythingllm.db"</text>
    <rect x="30" y="235" width="320" height="48" rx="6" fill="#bbf7d0" stroke="#15803d"/>
    <text x="190" y="260" fill="#14532d" font-size="13" text-anchor="middle" font-weight="700">index.js → require('@prisma/client')</text>
    <path d="M190 213 L190 235" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
    <path d="M190 91 L190 135" stroke="#475569" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <g transform="translate(490,260)">
    <text x="0" y="-12" fill="#cbd5e1" font-size="13" text-anchor="middle">resolve relative path →</text>
    <path d="M0 0 L60 0" stroke="#fbbf24" stroke-width="4" marker-end="url(#a)"/>
    <text x="30" y="22" fill="#fbbf24" font-size="12" text-anchor="middle">cwd = /app/server/</text>
    <text x="30" y="42" fill="#fbbf24" font-size="12" text-anchor="middle">../storage → /app/storage</text>
  </g>

  <g transform="translate(560,110)">
    <rect width="290" height="380" rx="12" fill="#1e293b" stroke="#475569"/>
    <text x="145" y="30" fill="#f8fafc" font-size="15" font-weight="700" text-anchor="middle">What it actually resolves to</text>
    <rect x="20" y="55" width="250" height="64" rx="6" fill="#fecaca" stroke="#991b1b"/>
    <text x="145" y="80" fill="#7f1d1d" font-size="12" text-anchor="middle" font-weight="700">❌ Naive guess</text>
    <text x="145" y="100" fill="#7f1d1d" font-size="11" text-anchor="middle">/app/server/storage/anythingllm.db</text>
    <rect x="20" y="135" width="250" height="64" rx="6" fill="#fef08a" stroke="#a16207"/>
    <text x="145" y="160" fill="#713f12" font-size="12" text-anchor="middle" font-weight="700">⚠️ Prisma actually expands</text>
    <text x="145" y="180" fill="#713f12" font-size="11" text-anchor="middle">/app/storage/anythingllm.db</text>
    <rect x="20" y="215" width="250" height="80" rx="6" fill="#bbf7d0" stroke="#15803d"/>
    <text x="145" y="240" fill="#14532d" font-size="12" text-anchor="middle" font-weight="700">✅ If you change schema to</text>
    <text x="145" y="260" fill="#14532d" font-size="11" text-anchor="middle">url = "file:/app/server/storage/"</text>
    <text x="145" y="280" fill="#14532d" font-size="11" text-anchor="middle">+ STORAGE_DIR=/app/server/storage</text>
    <text x="145" y="305" fill="#15803d" font-size="12" text-anchor="middle" font-weight="700">→ aligned, db opens</text>
  </g>

  <text x="450" y="520" fill="#94a3b8" font-size="12" text-anchor="middle">"Prisma + SQLite + multi-dir Node project: a tragedy in one relative path."</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>
