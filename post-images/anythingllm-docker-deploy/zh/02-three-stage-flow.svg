<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="#0f172a"/>
  <text x="450" y="40" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">AnythingLLM docker start: from one CLI line to "it works"</text>

  <rect x="40" y="80" width="260" height="380" rx="14" fill="url(#g1)"/>
  <text x="170" y="115" fill="#dbeafe" font-size="16" font-weight="700" text-anchor="middle">1. Pull image</text>
  <text x="170" y="140" fill="#bfdbfe" font-size="12" text-anchor="middle">docker pull</text>
  <text x="60" y="180" fill="#e0e7ff" font-size="12">· fetch layers from registry</text>
  <text x="60" y="205" fill="#e0e7ff" font-size="12">· verify sha256</text>
  <text x="60" y="230" fill="#e0e7ff" font-size="12">· cache locally</text>
  <text x="60" y="260" fill="#fde68a" font-size="12" font-weight="700">Analogy: pick up a parcel</text>
  <text x="60" y="280" fill="#fde68a" font-size="12">use the pickup code at</text>
  <text x="60" y="298" fill="#fde68a" font-size="12">the locker, sign for it,</text>
  <text x="60" y="320" fill="#fde68a" font-size="12">drop it in your home</text>
  <text x="60" y="338" fill="#fde68a" font-size="12">"stash cabinet".</text>
  <text x="60" y="430" fill="#fef3c7" font-size="11">time: 10s-2min</text>

  <path d="M305 270 L355 270" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="360" y="80" width="260" height="380" rx="14" fill="url(#g2)"/>
  <text x="490" y="115" fill="#cffafe" font-size="16" font-weight="700" text-anchor="middle">2. Create container</text>
  <text x="490" y="140" fill="#a5f3fc" font-size="12" text-anchor="middle">docker create + start</text>
  <text x="380" y="180" fill="#cffafe" font-size="12">· build rootfs</text>
  <text x="380" y="205" fill="#cffafe" font-size="12">· apply cgroups</text>
  <text x="380" y="230" fill="#cffafe" font-size="12">· mount volumes</text>
  <text x="380" y="260" fill="#fde68a" font-size="12" font-weight="700">Analogy: move into a rental</text>
  <text x="380" y="280" fill="#fde68a" font-size="12">landlord walls off a room,</text>
  <text x="380" y="298" fill="#fde68a" font-size="12">sets utility caps, hands</text>
  <text x="380" y="320" fill="#fde68a" font-size="12">you one key that maps</text>
  <text x="380" y="338" fill="#fde68a" font-size="12">to a hallway closet.</text>
  <text x="380" y="430" fill="#fef3c7" font-size="11">time: &lt; 1s</text>

  <path d="M625 270 L675 270" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="680" y="80" width="200" height="380" rx="14" fill="url(#g3)"/>
  <text x="780" y="115" fill="#ede9fe" font-size="16" font-weight="700" text-anchor="middle">3. Entrypoint</text>
  <text x="780" y="140" fill="#ddd6fe" font-size="12" text-anchor="middle">docker-entrypoint.sh</text>
  <text x="700" y="180" fill="#ede9fe" font-size="12">· Prisma migrate</text>
  <text x="700" y="205" fill="#ede9fe" font-size="12">· launch Node</text>
  <text x="700" y="230" fill="#ede9fe" font-size="12">· launch collector</text>
  <text x="700" y="260" fill="#fde68a" font-size="12" font-weight="700">Analogy: open the shop</text>
  <text x="700" y="280" fill="#fde68a" font-size="12">unlock the door,</text>
  <text x="700" y="298" fill="#fde68a" font-size="12">stock the shelves,</text>
  <text x="700" y="320" fill="#fde68a" font-size="12">test the till,</text>
  <text x="700" y="338" fill="#fde68a" font-size="12">serve on :3001.</text>
  <text x="700" y="430" fill="#fef3c7" font-size="11">time: 5-30s</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
