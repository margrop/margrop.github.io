<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Three Fixes, Ordered by How Much You Care About GPU Passthrough</text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#475569">All of them keep the same image, the same volumes, the same data — only the init behavior changes</text>

  <!-- box 1: remove init -->
  <g transform="translate(40,100)">
    <rect width="360" height="380" rx="14" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="360" height="44" rx="14" fill="#dcfce7"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#065f46">① Recommended: just unset it</text>

    <text x="20" y="74" font-size="12" fill="#334155">Edit <tspan font-family="monospace" font-weight="700">docker-compose.yml</tspan>:</text>
    <rect x="20" y="86" width="320" height="100" rx="6" fill="url(#g)"/>
    <text x="34" y="108" font-family="monospace" font-size="11" fill="#a7f3d0">environment:</text>
    <text x="44" y="126" font-family="monospace" font-size="11" fill="#86efac">PHOTOPRISM_INIT: ""</text>
    <text x="34" y="146" font-family="monospace" font-size="11" fill="#64748b"># 或者直接删掉这一行</text>

    <text x="20" y="212" font-size="12" font-weight="700" fill="#065f46">Why this works:</text>
    <text x="20" y="232" font-size="12" fill="#334155">你已经 <tspan font-family="monospace">devices</tspan> 挂载了</text>
    <text x="20" y="250" font-size="12" font-family="monospace" fill="#334155">/dev/dri/renderD128</text>
    <text x="20" y="270" font-size="12" fill="#334155">驱动/VA-API 工具由宿主机提供，</text>
    <text x="20" y="290" font-size="12" fill="#334155">容器里再装一遍完全是浪费。init 整</text>
    <text x="20" y="310" font-size="12" fill="#334155">阶段跳过，photoprism 30s 内起。</text>
    <text x="20" y="346" font-size="11" fill="#94a3b8" font-style="italic">改 stack → Update the stack</text>
    <text x="20" y="362" font-size="11" fill="#94a3b8" font-style="italic">（不要 re-pull image）</text>
  </g>

  <!-- box 2: pre-bake -->
  <g transform="translate(420,100)">
    <rect width="360" height="380" rx="14" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="0" y="0" width="360" height="44" rx="14" fill="#e0f2fe"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#075985">② If you really need intel init: pre-bake</text>

    <text x="20" y="74" font-size="12" fill="#334155">让容器在 CI / 一次性启动里跑完</text>
    <text x="20" y="92" font-size="12" fill="#334155">apt 步骤，然后 commit 一个新镜像：</text>
    <rect x="20" y="106" width="320" height="120" rx="6" fill="url(#g)"/>
    <text x="34" y="128" font-family="monospace" font-size="11" fill="#bae6fd">docker run --name pp-init \\</text>
    <text x="34" y="146" font-family="monospace" font-size="11" fill="#bae6fd">  -e PHOTOPRISM_INIT=intel \\</text>
    <text x="34" y="164" font-family="monospace" font-size="11" fill="#bae6fd">  photoprism/photoprism:250426</text>
    <text x="34" y="184" font-family="monospace" font-size="11" fill="#bae6fd"># 等 10 分钟 init 跑完…</text>
    <text x="34" y="202" font-family="monospace" font-size="11" fill="#86efac">docker commit pp-init \\</text>
    <text x="34" y="220" font-family="monospace" font-size="11" fill="#86efac">  my-registry/pp-intel-baked</text>

    <text x="20" y="252" font-size="12" fill="#334155">之后 stack 改用 baked 镜像，</text>
    <text x="20" y="272" font-size="12" fill="#334155">不再有 <tspan font-family="monospace">PHOTOPRISM_INIT</tspan>，</text>
    <text x="20" y="290" font-size="12" fill="#334155">启动秒级返回 307。</text>
    <text x="20" y="324" font-size="11" fill="#94a3b8" font-style="italic">镜像体积 +300MB 左右。</text>
    <text x="20" y="340" font-size="11" fill="#94a3b8" font-style="italic">一次性活儿，长期稳定。</text>
  </g>

  <!-- box 3: pre-step apt -->
  <g transform="translate(800,100)">
    <rect width="360" height="380" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="360" height="44" rx="14" fill="#fef3c7"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#92400e">③ Compromise: skip dist-upgrade</text>

    <text x="20" y="74" font-size="12" fill="#334155">如果你的镜像能容忍不更新</text>
    <text x="20" y="92" font-size="12" fill="#334155">systemd 等系统包，可以只跑 intel：</text>
    <rect x="20" y="106" width="320" height="80" rx="6" fill="url(#g)"/>
    <text x="34" y="128" font-family="monospace" font-size="11" fill="#fde68a">environment:</text>
    <text x="44" y="146" font-family="monospace" font-size="11" fill="#fde68a">PHOTOPRISM_INIT: "intel"</text>
    <text x="34" y="164" font-family="monospace" font-size="11" fill="#64748b"># Makefile 没有这个 target</text>
    <text x="34" y="180" font-family="monospace" font-size="11" fill="#64748b"># 实际不可行——intel 总是包 update</text>

    <text x="20" y="216" font-size="12" fill="#334155">这条路其实不通，因为</text>
    <text x="20" y="236" font-size="12" font-family="monospace" fill="#334155">intel: update install-intel</text>
    <text x="20" y="256" font-size="12" fill="#334155">永远会先跑 <tspan font-family="monospace">apt-get</tspan></text>
    <text x="20" y="274" font-size="12" fill="#334155">dist-upgrade。所以要么是 ①，</text>
    <text x="20" y="294" font-size="12" fill="#334155">要么是 ②。</text>
    <text x="20" y="328" font-size="11" fill="#94a3b8" font-style="italic">列出来只是为了让大家知道</text>
    <text x="20" y="344" font-size="11" fill="#94a3b8" font-style="italic">这个思路为什么死路。</text>
  </g>
</svg>
