<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="ok" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#bbf7d0"/></linearGradient>
    <linearGradient id="bad" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fee2e2"/><stop offset="1" stop-color="#fecaca"/></linearGradient>
  </defs>
  <rect width="1200" height="360" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">What 5 Minutes Look Like in CPU + Init Stages</text>
  <text x="600" y="64" text-anchor="middle" font-size="14" fill="#475569">apt dist-upgrade on a Plus tag with extra intel packages can blow past 5 minutes easily</text>

  <line x1="80" y1="180" x2="1120" y2="180" stroke="#0f172a" stroke-width="2"/>
  <g font-size="11" fill="#475569" font-family="monospace">
    <text x="80" y="200">0s</text>
    <text x="280" y="200">30s</text>
    <text x="480" y="200">1m</text>
    <text x="680" y="200">2m</text>
    <text x="880" y="200">3m</text>
    <text x="1080" y="200">5m</text>
  </g>

  <g>
    <rect x="80" y="120" width="200" height="60" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="180" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">s6 stage 1</text>
    <text x="180" y="166" text-anchor="middle" font-size="10" fill="#1e40af">supervisor boots</text>
  </g>
  <g>
    <rect x="280" y="120" width="100" height="60" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="330" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">rc-oneshot</text>
    <text x="330" y="166" text-anchor="middle" font-size="10" fill="#92400e">~5s</text>
  </g>
  <g>
    <rect x="380" y="120" width="700" height="60" rx="6" fill="url(#bad)" stroke="#b91c1c" stroke-width="2"/>
    <text x="730" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">PHOTOPRISM_INIT=intel</text>
    <text x="730" y="160" text-anchor="middle" font-size="11" fill="#991b1b">apt update → dist-upgrade → 7× GPU/VA-API pkgs</text>
    <text x="730" y="174" text-anchor="middle" font-size="10" fill="#b91c1c" font-style="italic">photoprism start BLOCKED here</text>
  </g>
  <g>
    <rect x="1080" y="120" width="40" height="60" rx="6" fill="url(#ok)" stroke="#15803d" stroke-width="1.5"/>
    <text x="1100" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">svc</text>
    <text x="1100" y="158" text-anchor="middle" font-size="9" fill="#14532d">on</text>
  </g>

  <!-- arrow showing 'port :2342 listen from docker-proxy' -->
  <g>
    <rect x="80" y="220" width="1040" height="40" rx="6" fill="#fef9c3" stroke="#a16207" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="600" y="246" text-anchor="middle" font-size="12" fill="#713f12">↘ docker-proxy already listening on host :2342 (0s in), but it has nothing to forward to until svc=on</text>
  </g>

  <g>
    <text x="80" y="304" font-size="13" fill="#334155">Default tag (no <tspan font-family="monospace">PHOTOPRISM_INIT=intel</tspan>): usually under 30s before 2342 returns 307.</text>
    <text x="80" y="324" font-size="13" fill="#334155">Plus tag with <tspan font-family="monospace">PHOTOPRISM_INIT=intel</tspan>: often 2–10 minutes, sometimes 15+, before 2342 answers.</text>
  </g>
</svg>
