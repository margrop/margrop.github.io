<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="k" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#020617"/></linearGradient>
  </defs>
  <rect width="1200" height="480" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Same curl, Two Different Hosts, Two Different Stories</text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#475569">Captured during the same minute: Portainer is happy, your browser is not</text>

  <g transform="translate(40,100)">
    <rect width="540" height="340" rx="12" fill="url(#k)"/>
    <rect x="0" y="0" width="540" height="36" rx="12" fill="#0b1220"/>
    <circle cx="18" cy="18" r="6" fill="#ef4444"/>
    <circle cx="38" cy="18" r="6" fill="#f59e0b"/>
    <circle cx="58" cy="18" r="6" fill="#10b981"/>
    <text x="80" y="22" font-family="monospace" font-size="12" fill="#94a3b8">curl — browser-equivalent: host network</text>

    <g font-family="monospace" font-size="12" fill="#e2e8f0">
      <text x="22" y="68">$ curl -v http://&lt;host&gt;:2342/</text>
      <text x="22" y="92">&gt; GET / HTTP/1.1</text>
      <text x="22" y="110">&gt; Host: &lt;host&gt;:2342</text>
      <text x="22" y="128">&gt; User-Agent: curl/8.7.1</text>
      <text x="22" y="146">&gt; </text>
      <text x="22" y="164" fill="#fbbf24">* Request completely sent off</text>
      <text x="22" y="184" fill="#fca5a5">* Recv failure: Connection reset by peer</text>
      <text x="22" y="202" fill="#fca5a5">* Closing connection</text>
      <text x="22" y="232" fill="#94a3b8"># 容器内部 2342 还没人 listen。</text>
      <text x="22" y="250" fill="#94a3b8"># docker-proxy 把握手完成、</text>
      <text x="22" y="268" fill="#94a3b8"># 拿到 SYN 后 RST 回去。</text>
      <text x="22" y="296" fill="#10b981" font-weight="700"># 浏览器表现：立刻 ERR_CONNECTION_RESET</text>
    </g>
  </g>

  <g transform="translate(620,100)">
    <rect width="540" height="340" rx="12" fill="url(#k)"/>
    <rect x="0" y="0" width="540" height="36" rx="12" fill="#0b1220"/>
    <circle cx="18" cy="18" r="6" fill="#ef4444"/>
    <circle cx="38" cy="18" r="6" fill="#f59e0b"/>
    <circle cx="58" cy="18" r="6" fill="#10b981"/>
    <text x="80" y="22" font-family="monospace" font-size="12" fill="#94a3b8">docker exec into photoprism — 真相所在</text>

    <g font-family="monospace" font-size="12" fill="#e2e8f0">
      <text x="22" y="68">$ docker exec photoprism ps -ef</text>
      <text x="22" y="92" fill="#a7f3d0">root  1  0  /package/admin/s6/...s6-svscan</text>
      <text x="22" y="110" fill="#a7f3d0">root 30  1  s6-supervise photoprism</text>
      <text x="22" y="128" fill="#fbbf24">root 60 30  bash /scripts/cmd.sh ...</text>
      <text x="22" y="146" fill="#fbbf24">root 63 60  bash /scripts/entrypoint-init.sh</text>
      <text x="22" y="164" fill="#fbbf24">root 65 63  make -C /scripts intel</text>
      <text x="22" y="184" fill="#fca5a5">root 106  65  apt-get -qq dist-upgrade</text>
      <text x="22" y="204" fill="#94a3b8">      PID  ELAPSED  CMD</text>
      <text x="22" y="222" fill="#94a3b8">      106  02:45    apt-get -qq dist-upgrade</text>
      <text x="22" y="244" fill="#94a3b8">$ docker exec photoprism ss -ltn</text>
      <text x="22" y="262" fill="#fca5a5">(empty — 容器内部 0 监听)</text>
    </g>
  </g>
</svg>
