<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.18"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">s6-overlay Init Flow with PHOTOPRISM_INIT=intel</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#475569">What really happens between `docker run` and `curl 2342` returning 307</text>

  <!-- s6-svscan PID 1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="220" height="64" rx="10" fill="url(#g1)"/>
    <text x="170" y="150" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">s6-svscan (PID 1)</text>
    <text x="170" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">process supervisor</text>
  </g>

  <!-- s6-rc-oneshot-runner -->
  <g filter="url(#shadow)">
    <rect x="370" y="120" width="240" height="64" rx="10" fill="#7c3aed"/>
    <text x="490" y="150" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">s6rc-oneshot-runner</text>
    <text x="490" y="170" text-anchor="middle" fill="#e9d5ff" font-size="11">stage 2 init services</text>
  </g>

  <!-- photoprism service -->
  <g filter="url(#shadow)">
    <rect x="700" y="120" width="200" height="64" rx="10" fill="#0ea5e9"/>
    <text x="800" y="150" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">s6-svc photoprism</text>
    <text x="800" y="170" text-anchor="middle" fill="#bae6fd" font-size="11">user service</text>
  </g>

  <!-- entrypoint-init -->
  <g filter="url(#shadow)">
    <rect x="60" y="240" width="320" height="64" rx="10" fill="#0f172a"/>
    <text x="220" y="270" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">entrypoint-init.sh</text>
    <text x="220" y="290" text-anchor="middle" fill="#94a3b8" font-size="11">runs once per container start</text>
  </g>

  <!-- apt step -->
  <g filter="url(#shadow)">
    <rect x="430" y="240" width="320" height="64" rx="10" fill="url(#bad)"/>
    <text x="590" y="266" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">make -C /scripts intel</text>
    <text x="590" y="286" text-anchor="middle" fill="#fecaca" font-size="11">apt update + dist-upgrade + 7 pkgs</text>
  </g>

  <!-- photoprism main -->
  <g filter="url(#shadow)">
    <rect x="800" y="240" width="280" height="64" rx="10" fill="url(#ok)"/>
    <text x="940" y="266" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">photoprism start (main)</text>
    <text x="940" y="286" text-anchor="middle" fill="#a7f3d0" font-size="11">only after init exits 0</text>
  </g>

  <!-- listener 2342 -->
  <g filter="url(#shadow)">
    <rect x="430" y="370" width="320" height="64" rx="10" fill="#1e293b"/>
    <text x="590" y="396" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">listen :2342 (HTTP)</text>
    <text x="590" y="416" text-anchor="middle" fill="#94a3b8" font-size="11">curl returns 307 to /library/login</text>
  </g>

  <!-- arrows -->
  <path d="M280,152 L370,152" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M610,152 L700,152" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M170,184 L170,240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M380,272 L430,272" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M750,272 L800,272" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M590,304 L590,370" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- port proxy -->
  <g>
    <rect x="800" y="370" width="280" height="64" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="940" y="396" text-anchor="middle" fill="#78350f" font-size="14" font-weight="600">docker-proxy :2342</text>
    <text x="940" y="416" text-anchor="middle" fill="#92400e" font-size="11">accepts, RSTs when app not listening</text>
  </g>
  <path d="M750,402 L800,402" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr)"/>

  <!-- labels -->
  <text x="220" y="220" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">BLOCKING STAGE</text>
  <text x="940" y="230" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">RELEASE STAGE</text>

  <!-- bottom note -->
  <text x="600" y="478" text-anchor="middle" font-size="13" fill="#334155">While <tspan font-weight="700" fill="#dc2626">apt-get dist-upgrade</tspan> is unpacking <tspan font-family="monospace">systemd</tspan> / <tspan font-family="monospace">util-linux</tspan>,</text>
  <text x="600" y="498" text-anchor="middle" font-size="13" fill="#334155">the inner photoprism process never starts → <tspan font-weight="700" fill="#dc2626">docker-proxy RSTs your curl</tspan> even though <tspan font-family="monospace">ss -ltn</tspan> shows <tspan font-weight="700" fill="#059669">:2342 LISTEN</tspan>.</text>
</svg>
