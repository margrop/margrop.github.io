<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="b" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Three Different "Up" Meanings During the Stuck Init</text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#475569">`docker ps` says healthy, the port is LISTEN, but your browser gets nothing — the app inside is still installing apt packages</text>

  <!-- card 1 -->
  <g transform="translate(40,100)">
    <rect width="350" height="320" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="22" y="36" font-size="14" font-weight="700" fill="#0f172a">What <tspan font-family="monospace">docker ps</tspan> says</text>
    <rect x="20" y="56" width="310" height="200" rx="8" fill="url(#b)"/>
    <text x="36" y="86" font-family="monospace" font-size="12" fill="#a7f3d0">NAMES</text>
    <text x="170" y="86" font-family="monospace" font-size="12" fill="#a7f3d0">STATUS</text>
    <text x="280" y="86" font-family="monospace" font-size="12" fill="#a7f3d0">PORTS</text>
    <line x1="20" y1="98" x2="330" y2="98" stroke="#334155"/>
    <text x="36" y="124" font-family="monospace" font-size="12" fill="#e2e8f0">photoprism</text>
    <text x="170" y="124" font-family="monospace" font-size="12" fill="#fbbf24">Up 3 minutes</text>
    <text x="280" y="124" font-family="monospace" font-size="11" fill="#94a3b8">0.0.0.0:2342</text>
    <text x="36" y="146" font-family="monospace" font-size="11" fill="#64748b">photoprism-ro</text>
    <text x="170" y="146" font-family="monospace" font-size="11" fill="#fbbf24">Up 3 minutes</text>
    <text x="280" y="146" font-family="monospace" font-size="11" fill="#64748b">0.0.0.0:2343</text>
    <text x="36" y="200" font-size="13" fill="#334155">"Up" only means <tspan font-weight="700">s6-svscan</tspan> is alive.</text>
    <text x="36" y="222" font-size="13" fill="#334155">It says nothing about the inner</text>
    <text x="36" y="240" font-size="13" font-family="monospace" fill="#334155">photoprism start</text>
    <text x="36" y="262" font-size="13" fill="#334155">process being up.</text>
  </g>

  <!-- card 2 -->
  <g transform="translate(420,100)">
    <rect width="350" height="320" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="22" y="36" font-size="14" font-weight="700" fill="#0f172a">What <tspan font-family="monospace">ss -ltn</tspan> says (host)</text>
    <rect x="20" y="56" width="310" height="200" rx="8" fill="url(#b)"/>
    <text x="36" y="86" font-family="monospace" font-size="11" fill="#a7f3d0">State</text>
    <text x="100" y="86" font-family="monospace" font-size="11" fill="#a7f3d0">Recv-Q</text>
    <text x="180" y="86" font-family="monospace" font-size="11" fill="#a7f3d0">Local</text>
    <text x="280" y="86" font-family="monospace" font-size="11" fill="#a7f3d0">Process</text>
    <line x1="20" y1="98" x2="330" y2="98" stroke="#334155"/>
    <text x="36" y="124" font-family="monospace" font-size="11" fill="#e2e8f0">LISTEN</text>
    <text x="100" y="124" font-family="monospace" font-size="11" fill="#e2e8f0">0</text>
    <text x="180" y="124" font-family="monospace" font-size="11" fill="#e2e8f0">0.0.0.0:2342</text>
    <text x="280" y="124" font-family="monospace" font-size="10" fill="#94a3b8">docker-proxy</text>
    <text x="36" y="146" font-family="monospace" font-size="11" fill="#e2e8f0">LISTEN</text>
    <text x="100" y="146" font-family="monospace" font-size="11" fill="#e2e8f0">0</text>
    <text x="180" y="146" font-family="monospace" font-size="11" fill="#e2e8f0">[::]:2342</text>
    <text x="280" y="146" font-family="monospace" font-size="10" fill="#94a3b8">docker-proxy</text>
    <text x="36" y="200" font-size="13" fill="#334155">That's <tspan font-weight="700">docker-proxy</tspan> on the</text>
    <text x="36" y="222" font-size="13" fill="#334155">host, not the app. docker-proxy</text>
    <text x="36" y="240" font-size="13" fill="#334155">accepts the TCP connection and</text>
    <text x="36" y="262" font-size="13" fill="#334155">forwards to the container's NS.</text>
  </g>

  <!-- card 3 -->
  <g transform="translate(800,100)">
    <rect width="360" height="320" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="22" y="36" font-size="14" font-weight="700" fill="#0f172a">What the <tspan fill="#dc2626">app</tspan> actually says</text>
    <rect x="20" y="56" width="320" height="200" rx="8" fill="url(#b)"/>
    <text x="36" y="86" font-family="monospace" font-size="11" fill="#a7f3d0">$ ss -ltn  # inside the container</text>
    <text x="36" y="110" font-family="monospace" font-size="11" fill="#64748b">(empty — nothing listening)</text>
    <text x="36" y="142" font-family="monospace" font-size="11" fill="#a7f3d0">$ ps -ef | grep photoprism</text>
    <text x="36" y="164" font-family="monospace" font-size="11" fill="#fbbf24">... entrypoint-init.sh</text>
    <text x="36" y="184" font-family="monospace" font-size="11" fill="#fbbf24">... make -C /scripts intel</text>
    <text x="36" y="204" font-family="monospace" font-size="11" fill="#dc2626">... apt-get dist-upgrade</text>
    <text x="36" y="222" font-family="monospace" font-size="11" fill="#64748b">  PID 106  ELAPSED 02:45</text>
    <text x="36" y="200" font-size="13" fill="#334155">Main process is still in</text>
    <text x="36" y="222" font-size="13" fill="#334155">entrypoint-init.sh running apt.</text>
    <text x="36" y="240" font-size="13" fill="#334155">2342 inside the NS is closed,</text>
    <text x="36" y="262" font-size="13" fill="#334155">so docker-proxy RSTs you.</text>
  </g>
</svg>
