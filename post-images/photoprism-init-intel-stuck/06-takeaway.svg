<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="b" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
  </defs>
  <rect width="1200" height="460" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">The Mental Model That Saves You Next Time</text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#475569">Whenever "Portainer says it's up but my browser says no", ask these four questions</text>

  <g transform="translate(40,100)">
    <rect width="1120" height="80" rx="10" fill="url(#b)"/>
    <text x="20" y="34" font-size="14" font-weight="700" fill="#a7f3d0">① Is the init stage still running?</text>
    <text x="20" y="58" font-size="13" fill="#e2e8f0"><tspan font-family="monospace">docker exec &lt;c&gt; ps -ef</tspan> · 看到 <tspan font-family="monospace">entrypoint-init.sh</tspan> / <tspan font-family="monospace">apt-get</tspan> / <tspan font-family="monospace">make -C /scripts</tspan> = 还卡着</text>
  </g>
  <g transform="translate(40,200)">
    <rect width="1120" height="80" rx="10" fill="url(#b)"/>
    <text x="20" y="34" font-size="14" font-weight="700" fill="#a7f3d0">② Is anything actually listening inside the namespace?</text>
    <text x="20" y="58" font-size="13" fill="#e2e8f0"><tspan font-family="monospace">docker exec &lt;c&gt; ss -ltn</tspan> · 空 = 主进程还没进 listen；docker-proxy 才会 RST</text>
  </g>
  <g transform="translate(40,300)">
    <rect width="540" height="80" rx="10" fill="url(#b)"/>
    <text x="20" y="34" font-size="14" font-weight="700" fill="#a7f3d0">③ Does the image need a long init at all?</text>
    <text x="20" y="58" font-size="13" fill="#e2e8f0">dist-upgrade / 装驱动 / 拉大模型 = 第一次永远 5+ 分钟</text>
  </g>
  <g transform="translate(620,300)">
    <rect width="540" height="80" rx="10" fill="url(#b)"/>
    <text x="20" y="34" font-size="14" font-weight="700" fill="#a7f3d0">④ Do I actually need it on this host?</text>
    <text x="20" y="58" font-size="13" fill="#e2e8f0">如果驱动 / 加速已经直通到容器，init 里再装一遍是浪费</text>
  </g>
  <text x="600" y="430" text-anchor="middle" font-size="13" fill="#475569">"Up" 是个非常弱的状态词。真正能告诉你服务活着的是 <tspan font-weight="700" font-family="monospace">ss -ltn</tspan> 在容器**内部**看到了什么。</text>
</svg>
