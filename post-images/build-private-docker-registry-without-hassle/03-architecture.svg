<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="1200" height="560" fill="#f8fafc"/>

  <text x="600" y="46" text-anchor="middle" font-size="24" fill="#0f172a" font-weight="700">一张图看懂私有仓库的整体架构</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#475569">registry:2 + 反向代理 + 鉴权 + 缓存,4 层组合成一个内网加速器</text>

  <!-- clients row -->
  <g transform="translate(60,120)">
    <rect width="1080" height="78" rx="10" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="20" y="30" font-size="14" fill="#0369a1" font-weight="700">客户端(局域网里的机器)</text>
    <g transform="translate(20,42)">
      <rect width="170" height="26" rx="6" fill="#0ea5e9"/>
      <text x="85" y="18" text-anchor="middle" font-size="12" fill="#ffffff">🐳 Docker daemon</text>
    </g>
    <g transform="translate(210,42)">
      <rect width="170" height="26" rx="6" fill="#0ea5e9"/>
      <text x="85" y="18" text-anchor="middle" font-size="12" fill="#ffffff">📦 Portainer</text>
    </g>
    <g transform="translate(400,42)">
      <rect width="170" height="26" rx="6" fill="#0ea5e9"/>
      <text x="85" y="18" text-anchor="middle" font-size="12" fill="#ffffff">☸️ k8s kubelet</text>
    </g>
    <g transform="translate(590,42)">
      <rect width="170" height="26" rx="6" fill="#0ea5e9"/>
      <text x="85" y="18" text-anchor="middle" font-size="12" fill="#ffffff">🚀 GitLab Runner</text>
    </g>
    <g transform="translate(780,42)">
      <rect width="170" height="26" rx="6" fill="#0ea5e9"/>
      <text x="85" y="18" text-anchor="middle" font-size="12" fill="#ffffff">🤖 CI / buildx</text>
    </g>
  </g>

  <!-- arrow down -->
  <g stroke="#0369a1" stroke-width="2" fill="none">
    <line x1="600" y1="200" x2="600" y2="232" marker-end="url(#a1)"/>
  </g>

  <!-- reverse proxy -->
  <g transform="translate(60,236)">
    <rect width="1080" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="20" y="28" font-size="14" fill="#92400e" font-weight="700">第 1 层:反向代理(Nginx / Caddy / Traefik)</text>
    <text x="20" y="50" font-size="12" fill="#92400e">① HTTPS 终结  ② 透传 WWW-Authenticate 头  ③ 限流 / 黑白名单  ④ 静态资源加速</text>
    <text x="20" y="70" font-size="12" fill="#92400e">⚠️ 必须把 /v2/ 的 401 challenge 原样回给客户端,否则 docker login 永远失败</text>
  </g>

  <g stroke="#0369a1" stroke-width="2" fill="none">
    <line x1="600" y1="320" x2="600" y2="352" marker-end="url(#a1)"/>
  </g>

  <!-- registry:2 -->
  <g transform="translate(60,356)">
    <rect width="1080" height="100" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="20" y="28" font-size="14" fill="#166534" font-weight="700">第 2 层:registry:2(本机)</text>
    <g transform="translate(20,42)">
      <rect width="220" height="48" rx="6" fill="#16a34a"/>
      <text x="110" y="20" text-anchor="middle" font-size="12" fill="#ffffff">htpasswd 鉴权</text>
      <text x="110" y="36" text-anchor="middle" font-size="11" fill="#ffffff">(bcrypt)</text>
    </g>
    <g transform="translate(260,42)">
      <rect width="220" height="48" rx="6" fill="#16a34a"/>
      <text x="110" y="20" text-anchor="middle" font-size="12" fill="#ffffff">proxy.remoteurl</text>
      <text x="110" y="36" text-anchor="middle" font-size="11" fill="#ffffff">拉取缓存 upstream</text>
    </g>
    <g transform="translate(500,42)">
      <rect width="220" height="48" rx="6" fill="#16a34a"/>
      <text x="110" y="20" text-anchor="middle" font-size="12" fill="#ffffff">storage.filesystem</text>
      <text x="110" y="36" text-anchor="middle" font-size="11" fill="#ffffff">13 GB blob 缓存</text>
    </g>
    <g transform="translate(740,42)">
      <rect width="220" height="48" rx="6" fill="#16a34a"/>
      <text x="110" y="20" text-anchor="middle" font-size="12" fill="#ffffff">scheduler GC</text>
      <text x="110" y="36" text-anchor="middle" font-size="11" fill="#ffffff">7 天未访问清理</text>
    </g>
  </g>

  <g stroke="#0369a1" stroke-width="2" fill="none">
    <line x1="600" y1="460" x2="600" y2="492" marker-end="url(#a1)"/>
  </g>

  <!-- upstream -->
  <g transform="translate(60,496)">
    <rect width="1080" height="50" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="20" y="32" font-size="14" fill="#5b21b6" font-weight="700">第 3 层:upstream(可选)  Docker Hub 官方 / hub1.nat.tf / ghcr.dockerproxy.net / 你公司买的私有仓库</text>
  </g>

  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0369a1"/>
    </marker>
  </defs>
</svg>