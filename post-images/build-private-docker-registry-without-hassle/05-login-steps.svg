<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="46" text-anchor="middle" font-size="24" fill="#0f172a" font-weight="700">4 步把 docker login 跑通(常见坑一览)</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#475569">每一步对应一个真实的"昨天还好好的,今天就 401"故障</text>

  <!-- step 1 -->
  <g transform="translate(60,120)">
    <rect width="540" height="170" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <rect x="0" y="0" width="60" height="170" rx="10" fill="#16a34a"/>
    <text x="30" y="100" text-anchor="middle" font-size="32" fill="#ffffff" font-weight="700">1</text>
    <text x="80" y="36" font-size="16" fill="#166534" font-weight="700">生成 htpasswd 文件</text>
    <text x="80" y="60" font-size="12" fill="#1f2937" font-family="monospace">docker run --rm httpd:alpine \</text>
    <text x="80" y="78" font-size="12" fill="#1f2937" font-family="monospace">  htpasswd -Bbn admin '你的密码' \</text>
    <text x="80" y="96" font-size="12" fill="#1f2937" font-family="monospace">  &gt;&gt; /docker/registry/auth/htpasswd</text>
    <text x="80" y="130" font-size="12" fill="#166534">✅ bcrypt 加密,密码不存明文</text>
    <text x="80" y="150" font-size="12" fill="#166534">⚠️ 不要用 -m(md5),Docker daemon 不认</text>
  </g>

  <!-- step 2 -->
  <g transform="translate(620,120)">
    <rect width="520" height="170" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <rect x="0" y="0" width="60" height="170" rx="10" fill="#16a34a"/>
    <text x="30" y="100" text-anchor="middle" font-size="32" fill="#ffffff" font-weight="700">2</text>
    <text x="80" y="36" font-size="16" fill="#166534" font-weight="700">挂到 registry 容器</text>
    <text x="80" y="60" font-size="12" fill="#1f2937" font-family="monospace">-v /docker/registry/auth:/auth \</text>
    <text x="80" y="78" font-size="12" fill="#1f2937" font-family="monospace">-e REGISTRY_AUTH=htpasswd \</text>
    <text x="80" y="96" font-size="12" fill="#1f2937" font-family="monospace">-e REGISTRY_AUTH_HTPASSWD_REALM="Registry" \</text>
    <text x="80" y="114" font-size="12" fill="#1f2937" font-family="monospace">-e REGISTRY_AUTH_HTPASSWD_PATH=/auth/htpasswd</text>
    <text x="80" y="148" font-size="12" fill="#166534">⚠️ 4 个变量少一个都会 401</text>
  </g>

  <!-- step 3 -->
  <g transform="translate(60,310)">
    <rect width="540" height="170" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="0" y="0" width="60" height="170" rx="10" fill="#0ea5e9"/>
    <text x="30" y="100" text-anchor="middle" font-size="32" fill="#ffffff" font-weight="700">3</text>
    <text x="80" y="36" font-size="16" fill="#0c4a6e" font-weight="700">客户端登录</text>
    <text x="80" y="60" font-size="12" fill="#1f2937" font-family="monospace">docker login registry.lab.local</text>
    <text x="80" y="78" font-size="12" fill="#1f2937" font-family="monospace">Username: admin</text>
    <text x="80" y="96" font-size="12" fill="#1f2937" font-family="monospace">Password: ********</text>
    <text x="80" y="128" font-size="12" fill="#0c4a6e">⚠️ 必须用 https:// 或 localhost</text>
    <text x="80" y="148" font-size="12" fill="#0c4a6e">  http:// 内网 IP docker daemon 不允许</text>
  </g>

  <!-- step 4 -->
  <g transform="translate(620,310)">
    <rect width="520" height="170" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="60" height="170" rx="10" fill="#f59e0b"/>
    <text x="30" y="100" text-anchor="middle" font-size="32" fill="#ffffff" font-weight="700">4</text>
    <text x="80" y="36" font-size="16" fill="#92400e" font-weight="700">故障排错</text>
    <text x="80" y="60" font-size="12" fill="#1f2937" font-family="monospace"># 一行命令看 challenge 是否正确返回</text>
    <text x="80" y="78" font-size="12" fill="#1f2937" font-family="monospace">curl -i https://registry.lab.local/v2/</text>
    <text x="80" y="100" font-size="12" fill="#92400e">⚠️ 看不到 WWW-Authenticate → 反代配置错</text>
    <text x="80" y="120" font-size="12" fill="#92400e">⚠️ 看到 401 但 token 取不到 → TLS 证书错</text>
    <text x="80" y="140" font-size="12" fill="#92400e">⚠️ 看到 token 但 push 还 401 → htpasswd 编码</text>
  </g>
</svg>