<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#0e3a4a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="520" fill="#0b1d3a"/>

  <text x="600" y="44" text-anchor="middle" font-size="26" fill="#ffffff" font-weight="700">Docker 镜像拉取流程:从 docker pull 到磁盘里那个 800MB 文件</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#9ec5ff">一句话总结:Docker daemon → registry API → 拿到 manifest → 按层拉 blob → 解压到本地</text>

  <!-- Step 1: client -->
  <g transform="translate(60,140)">
    <rect width="220" height="100" rx="12" fill="url(#g1)" stroke="#22d3ee" stroke-width="2"/>
    <text x="110" y="36" text-anchor="middle" font-size="16" fill="#67e8f9" font-weight="700">① docker pull</text>
    <text x="110" y="62" text-anchor="middle" font-size="12" fill="#cffafe">客户端只发命令</text>
    <text x="110" y="82" text-anchor="middle" font-size="12" fill="#cffafe">daemon 才是"快递员"</text>
  </g>

  <!-- Step 2: API v2 -->
  <g transform="translate(330,140)">
    <rect width="220" height="100" rx="12" fill="url(#g1)" stroke="#22d3ee" stroke-width="2"/>
    <text x="110" y="36" text-anchor="middle" font-size="16" fill="#67e8f9" font-weight="700">② GET /v2/</text>
    <text x="110" y="62" text-anchor="middle" font-size="12" fill="#cffafe">握手 + auth challenge</text>
    <text x="110" y="82" text-anchor="middle" font-size="12" fill="#cffafe">告诉客户端"我是 v2 仓库"</text>
  </g>

  <!-- Step 3: manifest -->
  <g transform="translate(600,140)">
    <rect width="220" height="100" rx="12" fill="url(#g1)" stroke="#22d3ee" stroke-width="2"/>
    <text x="110" y="36" text-anchor="middle" font-size="16" fill="#67e8f9" font-weight="700">③ GET manifest</text>
    <text x="110" y="62" text-anchor="middle" font-size="12" fill="#cffafe">"这镜像由 3 层组成"</text>
    <text x="110" y="82" text-anchor="middle" font-size="12" fill="#cffafe">+ 每层是 sha256:xxxx</text>
  </g>

  <!-- Step 4: blobs -->
  <g transform="translate(870,140)">
    <rect width="270" height="100" rx="12" fill="url(#g1)" stroke="#22d3ee" stroke-width="2"/>
    <text x="135" y="36" text-anchor="middle" font-size="16" fill="#67e8f9" font-weight="700">④ GET blobs (×N)</text>
    <text x="135" y="62" text-anchor="middle" font-size="12" fill="#cffafe">按 sha256 一层层拉</text>
    <text x="135" y="82" text-anchor="middle" font-size="12" fill="#cffafe">每层独立缓存、可复用</text>
  </g>

  <!-- arrows between top row -->
  <g stroke="#67e8f9" stroke-width="2" fill="none" opacity="0.8">
    <line x1="280" y1="190" x2="330" y2="190" marker-end="url(#arr)"/>
    <line x1="550" y1="190" x2="600" y2="190" marker-end="url(#arr)"/>
    <line x1="820" y1="190" x2="870" y2="190" marker-end="url(#arr)"/>
  </g>

  <!-- big layer visual -->
  <g transform="translate(60,300)">
    <text x="0" y="0" font-size="14" fill="#67e8f9" font-weight="700">⑤ 解压到磁盘</text>
    <g transform="translate(0,18)">
      <rect x="0" y="0" width="1080" height="50" rx="6" fill="#0e3a4a" stroke="#22d3ee"/>
      <text x="20" y="32" font-size="14" fill="#cffafe">/var/lib/docker/overlay2/&lt;layer-id&gt;/diff  ←  把每层 blob 解压挂到这里</text>
    </g>
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="350" height="40" rx="6" fill="#0e3a4a" stroke="#a78bfa"/>
      <text x="14" y="26" font-size="13" fill="#c4b5fd">blob A (sha256:de4a0c57...)  → 90 MB</text>
    </g>
    <g transform="translate(370,80)">
      <rect x="0" y="0" width="350" height="40" rx="6" fill="#0e3a4a" stroke="#a78bfa"/>
      <text x="14" y="26" font-size="13" fill="#c4b5fd">blob B (sha256:9c8b...)    → 40 MB</text>
    </g>
    <g transform="translate(740,80)">
      <rect x="0" y="0" width="340" height="40" rx="6" fill="#0e3a4a" stroke="#a78bfa"/>
      <text x="14" y="26" font-size="13" fill="#c4b5fd">blob C (sha256:f7...)      → 60 MB</text>
    </g>

    <g transform="translate(0,140)">
      <rect x="0" y="0" width="1080" height="46" rx="6" fill="#22d3ee" opacity="0.15" stroke="#67e8f9"/>
      <text x="540" y="28" text-anchor="middle" font-size="13" fill="#67e8f9" font-weight="600">同一份 sha256 在 N 个镜像里出现 → registry:2 物理上只存一份 (Content Addressable)</text>
    </g>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/>
    </marker>
  </defs>
</svg>