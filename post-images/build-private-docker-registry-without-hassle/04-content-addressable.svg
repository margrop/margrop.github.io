<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="1200" height="480" fill="#0b1d3a"/>
  <text x="600" y="46" text-anchor="middle" font-size="24" fill="#ffffff" font-weight="700">为什么 registry 的 blob 是"放一次,大家都用"?</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#9ec5ff">答案就四个字:内容寻址(content-addressable storage)</text>

  <!-- left: file system -->
  <g transform="translate(60,120)">
    <rect width="540" height="320" rx="12" fill="#0e3a4a" stroke="#22d3ee" stroke-width="2"/>
    <text x="270" y="32" text-anchor="middle" font-size="16" fill="#67e8f9" font-weight="700">真实磁盘布局</text>
    <text x="270" y="56" text-anchor="middle" font-size="12" fill="#9ec5ff">/docker/registry-cache/dockerhub/docker/registry/v2/blobs/sha256/</text>

    <g font-size="12" fill="#cffafe" font-family="monospace">
      <text x="20" y="92">de/</text>
      <text x="50" y="92" fill="#67e8f9">de4a0c57...cfff/data   934 MB  ← alpine 的根文件系统</text>

      <text x="20" y="116">13/</text>
      <text x="50" y="116" fill="#67e8f9">13d4f7c2...a51d/data   753 MB</text>

      <text x="20" y="140">f5/</text>
      <text x="50" y="140" fill="#67e8f9">f5fc7c45.../data       540 MB</text>

      <text x="20" y="164">89/</text>
      <text x="50" y="164" fill="#67e8f9">894f7c54.../data       534 MB</text>

      <text x="20" y="188">9c/</text>
      <text x="50" y="188" fill="#67e8f9">9c8a7d83.../data       422 MB</text>

      <text x="20" y="212">7c/</text>
      <text x="50" y="212" fill="#67e8f9">7c6f9b81.../data       402 MB</text>
    </g>

    <g transform="translate(20,240)">
      <rect width="500" height="60" rx="6" fill="#155e75"/>
      <text x="20" y="24" font-size="13" fill="#67e8f9" font-weight="700">📂 目录名 = sha256 前 2 位</text>
      <text x="20" y="44" font-size="13" fill="#cffafe">文件名 = sha256 完整值</text>
    </g>
  </g>

  <!-- right: explanation -->
  <g transform="translate(640,120)">
    <rect width="500" height="320" rx="12" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
    <text x="250" y="32" text-anchor="middle" font-size="16" fill="#c4b5fd" font-weight="700">类比:图书馆的书架</text>

    <g font-size="13" fill="#e2ecff">
      <text x="20" y="74">想象学校图书馆:</text>
      <text x="20" y="98">  • 书的"编号"不是"位置 1 / 2 / 3",</text>
      <text x="20" y="120">    而是这本书第一句话的 SHA256</text>
      <text x="20" y="146">  • 完全相同的两本书永远放在同一个架子上</text>
      <text x="20" y="172">  • 任何老师想拿一本《红楼梦》</text>
      <text x="20" y="194">    (无论他从哪个班来),</text>
      <text x="20" y="216">    都走到同一个架子、取同一份</text>
    </g>

    <g transform="translate(20,250)">
      <rect width="460" height="60" rx="6" fill="#a78bfa" opacity="0.18" stroke="#a78bfa"/>
      <text x="20" y="24" font-size="13" fill="#c4b5fd" font-weight="700">好处:同一份内容物理上只存 1 份</text>
      <text x="20" y="44" font-size="13" fill="#c4b5fd">13 GB 缓存里看着堆了 95 个仓库,</text>
      <text x="20" y="60" font-size="13" fill="#c4b5fd">去重后的真实占盘只有 13 GB</text>
    </g>
  </g>
</svg>