<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="1200" height="480" fill="#0b1d3a"/>
  <text x="600" y="46" text-anchor="middle" font-size="24" fill="#ffffff" font-weight="700">3 种部署形态:从一台 NUC 到一个公司</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#9ec5ff">形态不一样,但底层都是 registry:2 镜像</text>

  <!-- home -->
  <g transform="translate(60,120)">
    <rect width="350" height="320" rx="12" fill="#0e3a4a" stroke="#22d3ee" stroke-width="2"/>
    <text x="175" y="38" text-anchor="middle" font-size="18" fill="#67e8f9" font-weight="700">🏠 家庭 / 实验室</text>

    <g font-size="13" fill="#cffafe">
      <text x="20" y="78">• 一台 NUC / 旧笔记本</text>
      <text x="20" y="100">• docker run registry:2 起一个容器</text>
      <text x="20" y="122">• 8082 → dockerhub,8083 → ghcr</text>
      <text x="20" y="144">• 不上反代、不上 HTTPS</text>
      <text x="20" y="166">• 用 systemd 或 docker restart policy</text>
      <text x="20" y="188">  保证挂了自动起</text>
    </g>

    <g transform="translate(20,210)">
      <rect width="310" height="80" rx="8" fill="#155e75"/>
      <text x="155" y="28" text-anchor="middle" font-size="13" fill="#67e8f9" font-weight="700">适用</text>
      <text x="155" y="48" text-anchor="middle" font-size="12" fill="#cffafe">家庭 NAS、个人小集群</text>
      <text x="155" y="68" text-anchor="middle" font-size="12" fill="#cffafe">省事、不想折腾</text>
    </g>
  </g>

  <!-- team -->
  <g transform="translate(440,120)">
    <rect width="350" height="320" rx="12" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
    <text x="175" y="38" text-anchor="middle" font-size="18" fill="#c4b5fd" font-weight="700">🏢 小团队 / 项目组</text>

    <g font-size="13" fill="#e2ecff">
      <text x="20" y="78">• Docker Compose 起 registry + Caddy</text>
      <text x="20" y="100">• 内网域名 + 自签 CA / mkcert</text>
      <text x="20" y="122">• htpasswd + 单独镜像写权限</text>
      <text x="20" y="144">• 每晚 cron 备份 /var/lib/registry</text>
      <text x="20" y="166">• Prometheus + Grafana 监控 disk</text>
      <text x="20" y="188">  / pull 数 / 命中率</text>
    </g>

    <g transform="translate(20,210)">
      <rect width="310" height="80" rx="8" fill="#4c1d95"/>
      <text x="155" y="28" text-anchor="middle" font-size="13" fill="#c4b5fd" font-weight="700">适用</text>
      <text x="155" y="48" text-anchor="middle" font-size="12" fill="#e2ecff">10 ~ 50 人的开发团队</text>
      <text x="155" y="68" text-anchor="middle" font-size="12" fill="#e2ecff">需要登录、能审计</text>
    </g>
  </g>

  <!-- enterprise -->
  <g transform="translate(820,120)">
    <rect width="320" height="320" rx="12" fill="#0e7490" stroke="#0891b2" stroke-width="2"/>
    <text x="160" y="38" text-anchor="middle" font-size="18" fill="#cffafe" font-weight="700">🏭 公司 / 生产</text>

    <g font-size="13" fill="#e2ecff">
      <text x="20" y="78">• S3 / OSS / MinIO 做存储后端</text>
      <text x="20" y="100">• 多副本 + 云 LB + 对象存储</text>
      <text x="20" y="122">• LDAP / OIDC / OAuth 接公司账号</text>
      <text x="20" y="144">• 镜像扫描(Trivy / Clair)</text>
      <text x="20" y="166">• 跨地域同步、CDN 加速</text>
      <text x="20" y="188">• SLA、备份、容灾</text>
    </g>

    <g transform="translate(20,210)">
      <rect width="280" height="80" rx="8" fill="#155e75"/>
      <text x="140" y="28" text-anchor="middle" font-size="13" fill="#cffafe" font-weight="700">适用</text>
      <text x="140" y="48" text-anchor="middle" font-size="12" fill="#e2ecff">几十~几百个工程师</text>
      <text x="140" y="68" text-anchor="middle" font-size="12" fill="#e2ecff">需要合规、有 SLA</text>
    </g>
  </g>
</svg>