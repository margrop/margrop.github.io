<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1d3a"/>
      <stop offset="1" stop-color="#163a6b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f4e8a"/>
      <stop offset="1" stop-color="#0d2547"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb454"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- title -->
  <text x="600" y="74" text-anchor="middle" font-size="38" font-weight="700" fill="#ffffff">Docker 镜像不求人:从 0 到 1 搭一个私有仓库</text>
  <text x="600" y="110" text-anchor="middle" font-size="18" fill="#9ec5ff">registry:2 + htpasswd + 反向代理 + 拉取缓存 一条龙</text>

  <!-- left card: Docker Hub -->
  <g transform="translate(60,160)">
    <rect width="320" height="380" rx="18" fill="#13294b" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="46" text-anchor="middle" font-size="22" fill="#9ec5ff" font-weight="700">公网:Docker Hub</text>
    <text x="160" y="74" text-anchor="middle" font-size="14" fill="#7faadf">registry-1.docker.io</text>

    <!-- block icon -->
    <g transform="translate(60,110)">
      <rect width="60" height="60" rx="10" fill="#0b3a73"/>
      <rect x="20" y="20" width="60" height="60" rx="10" fill="#1d4ed8"/>
      <rect x="40" y="40" width="60" height="60" rx="10" fill="#60a5fa"/>
    </g>

    <text x="160" y="230" text-anchor="middle" font-size="15" fill="#e2ecff">官方镜像源</text>
    <text x="160" y="254" text-anchor="middle" font-size="13" fill="#7faadf">100 pulls / 6h 限流</text>
    <text x="160" y="278" text-anchor="middle" font-size="13" fill="#7faadf">国内慢、容易 429</text>

    <g transform="translate(40,310)">
      <rect width="240" height="46" rx="8" fill="url(#warn)" opacity="0.95"/>
      <text x="120" y="30" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="600">❌ 直连不稳定</text>
    </g>
  </g>

  <!-- middle card: self-hosted registry -->
  <g transform="translate(440,160)">
    <rect width="320" height="380" rx="18" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <text x="160" y="46" text-anchor="middle" font-size="22" fill="#67e8f9" font-weight="700">我家:私有仓库</text>
    <text x="160" y="74" text-anchor="middle" font-size="14" fill="#9ec5ff">registry:2 + 13 GB 缓存</text>

    <!-- warehouse icon -->
    <g transform="translate(80,100)">
      <rect x="0" y="40" width="160" height="100" rx="6" fill="#0b3a73" stroke="#67e8f9" stroke-width="2"/>
      <polygon points="0,40 80,0 160,40" fill="#1d4ed8" stroke="#67e8f9" stroke-width="2"/>
      <rect x="40" y="80" width="40" height="60" fill="#67e8f9"/>
      <rect x="90" y="80" width="40" height="60" fill="#67e8f9" opacity="0.5"/>
      <rect x="40" y="80" width="40" height="6" fill="#0b3a73"/>
      <rect x="90" y="80" width="40" height="6" fill="#0b3a73"/>
    </g>

    <text x="160" y="260" text-anchor="middle" font-size="15" fill="#e2ecff">自有 htpasswd 鉴权</text>
    <text x="160" y="284" text-anchor="middle" font-size="13" fill="#9ec5ff">内网秒级命中、对外可控</text>

    <g transform="translate(40,310)">
      <rect width="240" height="46" rx="8" fill="#22d3ee"/>
      <text x="120" y="30" text-anchor="middle" font-size="14" fill="#0b3a73" font-weight="700">✅ 自己说了算</text>
    </g>
  </g>

  <!-- right card: clients -->
  <g transform="translate(820,160)">
    <rect width="320" height="380" rx="18" fill="#13294b" stroke="#a78bfa" stroke-width="2"/>
    <text x="160" y="46" text-anchor="middle" font-size="22" fill="#c4b5fd" font-weight="700">全家桶都连它</text>
    <text x="160" y="74" text-anchor="middle" font-size="14" fill="#a78bfa">NAS / PVE / Mac / Win</text>

    <g transform="translate(70,110)" font-size="13" fill="#e2ecff">
      <rect x="0" y="0" width="180" height="38" rx="8" fill="#1e1b4b"/>
      <text x="90" y="24" text-anchor="middle">🐳 Docker daemon</text>
      <rect x="0" y="48" width="180" height="38" rx="8" fill="#1e1b4b"/>
      <text x="90" y="72" text-anchor="middle">📦 Portainer</text>
      <rect x="0" y="96" width="180" height="38" rx="8" fill="#1e1b4b"/>
      <text x="90" y="120" text-anchor="middle">🖥️ Kubernetes</text>
      <rect x="0" y="144" width="180" height="38" rx="8" fill="#1e1b4b"/>
      <text x="90" y="168" text-anchor="middle">🚀 GitLab CI</text>
    </g>

    <g transform="translate(40,310)">
      <rect width="240" height="46" rx="8" fill="#a78bfa"/>
      <text x="120" y="30" text-anchor="middle" font-size="14" fill="#1e1b4b" font-weight="700">统一登录、统一推拉</text>
    </g>
  </g>

  <!-- arrows -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.7">
    <path d="M380 350 Q 410 350 440 350" marker-end="url(#arrow)"/>
    <path d="M760 350 Q 790 350 820 350" marker-end="url(#arrow)"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <text x="600" y="572" text-anchor="middle" font-size="14" fill="#7faadf" opacity="0.7">一文搞定 registry:2 自部署、登录鉴权、内网加速、备份与监控</text>
</svg>