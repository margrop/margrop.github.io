<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="aux" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="infra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#78350f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" rx="28" fill="url(#bg3)"/>
  <text x="72" y="82" font-size="40" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1f2937" font-weight="700">模块地图：一套 CLI 智能体如何被拆成可维护的边界</text>
  <text x="72" y="124" font-size="20" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">这个图只画边界，不画花活。每个边界都对应一种职责，避免“一个文件包打一切”。</text>

  <g filter="url(#shadow3)">
    <rect x="550" y="180" width="500" height="150" rx="28" fill="url(#core)"/>
    <rect x="160" y="390" width="290" height="130" rx="22" fill="url(#aux)"/>
    <rect x="470" y="390" width="290" height="130" rx="22" fill="url(#aux)"/>
    <rect x="780" y="390" width="290" height="130" rx="22" fill="url(#aux)"/>
    <rect x="1090" y="390" width="290" height="130" rx="22" fill="url(#aux)"/>
    <rect x="160" y="590" width="290" height="130" rx="22" fill="url(#infra)"/>
    <rect x="470" y="590" width="290" height="130" rx="22" fill="url(#infra)"/>
    <rect x="780" y="590" width="290" height="130" rx="22" fill="url(#infra)"/>
    <rect x="1090" y="590" width="290" height="130" rx="22" fill="url(#infra)"/>
  </g>

  <text x="650" y="236" font-size="32" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">src/cli.ts</text>
  <text x="650" y="274" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#eff6ff">parse -> auth -> initAI -> dispatch</text>
  <text x="650" y="302" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#eff6ff">入口越薄，系统越容易演化</text>

  <text x="205" y="438" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">commands/</text>
  <text x="205" y="472" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#ecfdf5">命令注册、参数解析、帮助输出</text>

  <text x="515" y="438" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">ai/</text>
  <text x="515" y="472" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#ecfdf5">prompt、client、stream、retry</text>

  <text x="825" y="438" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">auth/</text>
  <text x="825" y="472" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#ecfdf5">API Key / OAuth / token refresh</text>

  <text x="1135" y="438" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">config/</text>
  <text x="1135" y="472" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#ecfdf5">默认值、文件、环境变量、CLI</text>

  <text x="205" y="638" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">codebase/</text>
  <text x="205" y="672" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff7ed">目录扫描、语言识别、依赖分析</text>

  <text x="515" y="638" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">execution/</text>
  <text x="515" y="672" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff7ed">shell、background process、danger filter</text>

  <text x="825" y="638" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">fileops / fs</text>
  <text x="825" y="672" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff7ed">安全路径、读写删改、文件枚举</text>

  <text x="1135" y="638" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">terminal / errors</text>
  <text x="1135" y="672" font-size="16" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff7ed">交互、表格、spinner、错误分层</text>

  <g stroke="#64748b" stroke-width="4" fill="none">
    <path d="M800 330 V380"/>
    <path d="M305 520 V580"/>
    <path d="M615 520 V580"/>
    <path d="M925 520 V580"/>
    <path d="M1235 520 V580"/>
  </g>

  <text x="72" y="820" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">看代码时，不要从文件数量入手，要从职责边界入手。边界越清楚，系统越像“法”，而不是一团“术”。</text>
</svg>
