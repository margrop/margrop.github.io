<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <text x="72" y="84" font-size="40" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#111827" font-weight="700">Clawd Code 速读总览</text>
  <text x="72" y="124" font-size="20" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#475569">从仓库形态到运行体，最新版本已经是 Python-first porting workspace，而不是静态镜像。</text>

  <rect x="92" y="210" width="280" height="120" rx="22" fill="url(#a)"/>
  <rect x="412" y="210" width="280" height="120" rx="22" fill="url(#b)"/>
  <rect x="732" y="210" width="280" height="120" rx="22" fill="url(#c)"/>
  <rect x="1052" y="210" width="460" height="120" rx="22" fill="url(#d)"/>

  <text x="136" y="256" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Manifest</text>
  <text x="136" y="288" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#eff6ff">what exists now</text>

  <text x="450" y="256" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Graph</text>
  <text x="450" y="288" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#ecfdf5">commands / tools</text>

  <text x="774" y="256" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Runtime</text>
  <text x="774" y="288" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f5f3ff">session / turn / route</text>

  <text x="1100" y="256" font-size="28" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">Audit + Startup</text>
  <text x="1100" y="288" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fffbeb">bootstrap / trust / parity</text>

  <g stroke="#64748b" stroke-width="4" fill="none">
    <path d="M372 270 H406"/>
    <path d="M692 270 H726"/>
    <path d="M1012 270 H1046"/>
  </g>

  <g fill="#fff" opacity="0.92">
    <rect x="120" y="400" width="320" height="220" rx="24"/>
    <rect x="490" y="400" width="320" height="220" rx="24"/>
    <rect x="860" y="400" width="320" height="220" rx="24"/>
    <rect x="1230" y="400" width="270" height="220" rx="24"/>
  </g>

  <text x="155" y="448" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1d4ed8" font-weight="700">src/</text>
  <text x="155" y="486" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">active Python workspace</text>
  <text x="155" y="518" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">manifest, runtime, graphs</text>
  <text x="155" y="550" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">turn loop, session store</text>

  <text x="525" y="448" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#0f766e" font-weight="700">reference_data/</text>
  <text x="525" y="486" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">commands_snapshot.json</text>
  <text x="525" y="518" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">tools_snapshot.json</text>
  <text x="525" y="550" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">surface snapshot metrics</text>

  <text x="895" y="448" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#7c3aed" font-weight="700">archive/</text>
  <text x="895" y="486" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">ignored local TS snapshot</text>
  <text x="895" y="518" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">used only for parity checks</text>
  <text x="895" y="550" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">not part of tracked history</text>

  <text x="1265" y="448" font-size="24" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#b45309" font-weight="700">tests/</text>
  <text x="1265" y="486" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">verification layer</text>
  <text x="1265" y="518" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">parity and smoke checks</text>
  <text x="1265" y="550" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#334155">keeps rewrite honest</text>
