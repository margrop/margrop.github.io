<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#f8fafc"/><text x="800" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#172033">Superpowers checkpoints: from idea to proven delivery</text><text x="800" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#64748b">The agent can move quickly, but every important handoff leaves evidence.</text>
<line x1="190" y1="430" x2="1410" y2="430" stroke="#94a3b8" stroke-width="7"/><g fill="#0f766e"><circle cx="210" cy="430" r="22"/><circle cx="505" cy="430" r="22"/><circle cx="800" cy="430" r="22"/><circle cx="1095" cy="430" r="22"/><circle cx="1390" cy="430" r="22"/></g>
<g font-family="Arial,sans-serif" text-anchor="middle"><g fill="#fff" stroke="#0f766e" stroke-width="3"><rect x="80" y="240" width="260" height="120" rx="16"/><rect x="375" y="500" width="260" height="120" rx="16"/><rect x="670" y="240" width="260" height="120" rx="16"/><rect x="965" y="500" width="260" height="120" rx="16"/><rect x="1260" y="240" width="260" height="120" rx="16"/></g><g fill="#0f172a" font-size="24" font-weight="700"><text x="210" y="285">1 · Brainstorm</text><text x="210" y="322" font-size="19" font-weight="400">clarify the real goal</text><text x="505" y="545">2 · Plan</text><text x="505" y="582" font-size="19" font-weight="400">write constraints and seams</text><text x="800" y="285">3 · Implement</text><text x="800" y="322" font-size="19" font-weight="400">use TDD and small tasks</text><text x="1095" y="545">4 · Verify</text><text x="1095" y="582" font-size="19" font-weight="400">run real checks, not guesses</text><text x="1390" y="285">5 · Review</text><text x="1390" y="322" font-size="19" font-weight="400">ship only with evidence</text></g></g>
<g font-family="Arial,sans-serif" text-anchor="middle" font-size="18" fill="#475569"><text x="210" y="735">Question before code</text><text x="505" y="735">Boundaries before work</text><text x="800" y="735">Changes stay reviewable</text><text x="1095" y="735">Completion is measurable</text><text x="1390" y="735">The summary matches reality</text></g>
</svg>
