<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="72" fill="#f8fafc" font-size="32" font-weight="800" font-family="Inter, system-ui, sans-serif">Reverse SSH path: where the source IP really appears</text>
  <text x="60" y="108" fill="#94a3b8" font-size="18" font-family="Inter, system-ui, sans-serif">The remote host is reachable, but the local machine only sees the VPN gateway as the source.</text>

  <g transform="translate(60 170)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="130" rx="22" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="26" y="36" fill="#93c5fd" font-size="18" font-family="Inter, system-ui, sans-serif">Remote internal host</text>
    <text x="26" y="68" fill="#e2e8f0" font-size="22" font-weight="700" font-family="Inter, system-ui, sans-serif">SSH client</text>
    <text x="26" y="98" fill="#94a3b8" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">host A</text>
  </g>

  <g transform="translate(470 156)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="160" rx="22" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="26" y="38" fill="#dcfce7" font-size="18" font-family="Inter, system-ui, sans-serif">VPN / tunnel gateway</text>
    <rect x="26" y="56" width="208" height="70" rx="16" fill="#06281f" stroke="#34d399" stroke-width="2"/>
    <text x="44" y="94" fill="#bbf7d0" font-size="22" font-weight="700" font-family="Inter, system-ui, sans-serif">source rewrite</text>
    <text x="26" y="146" fill="#86efac" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">gateway IP shown to sshd</text>
  </g>

  <g transform="translate(870 170)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="130" rx="22" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="26" y="36" fill="#fca5a5" font-size="18" font-family="Inter, system-ui, sans-serif">Local machine</text>
    <text x="26" y="68" fill="#e2e8f0" font-size="22" font-weight="700" font-family="Inter, system-ui, sans-serif">sshd + nftables</text>
    <text x="26" y="98" fill="#94a3b8" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">host B</text>
  </g>

  <path d="M310 235 H470" stroke="#22c55e" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="345" y="214" fill="#86efac" font-size="15" font-family="Inter, system-ui, sans-serif">outbound SSH works</text>

  <path d="M730 235 H870" stroke="#ef4444" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowRed)" stroke-dasharray="14 10"/>
  <text x="758" y="214" fill="#fca5a5" font-size="15" font-family="Inter, system-ui, sans-serif">return path gets blocked</text>

  <g transform="translate(60 390)" filter="url(#shadow)">
    <rect x="0" y="0" width="1080" height="290" rx="28" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="28" y="42" fill="#e2e8f0" font-size="22" font-weight="700" font-family="Inter, system-ui, sans-serif">Why the ban hit the wrong target</text>

    <rect x="28" y="78" width="310" height="160" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/>
    <text x="46" y="112" fill="#cbd5e1" font-size="18" font-family="Inter, system-ui, sans-serif">1. tcpdump on tun0</text>
    <text x="46" y="146" fill="#f8fafc" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">SYN from VPN_GATEWAY_IP</text>
    <text x="46" y="176" fill="#f8fafc" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">to local-host:22</text>
    <text x="46" y="212" fill="#94a3b8" font-size="14" font-family="Inter, system-ui, sans-serif">The actual client is behind the gateway.</text>

    <rect x="385" y="78" width="310" height="160" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/>
    <text x="403" y="112" fill="#cbd5e1" font-size="18" font-family="Inter, system-ui, sans-serif">2. fail2ban status</text>
    <text x="403" y="146" fill="#f8fafc" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Banned IP list includes</text>
    <text x="403" y="176" fill="#fca5a5" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">VPN_GATEWAY_IP</text>
    <text x="403" y="212" fill="#94a3b8" font-size="14" font-family="Inter, system-ui, sans-serif">The firewall rejects the return path.</text>

    <rect x="742" y="78" width="310" height="160" rx="18" fill="#111827" stroke="#475569" stroke-width="2"/>
    <text x="760" y="112" fill="#cbd5e1" font-size="18" font-family="Inter, system-ui, sans-serif">3. fix</text>
    <text x="760" y="146" fill="#f8fafc" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">unbanip VPN_GATEWAY_IP</text>
    <text x="760" y="176" fill="#f8fafc" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">add to ignoreip</text>
    <text x="760" y="212" fill="#94a3b8" font-size="14" font-family="Inter, system-ui, sans-serif">Then the reverse connection works again.</text>
  </g>
</svg>
