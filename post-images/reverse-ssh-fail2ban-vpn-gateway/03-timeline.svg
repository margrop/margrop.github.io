<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <text x="60" y="70" fill="#f8fafc" font-size="32" font-weight="800" font-family="Inter, system-ui, sans-serif">Debug timeline</text>
  <text x="60" y="106" fill="#94a3b8" font-size="18" font-family="Inter, system-ui, sans-serif">From "connection refused" to the actual ban entry</text>

  <line x1="120" y1="300" x2="1080" y2="300" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
  <circle cx="140" cy="300" r="18" fill="#22c55e"/>
  <circle cx="380" cy="300" r="18" fill="#38bdf8"/>
  <circle cx="620" cy="300" r="18" fill="#f59e0b"/>
  <circle cx="860" cy="300" r="18" fill="#ef4444"/>
  <circle cx="1040" cy="300" r="18" fill="#22c55e"/>

  <g filter="url(#shadow)">
    <rect x="80" y="150" width="220" height="110" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="100" y="186" fill="#dcfce7" font-size="18" font-family="Inter, system-ui, sans-serif">1. sshd listens</text>
    <text x="100" y="218" fill="#f8fafc" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">ss -lntp | grep :22</text>
    <text x="100" y="244" fill="#94a3b8" font-size="14" font-family="Inter, system-ui, sans-serif">Service is alive.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="150" width="220" height="110" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="340" y="186" fill="#dbeafe" font-size="18" font-family="Inter, system-ui, sans-serif">2. packets arrive</text>
    <text x="340" y="218" fill="#f8fafc" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">tcpdump on tun0</text>
    <text x="340" y="244" fill="#94a3b8" font-size="14" font-family="Inter, system-ui, sans-serif">Source is the gateway.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="150" width="220" height="110" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="580" y="186" fill="#fef3c7" font-size="18" font-family="Inter, system-ui, sans-serif">3. status check</text>
    <text x="580" y="218" fill="#f8fafc" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">fail2ban-client status sshd</text>
    <text x="580" y="244" fill="#94a3b8" font-size="14" font-family="Inter, system-ui, sans-serif">Gateway is on the ban list.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="150" width="220" height="110" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="820" y="186" fill="#fee2e2" font-size="18" font-family="Inter, system-ui, sans-serif">4. remove the ban</text>
    <text x="820" y="218" fill="#f8fafc" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">unbanip + ignoreip</text>
    <text x="820" y="244" fill="#94a3b8" font-size="14" font-family="Inter, system-ui, sans-serif">Return path restored.</text>
  </g>

  <g transform="translate(60 430)" filter="url(#shadow)">
    <rect x="0" y="0" width="1080" height="120" rx="20" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="26" y="38" fill="#e2e8f0" font-size="20" font-weight="700" font-family="Inter, system-ui, sans-serif">Core takeaway</text>
    <text x="26" y="74" fill="#cbd5e1" font-size="16" font-family="Inter, system-ui, sans-serif">The failure was not sshd, and it was not the route to the remote host. The local firewall rejected the gateway address that represented the return path.</text>
  </g>
</svg>
