<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0ea5e9" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="210" fill="#1d4ed8" opacity="0.12"/>
  <circle cx="1040" cy="520" r="180" fill="#ef4444" opacity="0.08"/>
  <circle cx="160" cy="520" r="180" fill="#22c55e" opacity="0.06"/>

  <g opacity="0.18">
    <path d="M0 540 C180 470, 260 470, 420 530 S740 600, 1200 510" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <path d="M0 580 C200 500, 320 510, 470 560 S790 650, 1200 565" fill="none" stroke="#f87171" stroke-width="2"/>
  </g>

  <g transform="translate(70 78)">
    <text x="0" y="0" fill="#93c5fd" font-size="20" font-family="Inter, system-ui, sans-serif" letter-spacing="3">TRIAGE STORY</text>
    <text x="0" y="86" fill="#f8fafc" font-size="56" font-weight="800" font-family="Inter, system-ui, sans-serif">You can SSH out,</text>
    <text x="0" y="148" fill="#f8fafc" font-size="56" font-weight="800" font-family="Inter, system-ui, sans-serif">but not back in</text>
    <text x="0" y="206" fill="#cbd5e1" font-size="24" font-family="Inter, system-ui, sans-serif">A Fail2Ban false positive against the VPN gateway</text>
    <text x="0" y="248" fill="#94a3b8" font-size="18" font-family="Inter, system-ui, sans-serif">reverse SSH, NAT, nftables, and the one ban that broke the return path</text>
  </g>

  <g transform="translate(705 145)" filter="url(#shadow)">
    <rect x="0" y="0" rx="28" ry="28" width="420" height="300" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <text x="24" y="42" fill="#cbd5e1" font-size="18" font-family="Inter, system-ui, sans-serif">LOCAL HOST</text>

    <rect x="38" y="86" rx="18" ry="18" width="120" height="72" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <rect x="56" y="103" rx="4" ry="4" width="84" height="38" fill="#1e293b" stroke="#93c5fd" stroke-width="2"/>
    <rect x="74" y="166" rx="8" ry="8" width="48" height="8" fill="#93c5fd"/>

    <rect x="270" y="72" rx="18" ry="18" width="120" height="100" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
    <text x="289" y="106" fill="#f8fafc" font-size="18" font-weight="700" font-family="Inter, system-ui, sans-serif">Fail2Ban</text>
    <text x="289" y="132" fill="#fca5a5" font-size="14" font-family="Inter, system-ui, sans-serif">banned IP</text>
    <rect x="286" y="144" rx="8" ry="8" width="86" height="16" fill="#7f1d1d"/>
    <text x="293" y="157" fill="#fecaca" font-size="12" font-family="Inter, system-ui, sans-serif">VPN gateway</text>

    <rect x="182" y="216" rx="18" ry="18" width="150" height="54" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="205" y="249" fill="#dcfce7" font-size="18" font-family="Inter, system-ui, sans-serif">reverse SSH path</text>

    <path d="M158 121 H260" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/>
    <path d="M250 121 l-14 -9 v18 z" fill="#22c55e"/>
    <text x="164" y="108" fill="#86efac" font-size="14" font-family="Inter, system-ui, sans-serif">SSH out OK</text>

    <path d="M210 216 C210 176, 240 176, 270 156" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10"/>
    <path d="M257 163 l12 -10 -2 16 z" fill="#ef4444"/>
    <text x="72" y="268" fill="#fca5a5" font-size="14" font-family="Inter, system-ui, sans-serif">incoming SSH blocked at the gate</text>
  </g>

  <g transform="translate(70 372)">
    <rect x="0" y="0" width="540" height="150" rx="20" fill="#0b1220" stroke="#334155" stroke-width="2" filter="url(#soft)"/>
    <text x="26" y="40" fill="#e2e8f0" font-size="20" font-weight="700" font-family="Inter, system-ui, sans-serif">What the logs finally showed</text>
    <text x="26" y="78" fill="#cbd5e1" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">fail2ban-client status sshd</text>
    <text x="26" y="108" fill="#fca5a5" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Banned IP list: VPN_GATEWAY_IP</text>
  </g>
</svg>
