<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="gOld" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#636e72"/>
      <stop offset="100%" style="stop-color:#2d3436"/>
    </linearGradient>
    <linearGradient id="gNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="gData" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#dfe6e9"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#00b894"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="url(#bg)" rx="10"/>
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#dfe6e9" font-size="18" font-weight="bold">AI Agent 完整迁移流程图</text>

  <!-- Old Platform -->
  <rect x="40" y="60" width="180" height="200" rx="12" fill="url(#gOld)" opacity="0.8"/>
  <text x="130" y="90" text-anchor="middle" fill="#b2bec3" font-size="14" font-weight="bold">旧平台</text>
  <text x="130" y="112" text-anchor="middle" fill="#dfe6e9" font-size="12">Memories (55文件)</text>
  <text x="130" y="132" text-anchor="middle" fill="#dfe6e9" font-size="12">Cron Jobs (7个)</text>
  <text x="130" y="152" text-anchor="middle" fill="#dfe6e9" font-size="12">Skills (16+)</text>
  <text x="130" y="172" text-anchor="middle" fill="#dfe6e9" font-size="12">API Keys &amp; Tokens</text>
  <text x="130" y="192" text-anchor="middle" fill="#dfe6e9" font-size="12">SOUL.md</text>
  <text x="130" y="212" text-anchor="middle" fill="#dfe6e9" font-size="12">配置文件</text>
  <text x="130" y="245" text-anchor="middle" fill="#636e72" font-size="10">~/.openclaw/</text>

  <!-- New Platform -->
  <rect x="780" y="60" width="180" height="200" rx="12" fill="url(#gNew)" opacity="0.85"/>
  <text x="870" y="90" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">新平台</text>
  <text x="870" y="112" text-anchor="middle" fill="#fff" font-size="12">Memories ✓</text>
  <text x="870" y="132" text-anchor="middle" fill="#fff" font-size="12">Cron Jobs ✓</text>
  <text x="870" y="152" text-anchor="middle" fill="#fff" font-size="12">Skills ✓</text>
  <text x="870" y="172" text-anchor="middle" fill="#fff" font-size="12">API Keys ✓</text>
  <text x="870" y="192" text-anchor="middle" fill="#fff" font-size="12">SOUL.md ✓</text>
  <text x="870" y="212" text-anchor="middle" fill="#fff" font-size="12">配置文件 ✓</text>
  <text x="870" y="245" text-anchor="middle" fill="#b2bec3" font-size="10">~/.hermes/</text>

  <!-- Migration Steps (center) -->
  <!-- Step 1 -->
  <rect x="300" y="55" width="160" height="50" rx="8" fill="#1a1a2e" stroke="#fdcb6e" stroke-width="1.5"/>
  <text x="380" y="77" text-anchor="middle" fill="#fdcb6e" font-size="11" font-weight="bold">Step 1: 安装新平台</text>
  <text x="380" y="93" text-anchor="middle" fill="#636e72" font-size="10">uv pip install</text>
  <!-- Step 2 -->
  <rect x="520" y="55" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#fdcb6e" stroke-width="1.5"/>
  <text x="610" y="77" text-anchor="middle" fill="#fdcb6e" font-size="11" font-weight="bold">Step 2: 迁移数据</text>
  <text x="610" y="93" text-anchor="middle" fill="#636e72" font-size="10">cp memories, skills, .env, config</text>
  <!-- Step 3 -->
  <rect x="300" y="120" width="160" height="50" rx="8" fill="#1a1a2e" stroke="#00b894" stroke-width="1.5"/>
  <text x="380" y="142" text-anchor="middle" fill="#00b894" font-size="11" font-weight="bold">Step 3: 配置渠道</text>
  <text x="380" y="158" text-anchor="middle" fill="#636e72" font-size="10">WeCom, DingTalk, iMessage</text>
  <!-- Step 4 -->
  <rect x="520" y="120" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#00b894" stroke-width="1.5"/>
  <text x="610" y="142" text-anchor="middle" fill="#00b894" font-size="11" font-weight="bold">Step 4: 配置定时任务</text>
  <text x="610" y="158" text-anchor="middle" fill="#636e72" font-size="10">Cron Jobs 迁移 &amp; 调整</text>
  <!-- Step 5 -->
  <rect x="300" y="185" width="160" height="50" rx="8" fill="#1a1a2e" stroke="#e17055" stroke-width="1.5"/>
  <text x="380" y="207" text-anchor="middle" fill="#e17055" font-size="11" font-weight="bold">Step 5: 排查问题</text>
  <text x="380" y="223" text-anchor="middle" fill="#636e72" font-size="10">代理, 模块, Dashboard</text>
  <!-- Step 6 -->
  <rect x="520" y="185" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#e17055" stroke-width="1.5"/>
  <text x="610" y="207" text-anchor="middle" fill="#e17055" font-size="11" font-weight="bold">Step 6: 自动启动 &amp; 备份</text>
  <text x="610" y="223" text-anchor="middle" fill="#636e72" font-size="10">LaunchAgent, crontab</text>

  <!-- Arrows -->
  <line x1="220" y1="160" x2="300" y2="80" stroke="#dfe6e9" stroke-width="1.5" marker-end="url(#arrowW)" stroke-dasharray="5,3"/>
  <line x1="460" y1="80" x2="520" y2="80" stroke="#fdcb6e" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <line x1="610" y1="105" x2="610" y2="120" stroke="#fdcb6e" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <line x1="520" y1="145" x2="460" y2="145" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <line x1="380" y1="170" x2="380" y2="185" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <line x1="460" y1="210" x2="520" y2="210" stroke="#e17055" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <line x1="700" y1="210" x2="780" y2="160" stroke="#00b894" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Challenges section -->
  <rect x="100" y="310" width="800" height="170" rx="12" fill="#1a0a0a" stroke="#e17055" stroke-width="1" opacity="0.8"/>
  <text x="500" y="340" text-anchor="middle" fill="#e17055" font-size="15" font-weight="bold">遇到的坑 &amp; 解决方案</text>
  <text x="150" y="370" fill="#dfe6e9" font-size="11">1. Python venv 安装失败 → 使用 uv 包管理器</text>
  <text x="150" y="392" fill="#dfe6e9" font-size="11">2. npm bridge 包缺少模块 → 创建 stub 模块</text>
  <text x="150" y="414" fill="#dfe6e9" font-size="11">3. Cron Job 创建命令解析错误 → 直接写 JSON</text>
  <text x="150" y="436" fill="#dfe6e9" font-size="11">4. WeCom Token 刷新失败 → NO_PROXY=* 绕过系统代理</text>
  <text x="150" y="458" fill="#dfe6e9" font-size="11">5. DingTalk SDK 未安装 → pip install dingtalk-stream</text>
  <text x="580" y="370" fill="#dfe6e9" font-size="11">6. Dashboard 模块缺失 → 创建 dashboard_auth stubs</text>
  <text x="580" y="392" fill="#dfe6e9" font-size="11">7. Dashboard 绑定失败 → 添加 --insecure 参数</text>
  <text x="580" y="414" fill="#dfe6e9" font-size="11">8. MEMORY.md 被截断 → 手动复制完整文件</text>
  <text x="580" y="436" fill="#dfe6e9" font-size="11">9. 系统代理导致连接失败 → NO_PROXY=* in plist</text>
  <text x="580" y="458" fill="#00b894" font-size="11" font-weight="bold">全部解决 → 所有功能正常运行 ✓</text>
</svg>
