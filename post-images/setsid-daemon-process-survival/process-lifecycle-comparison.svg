<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Courier New', Consolas, monospace" font-size="13">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <linearGradient id="header-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#34495e"/>
    </linearGradient>
    <linearGradient id="alive-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4edda"/>
      <stop offset="100%" stop-color="#c3e6cb"/>
    </linearGradient>
    <linearGradient id="dead-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8d7da"/>
      <stop offset="100%" stop-color="#f5c6cb"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="750" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="48" fill="url(#header-bg)" rx="8"/>
  <rect x="0" y="24" width="1000" height="24" fill="url(#header-bg)"/>
  <text x="500" y="32" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold" font-family="sans-serif">Process Survival After Shell Exit: &amp; vs nohup vs setsid</text>

  <!-- Column 1: & (background) -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="290" height="44" rx="6" fill="#e74c3c" opacity="0.12"/>
    <text x="145" y="28" text-anchor="middle" fill="#c0392b" font-size="15" font-weight="bold" font-family="sans-serif">❌ ./cliproxy &amp;</text>

    <!-- Shell -->
    <rect x="50" y="65" width="190" height="50" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="88" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold" font-family="sans-serif">Shell (bash)</text>
    <text x="145" y="103" text-anchor="middle" fill="#7f8c8d" font-size="11" font-family="sans-serif">PID=1000, PGID=1000, SID=1000</text>

    <!-- Arrow -->
    <line x1="145" y1="115" x2="145" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Fork notice -->
    <rect x="40" y="140" width="210" height="28" rx="5" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1"/>
    <text x="145" y="158" text-anchor="middle" fill="#d68910" font-size="12" font-family="sans-serif">fork() → child inherits PGID, SID</text>

    <!-- Process box -->
    <rect x="50" y="180" width="190" height="50" rx="8" fill="url(#alive-bg)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="203" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold" font-family="sans-serif">cliproxy (child)</text>
    <text x="145" y="218" text-anchor="middle" fill="#155724" font-size="11" font-family="sans-serif">PID=1001, PGID=1000, SID=1000</text>

    <!-- SIGHUP line -->
    <line x1="145" y1="230" x2="145" y2="258" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-red)"/>

    <!-- When shell exits -->
    <rect x="20" y="258" width="250" height="36" rx="6" fill="#f9ebea" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="145" y="275" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="bold" font-family="sans-serif">⏹ Shell exits / Tool terminates</text>
    <text x="145" y="288" text-anchor="middle" fill="#c0392b" font-size="11" font-family="sans-serif">SIGHUP sent to ALL processes in PGID=1000</text>

    <!-- Dead -->
    <rect x="50" y="306" width="190" height="50" rx="8" fill="url(#dead-bg)" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="329" text-anchor="middle" fill="#721c24" font-size="14" font-weight="bold" font-family="sans-serif">💀 cliproxy (dead)</text>
    <text x="145" y="344" text-anchor="middle" fill="#721c24" font-size="11" font-family="sans-serif">SIGHUP → default handler → terminate</text>
  </g>

  <!-- Column 2: nohup -->
  <g transform="translate(355, 70)">
    <rect x="0" y="0" width="290" height="44" rx="6" fill="#f39c12" opacity="0.12"/>
    <text x="145" y="28" text-anchor="middle" fill="#e67e22" font-size="15" font-weight="bold" font-family="sans-serif">⚠️ nohup ./cliproxy &amp;</text>

    <!-- Shell -->
    <rect x="50" y="65" width="190" height="50" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="88" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold" font-family="sans-serif">Shell (bash)</text>
    <text x="145" y="103" text-anchor="middle" fill="#7f8c8d" font-size="11" font-family="sans-serif">PID=2000, PGID=2000, SID=2000</text>

    <line x1="145" y1="115" x2="145" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- nohup notice -->
    <rect x="25" y="140" width="240" height="28" rx="5" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1"/>
    <text x="145" y="158" text-anchor="middle" fill="#d68910" font-size="12" font-family="sans-serif">nohup: signal(SIGHUP, SIG_IGN) set</text>

    <!-- Process -->
    <rect x="50" y="180" width="190" height="50" rx="8" fill="url(#alive-bg)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="203" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold" font-family="sans-serif">cliproxy (SIG_IGN)</text>
    <text x="145" y="218" text-anchor="middle" fill="#155724" font-size="11" font-family="sans-serif">PID=2001, PGID=2000, SID=2000</text>

    <line x1="145" y1="230" x2="145" y2="258" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-red)"/>

    <rect x="20" y="258" width="250" height="36" rx="6" fill="#f9ebea" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="145" y="275" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="bold" font-family="sans-serif">⏹ Shell exits / Tool terminates</text>
    <text x="145" y="288" text-anchor="middle" fill="#c0392b" font-size="11" font-family="sans-serif">SIGHUP ignored by cliproxy</text>

    <!-- BUT: stdin/stdout issues -->
    <rect x="20" y="306" width="250" height="60" rx="6" fill="#fef3cd" stroke="#ffc107" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="145" y="326" text-anchor="middle" fill="#856404" font-size="12" font-weight="bold" font-family="sans-serif">⚠️ Still tied to parent session</text>
    <text x="145" y="341" text-anchor="middle" fill="#856404" font-size="11" font-family="sans-serif">stdin/stdout may break</text>
    <text x="145" y="356" text-anchor="middle" fill="#856404" font-size="11" font-family="sans-serif">PIPE/SIGPIPE, EOF on stdin</text>
  </g>

  <!-- Column 3: setsid -->
  <g transform="translate(680, 70)">
    <rect x="0" y="0" width="290" height="44" rx="6" fill="#27ae60" opacity="0.12"/>
    <text x="145" y="28" text-anchor="middle" fill="#1e8449" font-size="15" font-weight="bold" font-family="sans-serif">✅ setsid -f ./cliproxy</text>

    <!-- Shell -->
    <rect x="50" y="65" width="190" height="50" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="88" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold" font-family="sans-serif">Shell (bash)</text>
    <text x="145" y="103" text-anchor="middle" fill="#7f8c8d" font-size="11" font-family="sans-serif">PID=3000, PGID=3000, SID=3000</text>

    <line x1="145" y1="115" x2="145" y2="140" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- setsid notice -->
    <rect x="10" y="140" width="270" height="28" rx="5" fill="#d4edda" stroke="#27ae60" stroke-width="1"/>
    <text x="145" y="158" text-anchor="middle" fill="#1e8449" font-size="12" font-family="sans-serif">setsid: new session created, no controlling tty</text>

    <!-- Process -->
    <rect x="50" y="180" width="190" height="50" rx="8" fill="url(#alive-bg)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="203" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold" font-family="sans-serif">cliproxy (new session)</text>
    <text x="145" y="218" text-anchor="middle" fill="#155724" font-size="11" font-family="sans-serif">PID=3001, PGID=3001, SID=3001</text>

    <line x1="145" y1="230" x2="145" y2="258" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-red)"/>

    <rect x="20" y="258" width="250" height="36" rx="6" fill="#f9ebea" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="145" y="275" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="bold" font-family="sans-serif">⏹ Shell exits / Tool terminates</text>
    <text x="145" y="288" text-anchor="middle" fill="#c0392b" font-size="11" font-family="sans-serif">SIGHUP sent to PGID=3000, NOT PGID=3001</text>

    <!-- Alive! -->
    <rect x="50" y="306" width="190" height="50" rx="8" fill="url(#alive-bg)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="329" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold" font-family="sans-serif">✅ cliproxy (still alive!)</text>
    <text x="145" y="344" text-anchor="middle" fill="#155724" font-size="11" font-family="sans-serif">In new session, parent init → survives</text>
  </g>

  <!-- Footer comparison table -->
  <g transform="translate(40, 450)">
    <rect x="0" y="0" width="920" height="280" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1.5" filter="url(#shadow)"/>

    <text x="460" y="28" text-anchor="middle" fill="#2c3e50" font-size="16" font-weight="bold" font-family="sans-serif">Comparison: Three Approaches to Background Process Management</text>

    <!-- Table header -->
    <rect x="20" y="44" width="175" height="32" rx="4" fill="#2c3e50"/>
    <text x="107" y="65" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">Property</text>
    <rect x="205" y="44" width="220" height="32" rx="4" fill="#c0392b"/>
    <text x="315" y="65" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">&amp; (background)</text>
    <rect x="435" y="44" width="220" height="32" rx="4" fill="#e67e22"/>
    <text x="545" y="65" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">nohup &amp;</text>
    <rect x="665" y="44" width="235" height="32" rx="4" fill="#27ae60"/>
    <text x="782" y="65" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">setsid -f</text>

    <!-- Row 1 -->
    <rect x="20" y="80" width="175" height="30" rx="2" fill="#f8f9fa"/>
    <text x="107" y="100" text-anchor="middle" fill="#2c3e50" font-size="12" font-family="sans-serif">SIGHUP immunity</text>
    <rect x="205" y="80" width="220" height="30" rx="2" fill="#f8f9fa"/>
    <text x="315" y="100" text-anchor="middle" fill="#e74c3c" font-size="12" font-family="sans-serif">❌ — killed by SIGHUP</text>
    <rect x="435" y="80" width="220" height="30" rx="2" fill="#f8f9fa"/>
    <text x="545" y="100" text-anchor="middle" fill="#f39c12" font-size="12" font-family="sans-serif">⚠️ ignores SIGHUP</text>
    <rect x="665" y="80" width="235" height="30" rx="2" fill="#f8f9fa"/>
    <text x="782" y="100" text-anchor="middle" fill="#27ae60" font-size="12" font-family="sans-serif">✅ never receives SIGHUP</text>

    <!-- Row 2 -->
    <rect x="20" y="112" width="175" height="30" rx="2" fill="#fff"/>
    <text x="107" y="132" text-anchor="middle" fill="#2c3e50" font-size="12" font-family="sans-serif">stdin/stdout safety</text>
    <rect x="205" y="112" width="220" height="30" rx="2" fill="#fff"/>
    <text x="315" y="132" text-anchor="middle" fill="#e74c3c" font-size="12" font-family="sans-serif">❌ tied to terminal</text>
    <rect x="435" y="112" width="220" height="30" rx="2" fill="#fff"/>
    <text x="545" y="132" text-anchor="middle" fill="#f39c12" font-size="12" font-family="sans-serif">⚠️ redirected but session-bound</text>
    <rect x="665" y="112" width="235" height="30" rx="2" fill="#fff"/>
    <text x="782" y="132" text-anchor="middle" fill="#27ae60" font-size="12" font-family="sans-serif">✅ no controlling terminal</text>

    <!-- Row 3 -->
    <rect x="20" y="144" width="175" height="30" rx="2" fill="#f8f9fa"/>
    <text x="107" y="164" text-anchor="middle" fill="#2c3e50" font-size="12" font-family="sans-serif">New session created</text>
    <rect x="205" y="144" width="220" height="30" rx="2" fill="#f8f9fa"/>
    <text x="315" y="164" text-anchor="middle" fill="#e74c3c" font-size="12" font-family="sans-serif">❌ shares parent session</text>
    <rect x="435" y="144" width="220" height="30" rx="2" fill="#f8f9fa"/>
    <text x="545" y="164" text-anchor="middle" fill="#e74c3c" font-size="12" font-family="sans-serif">❌ shares parent session</text>
    <rect x="665" y="144" width="235" height="30" rx="2" fill="#f8f9fa"/>
    <text x="782" y="164" text-anchor="middle" fill="#27ae60" font-size="12" font-family="sans-serif">✅ creates new session</text>

    <!-- Row 4 -->
    <rect x="20" y="176" width="175" height="30" rx="2" fill="#fff"/>
    <text x="107" y="196" text-anchor="middle" fill="#2c3e50" font-size="12" font-family="sans-serif">Parent after shell exits</text>
    <rect x="205" y="176" width="220" height="30" rx="2" fill="#fff"/>
    <text x="315" y="196" text-anchor="middle" fill="#e74c3c" font-size="12" font-family="sans-serif">💀 killed (same PGID)</text>
    <rect x="435" y="176" width="220" height="30" rx="2" fill="#fff"/>
    <text x="545" y="196" text-anchor="middle" fill="#f39c12" font-size="12" font-family="sans-serif">⚠️ stays alive (SIG_IGN)</text>
    <rect x="665" y="176" width="235" height="30" rx="2" fill="#fff"/>
    <text x="782" y="196" text-anchor="middle" fill="#27ae60" font-size="12" font-family="sans-serif">✅ re-parented to init</text>

    <!-- Row 5 -->
    <rect x="20" y="208" width="175" height="30" rx="2" fill="#f8f9fa"/>
    <text x="107" y="228" text-anchor="middle" fill="#2c3e50" font-size="12" font-family="sans-serif">Suitable for daemons</text>
    <rect x="205" y="208" width="220" height="30" rx="2" fill="#f8f9fa"/>
    <text x="315" y="228" text-anchor="middle" fill="#e74c3c" font-size="12" font-family="sans-serif">❌ no</text>
    <rect x="435" y="208" width="220" height="30" rx="2" fill="#f8f9fa"/>
    <text x="545" y="228" text-anchor="middle" fill="#f39c12" font-size="12" font-family="sans-serif">⚠️ sometimes (with redirects)</text>
    <rect x="665" y="208" width="235" height="30" rx="2" fill="#f8f9fa"/>
    <text x="782" y="228" text-anchor="middle" fill="#27ae60" font-size="12" font-family="sans-serif">✅ yes</text>

    <text x="460" y="265" text-anchor="middle" fill="#7f8c8d" font-size="11" font-family="sans-serif">PGID = Process Group ID, SID = Session ID, SIGHUP = Signal Hang Up (signal 1)</text>
  </g>
</svg>
