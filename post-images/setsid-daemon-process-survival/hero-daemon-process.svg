<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="sans-serif">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="signal-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-grad)"/>

  <!-- Grid lines -->
  <g stroke="#fff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold" filter="url(#glow)">Background Process Dies After Shell Exits?</text>
  <text x="400" y="78" text-anchor="middle" fill="#a0a0c0" font-size="14">The Difference Between &amp;, nohup, and setsid</text>

  <!-- Terminal window -->
  <rect x="60" y="110" width="680" height="220" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <!-- Terminal title bar -->
  <rect x="60" y="110" width="680" height="32" rx="10" fill="#161b22"/>
  <rect x="60" y="132" width="680" height="10" fill="#161b22"/>
  <circle cx="82" cy="126" r="6" fill="#ff5f56"/>
  <circle cx="102" cy="126" r="6" fill="#ffbd2e"/>
  <circle cx="122" cy="126" r="6" fill="#27c93f"/>
  <text x="400" y="131" text-anchor="middle" fill="#8b949e" font-size="12" font-family="monospace">bash — &lt;DEV_HOST&gt;: 22</text>

  <!-- Terminal content -->
  <text x="80" y="170" fill="#58a6ff" font-size="13" font-family="'Courier New', monospace">$</text>
  <text x="96" y="170" fill="#7ee787" font-size="13" font-family="'Courier New', monospace"> cd /opt/service</text>

  <text x="80" y="195" fill="#58a6ff" font-size="13" font-family="'Courier New', monospace">$</text>
  <text x="96" y="195" fill="#e3b341" font-size="13" font-family="'Courier New', monospace"> nohup</text>
  <text x="140" y="195" fill="#f97583" font-size="13" font-family="'Courier New', monospace">./myservice</text>
  <text x="-10" y="195" fill="#e3b341" font-size="13" font-family="'Courier New', monospace">&gt;</text>
  <text x="5" y="195" fill="#79c0ff" font-size="13" font-family="'Courier New', monospace">/dev/null</text>
  <text x="15" y="195" fill="#ff7b72" font-size="13" font-family="'Courier New', monospace"> 2&gt;&amp;1 &amp;</text>

  <!-- Output -->
  <text x="80" y="220" fill="#8b949e" font-size="13" font-family="'Courier New', monospace">[1] 3736519</text>
  <text x="80" y="240" fill="#8b949e" font-size="13" font-family="'Courier New', monospace">Service started successfully on port 8317</text>

  <!-- Check -->
  <text x="80" y="270" fill="#58a6ff" font-size="13" font-family="'Courier New', monospace">$</text>
  <text x="96" y="270" fill="#7ee787" font-size="13" font-family="'Courier New', monospace"> sleep 3 &amp;&amp; curl -s http://&lt;DEV_HOST&gt;:8317/health</text>

  <!-- Failed output -->
  <text x="80" y="295" fill="#f97583" font-size="13" font-family="'Courier New', monospace">curl: (7) Failed to connect to &lt;DEV_HOST&gt; port 8317</text>

  <!-- X mark -->
  <text x="80" y="320" fill="#f97583" font-size="13" font-family="'Courier New', monospace">$</text>
  <text x="96" y="320" fill="#f97583" font-size="13" font-family="'Courier New', monospace"> ps aux | grep myservice  # (no output — process already dead)</text>

  <!-- Bottom tagline -->
  <text x="400" y="365" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">The process started… but disappeared moments later.</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b949e" font-size="12">Why didn't nohup work? The answer involves sessions, process groups, and SIGHUP propagation.</text>
</svg>
