<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" fill="url(#bg)"/>
  <text x="480" y="36" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">SIGTERM vs SIGKILL on a real timeline</text>
  <text x="480" y="60" fill="#94a3b8" font-size="11" text-anchor="middle">Same Python process. Two reboots. Two outcomes.</text>

  <line x1="60" y1="120" x2="900" y2="120" stroke="#475569" stroke-width="2"/>

  <g font-size="10" fill="#cbd5e1">
    <line x1="80" y1="110" x2="80" y2="130" stroke="#94a3b8"/>
    <text x="80" y="105" text-anchor="middle">t=0</text>
    <text x="80" y="148" text-anchor="middle" fill="#94a3b8">SIGTERM</text>

    <line x1="280" y1="110" x2="280" y2="130" stroke="#94a3b8"/>
    <text x="280" y="105" text-anchor="middle">t=1s</text>

    <line x1="580" y1="110" x2="580" y2="130" stroke="#94a3b8"/>
    <text x="580" y="105" text-anchor="middle">t=90s</text>

    <line x1="800" y1="110" x2="800" y2="130" stroke="#94a3b8"/>
    <text x="800" y="105" text-anchor="middle">t=15s</text>
    <text x="800" y="148" text-anchor="middle" fill="#94a3b8">reboot</text>
  </g>

  <rect x="60" y="180" width="430" height="60" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="2"/>
  <text x="275" y="204" fill="#fde68a" font-size="12" font-weight="700" text-anchor="middle">Before: original code</text>
  <text x="275" y="226" fill="#cbd5e1" font-size="11" text-anchor="middle">SIGTERM ignored, blocked on socket.recv for 90s, SIGKILL</text>

  <rect x="510" y="180" width="430" height="60" rx="8" fill="#1e293b" stroke="#86efac" stroke-width="2"/>
  <text x="725" y="204" fill="#86efac" font-size="12" font-weight="700" text-anchor="middle">After: patched code</text>
  <text x="725" y="226" fill="#cbd5e1" font-size="11" text-anchor="middle">SIGTERM cancels children, Deactivated in &lt; 1s</text>

  <rect x="60" y="270" width="880" height="60" rx="8" fill="#0b1220" stroke="#fbbf24"/>
  <text x="500" y="294" fill="#fde68a" font-size="12" font-weight="700" text-anchor="middle">systemd defaults: TimeoutStopSec=90s, FinalKillSignal=SIGKILL</text>
  <text x="500" y="316" fill="#cbd5e1" font-size="11" text-anchor="middle">A drop-in can lower this to 20s, but the real fix is to make the app finish on its own.</text>

  <text x="480" y="350" fill="#475569" font-size="10" text-anchor="middle">Figure 2 / Patching the code beats tuning the systemd timeout.</text>
</svg>
