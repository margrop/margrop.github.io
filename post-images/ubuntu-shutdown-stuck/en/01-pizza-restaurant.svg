<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <text x="480" y="40" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">Shutdown is closing time: the OS is a restaurant, services are customers</text>
  <text x="480" y="64" fill="#94a3b8" font-size="12" text-anchor="middle">Closing time. The guard (sshd) walks from table to table asking everyone to leave.</text>

  <rect x="40" y="110" width="880" height="380" rx="16" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="480" y="138" fill="#fde68a" font-size="14" font-weight="700" text-anchor="middle">" The Restaurant " · /run/systemd/shutdown</text>

  <rect x="80" y="170" width="220" height="120" rx="10" fill="#0b1220" stroke="#86efac" stroke-width="2"/>
  <text x="190" y="198" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">finalrd waiter</text>
  <text x="190" y="220" fill="#cbd5e1" font-size="11" text-anchor="middle">"Sir, lights out"</text>
  <text x="190" y="240" fill="#cbd5e1" font-size="11" text-anchor="middle">stands, pays, leaves</text>
  <text x="190" y="270" fill="#475569" font-size="10" text-anchor="middle">default: done in 1 sec</text>

  <rect x="320" y="170" width="220" height="120" rx="10" fill="#0b1220" stroke="#fbbf24" stroke-width="2"/>
  <text x="430" y="198" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">smart-proxy diner</text>
  <text x="430" y="220" fill="#cbd5e1" font-size="11" text-anchor="middle">"I am still on a call"</text>
  <text x="430" y="240" fill="#cbd5e1" font-size="11" text-anchor="middle">Waiter says "hang up".</text>
  <text x="430" y="255" fill="#f87171" font-size="11" text-anchor="middle">Customer nods but the</text>
  <text x="430" y="268" fill="#f87171" font-size="11" text-anchor="middle">other side keeps talking.</text>
  <text x="430" y="285" fill="#475569" font-size="10" text-anchor="middle">waited: 90 sec</text>

  <rect x="560" y="170" width="220" height="120" rx="10" fill="#0b1220" stroke="#fb923c" stroke-width="2"/>
  <text x="670" y="198" fill="#fb923c" font-size="13" font-weight="700" text-anchor="middle">rule-proxy diner</text>
  <text x="670" y="220" fill="#cbd5e1" font-size="11" text-anchor="middle">"next order is almost done"</text>
  <text x="670" y="240" fill="#cbd5e1" font-size="11" text-anchor="middle">rules loaded, but a</text>
  <text x="670" y="255" fill="#cbd5e1" font-size="11" text-anchor="middle">long-poll upstream keeps</text>
  <text x="670" y="268" fill="#cbd5e1" font-size="11" text-anchor="middle">the line open.</text>
  <text x="670" y="285" fill="#475569" font-size="10" text-anchor="middle">waited: 90+ sec</text>

  <rect x="800" y="170" width="100" height="120" rx="10" fill="#0b1220" stroke="#22d3ee" stroke-width="2"/>
  <text x="850" y="198" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">guard</text>
  <text x="850" y="220" fill="#cbd5e1" font-size="11" text-anchor="middle">90 sec</text>
  <text x="850" y="240" fill="#cbd5e1" font-size="11" text-anchor="middle">reached</text>
  <text x="850" y="258" fill="#cbd5e1" font-size="11" text-anchor="middle">cut the</text>
  <text x="850" y="270" fill="#cbd5e1" font-size="11" text-anchor="middle">line (SIGKILL)</text>

  <rect x="80" y="320" width="780" height="120" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="470" y="346" fill="#fde68a" font-size="12" font-weight="700" text-anchor="middle">Root cause: the guard can only ask, never hang up the call for the customer.</text>
  <text x="470" y="370" fill="#cbd5e1" font-size="11" text-anchor="middle">SIGTERM is a polite request. But once Python asyncio is parked on a socket.recv,</text>
  <text x="470" y="390" fill="#cbd5e1" font-size="11" text-anchor="middle">the interpreter does not actively check "someone wants me gone". So for 90s</text>
  <text x="470" y="412" fill="#cbd5e1" font-size="11" text-anchor="middle">it ignores everything, until systemd SIGKILLs it.</text>

  <text x="480" y="472" fill="#86efac" font-size="11" font-weight="700" text-anchor="middle">Fix: give the customer a way to hang up itself.</text>
  <text x="480" y="492" fill="#cbd5e1" font-size="10" text-anchor="middle">= on SIGTERM the Python process cancels its asyncio tasks, finishes in under 10s.</text>

  <text x="480" y="528" fill="#475569" font-size="10" text-anchor="middle">Figure 1 / systemd + asyncio explained as last-call at a restaurant.</text>
</svg>
