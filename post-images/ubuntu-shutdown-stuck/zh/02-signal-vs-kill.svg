<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" fill="url(#bg)"/>
  <text x="480" y="36" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">SIGTERM vs SIGKILL 的时间轴</text>
  <text x="480" y="60" fill="#94a3b8" font-size="11" text-anchor="middle">同一个 python 进程,前后两次关机的不同结局</text>

  <line x1="60" y1="120" x2="900" y2="120" stroke="#475569" stroke-width="2"/>

  <g font-size="10" fill="#cbd5e1">
    <line x1="80" y1="110" x2="80" y2="130" stroke="#94a3b8"/>
    <text x="80" y="105" text-anchor="middle">t=0</text>
    <text x="80" y="148" text-anchor="middle" fill="#94a3b8">SIGTERM</text>

    <line x1="280" y1="110" x2="280" y2="130" stroke="#94a3b8"/>
    <text x="280" y="105" text-anchor="middle">t=1s</text>

    <line x1="580" y1="110" x2="580" y2="130" stroke="#94a3b8"/>
    <text x="580" y="105" text-anchor="middle">t=90s</text>

    <line x1="800" y1="110" x2="800" y2="130" stroke="#94a3b8"/>
    <text x="800" y="105" text-anchor="middle">t=15s</text>
    <text x="800" y="148" text-anchor="middle" fill="#94a3b8">reboot</text>
  </g>

  <rect x="60" y="180" width="430" height="60" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="2"/>
  <text x="275" y="204" fill="#fde68a" font-size="12" font-weight="700" text-anchor="middle">Before: 老代码</text>
  <text x="275" y="226" fill="#cbd5e1" font-size="11" text-anchor="middle">停 0s,卡在 socket.recv 等 90s,SIGKILL 强杀</text>

  <rect x="510" y="180" width="430" height="60" rx="8" fill="#1e293b" stroke="#86efac" stroke-width="2"/>
  <text x="725" y="204" fill="#86efac" font-size="12" font-weight="700" text-anchor="middle">After: 打了补丁的代码</text>
  <text x="725" y="226" fill="#cbd5e1" font-size="11" text-anchor="middle">停 &lt;1s,主动 cancel 子任务,2s 内 Deactivated</text>

  <rect x="60" y="270" width="880" height="60" rx="8" fill="#0b1220" stroke="#fbbf24"/>
  <text x="500" y="294" fill="#fde68a" font-size="12" font-weight="700" text-anchor="middle">systemd 默认 TimeoutStopSec=90s,FinalKillSignal=SIGKILL</text>
  <text x="500" y="316" fill="#cbd5e1" font-size="11" text-anchor="middle">这是"最长等 90 秒,之后拉闸"。可以被 drop-in 调到 20 秒,但更好的做法是让 Python 自己挂。</text>

  <text x="480" y="350" fill="#475569" font-size="10" text-anchor="middle">图 2 · 修代码,比改 systemd 超时,根本得多。</text>
</svg>
