<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="480" fill="url(#bg)"/>
  <text x="480" y="36" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">asyncio 的"任务树":父任务要负责拆掉子任务</text>
  <text x="480" y="60" fill="#94a3b8" font-size="11" text-anchor="middle">收到 SIGTERM 后,我们要遍历所有 in-flight 子任务,逐个 cancel</text>

  <rect x="380" y="90" width="200" height="56" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="480" y="116" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">serve_forever()</text>
  <text x="480" y="134" fill="#94a3b8" font-size="11" text-anchor="middle">父任务 · 等 SIGTERM</text>

  <line x1="480" y1="146" x2="200" y2="200" stroke="#475569"/>
  <line x1="480" y1="146" x2="480" y2="200" stroke="#475569"/>
  <line x1="480" y1="146" x2="760" y2="200" stroke="#475569"/>

  <rect x="100" y="200" width="200" height="56" rx="8" fill="#0b1220" stroke="#fbbf24" stroke-width="2"/>
  <text x="200" y="222" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">handle_socks_client()</text>
  <text x="200" y="240" fill="#94a3b8" font-size="10" text-anchor="middle">socket.recv 卡住</text>

  <rect x="380" y="200" width="200" height="56" rx="8" fill="#0b1220" stroke="#fbbf24" stroke-width="2"/>
  <text x="480" y="222" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">handle_http_client()</text>
  <text x="480" y="240" fill="#94a3b8" font-size="10" text-anchor="middle">在等上游 socket</text>

  <rect x="660" y="200" width="200" height="56" rx="8" fill="#0b1220" stroke="#86efac" stroke-width="2"/>
  <text x="760" y="222" fill="#86efac" font-size="12" font-weight="700" text-anchor="middle">health_check_loop()</text>
  <text x="760" y="240" fill="#94a3b8" font-size="10" text-anchor="middle">sleep 中 · 由 stop() 取消</text>

  <line x1="200" y1="256" x2="200" y2="310" stroke="#475569"/>
  <line x1="480" y1="256" x2="480" y2="310" stroke="#475569"/>

  <rect x="100" y="310" width="200" height="40" rx="6" fill="#020617" stroke="#475569"/>
  <text x="200" y="334" fill="#94a3b8" font-size="11" text-anchor="middle">asyncio.open_connection()</text>

  <rect x="380" y="310" width="200" height="40" rx="6" fill="#020617" stroke="#475569"/>
  <text x="480" y="334" fill="#94a3b8" font-size="11" text-anchor="middle">asyncio.open_connection()</text>

  <rect x="60" y="380" width="840" height="70" rx="8" fill="#0b1220" stroke="#fb923c" stroke-dasharray="4 3"/>
  <text x="480" y="406" fill="#fde68a" font-size="12" font-weight="700" text-anchor="middle">修复:遍历 asyncio.all_tasks(),匹配名字就 .cancel()</text>
  <text x="480" y="428" fill="#cbd5e1" font-size="11" text-anchor="middle">+ 把 self.stop() 套 asyncio.wait_for(timeout=10),双保险</text>
  <text x="480" y="446" fill="#94a3b8" font-size="10" text-anchor="middle">这一段是 15 行代码,但消掉的是 90 秒的"打烊僵局"</text>

  <text x="480" y="472" fill="#475569" font-size="10" text-anchor="middle">图 3 · 父子任务是 asyncio 世界的真正生命单元,signal handler 不取消它们,人就退不掉。</text>
</svg>
