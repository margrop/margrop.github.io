<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="380" fill="url(#bg)"/>
  <text x="480" y="36" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">systemd drop-in:不打补丁也能给 unit 套新规则</text>
  <text x="480" y="60" fill="#94a3b8" font-size="11" text-anchor="middle">在 service.d 目录下放 override.conf,原 unit 不动</text>

  <rect x="40" y="90" width="430" height="240" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="255" y="118" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">Before · 原 unit 一行都不动</text>
  <text x="255" y="138" fill="#cbd5e1" font-size="11" text-anchor="middle">/etc/systemd/system/smart-proxy.service</text>
  <g font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#94a3b8">
    <text x="60" y="170">[Service]</text>
    <text x="60" y="190">ExecStart=/usr/bin/env python3 ...</text>
    <text x="60" y="210">Restart=always</text>
    <text x="60" y="230">RestartSec=2</text>
    <text x="60" y="260" fill="#f87171"># TimeoutStopSec 没有显式值</text>
    <text x="60" y="280" fill="#f87171"># 默认 90s,卡住就卡 90s</text>
  </g>

  <path d="M 470 210 L 510 210" stroke="#86efac" stroke-width="3" fill="none"/>
  <polygon points="0,-6 12,0 0,6" fill="#86efac" transform="translate(510 210)"/>
  <text x="490" y="200" fill="#86efac" font-size="11" text-anchor="middle">drop-in</text>

  <rect x="510" y="90" width="410" height="240" rx="10" fill="#1e293b" stroke="#86efac" stroke-width="2"/>
  <text x="715" y="118" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">After · override.conf 覆盖关键三项</text>
  <text x="715" y="138" fill="#cbd5e1" font-size="11" text-anchor="middle">/etc/systemd/system/smart-proxy.service.d/override.conf</text>
  <g font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#86efac">
    <text x="530" y="170">[Service]</text>
    <text x="530" y="190">TimeoutStopSec=20s</text>
    <text x="530" y="210">KillMode=mixed</text>
    <text x="530" y="230">KillSignal=SIGTERM</text>
    <text x="530" y="250">FinalKillSignal=SIGKILL</text>
  </g>
  <text x="715" y="288" fill="#94a3b8" font-size="10" text-anchor="middle">daemon-reload · 下一次 stop 即生效</text>

  <text x="480" y="358" fill="#475569" font-size="10" text-anchor="middle">图 4 · drop-in 是 systemd 给你留的"安全补丁位",原 unit 不动,新规则叠加上去。</text>
</svg>
