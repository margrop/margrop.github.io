<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <text x="480" y="40" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">关机像打烊:系统是餐厅,服务是顾客,sshd 是保安</text>
  <text x="480" y="64" fill="#94a3b8" font-size="12" text-anchor="middle">餐厅要打烊了,保安(sshd)挨个请顾客(services)离场</text>

  <rect x="40" y="110" width="880" height="380" rx="16" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="480" y="138" fill="#fde68a" font-size="14" font-weight="700" text-anchor="middle">「 餐 厅 」 · /run/systemd/shutdown</text>

  <rect x="80" y="170" width="220" height="120" rx="10" fill="#0b1220" stroke="#86efac" stroke-width="2"/>
  <text x="190" y="198" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">finalrd 服务员</text>
  <text x="190" y="220" fill="#cbd5e1" font-size="11" text-anchor="middle">"先生,我要关灯了"</text>
  <text x="190" y="240" fill="#cbd5e1" font-size="11" text-anchor="middle">三秒起身,买单,走人</text>
  <text x="190" y="270" fill="#475569" font-size="10" text-anchor="middle">默认行为: 1 秒内完成</text>

  <rect x="320" y="170" width="220" height="120" rx="10" fill="#0b1220" stroke="#fbbf24" stroke-width="2"/>
  <text x="430" y="198" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">smart-proxy 顾客</text>
  <text x="430" y="220" fill="#cbd5e1" font-size="11" text-anchor="middle">"我还在打电话"</text>
  <text x="430" y="240" fill="#cbd5e1" font-size="11" text-anchor="middle">服务员说"挂电话",他点头,</text>
  <text x="430" y="255" fill="#f87171" font-size="11" text-anchor="middle">但电话里的人在讲事故报告</text>
  <text x="430" y="280" fill="#475569" font-size="10" text-anchor="middle">等他挂: 90 秒</text>

  <rect x="560" y="170" width="220" height="120" rx="10" fill="#0b1220" stroke="#fb923c" stroke-width="2"/>
  <text x="670" y="198" fill="#fb923c" font-size="13" font-weight="700" text-anchor="middle">rule-proxy 顾客</text>
  <text x="670" y="220" fill="#cbd5e1" font-size="11" text-anchor="middle">"我下一单马上好"</text>
  <text x="670" y="240" fill="#cbd5e1" font-size="11" text-anchor="middle">规则都加载完了,但有连接</text>
  <text x="670" y="255" fill="#cbd5e1" font-size="11" text-anchor="middle">在请求上游 socks 一直不返回</text>
  <text x="670" y="280" fill="#475569" font-size="10" text-anchor="middle">等他挂: 90+ 秒</text>

  <rect x="800" y="170" width="100" height="120" rx="10" fill="#0b1220" stroke="#22d3ee" stroke-width="2"/>
  <text x="850" y="198" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">保安</text>
  <text x="850" y="220" fill="#cbd5e1" font-size="11" text-anchor="middle">90 秒到</text>
  <text x="850" y="240" fill="#cbd5e1" font-size="11" text-anchor="middle">拉闸(SIGKILL)</text>
  <text x="850" y="260" fill="#cbd5e1" font-size="11" text-anchor="middle">顾客的电话</text>
  <text x="850" y="275" fill="#cbd5e1" font-size="11" text-anchor="middle">被强行掐断</text>

  <rect x="80" y="320" width="780" height="120" rx="10" fill="#0b1220" stroke="#475569"/>
  <text x="470" y="346" fill="#fde68a" font-size="12" font-weight="700" text-anchor="middle">问题的本质:保安只能"请",不能"替顾客挂电话"</text>
  <text x="470" y="370" fill="#cbd5e1" font-size="11" text-anchor="middle">服务员叫 SIGTERM,保安给的是"请立刻离开";但 Python 的 asyncio 一旦卡在</text>
  <text x="470" y="390" fill="#cbd5e1" font-size="11" text-anchor="middle">某个 socket.recv 上,Python 解释器根本不会主动去看"有人叫我走"。</text>
  <text x="470" y="412" fill="#cbd5e1" font-size="11" text-anchor="middle">所以 90 秒内它不响应任何东西,只能等 systemd 到点 SIGKILL。</text>

  <text x="480" y="472" fill="#86efac" font-size="11" font-weight="700" text-anchor="middle">修复:让服务员有"替顾客挂电话"的权限</text>
  <text x="480" y="492" fill="#cbd5e1" font-size="10" text-anchor="middle">= Python 进程收到 SIGTERM 后,主动 asyncio.tasks 取消在跑的子任务,10 秒内必定结束</text>

  <text x="480" y="528" fill="#475569" font-size="10" text-anchor="middle">图 1 · 把抽象的 systemd + asyncio 拉回"打烊前的餐厅"。</text>
</svg>
