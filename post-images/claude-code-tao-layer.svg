<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f3ea"/>
      <stop offset="100%" stop-color="#efe7da"/>
    </linearGradient>
    <linearGradient id="dao" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f5d4b"/>
      <stop offset="100%" stop-color="#2c7a5a"/>
    </linearGradient>
    <linearGradient id="fa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a5c2b"/>
      <stop offset="100%" stop-color="#a06b2a"/>
    </linearGradient>
    <linearGradient id="ti" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
    <linearGradient id="shu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a1f3a"/>
      <stop offset="100%" stop-color="#b83252"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#4b3f2f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1400" height="820" rx="28" fill="url(#bg)"/>
  <circle cx="1160" cy="120" r="180" fill="#d7c7ab" opacity="0.26"/>
  <circle cx="220" cy="700" r="220" fill="#d9cdbb" opacity="0.2"/>

  <text x="80" y="88" font-size="40" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#2b2b2b" font-weight="700">Claude Code 的道法体术四层结构</text>
  <text x="80" y="128" font-size="20" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#555">把提示词当作“道”，把模块边界当作“法”，把运行状态当作“体”，把工具调用当作“术”。</text>

  <g filter="url(#shadow)">
    <rect x="90" y="190" width="300" height="120" rx="22" fill="url(#dao)"/>
    <rect x="430" y="190" width="300" height="120" rx="22" fill="url(#fa)"/>
    <rect x="770" y="190" width="300" height="120" rx="22" fill="url(#ti)"/>
    <rect x="1110" y="190" width="200" height="120" rx="22" fill="url(#shu)"/>
  </g>

  <text x="140" y="235" font-size="30" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">道</text>
  <text x="140" y="272" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f4f4f4">System prompt / skills / policy</text>

  <text x="480" y="235" font-size="30" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">法</text>
  <text x="480" y="272" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f4f4f4">commands / config / auth / errors</text>

  <text x="820" y="235" font-size="30" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">体</text>
  <text x="820" y="272" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f4f4f4">state / tokens / workspace / cache</text>

  <text x="1150" y="235" font-size="30" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#fff" font-weight="700">术</text>
  <text x="1150" y="272" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#f4f4f4">bash / edit / write / task</text>

  <g stroke="#8b7d6a" stroke-width="4" fill="none" opacity="0.75">
    <path d="M390 250 H425"/>
    <path d="M730 250 H765"/>
    <path d="M1070 250 H1105"/>
    <path d="M1210 330 C1210 480, 1100 560, 930 590"/>
    <path d="M930 590 C760 620, 580 580, 430 510"/>
    <path d="M430 510 C290 455, 210 390, 180 320"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="380" width="250" height="250" rx="22" fill="#fff9f2"/>
    <rect x="410" y="380" width="250" height="250" rx="22" fill="#fff9f2"/>
    <rect x="700" y="380" width="250" height="250" rx="22" fill="#fff9f2"/>
    <rect x="990" y="380" width="250" height="250" rx="22" fill="#fff9f2"/>
  </g>

  <text x="160" y="430" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#1f5d4b" font-weight="700">道</text>
  <text x="160" y="468" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">决定“为什么做”</text>
  <text x="160" y="500" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">限制、约束、价值观</text>
  <text x="160" y="532" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">把行为导向可解释</text>

  <text x="450" y="430" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#a06b2a" font-weight="700">法</text>
  <text x="450" y="468" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">决定“如何组织”</text>
  <text x="450" y="500" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">目录、边界、协议</text>
  <text x="450" y="532" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">把复杂度拆成层</text>

  <text x="740" y="430" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#2d3748" font-weight="700">体</text>
  <text x="740" y="468" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">决定“当前是什么”</text>
  <text x="740" y="500" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">token、workspace、缓存</text>
  <text x="740" y="532" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">把状态变成现实</text>

  <text x="1030" y="430" font-size="26" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#b83252" font-weight="700">术</text>
  <text x="1030" y="468" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">决定“怎么出手”</text>
  <text x="1030" y="500" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">读、写、搜、执行、协作</text>
  <text x="1030" y="532" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#5c5346">把意图变成动作</text>

  <text x="80" y="720" font-size="18" font-family="Arial, 'Noto Sans SC', sans-serif" fill="#666">阅读本文时，可把这四层对应到代码中的 system prompt、command registry、auth/config state、terminal/fileops/execution adapters。</text>
</svg>
