<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-label="Linux/macOS 密钥登录流程">
<rect width="1100" height="600" fill="#f5f7fb"/><rect x="34" y="34" width="1032" height="532" rx="18" fill="#ffffff" stroke="#d4dbe8"/><rect x="34" y="34" width="1032" height="58" rx="18" fill="#eef3ff"/><circle cx="72" cy="64" r="8" fill="#ef4444"/><circle cx="96" cy="64" r="8" fill="#f59e0b"/><circle cx="120" cy="64" r="8" fill="#22c55e"/>
<text x="70" y="135" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#111827">Linux/macOS 密钥登录流程</text><text x="70" y="172" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#4b5563">客户端保留私钥，Windows 只保存公钥；Agent 不需要知道 Windows 密码。</text><g font-family="Arial, Helvetica, sans-serif"><g transform="translate(70 214)"><circle cx="18" cy="18" r="18" fill="#059669" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#059669">1</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">ssh-keygen -t ed25519 生成密钥</text></g><g transform="translate(70 272)"><circle cx="18" cy="18" r="18" fill="#059669" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#059669">2</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">第一次用密码登录 Windows</text></g><g transform="translate(70 330)"><circle cx="18" cy="18" r="18" fill="#059669" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#059669">3</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">普通用户写入 %USERPROFILE%/.ssh/authorized_keys</text></g><g transform="translate(70 388)"><circle cx="18" cy="18" r="18" fill="#059669" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#059669">4</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">管理员用户写入 C:/ProgramData/ssh/administrators_authorized_keys</text></g><g transform="translate(70 446)"><circle cx="18" cy="18" r="18" fill="#059669" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#059669">5</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">修正 ACL 后重启 sshd</text></g></g></svg>