<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-label="Agent side - macOS/Linux terminal"><rect width="1100" height="600" fill="#0f172a"/><rect x="44" y="42" width="1012" height="516" rx="18" fill="#111827" stroke="#334155"/><rect x="44" y="42" width="1012" height="58" rx="18" fill="#1f2937"/><circle cx="82" cy="72" r="8" fill="#ef4444"/><circle cx="106" cy="72" r="8" fill="#f59e0b"/><circle cx="130" cy="72" r="8" fill="#22c55e"/><text x="76" y="88" font-size="18" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif">Agent side - macOS/Linux terminal</text><text x="76" y="132" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">$ ssh-keygen -t ed25519 -C "agent-client"</text><text x="76" y="166" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">$ ssh -i ~/.ssh/id_ed25519 &lt;user&gt;@&lt;windows-host&gt; hostname</text><text x="76" y="200" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">$ ssh &lt;user&gt;@&lt;windows-host&gt; powershell -NoProfile -Command "Get-ComputerInfo"</text><text x="76" y="234" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">$ scp ./script.ps1 &lt;user&gt;@&lt;windows-host&gt;:~/Desktop/</text><text x="76" y="268" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">$ ssh &lt;user&gt;@&lt;windows-host&gt; powershell -ExecutionPolicy Bypass ~/Desktop/script.ps1</text><rect x="74" y="502" width="950" height="28" rx="6" fill="#22c55e" opacity="0.16"/><text x="90" y="522" font-size="17" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif">No real hostnames, addresses, or usernames are shown.</text></svg>