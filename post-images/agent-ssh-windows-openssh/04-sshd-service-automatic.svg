<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-label="服务管理：把 OpenSSH SSH Server 设为自动启动">
<rect width="1100" height="600" fill="#f5f7fb"/><rect x="34" y="34" width="1032" height="532" rx="18" fill="#ffffff" stroke="#d4dbe8"/><rect x="34" y="34" width="1032" height="58" rx="18" fill="#eef3ff"/><circle cx="72" cy="64" r="8" fill="#ef4444"/><circle cx="96" cy="64" r="8" fill="#f59e0b"/><circle cx="120" cy="64" r="8" fill="#22c55e"/>
<text x="70" y="135" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#111827">服务管理：把 OpenSSH SSH Server 设为自动启动</text><text x="70" y="172" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#4b5563">services.msc -&gt; OpenSSH SSH Server -&gt; Startup type: Automatic -&gt; Start。</text><g font-family="Arial, Helvetica, sans-serif"><g transform="translate(70 214)"><circle cx="18" cy="18" r="18" fill="#7c3aed" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#7c3aed">1</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">Win + R 输入 services.msc</text></g><g transform="translate(70 272)"><circle cx="18" cy="18" r="18" fill="#7c3aed" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#7c3aed">2</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">找到 OpenSSH SSH Server</text></g><g transform="translate(70 330)"><circle cx="18" cy="18" r="18" fill="#7c3aed" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#7c3aed">3</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">双击打开属性</text></g><g transform="translate(70 388)"><circle cx="18" cy="18" r="18" fill="#7c3aed" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#7c3aed">4</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">Startup type 选择 Automatic</text></g><g transform="translate(70 446)"><circle cx="18" cy="18" r="18" fill="#7c3aed" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#7c3aed">5</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">点击 Start 启动服务</text></g></g></svg>