<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-label="Windows 10：可选功能里安装 OpenSSH Server">
<rect width="1100" height="600" fill="#f5f7fb"/><rect x="34" y="34" width="1032" height="532" rx="18" fill="#ffffff" stroke="#d4dbe8"/><rect x="34" y="34" width="1032" height="58" rx="18" fill="#eef3ff"/><circle cx="72" cy="64" r="8" fill="#ef4444"/><circle cx="96" cy="64" r="8" fill="#f59e0b"/><circle cx="120" cy="64" r="8" fill="#22c55e"/>
<text x="70" y="135" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#111827">Windows 10：可选功能里安装 OpenSSH Server</text><text x="70" y="172" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#4b5563">Settings -&gt; Apps -&gt; Optional features -&gt; Add a feature -&gt; OpenSSH Server。</text><g font-family="Arial, Helvetica, sans-serif"><g transform="translate(70 214)"><circle cx="18" cy="18" r="18" fill="#0284c7" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#0284c7">1</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">打开 Settings，进入 Apps</text></g><g transform="translate(70 272)"><circle cx="18" cy="18" r="18" fill="#0284c7" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#0284c7">2</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">进入 Optional features</text></g><g transform="translate(70 330)"><circle cx="18" cy="18" r="18" fill="#0284c7" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#0284c7">3</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">点击 Add a feature</text></g><g transform="translate(70 388)"><circle cx="18" cy="18" r="18" fill="#0284c7" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#0284c7">4</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">搜索 OpenSSH Server</text></g><g transform="translate(70 446)"><circle cx="18" cy="18" r="18" fill="#0284c7" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#0284c7">5</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">选择 Install，等待安装完成</text></g></g></svg>