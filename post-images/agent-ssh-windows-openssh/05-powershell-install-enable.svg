<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-label="PowerShell as Administrator - Install and enable OpenSSH Server"><rect width="1100" height="600" fill="#0f172a"/><rect x="44" y="42" width="1012" height="516" rx="18" fill="#111827" stroke="#334155"/><rect x="44" y="42" width="1012" height="58" rx="18" fill="#1f2937"/><circle cx="82" cy="72" r="8" fill="#ef4444"/><circle cx="106" cy="72" r="8" fill="#f59e0b"/><circle cx="130" cy="72" r="8" fill="#22c55e"/><text x="76" y="88" font-size="18" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif">PowerShell as Administrator - Install and enable OpenSSH Server</text><text x="76" y="132" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">PS&gt; Get-WindowsCapability -Online | Where-Object Name -like "OpenSSH*"</text><text x="76" y="166" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">PS&gt; Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0</text><text x="76" y="200" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">PS&gt; Start-Service sshd</text><text x="76" y="234" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">PS&gt; Set-Service -Name sshd -StartupType Automatic</text><text x="76" y="268" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">PS&gt; Get-NetFirewallRule -Name OpenSSH-Server-In-TCP</text><text x="76" y="302" font-size="19" fill="#d1fae5" font-family="Menlo, Consolas, monospace">PS&gt; ssh &lt;user&gt;@&lt;windows-host&gt;</text><rect x="74" y="502" width="950" height="28" rx="6" fill="#16a34a" opacity="0.16"/><text x="90" y="522" font-size="17" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif">No real hostnames, addresses, or usernames are shown.</text></svg>