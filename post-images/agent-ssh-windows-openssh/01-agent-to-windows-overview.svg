<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-label="让 AI Agent 像登录 Linux 一样登录 Windows">
<rect width="1100" height="600" fill="#f5f7fb"/><rect x="34" y="34" width="1032" height="532" rx="18" fill="#ffffff" stroke="#d4dbe8"/><rect x="34" y="34" width="1032" height="58" rx="18" fill="#eef3ff"/><circle cx="72" cy="64" r="8" fill="#ef4444"/><circle cx="96" cy="64" r="8" fill="#f59e0b"/><circle cx="120" cy="64" r="8" fill="#22c55e"/>
<text x="70" y="135" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#111827">让 AI Agent 像登录 Linux 一样登录 Windows</text><text x="70" y="172" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#4b5563">Windows 只负责运行 OpenSSH Server，Linux/macOS/Agent 只需要标准 ssh 客户端。</text><g font-family="Arial, Helvetica, sans-serif"><g transform="translate(70 214)"><circle cx="18" cy="18" r="18" fill="#2563eb" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#2563eb">1</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">Windows 安装并启用 OpenSSH Server</text></g><g transform="translate(70 272)"><circle cx="18" cy="18" r="18" fill="#2563eb" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#2563eb">2</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">把 sshd 服务设为 Automatic 并确认防火墙端口 22</text></g><g transform="translate(70 330)"><circle cx="18" cy="18" r="18" fill="#2563eb" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#2563eb">3</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">Linux/macOS 生成 Ed25519 密钥</text></g><g transform="translate(70 388)"><circle cx="18" cy="18" r="18" fill="#2563eb" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#2563eb">4</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">把公钥写入 Windows authorized_keys 或 administrators_authorized_keys</text></g><g transform="translate(70 446)"><circle cx="18" cy="18" r="18" fill="#2563eb" opacity="0.14"/><text x="18" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#2563eb">5</text><rect x="52" y="-4" width="850" height="46" rx="8" fill="#ffffff" stroke="#d8dee8"/><text x="72" y="26" font-size="20" fill="#111827">Agent 使用 ssh &lt;user&gt;@&lt;windows-host&gt; 执行命令</text></g></g><text x="70" y="535" font-size="16" fill="#6b7280">隐私安全示意图：所有主机名、地址、用户名均为占位符。</text></svg>