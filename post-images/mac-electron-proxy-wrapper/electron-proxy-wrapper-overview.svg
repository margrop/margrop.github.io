<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Electron Proxy Wrapper Overview</title>
  <desc id="desc">A diagram showing a wrapper app loading proxy configuration and launching the original Electron app with proxy flags and Node bootstrap.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#94a3b8" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <circle cx="1060" cy="112" r="84" fill="#dbeafe" opacity="0.65"/>
  <circle cx="140" cy="570" r="110" fill="#dcfce7" opacity="0.55"/>

  <text x="80" y="92" font-size="34" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#0f172a">
    Safer macOS Proxy Injection for Electron Apps
  </text>
  <text x="80" y="132" font-size="19" font-family="Helvetica, Arial, sans-serif" fill="#334155">
    Keep the original app untouched. Move proxy logic into a small wrapper app and a private config directory.
  </text>

  <rect x="80" y="210" rx="28" ry="28" width="300" height="250" fill="url(#cardA)" filter="url(#shadow)"/>
  <text x="110" y="268" font-size="28" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#ffffff">Wrapper App</text>
  <text x="110" y="306" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#cbd5e1">Claude (Proxy).app</text>
  <text x="110" y="332" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#cbd5e1">Antigravity (Proxy).app</text>
  <text x="110" y="382" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#e2e8f0">• Minimal Info.plist</text>
  <text x="110" y="412" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#e2e8f0">• launch shell script</text>
  <text x="110" y="442" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#e2e8f0">• No edits inside original .app bundle</text>

  <rect x="450" y="170" rx="28" ry="28" width="300" height="330" fill="url(#cardB)" filter="url(#shadow)"/>
  <text x="480" y="228" font-size="28" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#ffffff">Private Config</text>
  <text x="480" y="266" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#dcfce7">~/.claude-proxy</text>
  <text x="480" y="292" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#dcfce7">~/.antigravity-proxy</text>
  <text x="480" y="346" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#f0fdf4">proxy.env</text>
  <text x="480" y="376" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#f0fdf4">APP_PROXY_URL=http://127.0.0.1:PORT</text>
  <text x="480" y="418" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#f0fdf4">bootstrap-fetch-proxy.cjs</text>
  <text x="480" y="448" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#f0fdf4">setGlobalDispatcher(new EnvHttpProxyAgent())</text>

  <rect x="820" y="210" rx="28" ry="28" width="300" height="250" fill="url(#cardC)" filter="url(#shadow)"/>
  <text x="850" y="268" font-size="28" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#ffffff">Original App</text>
  <text x="850" y="306" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#dbeafe">/Applications/Claude.app</text>
  <text x="850" y="332" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#dbeafe">/Applications/Antigravity.app</text>
  <text x="850" y="382" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#eff6ff">• --proxy-server</text>
  <text x="850" y="412" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#eff6ff">• --proxy-bypass-list</text>
  <text x="850" y="442" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#eff6ff">• Original signature and updates preserved</text>

  <line x1="380" y1="334" x2="450" y2="334" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="750" y1="334" x2="820" y2="334" stroke="#475569" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="210" y="534" rx="18" ry="18" width="790" height="88" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="245" y="572" font-size="18" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#0f172a">
    Public article / repo: placeholders only
  </text>
  <text x="245" y="603" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#475569">
    Keep real proxy hosts, internal IPs, credentials, and company domains out of screenshots, code blocks, and git history.
  </text>
</svg>
