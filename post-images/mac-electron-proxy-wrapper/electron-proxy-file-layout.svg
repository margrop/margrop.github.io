<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Electron Proxy File Layout</title>
  <desc id="desc">A file layout diagram showing a proxy wrapper app and a private user config directory for Claude and Antigravity.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf6"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#64748b" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg2)"/>
  <text x="72" y="86" font-size="34" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#111827">
    Recommended Layout for Claude / Antigravity Proxy Wrappers
  </text>
  <text x="72" y="126" font-size="19" font-family="Helvetica, Arial, sans-serif" fill="#475569">
    Separate the launcher app from the private endpoint. The app bundle stays public; the real proxy value stays local.
  </text>

  <rect x="72" y="180" rx="24" ry="24" width="488" height="500" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow2)"/>
  <text x="102" y="232" font-size="28" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#0f172a">Wrapper App Bundle</text>
  <text x="102" y="274" font-size="20" font-family="Menlo, Monaco, monospace" fill="#1d4ed8">~/Applications/Claude (Proxy).app</text>
  <text x="102" y="314" font-size="20" font-family="Menlo, Monaco, monospace" fill="#1d4ed8">~/Applications/Antigravity (Proxy).app</text>

  <text x="102" y="374" font-size="18" font-family="Menlo, Monaco, monospace" fill="#111827">Contents/</text>
  <text x="132" y="412" font-size="18" font-family="Menlo, Monaco, monospace" fill="#334155">Info.plist</text>
  <text x="132" y="448" font-size="18" font-family="Menlo, Monaco, monospace" fill="#334155">MacOS/</text>
  <text x="162" y="484" font-size="18" font-family="Menlo, Monaco, monospace" fill="#334155">launch</text>

  <rect x="318" y="392" rx="12" ry="12" width="200" height="110" fill="#eff6ff"/>
  <text x="338" y="426" font-size="16" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#1d4ed8">launch responsibilities</text>
  <text x="338" y="455" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#334155">• source proxy.env</text>
  <text x="338" y="479" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#334155">• export env vars</text>
  <text x="338" y="503" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#334155">• exec original app</text>

  <rect x="640" y="180" rx="24" ry="24" width="488" height="500" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow2)"/>
  <text x="670" y="232" font-size="28" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#0f172a">Private User Config</text>
  <text x="670" y="274" font-size="20" font-family="Menlo, Monaco, monospace" fill="#166534">~/.claude-proxy</text>
  <text x="670" y="314" font-size="20" font-family="Menlo, Monaco, monospace" fill="#166534">~/.antigravity-proxy</text>

  <text x="670" y="374" font-size="18" font-family="Menlo, Monaco, monospace" fill="#111827">proxy.env</text>
  <text x="700" y="410" font-size="18" font-family="Menlo, Monaco, monospace" fill="#334155">APP_PROXY_URL=http://127.0.0.1:PORT</text>
  <text x="700" y="446" font-size="18" font-family="Menlo, Monaco, monospace" fill="#334155">APP_PROXY_BYPASS_LIST=...</text>

  <text x="670" y="520" font-size="18" font-family="Menlo, Monaco, monospace" fill="#111827">bootstrap-fetch-proxy.cjs</text>
  <text x="700" y="556" font-size="18" font-family="Menlo, Monaco, monospace" fill="#334155">createRequire(app.asar/package.json)</text>
  <text x="700" y="592" font-size="18" font-family="Menlo, Monaco, monospace" fill="#334155">EnvHttpProxyAgent()</text>

  <rect x="830" y="374" rx="12" ry="12" width="250" height="96" fill="#f0fdf4"/>
  <text x="850" y="408" font-size="16" font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#166534">privacy rule</text>
  <text x="850" y="437" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#334155">Only placeholders belong in docs.</text>
  <text x="850" y="461" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#334155">Real endpoints stay in proxy.env.</text>

  <path d="M560 430 C600 430, 600 430, 640 430" fill="none" stroke="#64748b" stroke-width="4"/>
  <path d="M560 544 C600 544, 600 544, 640 544" fill="none" stroke="#64748b" stroke-width="4"/>

  <rect x="72" y="704" rx="16" ry="16" width="1056" height="36" fill="#111827"/>
  <text x="96" y="729" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#f8fafc">
    The original /Applications/*.app remains untouched. The wrapper app adds flags. The private config directory stores the real endpoint.
  </text>
</svg>
