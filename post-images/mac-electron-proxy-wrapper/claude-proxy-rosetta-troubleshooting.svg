<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" fill="#f5efe6"/>
  <rect x="50" y="48" width="1100" height="624" rx="28" fill="#fffaf4" stroke="#d6c7b2" stroke-width="2"/>
  <text x="86" y="112" fill="#2e261d" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">
    Claude (Proxy) on Apple Silicon: avoid Rosetta launch
  </text>
  <text x="86" y="150" fill="#65584c" font-family="Helvetica, Arial, sans-serif" font-size="20">
    The issue is usually not the proxy itself. The wrapper may launch Claude as x64 under Rosetta and crash.
  </text>

  <rect x="86" y="204" width="462" height="360" rx="24" fill="#fff1ef" stroke="#e6a39a" stroke-width="2"/>
  <text x="118" y="250" fill="#7d1f16" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">
    Wrong path
  </text>
  <text x="118" y="292" fill="#4a342f" font-family="Helvetica, Arial, sans-serif" font-size="20">
    1. Finder / wrapper 落在 Rosetta
  </text>
  <text x="118" y="326" fill="#4a342f" font-family="Helvetica, Arial, sans-serif" font-size="20">
    2. `uname -m` 返回 `x86_64`
  </text>
  <text x="118" y="360" fill="#4a342f" font-family="Helvetica, Arial, sans-serif" font-size="20">
    3. Claude 被以 x64 启动
  </text>
  <text x="118" y="394" fill="#4a342f" font-family="Helvetica, Arial, sans-serif" font-size="20">
    4. 日志出现 `arch: 'x64'`
  </text>
  <text x="118" y="428" fill="#4a342f" font-family="Helvetica, Arial, sans-serif" font-size="20">
    5. crash report 出现 `translated: true`
  </text>
  <text x="118" y="462" fill="#4a342f" font-family="Helvetica, Arial, sans-serif" font-size="20">
    6. macOS 报 “Claude quit unexpectedly”
  </text>

  <rect x="652" y="204" width="462" height="360" rx="24" fill="#eef8ef" stroke="#8cc497" stroke-width="2"/>
  <text x="684" y="250" fill="#155724" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">
    Correct path
  </text>
  <text x="684" y="292" fill="#304335" font-family="Helvetica, Arial, sans-serif" font-size="20">
    1. 用 `sysctl -in hw.optional.arm64`
  </text>
  <text x="684" y="326" fill="#304335" font-family="Helvetica, Arial, sans-serif" font-size="20">
    2. 只要结果是 `1`，直接强制 `arch -arm64`
  </text>
  <text x="684" y="360" fill="#304335" font-family="Helvetica, Arial, sans-serif" font-size="20">
    3. Claude 以 arm64 启动
  </text>
  <text x="684" y="394" fill="#304335" font-family="Helvetica, Arial, sans-serif" font-size="20">
    4. `main.log` 出现 `arch: 'arm64'`
  </text>
  <text x="684" y="428" fill="#304335" font-family="Helvetica, Arial, sans-serif" font-size="20">
    5. 资源下载切到 `darwin-arm64`
  </text>
  <text x="684" y="462" fill="#304335" font-family="Helvetica, Arial, sans-serif" font-size="20">
    6. 代理继续生效，应用正常运行
  </text>

  <path d="M548 384H646" stroke="#8f7e69" stroke-width="6" stroke-linecap="round"/>
  <path d="M628 364L648 384L628 404" stroke="#8f7e69" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="86" y="592" width="1028" height="46" rx="14" fill="#f0e7da"/>
  <text x="112" y="621" fill="#4b4136" font-family="Helvetica, Arial, sans-serif" font-size="19">
    Conclusion: on Apple Silicon, do not trust the wrapper process's `uname -m`; detect hardware capability and force arm64.
  </text>
</svg>
