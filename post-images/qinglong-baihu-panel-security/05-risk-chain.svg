<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="QingLong public exposure risk chain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="76" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#0f172a">公网裸露面板的风险链路</text>
  <text x="70" y="118" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#475569">漏洞不是“门没锁”这么简单，更像门禁、监控和值班表同时失效。</text>
  <g filter="url(#shadow)" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="70" y="190" width="210" height="150" rx="16" fill="#ffffff"/>
    <text x="175" y="248" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">公网入口</text>
    <text x="175" y="292" text-anchor="middle" font-size="18" fill="#475569">任何人都能敲门</text>
    <rect x="330" y="190" width="210" height="150" rx="16" fill="#ffffff"/>
    <text x="435" y="248" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">认证绕过</text>
    <text x="435" y="292" text-anchor="middle" font-size="18" fill="#475569">门禁判断被绕开</text>
    <rect x="590" y="190" width="210" height="150" rx="16" fill="#ffffff"/>
    <text x="695" y="248" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">后台权限</text>
    <text x="695" y="292" text-anchor="middle" font-size="18" fill="#475569">能看任务和配置</text>
    <rect x="850" y="190" width="280" height="150" rx="16" fill="#fff7ed"/>
    <text x="990" y="248" text-anchor="middle" font-size="26" font-weight="700" fill="#9a3412">任务执行</text>
    <text x="990" y="292" text-anchor="middle" font-size="18" fill="#7c2d12">面板变成攻击跳板</text>
  </g>
  <g stroke="#0f766e" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M285 265H320"/>
    <path d="M545 265H580"/>
    <path d="M805 265H840"/>
  </g>
  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="95" y="430" width="1010" height="120" rx="18" fill="#0f172a"/>
    <text x="130" y="482" font-size="24" font-weight="700" fill="#f8fafc">安全结论</text>
    <text x="130" y="524" font-size="21" fill="#cbd5e1">如果必须临时用 QingLong：不要裸露到公网；前面至少加 VPN / 零信任 / 反代 Basic Auth / IP allowlist / WAF。</text>
  </g>
</svg>
