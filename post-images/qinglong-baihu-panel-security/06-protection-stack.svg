<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Temporary protection stack for exposed panels">
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="70" y="76" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#111827">临时防护栈：先挡门，再谈功能</text>
  <text x="70" y="116" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#4b5563">这不是让漏洞消失，而是把攻击者挡在面板登录页之前。</text>
  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="120" y="190" width="960" height="70" rx="12" fill="#dbeafe"/>
    <text x="600" y="235" text-anchor="middle" font-size="25" font-weight="700" fill="#1e3a8a">1. 只允许可信入口：VPN / 隧道 / 零信任访问</text>
    <rect x="160" y="285" width="880" height="70" rx="12" fill="#dcfce7"/>
    <text x="600" y="330" text-anchor="middle" font-size="25" font-weight="700" fill="#166534">2. 反向代理二次认证：Basic Auth / OIDC / mTLS</text>
    <rect x="200" y="380" width="800" height="70" rx="12" fill="#fef3c7"/>
    <text x="600" y="425" text-anchor="middle" font-size="25" font-weight="700" fill="#92400e">3. 网络层收口：allowlist / 防火墙 / 只绑本机端口</text>
    <rect x="240" y="475" width="720" height="70" rx="12" fill="#fee2e2"/>
    <text x="600" y="520" text-anchor="middle" font-size="25" font-weight="700" fill="#991b1b">4. 面板内部：升级、强密码、最小化脚本权限</text>
  </g>
  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="600" y="606" text-anchor="middle" font-size="21" fill="#334155">像小区门禁：不能只靠家门锁，先要让陌生人进不了楼。</text>
  </g>
</svg>
