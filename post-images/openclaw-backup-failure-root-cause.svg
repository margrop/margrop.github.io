<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 40px/1.2 Inter,Helvetica,Arial,sans-serif; fill:#0F172A}
      .sub{font:500 20px/1.4 Inter,Helvetica,Arial,sans-serif; fill:#475569}
      .head{font:700 22px/1.2 Inter,Helvetica,Arial,sans-serif; fill:#0F172A}
      .body{font:500 18px/1.45 Inter,Helvetica,Arial,sans-serif; fill:#334155}
      .tiny{font:500 15px/1.35 Inter,Helvetica,Arial,sans-serif; fill:#475569}
      .caps{font:700 14px/1 Inter,Helvetica,Arial,sans-serif; letter-spacing:.16em; fill:#C2410C}
    </style>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="72" y="84" class="caps">ROOT CAUSE MAP</text>
  <text x="72" y="130" class="title">The backup did not fail in one place</text>
  <text x="72" y="168" class="sub">It failed in three different layers: scheduling, permissions, and validation.</text>

  <g filter="url(#shadow)">
    <rect x="436" y="264" width="328" height="154" rx="26" fill="#FFFFFF"/>
  </g>
  <rect x="478" y="302" width="244" height="78" rx="20" fill="#FB7185"/>
  <text x="526" y="350" class="head" fill="#FFFFFF">Backup missed or failed</text>

  <g>
    <line x1="600" y1="264" x2="600" y2="212" stroke="#C2410C" stroke-width="4" stroke-linecap="round"/>
    <polygon points="600,196 590,214 610,214" fill="#C2410C"/>
    <rect x="388" y="96" width="424" height="92" rx="22" fill="#FFEDD5" filter="url(#shadow)"/>
    <text x="420" y="132" class="head">Scheduler layer</text>
    <text x="420" y="160" class="body">launchd / sleep / stale job / GUI dependency</text>
    <line x1="560" y1="188" x2="520" y2="244" stroke="#C2410C" stroke-width="4" stroke-linecap="round"/>
    <line x1="640" y1="188" x2="680" y2="244" stroke="#C2410C" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g>
    <line x1="436" y1="338" x2="220" y2="338" stroke="#0F766E" stroke-width="4" stroke-linecap="round"/>
    <polygon points="204,338 222,328 222,348" fill="#0F766E"/>
    <rect x="72" y="246" width="208" height="184" rx="22" fill="#D1FAE5" filter="url(#shadow)"/>
    <text x="102" y="284" class="head">Local machine</text>
    <text x="102" y="316" class="body">manual run works</text>
    <text x="102" y="344" class="body">automatic run misses</text>
    <text x="102" y="372" class="tiny">Fix: use cron + lock</text>
  </g>

  <g>
    <line x1="764" y1="338" x2="980" y2="338" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
    <polygon points="996,338 978,328 978,348" fill="#2563EB"/>
    <rect x="912" y="246" width="216" height="184" rx="22" fill="#DBEAFE" filter="url(#shadow)"/>
    <text x="944" y="284" class="head">Remote VPS</text>
    <text x="944" y="316" class="body">EACCES in state dir</text>
    <text x="944" y="344" class="body">nested files unreadable</text>
    <text x="944" y="372" class="tiny">Fix: self-heal ownership</text>
  </g>

  <g>
    <line x1="600" y1="418" x2="600" y2="506" stroke="#7C3AED" stroke-width="4" stroke-linecap="round"/>
    <polygon points="600,522 590,504 610,504" fill="#7C3AED"/>
    <rect x="314" y="524" width="572" height="120" rx="24" fill="#EDE9FE" filter="url(#shadow)"/>
    <text x="348" y="566" class="head">Validation layer</text>
    <text x="348" y="598" class="body">manual success is not enough; schedule, logs, and NAS files must all agree</text>
    <text x="348" y="626" class="tiny">Fix: verify archive, confirm remote file, and check next scheduled tick</text>
  </g>
</svg>
