<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="card" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="900" height="420" fill="url(#bg)"/>

  <text x="450" y="38" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">
    Seagate Warranty Check Across Regions
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#475569" font-size="13">
    Same drive, three different region selections &#8212; the SN decides the result.
  </text>

  <!-- Card 1: Mainland China -->
  <g transform="translate(40,90)" filter="url(#card)">
    <rect width="260" height="280" rx="14" fill="#fff" stroke="#fecaca" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="44" rx="14" fill="#ef4444"/>
    <rect y="30" width="260" height="14" fill="#ef4444"/>
    <text x="20" y="30" fill="#fff" font-size="15" font-weight="700">&#x4E2D;&#x56FD;&#x5927;&#x9646; / Mainland China</text>

    <text x="20" y="80" fill="#94a3b8" font-size="11">Model: ST10000NE0008</text>
    <text x="20" y="98" fill="#94a3b8" font-size="11">S/N: ZS517X4K</text>

    <text x="20" y="138" fill="#0f172a" font-size="13" font-weight="700">Status</text>
    <rect x="20" y="148" width="220" height="42" rx="8" fill="#fee2e2"/>
    <text x="32" y="175" fill="#b91c1c" font-size="18" font-weight="700">OUT OF WARRANTY</text>

    <text x="20" y="218" fill="#475569" font-size="11">Reason</text>
    <text x="20" y="236" fill="#0f172a" font-size="12">The drive was originally</text>
    <text x="20" y="252" fill="#0f172a" font-size="12">sold in Taiwan, so the</text>
    <text x="20" y="268" fill="#0f172a" font-size="12">China portal has no record.</text>
  </g>

  <!-- Card 2: Taiwan -->
  <g transform="translate(320,90)" filter="url(#card)">
    <rect width="260" height="280" rx="14" fill="#fff" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="44" rx="14" fill="#22c55e"/>
    <rect y="30" width="260" height="14" fill="#22c55e"/>
    <text x="20" y="30" fill="#fff" font-size="15" font-weight="700">&#x53F0;&#x6E7E; / Taiwan (&#x539F;&#x4FDD;&#x533A;)</text>

    <text x="20" y="80" fill="#94a3b8" font-size="11">Model: ST10000NE0008</text>
    <text x="20" y="98" fill="#94a3b8" font-size="11">S/N: ZS517X4K</text>

    <text x="20" y="138" fill="#0f172a" font-size="13" font-weight="700">Status</text>
    <rect x="20" y="148" width="220" height="42" rx="8" fill="#dcfce7"/>
    <text x="32" y="175" fill="#15803d" font-size="18" font-weight="700">IN WARRANTY</text>

    <text x="20" y="218" fill="#475569" font-size="11">Warranty Expiry</text>
    <text x="20" y="240" fill="#0f172a" font-size="18" font-weight="700">2027-03-30</text>
    <text x="20" y="262" fill="#475569" font-size="11">~9 months remaining</text>
  </g>

  <!-- Card 3: After Region Transfer -->
  <g transform="translate(600,90)" filter="url(#card)">
    <rect width="260" height="280" rx="14" fill="#fff" stroke="#bfdbfe" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="44" rx="14" fill="#3b82f6"/>
    <rect y="30" width="260" height="14" fill="#3b82f6"/>
    <text x="20" y="30" fill="#fff" font-size="15" font-weight="700">&#x8F6C;&#x4FDD;&#x540E; / After Transfer</text>

    <text x="20" y="80" fill="#94a3b8" font-size="11">Region: Taiwan &#8594; China</text>
    <text x="20" y="98" fill="#94a3b8" font-size="11">Trigger: ST10000NE0008 SN match</text>

    <text x="20" y="138" fill="#0f172a" font-size="13" font-weight="700">Status</text>
    <rect x="20" y="148" width="220" height="42" rx="8" fill="#dbeafe"/>
    <text x="32" y="175" fill="#1d4ed8" font-size="18" font-weight="700">TRANSFERRED</text>

    <text x="20" y="218" fill="#475569" font-size="11">New Path</text>
    <text x="20" y="236" fill="#0f172a" font-size="12">&#x2022; China RMA issued</text>
    <text x="20" y="252" fill="#0f172a" font-size="12">&#x2022; Free SF Express shipping</text>
    <text x="20" y="268" fill="#0f172a" font-size="12">&#x2022; 7-15 days to door</text>
  </g>

  <text x="450" y="402" text-anchor="middle" fill="#64748b" font-size="12">
    Step 1: confirm SN is on file in the source region &#8594; Step 2: file a transfer case &#8594; Step 3: ship from the new region.
  </text>
</svg>
