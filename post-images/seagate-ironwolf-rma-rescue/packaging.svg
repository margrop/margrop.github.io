<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="drive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="460" fill="#f1f5f9"/>

  <text x="450" y="38" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">
    Hard Drive RMA Packaging Cross-Section
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#475569" font-size="13">
    Seagate will refuse any package with inadequate cushioning.
  </text>

  <!-- Outer carton -->
  <g transform="translate(220,90)">
    <rect width="460" height="320" rx="10" fill="url(#box)" stroke="#78350f" stroke-width="2"/>
    <text x="20" y="28" fill="#fff7ed" font-size="12" font-weight="700">OUTER CARTON (double-wall corrugated)</text>

    <!-- Top foam -->
    <rect x="20" y="40" width="420" height="40" rx="4" fill="url(#foam)" stroke="#b45309"/>
    <text x="230" y="65" text-anchor="middle" fill="#78350f" font-size="12" font-weight="600">Top Foam (5 cm)</text>

    <!-- Anti-static bag -->
    <g transform="translate(80,100)">
      <rect width="300" height="160" rx="6" fill="url(#bag)" opacity="0.85"/>
      <text x="150" y="22" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Anti-Static Bag (sealed)</text>

      <!-- Drive -->
      <g transform="translate(40,40)">
        <rect width="220" height="120" rx="8" fill="url(#drive)" stroke="#0f172a" stroke-width="2"/>
        <text x="110" y="35" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="700">SEAGATE IRONWOLF PRO</text>
        <text x="110" y="55" text-anchor="middle" fill="#94a3b8" font-size="10">Model: ST10000NE0008</text>
        <text x="110" y="72" text-anchor="middle" fill="#94a3b8" font-size="10">S/N: ZS517X4K</text>
        <text x="110" y="92" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">3.5 inch / 10 TB</text>
        <text x="110" y="108" text-anchor="middle" fill="#64748b" font-size="9">PCB side facing down</text>
      </g>
    </g>

    <!-- Bottom foam -->
    <rect x="20" y="270" width="420" height="40" rx="4" fill="url(#foam)" stroke="#b45309"/>
    <text x="230" y="295" text-anchor="middle" fill="#78350f" font-size="12" font-weight="600">Bottom Foam (5 cm)</text>
  </g>

  <!-- Side annotations -->
  <g transform="translate(60,120)" font-size="12" fill="#0f172a">
    <line x1="160" y1="0" x2="200" y2="0" stroke="#0f172a" stroke-width="1.5"/>
    <circle cx="160" cy="0" r="4" fill="#ef4444"/>
    <text x="0" y="-2" font-weight="700">Drive must NOT touch carton</text>
    <text x="0" y="14">All six faces wrapped in 5-7 cm foam.</text>
  </g>

  <g transform="translate(60,210)" font-size="12" fill="#0f172a">
    <line x1="160" y1="0" x2="200" y2="0" stroke="#0f172a" stroke-width="1.5"/>
    <circle cx="160" cy="0" r="4" fill="#22c55e"/>
    <text x="0" y="-2" font-weight="700">Inside the anti-static bag</text>
    <text x="0" y="14">No bubble wrap directly on the drive.</text>
  </g>

  <g transform="translate(60,300)" font-size="12" fill="#0f172a">
    <line x1="160" y1="0" x2="200" y2="0" stroke="#0f172a" stroke-width="1.5"/>
    <circle cx="160" cy="0" r="4" fill="#f59e0b"/>
    <text x="0" y="-2" font-weight="700">Double-wall corrugated carton</text>
    <text x="0" y="14">Print RMA number on the outside.</text>
  </g>

  <g transform="translate(690,120)" font-size="12" fill="#0f172a">
    <line x1="-10" y1="0" x2="30" y2="0" stroke="#0f172a" stroke-width="1.5"/>
    <circle cx="30" cy="0" r="4" fill="#3b82f6"/>
    <text x="40" y="-2" font-weight="700">PCB side down</text>
    <text x="40" y="14">So gravity + foam protect the platter side.</text>
  </g>

  <g transform="translate(690,260)" font-size="12" fill="#0f172a">
    <line x1="-10" y1="0" x2="30" y2="0" stroke="#0f172a" stroke-width="1.5"/>
    <circle cx="30" cy="0" r="4" fill="#a855f7"/>
    <text x="40" y="-2" font-weight="700">Bag sealed, no staples</text>
    <text x="40" y="14">Use tape; metal punctures the bag.</text>
  </g>

  <text x="450" y="440" text-anchor="middle" fill="#64748b" font-size="12">
    If the carton rattles, repack. Seagate will return-to-sender any box they consider damaged.
  </text>
</svg>
