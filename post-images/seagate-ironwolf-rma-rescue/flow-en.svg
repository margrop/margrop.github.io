<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feOffset in="b" dx="0" dy="2" result="o"/>
      <feComponentTransfer in="o" result="t"><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode in="t"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="url(#bg)"/>

  <text x="550" y="46" text-anchor="middle" fill="url(#title)" font-size="26" font-weight="700">
    NAS Hard Drive Health &amp; RMA Rescue Flow
  </text>
  <text x="550" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">
    SMART diagnosis &#8594; fault classification &#8594; warranty path &#8594; replacement
  </text>

  <g transform="translate(40,110)">
    <rect width="240" height="180" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
    <text x="20" y="32" fill="#a5b4fc" font-size="14" font-weight="700">① SMART Check</text>
    <text x="20" y="56" fill="#cbd5e1" font-size="12">smartctl -a /dev/sdX</text>
    <g transform="translate(20,70)" font-size="11">
      <rect width="200" height="22" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="10" y="15" fill="#fbbf24">ID  5 Reallocated_Sector_Ct</text>
      <rect y="28" width="200" height="22" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="10" y="43" fill="#fbbf24">ID  9 Power_On_Hours</text>
      <rect y="56" width="200" height="22" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="10" y="71" fill="#fbbf24">ID 187 Reported_Uncorrect</text>
      <rect y="84" width="200" height="22" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="10" y="99" fill="#fbbf24">ID 198 Offline_Uncorrectable</text>
    </g>
  </g>

  <line x1="285" y1="200" x2="335" y2="200" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(340,110)">
    <rect width="320" height="180" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
    <text x="20" y="32" fill="#a5b4fc" font-size="14" font-weight="700">② Classify the Fault</text>

    <g transform="translate(20,48)">
      <rect width="280" height="34" rx="6" fill="url(#bad)" opacity="0.85"/>
      <text x="14" y="22" fill="#fff" font-size="12" font-weight="600">Pending &gt; 0 or Realloc climbing</text>
    </g>

    <g transform="translate(20,90)">
      <rect width="280" height="34" rx="6" fill="url(#warn)" opacity="0.85"/>
      <text x="14" y="22" fill="#fff" font-size="12" font-weight="600">Realloc high but stable</text>
    </g>

    <g transform="translate(20,132)">
      <rect width="280" height="34" rx="6" fill="url(#link)" opacity="0.85"/>
      <text x="14" y="22" fill="#fff" font-size="12" font-weight="600">CRC / Timeout climbing</text>
    </g>
  </g>

  <line x1="665" y1="200" x2="715" y2="200" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(720,110)">
    <rect width="340" height="180" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
    <text x="20" y="32" fill="#a5b4fc" font-size="14" font-weight="700">③ Pick a Warranty Path</text>

    <g transform="translate(20,50)">
      <rect width="300" height="32" rx="6" fill="url(#ok)" opacity="0.9"/>
      <text x="14" y="20" fill="#fff" font-size="12" font-weight="600">Mainland box &#8594; local RMA</text>
    </g>
    <g transform="translate(20,90)">
      <rect width="300" height="32" rx="6" fill="url(#warn)" opacity="0.9"/>
      <text x="14" y="20" fill="#fff" font-size="12" font-weight="600">TW/HK/Overseas &#8594; ship back or transfer</text>
    </g>
    <g transform="translate(20,130)">
      <rect width="300" height="32" rx="6" fill="url(#bad)" opacity="0.9"/>
      <text x="14" y="20" fill="#fff" font-size="12" font-weight="600">OEM / shop-warranty / reused SN &#8594; dealer</text>
    </g>
  </g>

  <g transform="translate(40,340)">
    <rect width="500" height="320" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
    <text x="20" y="32" fill="#a5b4fc" font-size="14" font-weight="700">④ File RMA / Region Transfer</text>

    <g transform="translate(20,50)" font-size="12">
      <rect width="460" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="14" y="20" fill="#cbd5e1">① Open web case / email / phone</text>
    </g>
    <g transform="translate(20,90)" font-size="12">
      <rect width="460" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="14" y="20" fill="#cbd5e1">② Submit SN + SMART + drive label photo</text>
    </g>
    <g transform="translate(20,130)" font-size="12">
      <rect width="460" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="14" y="20" fill="#cbd5e1">③ Get RMA number &#8594; SF Express (free)</text>
    </g>
    <g transform="translate(20,170)" font-size="12">
      <rect width="460" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="14" y="20" fill="#cbd5e1">④ Receive replacement in 7-15 days</text>
    </g>
    <g transform="translate(20,210)">
      <rect width="460" height="60" rx="6" fill="url(#bad)" opacity="0.3" stroke="#ef4444" stroke-dasharray="5 4"/>
      <text x="14" y="22" fill="#fecaca" font-size="12" font-weight="700">⚠ Before shipping:</text>
      <text x="14" y="42" fill="#fecaca" font-size="11">• Back up every byte (RMA = wiped)</text>
      <text x="14" y="56" fill="#fecaca" font-size="11">• Anti-static bag + 5cm foam padding</text>
    </g>
  </g>

  <g transform="translate(560,340)">
    <rect width="500" height="320" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
    <text x="20" y="32" fill="#a5b4fc" font-size="14" font-weight="700">⑤ Validate the Replacement</text>

    <g transform="translate(20,50)" font-size="12">
      <rect width="460" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="14" y="20" fill="#cbd5e1">① smartctl -A &#8594; all counters = 0</text>
    </g>
    <g transform="translate(20,90)" font-size="12">
      <rect width="460" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="14" y="20" fill="#cbd5e1">② Short &amp; long self-test, badblocks</text>
    </g>
    <g transform="translate(20,130)" font-size="12">
      <rect width="460" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="14" y="20" fill="#cbd5e1">③ Burn-in test data before real load</text>
    </g>
    <g transform="translate(20,170)" font-size="12">
      <rect width="460" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="14" y="20" fill="#cbd5e1">④ Rebuild RAID / Storage Pool in DSM</text>
    </g>
    <g transform="translate(20,210)">
      <rect width="460" height="60" rx="6" fill="url(#ok)" opacity="0.25" stroke="#22c55e" stroke-dasharray="5 4"/>
      <text x="14" y="22" fill="#bbf7d0" font-size="12" font-weight="700">✅ Long-term hygiene:</text>
      <text x="14" y="42" fill="#bbf7d0" font-size="11">• Monthly SMART self-test + alerting</text>
      <text x="14" y="56" fill="#bbf7d0" font-size="11">• 3-2-1 backup (local / offsite / cloud)</text>
    </g>
  </g>

  <g transform="translate(40,680)">
    <line x1="0" y1="6" x2="1020" y2="6" stroke="#475569" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="510" y="30" text-anchor="middle" fill="#64748b" font-size="12">
      Alert &#8594; 5 min triage &#8594; 24 h RMA case &#8594; 7-15 days fresh drive in slot
    </text>
  </g>
</svg>
