<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
 <defs><style>text{font-family:Arial,Helvetica,sans-serif}.t{font-size:40px;font-weight:700;fill:#111827}.s{font-size:21px;fill:#475569}.node{fill:#fff;stroke:#0f172a;stroke-width:3;rx:8}.bar1{fill:#ef4444}.bar2{fill:#f59e0b}.bar3{fill:#22c55e}.vm{fill:#e57000;rx:6}.arr{stroke:#2563eb;stroke-width:6;fill:none;marker-end:url(#m)}.label{font-size:22px;font-weight:700;fill:#111827}</style><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#2563eb"/></marker></defs>
 <rect width="1280" height="720" fill="#f8fafc"/><text x="60" y="70" class="t">Dynamic Load Balancer: What Changes?</text><text x="60" y="110" class="s">CRS can use live utilization metrics to rebalance HA-managed guests across nodes.</text>
 <g transform="translate(90 190)"><text x="0" y="-24" class="label">Before</text><rect class="node" width="250" height="330"/><text x="28" y="44" class="label">Node A</text><rect class="bar1" x="28" y="72" width="190" height="28"/><rect class="vm" x="28" y="128" width="86" height="54"/><rect class="vm" x="124" y="128" width="86" height="54"/><rect class="vm" x="28" y="196" width="86" height="54"/><rect class="vm" x="124" y="196" width="86" height="54"/></g>
 <g transform="translate(385 190)"><rect class="node" width="250" height="330"/><text x="28" y="44" class="label">Node B</text><rect class="bar2" x="28" y="72" width="118" height="28"/><rect class="vm" x="28" y="128" width="86" height="54"/><rect class="vm" x="124" y="128" width="86" height="54"/></g>
 <path class="arr" d="M650 360 C735 270,755 270,835 360"/><path class="arr" d="M650 420 C735 510,755 510,835 420"/>
 <g transform="translate(895 190)"><text x="0" y="-24" class="label">After</text><rect class="node" width="250" height="330"/><text x="28" y="44" class="label">Balanced HA Set</text><rect class="bar3" x="28" y="72" width="145" height="28"/><rect class="vm" x="28" y="128" width="86" height="54"/><rect class="vm" x="124" y="128" width="86" height="54"/><rect class="vm" x="28" y="196" width="86" height="54"/></g>
 <text x="90" y="595" class="s">Key point: this is not a magic auto-tuner for every workload. It acts on HA-managed guests and still respects user-defined HA rules.</text>
</svg>