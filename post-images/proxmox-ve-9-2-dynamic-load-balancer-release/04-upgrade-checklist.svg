<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
 <defs><style>text{font-family:Arial,Helvetica,sans-serif}.t{font-size:40px;font-weight:700;fill:#fff}.s{font-size:21px;fill:#cbd5e1}.card{fill:#fff;rx:8}.h{font-size:24px;font-weight:700;fill:#111827}.p{font-size:18px;fill:#334155}.check{fill:#16a34a}.warn{fill:#f97316}</style></defs><rect width="1280" height="720" fill="#111827"/>
 <text x="60" y="70" class="t">Before You Upgrade to Proxmox VE 9.2</text><text x="60" y="110" class="s">A practical operator checklist for homelab and small clusters</text>
