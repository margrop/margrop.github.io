 <g transform="translate(860 165)"><rect class="card" width="350" height="190"/><circle cx="42" cy="48" r="18" class="warn"/><text x="35" y="56" fill="#fff" font-size="22">!</text><text x="75" y="55" class="h">HA Window</text><text x="34" y="98" class="p">Avoid active migrations</text><text x="34" y="128" class="p">Understand arm/disarm</text><text x="34" y="158" class="p">Keep console access ready</text></g>
 <g transform="translate(70 410)"><rect class="card" width="350" height="190"/><circle cx="42" cy="48" r="18" class="check"/><text x="35" y="56" fill="#fff" font-size="22">✓</text><text x="75" y="55" class="h">Repositories</text><text x="34" y="98" class="p">Use official 9.2 guidance</text><text x="34" y="128" class="p">No mixed old sources</text><text x="34" y="158" class="p">Review package removals</text></g>
 <g transform="translate(465 410)"><rect class="card" width="350" height="190"/><circle cx="42" cy="48" r="18" class="check"/><text x="35" y="56" fill="#fff" font-size="22">✓</text><text x="75" y="55" class="h">Post-checks</text><text x="34" y="98" class="p">Services and journal</text><text x="34" y="128" class="p">Storage and networking</text><text x="34" y="158" class="p">Guests and web console</text></g>
