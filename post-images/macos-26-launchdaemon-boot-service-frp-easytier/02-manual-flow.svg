<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#f8fafc"/>
<rect x="0" y="0" width="1280" height="18" fill="#7c3aed"/>
<text x="70" y="82" font-family="Arial, PingFang SC, sans-serif" font-size="42" font-weight="700" fill="#111827">Manual Setup Flow</text>
<text x="72" y="126" font-family="Arial, PingFang SC, sans-serif" font-size="22" fill="#475569">先检查，再写配置，再启用，最后验证</text>
<rect x="70" y="170" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="112" cy="212" r="20" fill="#7c3aed"/>
<text x="112" y="220" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">1</text>
<text x="146" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Check binary</text>
<text x="146" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">绝对路径可执行</text>
<rect x="460" y="170" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="502" cy="212" r="20" fill="#7c3aed"/>
<text x="502" y="220" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">2</text>
<text x="536" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Check config</text>
<text x="536" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">权限和占位符</text>
<rect x="850" y="170" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="892" cy="212" r="20" fill="#7c3aed"/>
<text x="892" y="220" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">3</text>
<text x="926" y="214" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Write definition</text>
<text x="926" y="248" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">unit / task / plist</text>
<rect x="70" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="112" cy="422" r="20" fill="#7c3aed"/>
<text x="112" y="430" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">4</text>
<text x="146" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Enable boot</text>
<text x="146" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">注册开机启动</text>
<rect x="460" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="502" cy="422" r="20" fill="#7c3aed"/>
<text x="502" y="430" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">5</text>
<text x="536" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Start now</text>
<text x="536" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">立即启动验证</text>
<rect x="850" y="380" width="340" height="140" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<circle cx="892" cy="422" r="20" fill="#7c3aed"/>
<text x="892" y="430" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#fff">6</text>
<text x="926" y="424" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700" fill="#111827">Read logs</text>
<text x="926" y="458" font-family="Arial, PingFang SC, sans-serif" font-size="19" fill="#475569">用证据收尾</text>
</svg>