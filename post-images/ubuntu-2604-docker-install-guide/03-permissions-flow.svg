<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <rect x="58" y="56" width="1164" height="608" rx="18" fill="#ffffff" stroke="#d9dee8" stroke-width="2"/>
  <text x="92" y="120" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#111827">Docker 权限管理：非 root 用户安全访问</text>
  <text x="92" y="160" font-family="Arial, sans-serif" font-size="20" fill="#4b5563">如何实现免 sudo 安全调用 Docker 控制指令</text>
  
  <rect x="100" y="220" width="480" height="360" rx="12" fill="#fff5f5" stroke="#feb2b2" stroke-width="2"/>
  <text x="340" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#9b2c2c">默认未配置 (权限被拒)</text>
  
  <rect x="140" y="300" width="400" height="60" rx="8" fill="#ffffff" stroke="#fc8181"/>
  <text x="340" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#c53030">$ docker ps</text>

  <rect x="140" y="390" width="400" height="80" rx="8" fill="#fdb3b3" stroke="#f56565"/>
  <text x="340" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#742a2a">/var/run/docker.sock</text>
  <text x="340" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#742a2a">所有者: root:root (srw-rw----)</text>
  
  <text x="340" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9b2c2c">❌ Permission Denied (需要 sudo)</text>

  <rect x="700" y="220" width="480" height="360" rx="12" fill="#f0fff4" stroke="#9ae6b4" stroke-width="2"/>
  <text x="940" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#22543d">配置用户组 (免 sudo 执行)</text>
  
  <rect x="740" y="300" width="400" height="60" rx="8" fill="#ffffff" stroke="#68d391"/>
  <text x="940" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#22543d">$ docker ps (非 root 用户)</text>

  <rect x="740" y="390" width="400" height="80" rx="8" fill="#c6f6d5" stroke="#48bb78"/>
  <text x="940" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22543d">/var/run/docker.sock</text>
  <text x="940" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22543d">所有者: root:docker (srw-rw----)</text>
  
  <text x="940" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#22543d">✓ 成功读取 (免 sudo 权限)</text>

  <rect x="210" y="610" width="860" height="40" rx="10" fill="#2d3748"/>
  <text x="640" y="635" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">命令: sudo groupadd docker &amp;&amp; sudo usermod -aG docker $USER &amp;&amp; newgrp docker</text>
</svg>