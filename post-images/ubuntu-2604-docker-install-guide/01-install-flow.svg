<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <rect x="58" y="56" width="1164" height="608" rx="18" fill="#ffffff" stroke="#d9dee8" stroke-width="2"/>
  <text x="92" y="120" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#111827">Ubuntu 26.04 LTS Docker CE 安装优化流程</text>
  <text x="92" y="160" font-family="Arial, sans-serif" font-size="20" fill="#4b5563">规范的步骤不仅保证服务安装成功，更能保障后续的运行安全与极速镜像拉取</text>
  
  <g transform="translate(100, 220)">
    <rect width="180" height="280" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" fill="#991b1b">1. 冲突清理</text>
    <text x="90" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">清理 apt/snap 旧版本</text>
    <text x="90" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">删除冲突组件</text>
    <text x="90" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">清理无用残留</text>
  </g>
  
  <g transform="translate(320, 220)">
    <rect width="180" height="280" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" fill="#92400e">2. 密钥与源</text>
    <text x="90" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78350f">引入 Docker GPG 密钥</text>
    <text x="90" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78350f">配置 Plucky 源列表</text>
    <text x="90" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78350f">apt update 列表更新</text>
  </g>

  <g transform="translate(540, 220)">
    <rect width="180" height="280" rx="10" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" fill="#075985">3. 软件安装</text>
    <text x="90" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0c4a6e">安装 docker-ce CLI</text>
    <text x="90" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0c4a6e">安装 compose-plugin</text>
    <text x="90" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0c4a6e">验证服务运行状态</text>
  </g>

  <g transform="translate(760, 220)">
    <rect width="180" height="280" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" fill="#166534">4. 权限与自启</text>
    <text x="90" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#14532d">创建 docker 用户组</text>
    <text x="90" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#14532d">加入非 root 用户</text>
    <text x="90" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#14532d">systemctl 启用开机自启</text>
  </g>

  <g transform="translate(980, 220)">
    <rect width="180" height="280" rx="10" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="2"/>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" fill="#6b21a8">5. 加加速与代理</text>
    <text x="90" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#581c87">修改 daemon.json 镜像</text>
    <text x="90" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#581c87">Systemd 环境变量代理</text>
    <text x="90" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#581c87">国内环境无缝拉取</text>
  </g>

  <path d="M280 360h40" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
  <path d="M500 360h40" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
  <path d="M720 360h40" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
  <path d="M940 360h40" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>

  <rect x="210" y="586" width="860" height="44" rx="22" fill="#111827"/>
  <text x="640" y="616" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">避坑原则：清理旧版本冲突 -> 引入 Plucky 专属官方源 -> 配置 systemd 代理或自建镜像加速</text>
</svg>