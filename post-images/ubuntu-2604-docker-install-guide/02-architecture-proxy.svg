<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <rect x="58" y="56" width="1164" height="608" rx="18" fill="#ffffff" stroke="#d9dee8" stroke-width="2"/>
  <text x="92" y="120" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#111827">Docker 镜像拉取与代理/加速网卡架构</text>
  <text x="92" y="160" font-family="Arial, sans-serif" font-size="20" fill="#4b5563">如何解决国内拉取官方 Docker Hub 镜像的痛点</text>
  
  <rect x="100" y="240" width="300" height="280" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e3a8a">Docker 宿主机 (Host)</text>
  
  <rect x="130" y="320" width="240" height="60" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-dasharray="4 4"/>
  <text x="250" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e40af">Docker CLI / Compose</text>

  <rect x="130" y="410" width="240" height="80" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1d4ed8">Docker Daemon</text>
  <text x="250" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">(/usr/bin/dockerd)</text>

  <path d="M400 450h140" stroke="#6b7280" stroke-width="4" stroke-dasharray="6 6"/>
  <text x="470" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">路径 A: 代理转发</text>

  <rect x="540" y="380" width="200" height="140" rx="10" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <text x="640" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#991b1b">HTTP/HTTPS 代理</text>
  <text x="640" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">http-proxy.conf</text>
  <text x="640" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d">&lt;PROXY_HOST&gt;</text>

  <path d="M300 520v100h540v-100" fill="none" stroke="#059669" stroke-width="4"/>
  <text x="570" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#047857">路径 B: 私有镜像源 (daemon.json)</text>

  <rect x="840" y="240" width="340" height="280" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="1010" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#065f46">注册表仓库 (Registry)</text>

  <rect x="870" y="320" width="280" height="70" rx="8" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
  <text x="1010" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#065f46">官方 Docker Hub</text>
  <text x="1010" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">registry-1.docker.io</text>

  <rect x="870" y="420" width="280" height="70" rx="8" fill="#ffffff" stroke="#34d399" stroke-width="2"/>
  <text x="1010" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#065f46">自建/公网代理镜像站</text>
  <text x="1010" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">&lt;MIRROR_REGISTRY_URL&gt;</text>

  <path d="M740 450h100" stroke="#ef4444" stroke-width="4"/>
  <path d="M730 440l15 10-15 10" fill="#ef4444"/>

  <rect x="210" y="650" width="860" height="34" rx="17" fill="#111827"/>
  <text x="640" y="672" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">原理：通过 daemon.json 配置加速源，或者用 systemd 环境变量挂载透明代理完成镜像获取</text>
</svg>