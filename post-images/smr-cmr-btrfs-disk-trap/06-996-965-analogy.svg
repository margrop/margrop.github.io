<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-label="996 and 965 analogy for SMR and CMR">
  <rect width="1440" height="760" fill="#fbfcfd"/>
  <text x="720" y="74" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#17212b">965 is like CMR. 996 is like SMR.</text>
  <text x="720" y="116" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#52606d">Higher apparent capacity can come from removing slack and pushing hidden costs somewhere else.</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(120 180)">
      <rect width="560" height="440" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
      <text x="280" y="70" text-anchor="middle" font-size="36" font-weight="700" fill="#0f5c8f">965 / CMR</text>
      <text x="280" y="116" text-anchor="middle" font-size="22" fill="#334e68">Clear lanes, clear rest, predictable rewrites.</text>
      <g transform="translate(90 170)">
        <rect x="0" y="0" width="380" height="70" rx="8" fill="#e9f4fb"/>
        <rect x="0" y="100" width="380" height="70" rx="8" fill="#e9f4fb"/>
        <rect x="0" y="200" width="380" height="70" rx="8" fill="#e9f4fb"/>
        <text x="190" y="44" text-anchor="middle" font-size="22" fill="#0f5c8f">work block</text>
        <text x="190" y="144" text-anchor="middle" font-size="22" fill="#0f5c8f">buffer gap</text>
        <text x="190" y="244" text-anchor="middle" font-size="22" fill="#0f5c8f">work block</text>
      </g>
    </g>
    <g transform="translate(760 180)">
      <rect width="560" height="440" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
      <text x="280" y="70" text-anchor="middle" font-size="36" font-weight="700" fill="#a61b1b">996 / SMR</text>
      <text x="280" y="116" text-anchor="middle" font-size="22" fill="#334e68">More packed schedule, less slack, harder recovery.</text>
      <g transform="translate(90 170)">
        <rect x="0" y="0" width="380" height="82" rx="8" fill="#fff1f0"/>
        <rect x="0" y="66" width="380" height="82" rx="8" fill="#ffd8d6"/>
        <rect x="0" y="132" width="380" height="82" rx="8" fill="#ffb3b3"/>
        <rect x="0" y="198" width="380" height="82" rx="8" fill="#ff8f8f"/>
        <text x="190" y="45" text-anchor="middle" font-size="22" fill="#8f1d1d">overlapped task</text>
        <text x="190" y="179" text-anchor="middle" font-size="22" fill="#8f1d1d">one change disturbs many layers</text>
      </g>
    </g>
  </g>
</svg>
