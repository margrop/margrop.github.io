<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="780" viewBox="0 0 1440 780" role="img" aria-label="SMR control models">
  <rect width="1440" height="780" fill="#fbfcfd"/>
  <text x="720" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#17212b">Three SMR control models</text>
  <text x="720" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#52606d">The key question is: who manages the sequential-write constraint?</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(90 190)">
      <rect width="380" height="430" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
      <circle cx="190" cy="96" r="54" fill="#e8f6ef"/>
      <text x="190" y="106" text-anchor="middle" font-size="42" font-weight="700" fill="#1f7a4d">FW</text>
      <text x="190" y="190" text-anchor="middle" font-size="30" font-weight="700" fill="#17212b">Drive-managed</text>
      <text x="190" y="232" text-anchor="middle" font-size="20" fill="#52606d">Host sees a normal disk.</text>
      <text x="190" y="268" text-anchor="middle" font-size="20" fill="#52606d">Firmware hides the shingling.</text>
      <path d="M82 326 H298" stroke="#1f7a4d" stroke-width="10" stroke-linecap="round"/>
      <path d="M82 365 H298" stroke="#1f7a4d" stroke-width="10" stroke-linecap="round"/>
      <text x="190" y="412" text-anchor="middle" font-size="18" fill="#334e68">Compatible, but performance can be weird.</text>
    </g>
    <g transform="translate(530 190)">
      <rect width="380" height="430" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
      <circle cx="190" cy="96" r="54" fill="#edf2ff"/>
      <text x="190" y="106" text-anchor="middle" font-size="42" font-weight="700" fill="#2f54eb">HY</text>
      <text x="190" y="190" text-anchor="middle" font-size="30" font-weight="700" fill="#17212b">Host-aware</text>
      <text x="190" y="232" text-anchor="middle" font-size="20" fill="#52606d">Can act like a normal disk.</text>
      <text x="190" y="268" text-anchor="middle" font-size="20" fill="#52606d">Can expose zone controls too.</text>
      <path d="M82 326 H298" stroke="#2f54eb" stroke-width="10" stroke-linecap="round"/>
      <path d="M82 365 H260" stroke="#2f54eb" stroke-width="10" stroke-linecap="round"/>
      <text x="190" y="412" text-anchor="middle" font-size="18" fill="#334e68">A bridge model, still workload-sensitive.</text>
    </g>
    <g transform="translate(970 190)">
      <rect width="380" height="430" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
      <circle cx="190" cy="96" r="54" fill="#fff1f0"/>
      <text x="190" y="106" text-anchor="middle" font-size="42" font-weight="700" fill="#a61b1b">OS</text>
      <text x="190" y="190" text-anchor="middle" font-size="30" font-weight="700" fill="#17212b">Host-managed</text>
      <text x="190" y="232" text-anchor="middle" font-size="20" fill="#52606d">Host must write zones correctly.</text>
      <text x="190" y="268" text-anchor="middle" font-size="20" fill="#52606d">Legacy stacks may fail or crawl.</text>
      <path d="M82 326 H298" stroke="#a61b1b" stroke-width="10" stroke-linecap="round"/>
      <path d="M82 365 H180" stroke="#a61b1b" stroke-width="10" stroke-linecap="round"/>
      <text x="190" y="412" text-anchor="middle" font-size="18" fill="#334e68">Cheap only if your software is ready.</text>
    </g>
  </g>
</svg>
