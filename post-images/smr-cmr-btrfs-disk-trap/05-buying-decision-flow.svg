<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="840" viewBox="0 0 1440 840" role="img" aria-label="Hard drive buying decision flow">
  <rect width="1440" height="840" fill="#f8fafc"/>
  <text x="720" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#17212b">Before buying a suspiciously cheap HDD</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#17212b">
    <g transform="translate(170 140)">
      <rect width="1100" height="92" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
      <text x="550" y="56" text-anchor="middle" font-weight="700">1. Get the exact model number from label photos or SMART output</text>
    </g>
    <path d="M720 244 V292" stroke="#9fb3c8" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(170 300)">
      <rect width="1100" height="92" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
      <text x="550" y="56" text-anchor="middle" font-weight="700">2. Search the vendor data sheet, not only the shop title</text>
    </g>
    <path d="M720 404 V452" stroke="#9fb3c8" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(170 460)">
      <rect width="1100" height="92" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
      <text x="550" y="56" text-anchor="middle" font-weight="700">3. On Linux, check /sys/block/*/queue/zoned</text>
    </g>
    <path d="M720 564 V612" stroke="#9fb3c8" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(170 620)">
      <rect width="520" height="120" rx="10" fill="#e8f6ef" stroke="#91d5b0"/>
      <text x="260" y="48" text-anchor="middle" font-weight="700" fill="#1f7a4d">CMR or non-zoned</text>
      <text x="260" y="84" text-anchor="middle" font-size="20" fill="#334e68">Still check warranty and workload.</text>
    </g>
    <g transform="translate(750 620)">
      <rect width="520" height="120" rx="10" fill="#fff1f0" stroke="#ffb3b3"/>
      <text x="260" y="48" text-anchor="middle" font-weight="700" fill="#a61b1b">host-managed</text>
      <text x="260" y="84" text-anchor="middle" font-size="20" fill="#334e68">Avoid for normal NAS, RAID, desktop use.</text>
    </g>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#9fb3c8"/>
    </marker>
  </defs>
</svg>
