<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-label="CMR and SMR track layout comparison">
  <rect width="1440" height="760" fill="#f7f9fb"/>
  <text x="720" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#17212b">CMR leaves lanes. SMR overlaps lanes.</text>
  <text x="720" y="116" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#52606d">The same platter area can hold more data, but rewrites become more complicated.</text>
  <g transform="translate(100 170)">
    <rect x="0" y="0" width="580" height="500" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
    <text x="290" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#0f5c8f">CMR</text>
    <text x="290" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#52606d">separate magnetic tracks</text>
    <g transform="translate(75 135)">
      <rect x="0" y="0" width="430" height="280" rx="16" fill="#e9f4fb"/>
      <g stroke="#0f74b7" stroke-width="11" fill="none" stroke-linecap="round">
        <path d="M35 45 H395"/>
        <path d="M35 92 H395"/>
        <path d="M35 139 H395"/>
        <path d="M35 186 H395"/>
        <path d="M35 233 H395"/>
      </g>
      <g stroke="#ffffff" stroke-width="13" fill="none" opacity="0.95">
        <path d="M35 68 H395"/>
        <path d="M35 115 H395"/>
        <path d="M35 162 H395"/>
        <path d="M35 209 H395"/>
      </g>
      <text x="215" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334e68">Random rewrites are predictable.</text>
    </g>
  </g>
  <g transform="translate(760 170)">
    <rect x="0" y="0" width="580" height="500" rx="10" fill="#ffffff" stroke="#d9e2ec"/>
    <text x="290" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#a61b1b">SMR</text>
    <text x="290" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#52606d">overlapped shingled tracks</text>
    <g transform="translate(75 135)">
      <rect x="0" y="0" width="430" height="280" rx="16" fill="#fff1f0"/>
      <g fill="#d64545" stroke="#8f1d1d" stroke-width="2" opacity="0.95">
        <path d="M20 62 C80 12 140 12 200 62 C260 112 320 112 380 62 L380 106 C320 156 260 156 200 106 C140 56 80 56 20 106 Z"/>
        <path d="M20 105 C80 55 140 55 200 105 C260 155 320 155 380 105 L380 149 C320 199 260 199 200 149 C140 99 80 99 20 149 Z"/>
        <path d="M20 148 C80 98 140 98 200 148 C260 198 320 198 380 148 L380 192 C320 242 260 242 200 192 C140 142 80 142 20 192 Z"/>
        <path d="M20 191 C80 141 140 141 200 191 C260 241 320 241 380 191 L380 235 C320 285 260 285 200 235 C140 185 80 185 20 235 Z"/>
      </g>
      <text x="215" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334e68">Overwrites may require zone rewrites.</text>
    </g>
  </g>
</svg>
