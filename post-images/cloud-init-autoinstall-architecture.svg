<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 550">
  <defs>
    <style>
      .box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; rx: 8; }
      .box-green { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; rx: 8; }
      .box-yellow { fill: #fffde7; stroke: #f9a825; stroke-width: 2; rx: 8; }
      .box-gray { fill: #f5f5f5; stroke: #757575; stroke-width: 2; rx: 8; }
      .label { font-family: monospace; font-size: 12px; }
      .title { font-family: sans-serif; font-size: 16px; font-weight: bold; }
      .key { font-family: sans-serif; font-size: 12px; fill: #1976d2; font-weight: bold; }
    </style>
  </defs>

  <text x="350" y="30" class="title" text-anchor="middle">Cloud-init + Autoinstall Configuration Architecture</text>

  <!-- user-data section -->
  <rect x="30" y="50" width="640" height="200" class="box"/>
  <text x="50" y="75" font-family="sans-serif" font-size="14px" font-weight="bold">📄 user-data (YAML)</text>

  <!-- autoinstall section -->
  <rect x="50" y="90" width="300" height="150" class="box-green"/>
  <text x="60" y="110" class="key">autoinstall:</text>
  <text x="70" y="130" class="label">version: 1</text>

  <text x="70" y="150" class="key">identity:</text>
  <text x="80" y="168" class="label">hostname: ubuntu</text>
  <text x="80" y="184" class="label">username: margrop</text>
  <text x="80" y="200" class="label">password: $6$... (SHA-512)</text>

  <text x="70" y="220" class="key">ssh:</text>
  <text x="80" y="238" class="label">install-server: true</text>

  <!-- storage section -->
  <rect x="360" y="90" width="290" height="150" class="box-yellow"/>
  <text x="370" y="110" class="key">storage:</text>
  <text x="380" y="130" class="label">layout:</text>
  <text x="390" y="148" class="label">name: lvm</text>

  <text x="370" y="170" class="key">packages:</text>
  <text x="380" y="188" class="label">- openssh-server</text>
  <text x="380" y="204" class="label">- qemu-guest-agent</text>
  <text x="380" y="220" class="label">- vim, net-tools, curl...</text>

  <!-- meta-data section -->
  <rect x="30" y="260" width="300" height="80" class="box-gray"/>
  <text x="50" y="285" font-family="sans-serif" font-size="14px" font-weight="bold">📄 meta-data (YAML)</text>
  <text x="50" y="310" class="label">instance-id: ubuntu26-4526</text>
  <text x="50" y="328" class="label">local-hostname: ubuntu</text>

  <!-- ISO section -->
  <rect x="350" y="260" width="320" height="80" class="box"/>
  <text x="370" y="285" font-family="sans-serif" font-size="14px" font-weight="bold">💿 Cloud-init ISO</text>
  <text x="370" y="310" class="label">Volume Label: CIDATA</text>
  <text x="370" y="328" class="label">Format: ISO9660 + Rock Ridge</text>

  <!-- Arrow from files to ISO -->
  <line x1="180" y1="240" x2="510" y2="240" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="510" y1="240" x2="510" y2="260" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,3"/>

  <line x1="180" y1="300" x2="510" y2="300" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="510" y1="300" x2="510" y2="260" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- VM Attachment -->
  <rect x="200" y="370" width="300" height="80" class="box-green"/>
  <text x="350" y="395" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">🖥️ Virtual Machine (PVE)</text>
  <text x="350" y="418" class="label" text-anchor="middle">Attached via IDE3 port</text>

  <!-- Arrow from ISO to VM -->
  <line x1="510" y1="300" x2="350" y2="370" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>

  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
  </marker>

  <!-- Installation Result -->
  <rect x="200" y="480" width="300" height="60" class="box-green"/>
  <text x="350" y="505" font-family="sans-serif" font-size="14px" font-weight="bold" text-anchor="middle">✅ Installation Complete</text>
  <text x="350" y="525" class="label" text-anchor="middle">User: margrop | SSH: enabled | Packages: installed</text>

  <!-- Arrow from VM to Result -->
  <line x1="350" y1="450" x2="350" y2="480" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Legend -->
  <rect x="30" y="480" width="140" height="60" class="box" opacity="0.7"/>
  <text x="40" y="500" font-family="sans-serif" font-size="11px">Legend:</text>
  <rect x="40" y="508" width="12" height="12" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="58" y="518" font-family="sans-serif" font-size="10px">Config Data</text>
  <rect x="40" y="524" width="12" height="12" fill="#e8f5e9" stroke="#388e3c"/>
  <text x="58" y="534" font-family="sans-serif" font-size="10px">Result/Output</text>
</svg>