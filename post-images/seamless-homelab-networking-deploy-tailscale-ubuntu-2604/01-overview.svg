<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#f6f3ec"/>
  <rect x="60" y="50" width="1080" height="580" rx="24" fill="#fffdf8" stroke="#d7c9b5" stroke-width="4"/>
  <text x="90" y="110" font-family="Georgia, serif" font-size="36" fill="#2b2117">Tailscale Homelab Connection Flow (Ubuntu 26.04)</text>
  <text x="90" y="150" font-family="Georgia, serif" font-size="20" fill="#6e5a47">Seamless NAT traversal and fallback relay routing within the Tailnet virtual space</text>

  <!-- Homelab Network Box -->
  <rect x="95" y="210" width="300" height="340" rx="18" fill="#efe2d1" stroke="#b18355" stroke-width="3"/>
  <text x="125" y="250" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2b2117">Home Lab Network</text>
  <text x="125" y="280" font-family="Arial, sans-serif" font-size="16" fill="#6e5a47">Local Subnet: 192.168.1.0/24</text>
  
  <!-- Ubuntu Server Box -->
  <rect x="125" y="310" width="240" height="120" rx="12" fill="#ffffff" stroke="#b18355" stroke-width="2"/>
  <text x="145" y="345" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2b2117">Ubuntu 26.04 Server</text>
  <text x="145" y="375" font-family="Arial, sans-serif" font-size="14" fill="#4c3a2b">Local IP: 192.168.1.100</text>
  <text x="145" y="400" font-family="Arial, sans-serif" font-size="14" fill="#ff7f50" font-weight="bold">Tail IP: 100.64.0.10</text>

  <!-- Other Lab Devices -->
  <rect x="125" y="450" width="240" height="70" rx="12" fill="#ffffff" stroke="#b18355" stroke-width="1" stroke-dasharray="4"/>
  <text x="145" y="490" font-family="Arial, sans-serif" font-size="16" fill="#6e5a47">Other Lab Devices (NAS, PC)</text>

  <!-- Tailscale Control Plane -->
  <rect x="495" y="180" width="220" height="100" rx="18" fill="#e2ede4" stroke="#55b169" stroke-width="3"/>
  <text x="515" y="225" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#172b1d">Tailscale Control</text>
  <text x="515" y="255" font-family="Arial, sans-serif" font-size="16" fill="#476e50">Coordination (DERP Map)</text>

  <!-- DERP Relay Server -->
  <rect x="495" y="450" width="220" height="100" rx="18" fill="#f7e1d7" stroke="#b16955" stroke-width="3"/>
  <text x="515" y="495" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2b1d17">DERP Relay Server</text>
  <text x="515" y="525" font-family="Arial, sans-serif" font-size="16" fill="#6e5047">Relays encrypted traffic</text>

  <!-- Remote Client Box -->
  <rect x="805" y="210" width="300" height="340" rx="18" fill="#efe2d1" stroke="#b18355" stroke-width="3"/>
  <text x="835" y="250" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2b2117">Remote Access Client</text>
  <text x="835" y="280" font-family="Arial, sans-serif" font-size="16" fill="#6e5a47">External Net (LTE / Public)</text>

  <!-- Remote Laptop -->
  <rect x="835" y="310" width="240" height="120" rx="12" fill="#ffffff" stroke="#b18355" stroke-width="2"/>
  <text x="855" y="345" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2b2117">Admin Laptop / Phone</text>
  <text x="855" y="375" font-family="Arial, sans-serif" font-size="14" fill="#4c3a2b">Public IP: Dynamic</text>
  <text x="855" y="400" font-family="Arial, sans-serif" font-size="14" fill="#ff7f50" font-weight="bold">Tail IP: 100.64.0.20</text>

  <!-- Connections -->
  <path d="M720 230 L805 310" stroke="#55b169" stroke-width="3" stroke-dasharray="6" fill="none"/>
  <path d="M380 310 L495 230" stroke="#55b169" stroke-width="3" stroke-dasharray="6" fill="none"/>
  <text x="400" y="210" font-family="Arial, sans-serif" font-size="14" fill="#476e50">Keys &amp; Coordination</text>

  <!-- Path A: Direct WireGuard Connection -->
  <path d="M365 370 L835 370" stroke="#ff7f50" stroke-width="5" fill="none"/>
  <text x="510" y="355" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff7f50">Direct Connection (WireGuard UDP)</text>
  <text x="525" y="390" font-family="Arial, sans-serif" font-size="14" fill="#6e5a47">Optimal path, low latency</text>

  <!-- Path B: Relay Connection via DERP -->
  <path d="M365 410 L495 480" stroke="#b16955" stroke-width="3" stroke-dasharray="4" fill="none"/>
  <path d="M715 480 L835 410" stroke="#b16955" stroke-width="3" stroke-dasharray="4" fill="none"/>
  <text x="490" y="435" font-family="Arial, sans-serif" font-size="14" fill="#b16955">Fallback path (Encrypted via DERP)</text>

</svg>