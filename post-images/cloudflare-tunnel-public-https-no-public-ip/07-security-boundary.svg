<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="安全边界: Tunnel 不是“可以裸奔”的理由">
<style>
  .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:2}.cf{fill:#f6821f}.dark{fill:#1f2937}.muted{fill:#64748b}.line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.good{fill:#16a34a}.blue{fill:#2563eb}.warn{fill:#f59e0b}.box{fill:#eef6ff;stroke:#93c5fd;stroke-width:2}.soft{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.code{font-family:Menlo,Consolas,monospace}.txt{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.h{font-size:28px;font-weight:700}.m{font-size:18px}.s{font-size:14px}.xs{font-size:12px}</style>
<rect class="bg" width="1280" height="720"/>
<text class="txt h dark" x="64" y="70">安全边界: Tunnel 不是“可以裸奔”的理由</text>

<rect class="panel" x="80" y="120" width="1120" height="500" rx="18"/>
<text class="txt h dark" x="130" y="185">公网 HTTPS 能访问以后，更要加权限边界</text>
<rect class="box" x="130" y="245" width="260" height="210" rx="12"/><text class="txt m dark" x="165" y="295">公开页面</text><text class="txt s muted" x="165" y="335">博客、只读仪表盘、演示页</text><text class="txt s muted" x="165" y="365">可直接公开，但仍需更新和限流</text>
<rect class="soft" x="510" y="245" width="260" height="210" rx="12"/><text class="txt m dark" x="545" y="295">半公开后台</text><text class="txt s muted" x="545" y="335">NAS、面板、监控、相册</text><text class="txt s muted" x="545" y="365">建议加 Cloudflare Access / SSO</text>
<rect class="panel" x="890" y="245" width="260" height="210" rx="12"/><text class="txt m dark" x="925" y="295">高风险服务</text><text class="txt s muted" x="925" y="335">数据库、SSH、管理端口</text><text class="txt s muted" x="925" y="365">不要随便做 Public Hostname</text>
<text class="txt s muted" x="130" y="540">原则：Tunnel 解决入口和证书，不替代认证、授权、审计和备份。</text>

</svg>