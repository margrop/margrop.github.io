<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="推荐命名: 把 speedtest 放进 hostname，而不是 path">
<style>
  .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:2}.cf{fill:#f6821f}.dark{fill:#1f2937}.muted{fill:#64748b}.line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.good{fill:#16a34a}.blue{fill:#2563eb}.warn{fill:#f59e0b}.box{fill:#eef6ff;stroke:#93c5fd;stroke-width:2}.soft{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.code{font-family:Menlo,Consolas,monospace}.txt{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.h{font-size:28px;font-weight:700}.m{font-size:18px}.s{font-size:14px}.xs{font-size:12px}</style>
<rect class="bg" width="1280" height="720"/>
<text class="txt h dark" x="64" y="70">推荐命名: 把 speedtest 放进 hostname，而不是 path</text>

<rect class="panel" x="90" y="140" width="500" height="330" rx="16"/><circle class="good" cx="130" cy="190" r="18"/><text class="txt h dark" x="165" y="200">推荐</text>
<text class="code m dark" x="130" y="275">nas.speedtest.example.xyz</text><text class="txt s muted" x="130" y="325">speedtest 出现在 hostname / SNI 中，链路更早能看到这个标签。</text>
<rect class="panel" x="690" y="140" width="500" height="330" rx="16"/><circle class="warn" cx="730" cy="190" r="18"/><text class="txt h dark" x="765" y="200">不推荐只这样做</text>
<text class="code m dark" x="730" y="275">example.xyz/speedtest/nas</text><text class="txt s muted" x="730" y="325">path 往往在 HTTPS 之后才出现，不能替代子域名命名。</text>
<text class="txt s muted" x="95" y="600">这不是加速承诺，只是延续前文“speedtest 子域名”思路，做一个低成本对照实验。</text>

</svg>