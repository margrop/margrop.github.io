<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="步骤 2: 在内网机器安装并启动 cloudflared">
<style>
  .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:2}.cf{fill:#f6821f}.dark{fill:#1f2937}.muted{fill:#64748b}.line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.good{fill:#16a34a}.blue{fill:#2563eb}.warn{fill:#f59e0b}.box{fill:#eef6ff;stroke:#93c5fd;stroke-width:2}.soft{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.code{font-family:Menlo,Consolas,monospace}.txt{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.h{font-size:28px;font-weight:700}.m{font-size:18px}.s{font-size:14px}.xs{font-size:12px}</style>
<rect class="bg" width="1280" height="720"/>
<text class="txt h dark" x="64" y="70">步骤 2: 在内网机器安装并启动 cloudflared</text>

<rect class="panel" x="70" y="120" width="540" height="460" rx="16"/><text class="txt m dark" x="110" y="175">Linux systemd</text>
<rect class="dark" x="110" y="215" width="440" height="245" rx="10"/>
<text class="code s" fill="#d1fae5" x="135" y="255">sudo cloudflared service install TOKEN</text>
<text class="code s" fill="#d1fae5" x="135" y="295">systemctl status cloudflared</text>
<text class="code s" fill="#d1fae5" x="135" y="335">journalctl -u cloudflared -f</text>
<text class="txt s muted" x="110" y="510">适合长期运行的服务器、NAS、虚拟机。</text>
<rect class="panel" x="670" y="120" width="540" height="460" rx="16"/><text class="txt m dark" x="710" y="175">Docker / Compose</text>
<rect class="dark" x="710" y="215" width="440" height="245" rx="10"/>
<text class="code s" fill="#dbeafe" x="735" y="255">image: cloudflare/cloudflared:latest</text>
<text class="code s" fill="#dbeafe" x="735" y="295">command: tunnel --no-autoupdate</text>
<text class="code s" fill="#dbeafe" x="735" y="335">  run --token ${'{'}TUNNEL_TOKEN{'}'}</text>
<text class="txt s muted" x="710" y="510">适合已有 Docker 环境，Token 放在环境变量或 secret 中。</text>

</svg>