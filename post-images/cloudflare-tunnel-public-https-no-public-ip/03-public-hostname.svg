<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="步骤 3: 配置 Public Hostname 与内网 Service URL">
<style>
  .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:2}.cf{fill:#f6821f}.dark{fill:#1f2937}.muted{fill:#64748b}.line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.good{fill:#16a34a}.blue{fill:#2563eb}.warn{fill:#f59e0b}.box{fill:#eef6ff;stroke:#93c5fd;stroke-width:2}.soft{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.code{font-family:Menlo,Consolas,monospace}.txt{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.h{font-size:28px;font-weight:700}.m{font-size:18px}.s{font-size:14px}.xs{font-size:12px}</style>
<rect class="bg" width="1280" height="720"/>
<text class="txt h dark" x="64" y="70">步骤 3: 配置 Public Hostname 与内网 Service URL</text>

<rect class="panel" x="90" y="120" width="1100" height="500" rx="18"/>
<text class="txt h dark" x="140" y="185">Add a public hostname</text>
<text class="txt m dark" x="150" y="255">Subdomain</text><rect class="panel" x="150" y="278" width="260" height="50" rx="8"/><text class="code s muted" x="170" y="309">nas.speedtest</text>
<text class="txt m dark" x="450" y="255">Domain</text><rect class="panel" x="450" y="278" width="260" height="50" rx="8"/><text class="code s muted" x="470" y="309">example.xyz</text>
<text class="txt m dark" x="750" y="255">Service URL</text><rect class="panel" x="750" y="278" width="300" height="50" rx="8"/><text class="code s muted" x="770" y="309">http://localhost:8080</text>
<path class="line" d="M280 390 L920 390"/><polygon class="muted" points="905,382 930,390 905,398"/>
<rect class="soft" x="150" y="430" width="900" height="80" rx="12"/><text class="txt m dark" x="180" y="468">访问地址: https://nas.speedtest.example.xyz</text><text class="txt s muted" x="180" y="495">Cloudflare 会把公网 443 HTTPS 请求转发到 cloudflared 后面的本地服务。</text>

</svg>