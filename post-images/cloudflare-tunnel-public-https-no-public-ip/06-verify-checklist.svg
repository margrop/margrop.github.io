<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="上线前后的验证清单">
<style>
  .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:2}.cf{fill:#f6821f}.dark{fill:#1f2937}.muted{fill:#64748b}.line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.good{fill:#16a34a}.blue{fill:#2563eb}.warn{fill:#f59e0b}.box{fill:#eef6ff;stroke:#93c5fd;stroke-width:2}.soft{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.code{font-family:Menlo,Consolas,monospace}.txt{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.h{font-size:28px;font-weight:700}.m{font-size:18px}.s{font-size:14px}.xs{font-size:12px}</style>
<rect class="bg" width="1280" height="720"/>
<text class="txt h dark" x="64" y="70">上线前后的验证清单</text>

<rect class="panel" x="100" y="120" width="1080" height="500" rx="18"/>
<text class="txt h dark" x="150" y="180">不要只看“能打开”，要分层验证</text>
<g class="txt m dark"><text x="170" y="250">1. cloudflared service: systemctl status / docker logs</text><text x="170" y="305">2. Tunnel status: Dashboard 显示 Healthy</text><text x="170" y="360">3. DNS: CNAME 指向 UUID.cfargotunnel.com</text><text x="170" y="415">4. HTTPS: curl -I https://nas.speedtest.example.xyz</text><text x="170" y="470">5. 应用层: 登录、上传、WebSocket、反代路径逐项检查</text></g>
<rect class="soft" x="760" y="245" width="330" height="190" rx="12"/><text class="txt m dark" x="795" y="295">常见错误</text><text class="txt s muted" x="795" y="335">1016: DNS 指向 tunnel 但 tunnel 未运行</text><text class="txt s muted" x="795" y="365">502/1033: service URL 或本地服务异常</text><text class="txt s muted" x="795" y="395">证书报错: origin HTTPS 校验不匹配</text>

</svg>