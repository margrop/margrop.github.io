<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Tunnel Token 与 DNS CNAME 的关系">
<style>
  .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:2}.cf{fill:#f6821f}.dark{fill:#1f2937}.muted{fill:#64748b}.line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.good{fill:#16a34a}.blue{fill:#2563eb}.warn{fill:#f59e0b}.box{fill:#eef6ff;stroke:#93c5fd;stroke-width:2}.soft{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.code{font-family:Menlo,Consolas,monospace}.txt{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.h{font-size:28px;font-weight:700}.m{font-size:18px}.s{font-size:14px}.xs{font-size:12px}</style>
<rect class="bg" width="1280" height="720"/>
<text class="txt h dark" x="64" y="70">Tunnel Token 与 DNS CNAME 的关系</text>

<rect class="panel" x="80" y="130" width="340" height="390" rx="16"/><text class="txt m dark" x="125" y="185">Connector Token</text><text class="txt s muted" x="125" y="230">只给 cloudflared 使用</text><text class="txt s muted" x="125" y="260">不要截图、不要入库、不要贴公开文章</text><rect class="dark" x="125" y="310" width="240" height="55" rx="8"/><text class="code s" fill="#fde68a" x="145" y="343">eyJhIjoi...REDACTED</text>
<rect class="panel" x="470" y="130" width="340" height="390" rx="16"/><text class="txt m dark" x="515" y="185">Tunnel ID</text><text class="txt s muted" x="515" y="230">用于 CNAME 目标</text><rect class="box" x="515" y="310" width="240" height="55" rx="8"/><text class="code s muted" x="535" y="343">UUID.cfargotunnel.com</text>
<rect class="panel" x="860" y="130" width="340" height="390" rx="16"/><text class="txt m dark" x="905" y="185">DNS Record</text><text class="txt s muted" x="905" y="230">自动或手动创建</text><rect class="soft" x="905" y="300" width="240" height="90" rx="8"/><text class="code s dark" x="925" y="333">CNAME nas.speedtest</text><text class="code s dark" x="925" y="363">-&gt; UUID.cfargotunnel.com</text>
<path class="line" d="M420 325 L470 325 M810 325 L860 325"/>

</svg>