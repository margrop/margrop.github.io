<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Cloudflare Tunnel: 让内网 Web 服务拥有公网 HTTPS 入口">
<style>
  .bg{fill:#f6f8fb}.panel{fill:#fff;stroke:#d8dee9;stroke-width:2}.cf{fill:#f6821f}.dark{fill:#1f2937}.muted{fill:#64748b}.line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.good{fill:#16a34a}.blue{fill:#2563eb}.warn{fill:#f59e0b}.box{fill:#eef6ff;stroke:#93c5fd;stroke-width:2}.soft{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.code{font-family:Menlo,Consolas,monospace}.txt{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.h{font-size:28px;font-weight:700}.m{font-size:18px}.s{font-size:14px}.xs{font-size:12px}</style>
<rect class="bg" width="1280" height="720"/>
<text class="txt h dark" x="64" y="70">Cloudflare Tunnel: 让内网 Web 服务拥有公网 HTTPS 入口</text>

<rect class="panel" x="60" y="120" width="260" height="420" rx="16"/>
<text class="txt m dark" x="100" y="170">访问者</text><text class="txt s muted" x="100" y="205">https://nas.speedtest.example.xyz</text>
<circle class="blue" cx="190" cy="320" r="58"/><text class="txt m" fill="#fff" x="145" y="328">Browser</text>
<path class="line" d="M320 320 C410 220 470 220 560 320"/><polygon class="muted" points="548,312 575,320 548,328"/>
<rect class="soft" x="560" y="120" width="260" height="420" rx="16"/>
<text class="txt m dark" x="620" y="170">Cloudflare Edge</text><text class="txt s muted" x="620" y="205">DNS / TLS / WAF / Tunnel</text>
<circle class="cf" cx="690" cy="320" r="62"/><text class="txt m" fill="#fff" x="640" y="328">443 HTTPS</text>
<path class="line" d="M820 320 C900 430 970 430 1045 320"/><polygon class="muted" points="1030,314 1057,320 1030,328"/>
<rect class="panel" x="960" y="120" width="260" height="420" rx="16"/>
<text class="txt m dark" x="1015" y="170">家里 / 内网服务器</text><text class="txt s muted" x="1015" y="205">只需主动连出 Cloudflare</text>
<rect class="box" x="1015" y="270" width="150" height="72" rx="10"/><text class="txt m dark" x="1038" y="313">cloudflared</text>
<rect class="box" x="1015" y="380" width="150" height="72" rx="10"/><text class="txt m dark" x="1045" y="423">Web App</text>
<path class="line" d="M1090 342 L1090 380"/><text class="txt s muted" x="1020" y="500">不用路由器端口转发</text><text class="txt s muted" x="1020" y="525">不用暴露源站公网 IP</text>
<text class="txt s muted" x="64" y="650">示意图使用 example.xyz 与文档保留地址，不包含真实域名、账号、Token 或内网信息。</text>

</svg>