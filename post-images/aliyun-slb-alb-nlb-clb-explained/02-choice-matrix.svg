<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ALB NLB CLB choice matrix</title>
  <desc id="desc">A comparison matrix for choosing Alibaba Cloud ALB, NLB, and CLB.</desc>
  <rect width="1280" height="760" fill="#ffffff"/>
  <text x="56" y="70" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">一句话选型：先看协议层，再看业务形态</text>
  <text x="58" y="112" font-family="Arial, sans-serif" font-size="22" fill="#64748b">如果能清楚回答“请求是 HTTP 业务、四层连接，还是历史存量”，选择通常就不难。</text>

  <g font-family="Arial, sans-serif">
    <rect x="54" y="160" width="1172" height="520" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="54" y="160" width="1172" height="74" rx="16" fill="#0f172a"/>
    <text x="94" y="207" font-size="24" font-weight="700" fill="#ffffff">问题</text>
    <text x="402" y="207" font-size="24" font-weight="700" fill="#ffffff">优先选择</text>
    <text x="668" y="207" font-size="24" font-weight="700" fill="#ffffff">为什么</text>
    <text x="1010" y="207" font-size="24" font-weight="700" fill="#ffffff">典型场景</text>

    <line x1="360" y1="160" x2="360" y2="680" stroke="#e2e8f0"/>
    <line x1="620" y1="160" x2="620" y2="680" stroke="#e2e8f0"/>
    <line x1="970" y1="160" x2="970" y2="680" stroke="#e2e8f0"/>
    <line x1="54" y1="322" x2="1226" y2="322" stroke="#e2e8f0"/>
    <line x1="54" y1="486" x2="1226" y2="486" stroke="#e2e8f0"/>

    <text x="94" y="280" font-size="24" font-weight="700" fill="#0f172a">要按域名、路径、Header、Cookie 分流？</text>
    <rect x="402" y="250" width="160" height="54" rx="12" fill="#dbeafe"/>
    <text x="447" y="286" font-size="27" font-weight="800" fill="#1d4ed8">ALB</text>
    <text x="668" y="265" font-size="21" fill="#334155">专注 HTTP / HTTPS / QUIC</text>
    <text x="668" y="298" font-size="21" fill="#334155">高级七层路由能力强</text>
    <text x="1010" y="265" font-size="21" fill="#334155">网站、API、Ingress</text>
    <text x="1010" y="298" font-size="21" fill="#334155">灰度、蓝绿、SSE</text>

    <text x="94" y="430" font-size="24" font-weight="700" fill="#0f172a">要扛大量 TCP / UDP 长连接？</text>
    <rect x="402" y="400" width="160" height="54" rx="12" fill="#fef3c7"/>
    <text x="447" y="436" font-size="27" font-weight="800" fill="#b45309">NLB</text>
    <text x="668" y="415" font-size="21" fill="#334155">新一代四层负载均衡</text>
    <text x="668" y="448" font-size="21" fill="#334155">高并发、低时延、TCPSSL</text>
    <text x="1010" y="415" font-size="21" fill="#334155">IoT、音视频、消息</text>
    <text x="1010" y="448" font-size="21" fill="#334155">IDC / 云上入口</text>

    <text x="94" y="594" font-size="24" font-weight="700" fill="#0f172a">存量系统已跑在传统实例上？</text>
    <rect x="402" y="564" width="160" height="54" rx="12" fill="#ccfbf1"/>
    <text x="447" y="600" font-size="27" font-weight="800" fill="#0f766e">CLB</text>
    <text x="668" y="579" font-size="21" fill="#334155">传统型产品，兼具四层和基础七层</text>
    <text x="668" y="612" font-size="21" fill="#334155">适合稳定存量与谨慎迁移</text>
    <text x="1010" y="579" font-size="21" fill="#334155">老业务、简单转发</text>
    <text x="1010" y="612" font-size="21" fill="#334155">迁移过渡期</text>
  </g>

  <text x="58" y="724" font-family="Arial, sans-serif" font-size="20" fill="#64748b">注意：最终还要看地域、配额、计费、迁移成本和已有架构。矩阵只解决第一轮方向判断。</text>
</svg>
