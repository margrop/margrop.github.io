<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Load balancer mailroom analogy</title>
  <desc id="desc">An analogy showing SLB as the reception desk and ALB, NLB, CLB as different dispatch counters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#edf6f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="0" fill="url(#bg)"/>
  <text x="70" y="76" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">把负载均衡想成一栋楼的收发室</text>
  <text x="72" y="118" font-family="Arial, sans-serif" font-size="22" fill="#475569">用户请求像快递，负载均衡负责看标签、分柜台、查健康状态，再交给后端服务器。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="250" height="300" rx="18" fill="#ffffff"/>
    <text x="105" y="245" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">用户请求</text>
    <rect x="108" y="285" width="174" height="54" rx="12" fill="#dbeafe"/>
    <text x="137" y="320" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">网页访问</text>
    <rect x="108" y="360" width="174" height="54" rx="12" fill="#fef3c7"/>
    <text x="126" y="395" font-family="Arial, sans-serif" font-size="22" fill="#92400e">TCP 长连接</text>
    <rect x="108" y="435" width="174" height="54" rx="12" fill="#ccfbf1"/>
    <text x="128" y="470" font-family="Arial, sans-serif" font-size="22" fill="#115e59">老系统访问</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="180" width="270" height="320" rx="26" fill="#0f172a"/>
    <circle cx="605" cy="275" r="48" fill="#38bdf8"/>
    <path d="M605 323 V382 M548 420 H662 M548 420 L605 382 L662 420" stroke="#e0f2fe" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="550" y="460" font-family="Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff">SLB</text>
    <text x="515" y="535" font-family="Arial, sans-serif" font-size="23" fill="#cbd5e1">产品家族入口</text>
  </g>

  <path d="M320 340 C380 340 400 340 470 340" stroke="#2563eb" stroke-width="6" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="890" y="142" width="300" height="118" rx="18" fill="#ffffff"/>
    <circle cx="940" cy="201" r="30" fill="#dbeafe"/>
    <text x="925" y="210" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1d4ed8">7</text>
    <text x="990" y="190" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">ALB 柜台</text>
    <text x="990" y="226" font-family="Arial, sans-serif" font-size="20" fill="#475569">看 URL、Header、Cookie</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="890" y="302" width="300" height="118" rx="18" fill="#ffffff"/>
    <circle cx="940" cy="361" r="30" fill="#fef3c7"/>
    <text x="925" y="370" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#b45309">4</text>
    <text x="990" y="350" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">NLB 柜台</text>
    <text x="990" y="386" font-family="Arial, sans-serif" font-size="20" fill="#475569">看协议、端口、连接</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="890" y="462" width="300" height="118" rx="18" fill="#ffffff"/>
    <circle cx="940" cy="521" r="30" fill="#ccfbf1"/>
    <text x="914" y="530" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0f766e">旧</text>
    <text x="990" y="510" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">CLB 柜台</text>
    <text x="990" y="546" font-family="Arial, sans-serif" font-size="20" fill="#475569">传统四层 + 基础七层</text>
  </g>

  <path d="M740 300 C800 230 820 205 890 202" stroke="#2563eb" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M740 340 C800 340 820 360 890 360" stroke="#2563eb" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M740 380 C800 445 820 520 890 520" stroke="#2563eb" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
</svg>
