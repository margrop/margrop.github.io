<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="1400" height="760" fill="#101827"/><g font-family="Arial,Microsoft YaHei,sans-serif" text-anchor="middle"><text x="700" y="70" font-size="40" font-weight="700" fill="#fff">MCP：给 AI 配了一套“统一插座”</text><g fill="#19283b" stroke="#49dcb1" stroke-width="4"><rect x="80" y="210" width="280" height="180" rx="22"/><rect x="560" y="180" width="280" height="240" rx="22"/><rect x="1040" y="210" width="280" height="180" rx="22"/></g><g fill="#fff" font-size="30"><text x="220" y="285">AI 应用</text><text x="220" y="330" font-size="22">聊天、IDE、Agent</text><text x="700" y="275">MCP Client</text><text x="700" y="325" font-size="22">统一发现与调用</text><text x="1180" y="285">MCP Server</text><text x="1180" y="330" font-size="22">文件、数据库、API</text></g><path d="M360 300h190M850 300h190" stroke="#ffbd69" stroke-width="10" stroke-linecap="round"/><g fill="#ffbd69" font-size="22"><text x="455" y="270">协议</text><text x="945" y="270">协议</text></g><g fill="#8ba8ba" font-size="24"><text x="700" y="570">好处：换客户端不必重写每个工具；换工具也不必重新教会每个客户端。</text><text x="700" y="620">像 USB 一样，重点不是“插了什么”，而是“大家都按同一套接口说话”。</text></g></g></svg>
