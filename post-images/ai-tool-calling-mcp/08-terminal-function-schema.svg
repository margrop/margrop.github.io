<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820"><rect width="1400" height="820" fill="#10151c"/><rect x="55" y="55" width="1290" height="710" rx="18" fill="#17212b" stroke="#44515d" stroke-width="3"/><circle cx="95" cy="95" r="11" fill="#ff5f57"/><circle cx="130" cy="95" r="11" fill="#febc2e"/><circle cx="165" cy="95" r="11" fill="#28c840"/><g font-family="Menlo,monospace" font-size="26" fill="#d9e5ef"><text x="90" y="160" fill="#7ee787">$ tool.describe(get_weather)</text><text x="90" y="215">name: get_weather</text><text x="90" y="260">description: Return current weather</text><text x="90" y="305">parameters:</text><text x="135" y="350">city: string (required)</text><text x="135" y="395">unit: celsius | fahrenheit</text><text x="90" y="470" fill="#ffbd69">model output → {"city":"Beijing","unit":"celsius"}</text><text x="90" y="555" fill="#49dcb1">executor → validates → runs → returns JSON</text><text x="90" y="660" fill="#a9c7d8">真实截图：工具描述不是魔法，是一份机器可读的菜单。</text></g></svg>
