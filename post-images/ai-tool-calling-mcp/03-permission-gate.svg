<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="1400" height="760" fill="#fffaf2"/><g font-family="Arial,Microsoft YaHei,sans-serif" text-anchor="middle"><text x="700" y="70" font-size="40" font-weight="700" fill="#432818">工具调用不是“放权”，而是“过闸机”</text><g fill="#fff" stroke="#d97706" stroke-width="4"><rect x="100" y="245" width="230" height="150" rx="20"/><rect x="430" y="245" width="230" height="150" rx="20"/><rect x="760" y="245" width="230" height="150" rx="20"/><rect x="1090" y="245" width="230" height="150" rx="20"/></g><g fill="#432818" font-size="28"><text x="215" y="315">模型提议</text><text x="215" y="355" font-size="21">“删除文件”</text><text x="545" y="315">参数校验</text><text x="545" y="355" font-size="21">路径、类型、范围</text><text x="875" y="315">权限确认</text><text x="875" y="355" font-size="21">用户 / 沙箱 / 只读</text><text x="1205" y="315">执行与审计</text><text x="1205" y="355" font-size="21">结果、日志、撤销</text></g><path d="M330 320h90M660 320h90M990 320h90" stroke="#dc2626" stroke-width="9" stroke-linecap="round"/><text x="700" y="560" font-size="30" fill="#7f1d1d">真正可靠的 Agent，不是“敢做事”，而是“知道什么时候必须先问人”。</text></g></svg>
