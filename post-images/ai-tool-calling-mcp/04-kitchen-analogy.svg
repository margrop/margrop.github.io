<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="1400" height="760" fill="#eef8f5"/><g font-family="Arial,Microsoft YaHei,sans-serif" text-anchor="middle"><text x="700" y="75" font-size="40" font-weight="700" fill="#123b36">把 AI 想成餐厅：会说话，不等于会做菜</text><g fill="#fff" stroke="#0f766e" stroke-width="4"><rect x="100" y="220" width="270" height="190" rx="24"/><rect x="565" y="220" width="270" height="190" rx="24"/><rect x="1030" y="220" width="270" height="190" rx="24"/></g><g fill="#123b36" font-size="30"><text x="235" y="295">顾客</text><text x="235" y="345" font-size="22">用户：我要一份天气</text><text x="700" y="295">服务员</text><text x="700" y="345" font-size="22">模型：理解并下单</text><text x="1165" y="295">后厨</text><text x="1165" y="345" font-size="22">工具：真正执行</text></g><path d="M370 315h175M835 315h175" stroke="#f59e0b" stroke-width="10"/><g fill="#9a3412" font-size="23"><text x="455" y="285">订单</text><text x="920" y="285">食材与火</text></g><text x="700" y="575" font-size="30" fill="#155e75">MCP 就像后厨统一的出餐标准：不同餐厅软件，也能叫同一套厨具。</text></g></svg>
