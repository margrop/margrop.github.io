<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700"><rect width="1400" height="700" fill="#f6f8fb"/><g font-family="Arial,Microsoft YaHei,sans-serif" text-anchor="middle"><text x="700" y="70" font-size="38" font-weight="700" fill="#14202b">一次工具调用，实际上是五步接力</text><g fill="#fff" stroke="#3b82f6" stroke-width="4"><rect x="70" y="250" width="210" height="150" rx="24"/><rect x="350" y="250" width="210" height="150" rx="24"/><rect x="630" y="250" width="210" height="150" rx="24"/><rect x="910" y="250" width="210" height="150" rx="24"/><rect x="1190" y="250" width="140" height="150" rx="24"/></g><g font-size="28" fill="#14202b"><text x="175" y="315">1. 用户说话</text><text x="175" y="355" font-size="22">“查明天北京天气”</text><text x="455" y="315">2. 模型选工具</text><text x="455" y="355" font-size="22">生成参数 JSON</text><text x="735" y="315">3. 系统执行</text><text x="735" y="355" font-size="22">权限与校验</text><text x="1015" y="315">4. 工具返回</text><text x="1015" y="355" font-size="22">结构化结果</text><text x="1260" y="315">5. 模型解释</text><text x="1260" y="355" font-size="22">给人读</text></g><g stroke="#f59e0b" stroke-width="8" marker-end="url(#a)"><path d="M280 325h60"/><path d="M560 325h60"/><path d="M840 325h60"/><path d="M1120 325h60"/></g></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0l10 3-10 3z" fill="#f59e0b"/></marker></defs></svg>
