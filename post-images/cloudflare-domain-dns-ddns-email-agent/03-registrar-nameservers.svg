<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="1280" height="760" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="92" fill="#111827"/>
  <circle cx="58" cy="46" r="14" fill="#ef4444"/><circle cx="98" cy="46" r="14" fill="#f59e0b"/><circle cx="138" cy="46" r="14" fill="#22c55e"/>
  <text x="190" y="56" font-size="28" fill="#f9fafb" font-weight="700">Cloudflare Dashboard - example.xyz</text>
  <text x="80" y="135" font-size="38" fill="#111827" font-weight="800">域名商：替换 Nameserver</text>
  <text x="82" y="166" font-size="21" fill="#4b5563">在域名购买平台找到 DNS / Nameserver / DNS 服务器设置，选择自定义 NS。</text>
  <rect x="80" y="190" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="233" r="22" fill="#f6821f"/><text x="122" y="240" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">1</text><text x="165" y="225" font-size="25" fill="#111827" font-weight="700">删除域名商默认 NS</text><text x="165" y="255" font-size="19" fill="#4b5563">例如 ns1.registrar.example、ns2.registrar.example。</text><rect x="80" y="298" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="341" r="22" fill="#f6821f"/><text x="122" y="348" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">2</text><text x="165" y="333" font-size="25" fill="#111827" font-weight="700">填入 Cloudflare 两条 NS</text><text x="165" y="363" font-size="19" fill="#4b5563">arya.ns.cloudflare.com / brad.ns.cloudflare.com。</text><rect x="80" y="406" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="449" r="22" fill="#f6821f"/><text x="122" y="456" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">3</text><text x="165" y="441" font-size="25" fill="#111827" font-weight="700">保存并等待生效</text><text x="165" y="471" font-size="19" fill="#4b5563">通常几分钟到数小时；期间 Cloudflare 可能显示 Pending。</text><rect x="80" y="514" width="1120" height="96" rx="14" fill="#fff7ed" stroke="#fed7aa"/><text x="115" y="552" font-size="24" fill="#9a3412" font-weight="700">不要混搭</text><text x="115" y="584" font-size="20" fill="#7c2d12">权威 NS 不要一条填 Cloudflare、一条保留域名商默认值，否则排查会非常痛苦。</text>
</svg>