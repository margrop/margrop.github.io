<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="1280" height="760" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="92" fill="#111827"/>
  <circle cx="58" cy="46" r="14" fill="#ef4444"/><circle cx="98" cy="46" r="14" fill="#f59e0b"/><circle cx="138" cy="46" r="14" fill="#22c55e"/>
  <text x="190" y="56" font-size="28" fill="#f9fafb" font-weight="700">Cloudflare Dashboard - example.xyz</text>
  <text x="80" y="135" font-size="38" fill="#111827" font-weight="800">Cloudflare：添加站点</text>
  <text x="82" y="166" font-size="21" fill="#4b5563">Dashboard -&gt; Domains -&gt; Add a domain / Onboard a domain。域名只写根域名，不写 www。</text>
  <rect x="80" y="190" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="233" r="22" fill="#f6821f"/><text x="122" y="240" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">1</text><text x="165" y="225" font-size="25" fill="#111827" font-weight="700">输入域名</text><text x="165" y="255" font-size="19" fill="#4b5563">example.xyz</text><rect x="80" y="298" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="341" r="22" fill="#f6821f"/><text x="122" y="348" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">2</text><text x="165" y="333" font-size="25" fill="#111827" font-weight="700">选择计划</text><text x="165" y="363" font-size="19" fill="#4b5563">个人和入门玩法通常 Free 计划已经足够。</text><rect x="80" y="406" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="449" r="22" fill="#f6821f"/><text x="122" y="456" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">3</text><text x="165" y="441" font-size="25" fill="#111827" font-weight="700">检查扫描到的 DNS 记录</text><text x="165" y="471" font-size="19" fill="#4b5563">如果刚买的新域名没有记录，也可以直接进入下一步。</text><rect x="80" y="514" width="1120" height="96" rx="14" fill="#fff7ed" stroke="#fed7aa"/><text x="115" y="552" font-size="24" fill="#9a3412" font-weight="700">隐私说明</text><text x="115" y="584" font-size="20" fill="#7c2d12">本文截图均为复刻示意图，只使用 example.xyz，不包含真实账号、Zone ID、IP 或 Token。</text>
</svg>