<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="1280" height="760" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="92" fill="#111827"/>
  <circle cx="58" cy="46" r="14" fill="#ef4444"/><circle cx="98" cy="46" r="14" fill="#f59e0b"/><circle cx="138" cy="46" r="14" fill="#22c55e"/>
  <text x="190" y="56" font-size="28" fill="#f9fafb" font-weight="700">Cloudflare Dashboard - example.xyz</text>
  <text x="80" y="135" font-size="38" fill="#111827" font-weight="800">把域名接入 Cloudflare 的总路线</text>
  <text x="82" y="166" font-size="21" fill="#4b5563">先让 Cloudflare 成为权威 DNS，再把 DNS、DDNS、邮箱和 Agent 自动化放到同一个入口管理。</text>
  <rect x="80" y="190" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="233" r="22" fill="#f6821f"/><text x="122" y="240" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">1</text><text x="165" y="225" font-size="25" fill="#111827" font-weight="700">Cloudflare 添加 example.xyz</text><text x="165" y="255" font-size="19" fill="#4b5563">选择 Free 计划，先让 Cloudflare 扫描已有记录，后面再人工校对。</text><rect x="80" y="298" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="341" r="22" fill="#f6821f"/><text x="122" y="348" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">2</text><text x="165" y="333" font-size="25" fill="#111827" font-weight="700">复制 Cloudflare 分配的两台 NS</text><text x="165" y="363" font-size="19" fill="#4b5563">示例：arya.ns.cloudflare.com 与 brad.ns.cloudflare.com，每个域名看到的值可能不同。</text><rect x="80" y="406" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="449" r="22" fill="#f6821f"/><text x="122" y="456" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">3</text><text x="165" y="441" font-size="25" fill="#111827" font-weight="700">回到域名商替换 Nameserver</text><text x="165" y="471" font-size="19" fill="#4b5563">把原域名商默认 NS 全部替换为 Cloudflare 给出的两条，不要混用。</text><rect x="80" y="514" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="557" r="22" fill="#f6821f"/><text x="122" y="564" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">4</text><text x="165" y="549" font-size="25" fill="#111827" font-weight="700">配置 DNS、DDNS、邮箱和 Token</text><text x="165" y="579" font-size="19" fill="#4b5563">先手工跑通关键记录，再把受限 API Token 交给 Agent 维护复杂项。</text>
</svg>