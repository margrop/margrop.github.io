<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="1280" height="760" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="92" fill="#111827"/>
  <circle cx="58" cy="46" r="14" fill="#ef4444"/><circle cx="98" cy="46" r="14" fill="#f59e0b"/><circle cx="138" cy="46" r="14" fill="#22c55e"/>
  <text x="190" y="56" font-size="28" fill="#f9fafb" font-weight="700">Cloudflare Dashboard - example.xyz</text>
  <text x="80" y="135" font-size="38" fill="#111827" font-weight="800">DDNS 玩法：动态公网地址也能有固定域名</text>
  <text x="82" y="166" font-size="21" fill="#4b5563">定时检测公网 IP，变化时调用 Cloudflare API 更新 A/AAAA 记录。</text>
  <rect x="80" y="190" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="233" r="22" fill="#f6821f"/><text x="122" y="240" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">1</text><text x="165" y="225" font-size="25" fill="#111827" font-weight="700">家宽 / 服务器获取当前公网 IP</text><text x="165" y="255" font-size="19" fill="#4b5563">脚本或 Agent 定时请求 IP 查询接口。</text><rect x="80" y="298" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="341" r="22" fill="#f6821f"/><text x="122" y="348" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">2</text><text x="165" y="333" font-size="25" fill="#111827" font-weight="700">和 Cloudflare 当前记录比较</text><text x="165" y="363" font-size="19" fill="#4b5563">相同则不动，不同才调用 API，避免无意义写入。</text><rect x="80" y="406" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="449" r="22" fill="#f6821f"/><text x="122" y="456" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">3</text><text x="165" y="441" font-size="25" fill="#111827" font-weight="700">更新 home.example.xyz</text><text x="165" y="471" font-size="19" fill="#4b5563">A 记录写 IPv4，AAAA 记录写 IPv6，按实际网络选择。</text><rect x="80" y="514" width="1120" height="86" rx="14" fill="#fff" stroke="#e5e7eb"/><circle cx="122" cy="557" r="22" fill="#f6821f"/><text x="122" y="564" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">4</text><text x="165" y="549" font-size="25" fill="#111827" font-weight="700">业务访问固定域名</text><text x="165" y="579" font-size="19" fill="#4b5563">NAS、旁路由、监控、临时服务都不用记变化的地址。</text>
</svg>