  <text x="190" y="56" font-size="28" fill="#f9fafb" font-weight="700">Cloudflare Dashboard - example.xyz</text>
  <text x="80" y="135" font-size="38" fill="#111827" font-weight="800">邮箱玩法：第三方企业邮箱 vs Cloudflare Email Routing</text>
  <text x="82" y="166" font-size="21" fill="#4b5563">第三方邮箱需要 MX/TXT/DKIM/DMARC；Cloudflare Email Routing 适合只收信转发。</text>
