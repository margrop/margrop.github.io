xt><text x="330" y="479" font-size="21" fill="#111827" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Selected</text><text x="590" y="479" font-size="21" fill="#111827" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Workers:Edit</text><text x="1010" y="479" font-size="21" fill="#111827" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">可选，高级玩法</text><rect x="80" y="518" width="1120" height="96" rx="14" fill="#fff7ed" stroke="#fed7aa"/><text x="115" y="556" font-size="24" fill="#9a3412" font-weight="700">建议</text><text x="115" y="588" font-size="20" fill="#7c2d12">一个用途一个 Token；DDNS 只给 DNS Edit，不要顺手给 Account 全权限。</text>
