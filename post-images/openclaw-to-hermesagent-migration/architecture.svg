<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="openclawGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="hermesGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#44bd32"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  <rect x="0" y="0" width="1200" height="80" fill="url(#headerGrad)"/>

  <!-- Header -->
  <text x="600" y="52" text-anchor="middle" fill="white" font-size="28" font-weight="bold">OpenClaw → HermesAgent Migration Architecture</text>

  <!-- OpenClaw Section -->
  <rect x="50" y="120" width="350" height="550" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="50" y="120" width="350" height="60" rx="20" fill="url(#openclawGrad)"/>
  <rect x="50" y="150" width="350" height="30" fill="url(#openclawGrad)"/>
  <text x="225" y="158" text-anchor="middle" fill="white" font-size="22" font-weight="bold">OpenClaw</text>

  <!-- OpenClaw Components -->
  <rect x="80" y="200" width="290" height="50" rx="10" fill="#fff5f5" stroke="#ff6b6b" stroke-width="2"/>
  <text x="225" y="230" text-anchor="middle" fill="#ee5a24" font-size="14" font-weight="bold">~/.openclaw/</text>

  <rect x="80" y="260" width="140" height="40" rx="8" fill="#ffe0e0"/>
  <text x="150" y="285" text-anchor="middle" fill="#c0392b" font-size="12">openclaw.json</text>

  <rect x="230" y="260" width="140" height="40" rx="8" fill="#ffe0e0"/>
  <text x="300" y="285" text-anchor="middle" fill="#c0392b" font-size="12">SOUL.md</text>

  <rect x="80" y="310" width="140" height="40" rx="8" fill="#ffe0e0"/>
  <text x="150" y="335" text-anchor="middle" fill="#c0392b" font-size="12">memory/</text>

  <rect x="230" y="310" width="140" height="40" rx="8" fill="#ffe0e0"/>
  <text x="300" y="335" text-anchor="middle" fill="#c0392b" font-size="12">skills/</text>

  <rect x="80" y="360" width="140" height="40" rx="8" fill="#ffe0e0"/>
  <text x="150" y="385" text-anchor="middle" fill="#c0392b" font-size="12">cron/</text>

  <rect x="230" y="360" width="140" height="40" rx="8" fill="#ffe0e0"/>
  <text x="300" y="385" text-anchor="middle" fill="#c0392b" font-size="12">credentials/</text>

  <!-- OpenClaw Features -->
  <text x="225" y="430" text-anchor="middle" fill="#666" font-size="13" font-style="italic">Node.js Gateway</text>
  <text x="225" y="450" text-anchor="middle" fill="#666" font-size="13" font-style="italic">Multi-channel Messaging</text>
  <text x="225" y="470" text-anchor="middle" fill="#666" font-size="13" font-style="italic">Extensible Plugins</text>

  <!-- Migration Arrow -->
  <g transform="translate(450, 350)">
    <rect x="0" y="-40" width="300" height="80" rx="40" fill="url(#dataGrad)" opacity="0.9"/>
    <text x="150" y="-5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">hermes claw migrate</text>
    <text x="150" y="20" text-anchor="middle" fill="white" font-size="12">--migrate-secrets --overwrite</text>
    <!-- Arrow -->
    <polygon points="280,0 260,-15 260,-8 220,-8 220,8 260,8 260,15" fill="white"/>
  </g>

  <!-- HermesAgent Section -->
  <rect x="800" y="120" width="350" height="550" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="800" y="120" width="350" height="60" rx="20" fill="url(#hermesGrad)"/>
  <rect x="800" y="150" width="350" height="30" fill="url(#hermesGrad)"/>
  <text x="975" y="158" text-anchor="middle" fill="white" font-size="22" font-weight="bold">HermesAgent</text>

  <!-- HermesAgent Components -->
  <rect x="830" y="200" width="290" height="50" rx="10" fill="#f0fff4" stroke="#4ecdc4" stroke-width="2"/>
  <text x="975" y="230" text-anchor="middle" fill="#44bd32" font-size="14" font-weight="bold">~/.hermes/</text>

  <rect x="830" y="260" width="140" height="40" rx="8" fill="#e0ffe0"/>
  <text x="900" y="285" text-anchor="middle" fill="#27ae60" font-size="12">config.yaml</text>

  <rect x="980" y="260" width="140" height="40" rx="8" fill="#e0ffe0"/>
  <text x="1050" y="285" text-anchor="middle" fill="#27ae60" font-size="12">SOUL.md</text>

  <rect x="830" y="310" width="140" height="40" rx="8" fill="#e0ffe0"/>
  <text x="900" y="335" text-anchor="middle" fill="#27ae60" font-size="12">memories/</text>

  <rect x="980" y="310" width="140" height="40" rx="8" fill="#e0ffe0"/>
  <text x="1050" y="335" text-anchor="middle" fill="#27ae60" font-size="12">skills/</text>

  <rect x="830" y="360" width="140" height="40" rx="8" fill="#e0ffe0"/>
  <text x="900" y="385" text-anchor="middle" fill="#27ae60" font-size="12">cron/</text>

  <rect x="980" y="360" width="140" height="40" rx="8" fill="#e0ffe0"/>
  <text x="1050" y="385" text-anchor="middle" fill="#27ae60" font-size="12">.env</text>

  <!-- HermesAgent Features -->
  <text x="975" y="430" text-anchor="middle" fill="#666" font-size="13" font-style="italic">Python + Node.js TUI</text>
  <text x="975" y="450" text-anchor="middle" fill="#666" font-size="13" font-style="italic">Self-Improving Skills</text>
  <text x="975" y="470" text-anchor="middle" fill="#666" font-size="13" font-style="italic">300+ Model Support</text>

  <!-- Bottom Info -->
  <rect x="50" y="700" width="1100" height="70" rx="15" fill="#2d3436"/>
  <text x="600" y="730" text-anchor="middle" fill="white" font-size="14">Migrated: SOUL.md | Memories | Skills (10) | Cron Jobs | API Keys | Model Config | MCP Servers | Browser Settings</text>
  <text x="600" y="755" text-anchor="middle" fill="#b2bec3" font-size="12">Command: hermes claw migrate --migrate-secrets --overwrite --no-backup --yes</text>
</svg>
