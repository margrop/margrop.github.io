<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Supported Ubuntu upgrade paths</title>
  <desc id="desc">Ubuntu 22.04 upgrades to 24.04 first, then 26.04. Ubuntu 24.04 upgrades to 26.04 after the LTS point release gate, or earlier only with explicit risk acceptance.</desc>
  <rect width="1280" height="720" fill="#fbfaf7"/>
  <text x="80" y="94" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#172554">不要从 22.04 直接跳到 26.04</text>
  <text x="80" y="138" font-family="Arial, sans-serif" font-size="22" fill="#475569">Ubuntu 官方支持顺序升级：LTS 到下一个 LTS，或中间版本逐个升级。</text>
  <line x1="170" y1="330" x2="1110" y2="330" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round"/>
  <circle cx="230" cy="330" r="70" fill="#fef3c7" stroke="#f59e0b" stroke-width="4"/>
  <circle cx="640" cy="330" r="70" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <circle cx="1050" cy="330" r="70" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="230" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#78350f">22.04</text>
  <text x="230" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#78350f">先到这里</text>
  <text x="640" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">24.04</text>
  <text x="640" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#1e3a8a">中转站</text>
  <text x="1050" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#14532d">26.04</text>
  <text x="1050" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#14532d">目标版本</text>
  <path d="M332 330h200" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
  <path d="M512 306l28 24-28 24" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M742 330h200" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
  <path d="M922 306l28 24-28 24" fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="120" y="470" width="1040" height="118" rx="16" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="154" y="518" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#9a3412">时间门槛</text>
  <text x="154" y="560" font-family="Arial, sans-serif" font-size="22" fill="#7c2d12">截至 2026-05-12：26.04 已发布，但 24.04 LTS 到 26.04 LTS 的常规升级提示通常等 26.04.1 后开放。</text>
</svg>
