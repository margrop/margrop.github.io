<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu 26.04 upgrade overview</title>
  <desc id="desc">Two safe ways to upgrade Ubuntu 22.04 or 24.04 to Ubuntu 26.04: delegate to an agent or run the manual checklist.</desc>
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <rect x="58" y="56" width="1164" height="608" rx="18" fill="#ffffff" stroke="#d9dee8" stroke-width="2"/>
  <text x="92" y="118" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">Ubuntu 26.04 升级有两条路</text>
  <text x="92" y="164" font-family="Arial, sans-serif" font-size="22" fill="#4b5563">Agent 托管节省时间；人工升级保留控制。两条路都从备份、检查和验证开始。</text>
  <rect x="92" y="220" width="510" height="330" rx="14" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <rect x="678" y="220" width="510" height="330" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="128" y="280" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#065f46">方案 A：交给 Agent</text>
  <text x="714" y="280" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">方案 B：手工执行</text>
  <text x="128" y="330" font-family="Arial, sans-serif" font-size="23" fill="#064e3b">一句话描述目标和边界</text>
  <text x="128" y="376" font-family="Arial, sans-serif" font-size="23" fill="#064e3b">让 Agent 先检查再升级</text>
  <text x="128" y="422" font-family="Arial, sans-serif" font-size="23" fill="#064e3b">每一步保存日志和回滚点</text>
  <text x="128" y="468" font-family="Arial, sans-serif" font-size="23" fill="#064e3b">升级后验证系统与业务</text>
  <text x="714" y="330" font-family="Arial, sans-serif" font-size="23" fill="#1e40af">确认升级路径和发布时间</text>
  <text x="714" y="376" font-family="Arial, sans-serif" font-size="23" fill="#1e40af">备份、更新当前系统</text>
  <text x="714" y="422" font-family="Arial, sans-serif" font-size="23" fill="#1e40af">运行 do-release-upgrade</text>
  <text x="714" y="468" font-family="Arial, sans-serif" font-size="23" fill="#1e40af">重启、清理、恢复第三方源</text>
  <path d="M606 383h68" stroke="#6b7280" stroke-width="6" stroke-linecap="round"/>
  <path d="M660 363l22 20-22 20" fill="none" stroke="#6b7280" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="210" y="586" width="860" height="44" rx="22" fill="#111827"/>
  <text x="640" y="616" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#ffffff">核心原则：不能跳级，不能无备份，不能只看命令成功，要看服务真的恢复。</text>
</svg>
