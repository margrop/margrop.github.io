<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent handoff prompt for Ubuntu upgrade</title>
  <desc id="desc">A safe agent-driven upgrade flow with scope, preflight, upgrade, validation, and report stages.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">把升级交给 Agent，不等于把判断交出去</text>
  <rect x="80" y="140" width="1120" height="92" rx="14" fill="#111827"/>
  <text x="112" y="177" font-family="Arial, sans-serif" font-size="22" fill="#e5e7eb">请帮我把这台 Ubuntu 主机从当前 LTS 升级到 26.04 LTS：</text>
  <text x="112" y="210" font-family="Arial, sans-serif" font-size="20" fill="#a7f3d0">先检查路径、备份、磁盘、第三方源和业务进程；确认可升级后执行；最后验证版本、服务、端口和日志。</text>
  <g font-family="Arial, sans-serif">
    <rect x="98" y="305" width="190" height="120" rx="12" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
    <text x="193" y="354" text-anchor="middle" font-size="24" font-weight="700" fill="#075985">1. 定边界</text>
    <text x="193" y="388" text-anchor="middle" font-size="18" fill="#075985">目标与禁止项</text>
    <rect x="330" y="305" width="190" height="120" rx="12" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="425" y="354" text-anchor="middle" font-size="24" font-weight="700" fill="#065f46">2. 预检查</text>
    <text x="425" y="388" text-anchor="middle" font-size="18" fill="#065f46">备份与空间</text>
    <rect x="562" y="305" width="190" height="120" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="657" y="354" text-anchor="middle" font-size="24" font-weight="700" fill="#78350f">3. 执行</text>
    <text x="657" y="388" text-anchor="middle" font-size="18" fill="#78350f">交互升级</text>
    <rect x="794" y="305" width="190" height="120" rx="12" fill="#fce7f3" stroke="#f472b6" stroke-width="2"/>
    <text x="889" y="354" text-anchor="middle" font-size="24" font-weight="700" fill="#831843">4. 验证</text>
    <text x="889" y="388" text-anchor="middle" font-size="18" fill="#831843">版本与服务</text>
    <rect x="1026" y="305" width="190" height="120" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="1121" y="354" text-anchor="middle" font-size="24" font-weight="700" fill="#4c1d95">5. 汇报</text>
    <text x="1121" y="388" text-anchor="middle" font-size="18" fill="#4c1d95">证据与遗留项</text>
  </g>
  <g stroke="#64748b" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M288 365h42"/><path d="M316 347l18 18-18 18"/>
    <path d="M520 365h42"/><path d="M548 347l18 18-18 18"/>
    <path d="M752 365h42"/><path d="M780 347l18 18-18 18"/>
    <path d="M984 365h42"/><path d="M1012 347l18 18-18 18"/>
  </g>
  <rect x="160" y="510" width="960" height="86" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">适合 Code / Claude / OpenClaw / HermesAgent 等工具</text>
  <text x="640" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">关键是把“先检查、再升级、最后验证”写进任务，而不是只说“帮我升级”。</text>
</svg>
