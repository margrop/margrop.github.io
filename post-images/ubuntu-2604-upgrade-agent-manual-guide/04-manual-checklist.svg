<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Manual upgrade checklist</title>
  <desc id="desc">Manual Ubuntu release upgrade checklist: backup, update, run do-release-upgrade, reboot, verify, clean up.</desc>
  <rect width="1280" height="720" fill="#f6f7f9"/>
  <text x="80" y="88" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#111827">人工升级时，把它当成一次变更窗口</text>
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="22" fill="#4b5563">不要只记一条 do-release-upgrade。真正决定成败的是前后检查。</text>
  <g font-family="Arial, sans-serif" font-size="23" fill="#111827">
    <rect x="100" y="190" width="1080" height="70" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="136" y="234">01 备份数据、快照虚拟机、保存软件源和关键配置</text>
    <rect x="100" y="280" width="1080" height="70" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="136" y="324">02 更新当前系统，处理 held packages、第三方源和 reboot-required</text>
    <rect x="100" y="370" width="1080" height="70" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="136" y="414">03 在 screen/tmux/控制台里运行 sudo do-release-upgrade</text>
    <rect x="100" y="460" width="1080" height="70" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="136" y="504">04 根据 diff 判断配置文件，升级完成后重启</text>
    <rect x="100" y="550" width="1080" height="70" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="136" y="594">05 验证版本、内核、服务、端口、日志，再恢复第三方源</text>
  </g>
  <g fill="#16a34a" font-family="Arial, sans-serif" font-size="34" font-weight="700">
    <text x="1100" y="238">✓</text>
    <text x="1100" y="328">✓</text>
    <text x="1100" y="418">✓</text>
    <text x="1100" y="508">✓</text>
    <text x="1100" y="598">✓</text>
  </g>
</svg>
