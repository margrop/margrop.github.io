name: observability-agent-lab

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: shop
      MYSQL_AGENT_PASSWORD: ${MYSQL_AGENT_PASSWORD}
    command: ["--performance-schema=ON", "--slow-query-log=ON", "--long-query-time=0.2"]
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
    ports:
      - "127.0.0.1:13306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [lab]

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.19.0
    command: ["--config.my-cnf=/cfg/.my.cnf", "--collect.global_status", "--collect.info_schema.processlist"]
    volumes:
      - ./exporter.my.cnf:/cfg/.my.cnf:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks: [lab]

  prometheus:
    image: prom/prometheus:v3.13.1
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=2d"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:19090:9090"
    networks: [lab]

  loki:
    image: grafana/loki:3.7.3
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:13100:3100"
    networks: [lab]

  grafana:
    image: grafana/grafana:13.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      MYSQL_AGENT_PASSWORD: ${MYSQL_AGENT_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:13000:3000"
    depends_on: [prometheus, loki, mysql]
    networks: [lab]

  agent-bridge:
    build: ./agent
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: shop
      MYSQL_USER: agent_reader
      MYSQL_PASSWORD: ${MYSQL_AGENT_PASSWORD}
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: admin
      GRAFANA_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      grafana:
        condition: service_started
    stdin_open: true
    networks: [lab]

networks:
  lab:
    internal: false

volumes:
  mysql-data:
  prometheus-data:
  loki-data:
  grafana-data:
