apiVersion: 1
prune: true

datasources:
  - name: Prometheus
    uid: prometheus-lab
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: Loki
    uid: loki-lab
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
  - name: MySQL
    uid: mysql-lab
    type: mysql
    url: mysql:3306
    user: agent_reader
    editable: false
    jsonData:
      database: shop
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 300
    secureJsonData:
      password: ${MYSQL_AGENT_PASSWORD}
